<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Control M · M de Materia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F0EBE0;
  --paper: #F7F3EA;
  --ink:   #111009;
  --olive: #5C6145;
  --olive-light: #DDE0D0;
  --line:  #D4CDB8;
  --muted: #8A8470;
  --warn:  #9C5A2E;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; font-size: 13px; }

/* ── TOP BAR ──────────────────────────────────────────── */
.topbar {
  background: var(--ink);
  color: var(--cream);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 52px;
  flex-shrink: 0;
  gap: 16px;
}

.topbar-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.topbar-sep { color: #333020; }

.topbar-section {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #AAA490;
  flex: 1;
}

.topbar-back {
  background: none;
  border: none;
  color: var(--olive-light);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 0;
  display: none;
  align-items: center;
  gap: 6px;
}

.topbar-back.visible { display: flex; }
.topbar-back:hover { color: var(--cream); }

.topbar-user {
  display: flex;
  gap: 6px;
}

.user-chip {
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid #2A2820;
  color: #666050;
  background: none;
}

.user-chip.on {
  background: var(--olive);
  border-color: var(--olive);
  color: var(--cream);
}

/* ── MAIN VIEWPORT ───────────────────────────────────── */
.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 32px 36px;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  background: var(--cream);
}

.screen.active {
  transform: translateX(0);
}

.screen.exit {
  transform: translateX(-30%);
}

/* ── HOME GRID ───────────────────────────────────────── */
.home-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}

.kpi-box {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
}

.kpi-label {
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.kpi-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.kpi-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

.home-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.tile {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 24px 22px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
  position: relative;
}

.tile:hover {
  border-color: var(--olive);
  background: #F2EFE6;
}

.tile:active { opacity: 0.85; }

.tile.urgente {
  border-left: 3px solid var(--warn);
}

.tile.ok {
  border-left: 3px solid var(--olive);
}

.tile-num {
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}

.tile-title {
  font-size: 15px;
  font-weight: 700;
}

.tile-badge {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

.tile-badge.alert { color: var(--warn); }

.tile-arrow {
  position: absolute;
  bottom: 18px;
  right: 18px;
  font-size: 16px;
  color: var(--line);
}

/* ── INNER SCREENS ───────────────────────────────────── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 10px;
  margin-top: 24px;
}

.section-label:first-child { margin-top: 0; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
  margin-bottom: 8px;
}

.card-name { font-size: 14px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.btn-primary {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.02em;
}
.btn-primary:hover { background: var(--olive); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: none;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 10px 16px;
  font-size: 12px;
}
.btn-ghost:hover { border-color: var(--ink); }

.btn-warn {
  background: var(--warn);
  color: #FFF5EE;
  border: none;
  padding: 10px 16px;
  font-size: 12px;
}

.badge-low {
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid var(--warn);
  color: var(--warn);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 8px;
}

.empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 12px 0; }
.loading { font-size: 12px; color: var(--muted); padding: 32px 0; }
.err { font-size: 12px; color: var(--warn); padding: 32px 0; }

/* ── BANNER ──────────────────────────────────────────── */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 3px solid var(--olive);
  padding: 12px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.banner.warn { border-left-color: var(--warn); }
.banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--olive); flex-shrink: 0; }
.banner.warn .dot { background: var(--warn); }

/* ── FORM ────────────────────────────────────────────── */
.field { margin-top: 12px; }
.field label { display: block; font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field select, .field input { background: var(--cream); border: 1px solid var(--line); color: var(--ink); padding: 9px 10px; width: 100%; }
.field input[type="number"] { width: 140px; }

.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.toggle { background: var(--paper); border: 1px solid var(--line); color: var(--ink); font-size: 12px; padding: 7px 12px; }
.toggle.on { background: var(--olive); border-color: var(--olive); color: var(--cream); }
.toggle:hover:not(.on) { border-color: var(--ink); }

/* ── WIZARD ──────────────────────────────────────────── */
.wizard-overlay {
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 999;
  display: flex;
  flex-direction: column;
}

.wiz-bar {
  height: 3px;
  background: var(--line);
  flex-shrink: 0;
}

.wiz-bar-fill {
  height: 100%;
  background: var(--olive);
  transition: width 0.3s ease;
}

.wiz-top {
  padding: 20px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.wiz-close {
  background: none;
  border: none;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.wiz-close:hover { color: var(--ink); }

.wiz-step {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--olive);
}

.wiz-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 40px;
  text-align: center;
}

.wiz-recipe {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

.wiz-action {
  font-size: clamp(24px, 5.5vw, 40px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.1;
  max-width: 640px;
}

.wiz-num {
  font-size: clamp(88px, 20vw, 160px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.03em;
  margin-top: 4px;
}

.wiz-unit {
  font-size: clamp(18px, 3vw, 26px);
  color: var(--muted);
  margin-top: 6px;
}

.wiz-done {
  font-size: clamp(30px, 6vw, 52px);
  font-weight: 700;
  margin-bottom: 10px;
}

.wiz-done-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 48px;
}

.wiz-footer {
  padding: 0 40px 48px;
  flex-shrink: 0;
}

.wiz-ok {
  background: var(--ink);
  color: var(--cream);
  border: none;
  width: 100%;
  padding: 26px;
  font-size: 17px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.wiz-ok:hover { background: var(--olive); }

/* ── MANUAL ──────────────────────────────────────────── */
.manual-block { margin-bottom: 24px; }
.manual-block h3 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--olive); margin-bottom: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.manual-block ul { padding-left: 18px; font-size: 13px; line-height: 1.9; }

/* ── RESPONSIVE MOBILE ───────────────────────────────── */
@media (max-width: 680px) {
  .topbar { padding: 0 16px; }
  .screen { padding: 20px 18px; }
  .home-kpis { grid-template-columns: repeat(2, 1fr); }
  .home-tiles { grid-template-columns: repeat(2, 1fr); }
  .topbar-user { display: none; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">M</div>
  <span class="topbar-sep">·</span>
  <div class="topbar-section" id="topbar-section">Control M</div>
  <button class="topbar-back" id="topbar-back" onclick="goHome()">← Inicio</button>
  <div class="topbar-user" id="topbar-user"></div>
</header>

<!-- VIEWPORT -->
<div class="viewport" id="viewport">
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div id="home-content"><div class="loading">Cargando…</div></div>
  </div>
  <!-- INNER SCREEN -->
  <div class="screen" id="screen-inner">
    <div id="inner-content"></div>
  </div>
</div>

<!-- WIZARD -->
<div id="wizard-root"></div>

<script>
const API = "/api";
let currentSection = "home";

// ── SISTEMA DE USUARIOS CON ROLES ─────────────────────
// Solo para pintar los botones de login. La autenticación (PIN) la valida el
// backend vía JWT; los PIN ya no viven en el frontend.
const USUARIOS = {
  "Jon":  { rol: "admin",  nombre: "Jon" },
  "Lara": { rol: "equipo", nombre: "Lara" },
  "Moni": { rol: "admin",  nombre: "Mónica" },
};

const MODULOS_EQUIPO = ["preparaciones","lotes","revisiones","ajustes"];
const MODULOS_ADMIN  = ["preparaciones","lotes","materias","revisiones","ajustes","proveedores","recepcion","pagos","manual"];

function getUser()  { try{ return JSON.parse(localStorage.getItem("cm_session")); }catch{ return null; } }
function getToken() { const u = getUser(); return u && u.token; }
function setSession(u) { localStorage.setItem("cm_session", JSON.stringify(u)); }
function logout()   { localStorage.removeItem("cm_session"); location.reload(); }

function puedeVer(seccion) {
  const u = getUser();
  if (!u) return false;
  if (u.rol === "admin") return true;
  return MODULOS_EQUIPO.includes(seccion);
}

function modulosVisibles() {
  const u = getUser();
  if (!u) return [];
  return u.rol === "admin" ? MODULOS_ADMIN : MODULOS_EQUIPO;
}

// ── LOGIN SCREEN ──────────────────────────────────────
let _loginKey = null;

function mostrarLogin() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div style="min-height:100vh;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;">
      <div style="text-align:center;color:var(--cream);">
        <div style="font-size:52px;font-weight:700;line-height:1;">M</div>
        <div style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#555040;margin-top:6px;margin-bottom:52px;">Control M · Producción</div>
        <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#555040;margin-bottom:18px;">¿Quién prepara hoy?</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;">
          ${Object.entries(USUARIOS).map(([k,u]) => `
            <button id="ubtn-${k}" onclick="seleccionarUsuario('${k}')"
              style="font-family:inherit;font-size:13px;padding:14px 28px;background:none;border:1px solid #2A2820;color:#888070;cursor:pointer;">
              ${u.nombre}
            </button>`).join("")}
        </div>
        <div id="pin-wrap" style="display:none;">
          <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#555040;margin-bottom:12px;">PIN</div>
          <input type="password" inputmode="numeric" maxlength="4" id="pin-inp" autocomplete="off"
            style="font-family:inherit;font-size:28px;letter-spacing:0.4em;text-align:center;width:130px;background:none;border:none;border-bottom:1px solid #2A2820;color:var(--cream);padding:8px;outline:none;"
            oninput="if(this.value.length===4)checkPin();">
          <div id="pin-err" style="font-size:11px;color:#9C5A2E;margin-top:14px;min-height:16px;"></div>
        </div>
      </div>
    </div>`;
}

function seleccionarUsuario(key) {
  _loginKey = key;
  Object.keys(USUARIOS).forEach(k => {
    const b = document.getElementById("ubtn-"+k);
    if(b) b.style.borderColor = k===key ? "#5C6145" : "#2A2820";
    if(b) b.style.color = k===key ? "#F0EBE0" : "#888070";
  });
  const w = document.getElementById("pin-wrap");
  w.style.display = "block";
  document.getElementById("pin-inp").value = "";
  document.getElementById("pin-err").textContent = "";
  document.getElementById("pin-inp").focus();
}

async function checkPin() {
  const pin = document.getElementById("pin-inp").value;
  if (pin.length !== 4) return;
  document.getElementById("pin-err").textContent = "";
  try {
    const r = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: _loginKey, pin }),
    });
    if (!r.ok) throw new Error();
    const data = await r.json();
    setSession({ key: data.usuario.key, nombre: data.usuario.nombre, rol: data.usuario.rol, token: data.token });
    entrarApp();
  } catch (e) {
    document.getElementById("pin-err").textContent = "PIN incorrecto";
    document.getElementById("pin-inp").value = "";
    document.getElementById("pin-inp").focus();
  }
}

function renderUserChips() {
  const u = getUser();
  const el = document.getElementById("topbar-user");
  if (!el || !u) return;
  el.innerHTML = `
    <span style="font-size:11px;color:#AAA490;margin-right:10px;">${u.nombre}</span>
    <button class="user-chip" onclick="logout()">Salir</button>`;
}

// ── NAVEGACIÓN ────────────────────────────────────────
function goHome() {
  currentSection = "home";
  document.getElementById("topbar-section").textContent = "Control M";
  document.getElementById("topbar-back").classList.remove("visible");
  document.getElementById("screen-inner").classList.remove("active");
  document.getElementById("screen-inner").classList.add("exit");
  document.getElementById("screen-home").classList.add("active");
  document.getElementById("screen-home").classList.remove("exit");
  setTimeout(() => {
    document.getElementById("screen-inner").classList.remove("exit");
  }, 300);
  loadHome();
}

function openSection(id, title) {
  currentSection = id;
  document.getElementById("topbar-section").textContent = title;
  document.getElementById("topbar-back").classList.add("visible");
  document.getElementById("screen-home").classList.add("exit");
  document.getElementById("screen-home").classList.remove("active");
  document.getElementById("screen-inner").classList.add("active");
  document.getElementById("screen-inner").classList.remove("exit");
  document.getElementById("inner-content").innerHTML = `<div class="loading">Cargando…</div>`;
  setTimeout(() => {
    document.getElementById("screen-home").classList.remove("exit");
  }, 300);
}

// ── HELPERS ───────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  const t = getToken();
  if (t) headers["Authorization"] = "Bearer " + t;
  const r = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (r.status === 401) { localStorage.removeItem("cm_session"); location.reload(); throw new Error("Sesión expirada"); }
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

function el(id) { return document.getElementById(id); }
function setInner(html) { el("inner-content").innerHTML = html; }

function card(name, meta, actions, extra) {
  return `<div class="card">
    <div class="card-name">${name}</div>
    ${meta ? `<div class="card-meta">${meta}</div>` : ""}
    ${extra || ""}
    ${actions ? `<div class="card-actions">${actions}</div>` : ""}
  </div>`;
}

function section(label, items, fn, empty) {
  return `<div class="section-label">${label}</div>` +
    (items && items.length ? items.map(fn).join("") : `<div class="empty">${empty||"Sin elementos."}</div>`);
}

function fmt(iso) {
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function whatsapp(num, msg) { window.open(`https://wa.me/${num}?text=${msg}`, "_blank"); }

// ── HOME ──────────────────────────────────────────────
async function loadHome() {
  try {
    const d = await api("/inicio");
    const k = d.kpis || {};
    const alerta = d.estado_servicio !== "Servicio en orden";

    const u = getUser();
    const esAdmin = u && u.rol === "admin";

    const kpisHTML = esAdmin ? `
      <div class="home-kpis">
        <div class="kpi-box">
          <div class="kpi-label">Producción hoy</div>
          <div class="kpi-val">${k.coste_produccion_hoy!=null?k.coste_produccion_hoy.toFixed(2)+" €":"—"}</div>
          <div class="kpi-sub">${k.preparaciones_hoy||0} preparaciones</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Mermas hoy</div>
          <div class="kpi-val" style="${(k.coste_mermas_hoy||0)>0?"color:var(--warn)":""}">${k.coste_mermas_hoy!=null?k.coste_mermas_hoy.toFixed(2)+" €":"—"}</div>
          <div class="kpi-sub">${k.ajustes_hoy||0} ajustes</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Valor stock</div>
          <div class="kpi-val">${k.valor_stock_total!=null?k.valor_stock_total.toFixed(2)+" €":"—"}</div>
          <div class="kpi-sub">en materias</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Margen carta</div>
          <div class="kpi-val">${k.margen_medio_carta!=null?Math.round(k.margen_medio_carta*100)+" %":"—"}</div>
          <div class="kpi-sub">${k.productos_carta||0} productos</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Estado</div>
          <div class="kpi-val" style="font-size:14px;padding-top:4px;${alerta?"color:var(--warn)":""}">${alerta?"Requiere atención":"En orden"}</div>
          <div class="kpi-sub">${d.preparar&&d.preparar.length?d.preparar.length+" pendientes de prep.":"Producción al día"}</div>
        </div>
      </div>` : "";

    const enCurso = d.en_curso && d.en_curso.length;
    const pendPrep = d.preparar && d.preparar.length;
    const pendPedir = d.pedir && d.pedir.length;
    const pendRevisar = d.revisar && d.revisar.length;
    const pendLotes = d.lotes_a_vigilar && d.lotes_a_vigilar.length;

    const todosLosTiles = [
      { id:"preparaciones", title:"Preparaciones", num:"02", badge: enCurso ? `${enCurso} en curso` : (pendPrep ? `${pendPrep} recomendadas` : "Al día"), urgent: enCurso||pendPrep },
      { id:"lotes", title:"Lotes activos", num:"03", badge: pendLotes ? `${pendLotes} requieren atención` : "Sin alertas", urgent: pendLotes },
      { id:"materias", title:"Materias", num:"04", badge: pendPedir ? `${pendPedir} con disponibilidad baja` : "Stock correcto", urgent: pendPedir, soloAdmin: false },

async function iniciarYAbrir(rid, cantidad, btn) {

async function abrirWizard(id) {
  try {
    const todas = await api("/preparaciones?estado=En curso");
    const p = todas.find(x=>x.id===id);
    if(!p){alert("No encontrada.");return;}
    pintarWizard(p);
  } catch(e){alert(e.message);}
}

function cerrarWizard() {
  el("wizard-root").innerHTML="";
  if(currentSection==="preparaciones") irA_preparaciones();
  else loadHome();
}

function pintarWizard(p) {
  const total=p.pasos.length, actual=p.paso_actual;
  const pct=Math.round((actual/total)*100);
  if(actual>=total){
    el("wizard-root").innerHTML=`
      <div class="wizard-overlay">
        <div class="wiz-bar"><div class="wiz-bar-fill" style="width:100%"></div></div>
        <div class="wiz-top"><span class="wiz-step">Completado</span><button class="wiz-close" onclick="cerrarWizard()">Cerrar</button></div>
        <div class="wiz-body">
          <div class="wiz-done">Preparación finalizada</div>
          <div class="wiz-done-meta">${p.nombre_receta} · ${p.cantidad_objetivo} g · ${p.responsable}</div>
          <button class="wiz-ok" onclick="finalizarPrep('${p.id}')">Crear lote</button>
        </div>
      </div>`;
    return;
  }
  const paso=p.pasos[actual];
  const esIng=paso.tipo==="ingrediente";
  el("wizard-root").innerHTML=`
    <div class="wizard-overlay">
      <div class="wiz-bar"><div class="wiz-bar-fill" style="width:${pct}%"></div></div>
      <div class="wiz-top">
        <span class="wiz-step">Paso ${actual+1} de ${total}</span>
        <button class="wiz-close" onclick="cerrarWizard()">Cerrar</button>
      </div>
      <div class="wiz-body">
        <div class="wiz-recipe">${p.nombre_receta}</div>
        <div class="wiz-action">${paso.texto}</div>
        ${esIng?`<div class="wiz-num">${paso.cantidad}</div><div class="wiz-unit">${paso.unidad}</div>`:""}
      </div>
      <div class="wiz-footer">
        <button class="wiz-ok" onclick="confirmarPaso('${p.id}')">OK — Siguiente</button>
      </div>
    </div>`;
}

// Reduce la imagen en el navegador antes de enviarla (tamaño y coste OCR).
function reducirImagen(file,maxLado,calidad){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      const escala=Math.min(1,maxLado/Math.max(w,h));
      w=Math.round(w*escala); h=Math.round(h*escala);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",calidad));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

async function escanearAlbaran(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const hint=el("ocr-hint");
  hint.textContent="Procesando imagen…";
  try{
    const dataUrl=await reducirImagen(file,1500,0.7);
    window._albFoto=dataUrl;
    el("alb-preview").innerHTML=`<img src="${dataUrl}" style="max-width:100%;border-radius:6px;margin-top:8px;">`;
    hint.textContent="Leyendo el albarán…";
    const r=await api("/recepciones/escanear",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imagen:dataUrl,media_type:"image/jpeg"})});
    if(r.proveedor_id) el("rcp-prov").value=r.proveedor_id;
    if(r.importe_total) el("rcp-imp").value=r.importe_total;
    window._albLineas=r.lineas||[];
    hint.innerHTML=`Leído: <b>${r.proveedor||"proveedor ?"}</b> · total ${(r.importe_total||0).toFixed(2)} €${r.proveedor_id?"":' · <span style="color:#9C5A2E">elige el proveedor</span>'}`;
    const lin=(r.lineas||[]).map(l=>`${l.descripcion} · ${l.cantidad} · ${(l.importe||0).toFixed(2)} €`).join("<br>");
    if(lin) el("alb-preview").innerHTML+=`<div style="font-size:10px;color:#888070;margin-top:8px;">${lin}</div>`;
  }catch(e){
    if(/no configurado|503/i.test(e.message)){
      hint.innerHTML="Lectura automática no activada. La foto queda adjunta; rellena proveedor e importe a mano y registra.";
    }else{
      hint.textContent="No se pudo leer: "+e.message;
    }
  }
}

      <div class="card" style="font-size:10px;color:#888070;">Formato esperado: una columna de producto (por nombre) y una de cantidad. También admite importe y fecha.</div>`);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function importarVentasCSV(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const res=el("csv-res");
  res.textContent="Importando…";
  try{
    const texto=await file.text();
    const r=await api("/ventas/importar",{method:"POST",headers:{"Content-Type":"text/csv"},body:texto});
    const noRec=(r.productos_no_reconocidos&&r.productos_no_reconocidos.length)?` · No reconocidos: ${r.productos_no_reconocidos.join(", ")}`:"";
    res.innerHTML=`✓ Importadas <b>${r.ventas_importadas}</b> ventas de ${r.lineas} líneas. Stock actualizado.${noRec}`;
  }catch(e){res.textContent="Error: "+e.message;}
}

async function confirmarRcp(id){
  try{await api(`/recepciones/${id}/confirmar`,{method:"POST"});irA_recepcion();}
  catch(e){alert(e.message);}
}

// ── PAGOS ─────────────────────────────────────────────
async function irA_pagos(){
  openSection("pagos","Pagos pendientes");
  try{
    const pagos=await api("/pagos");
    setInner(section("Por proveedor",pagos,p=>{
      const listId=`alb-${p.proveedor_id}`;
      const filas=(p.recepciones||[]).slice().reverse().map(r=>{
        const f=new Date(r.fecha).toLocaleDateString("es-ES");
        const btn=r.tiene_foto
          ? `<button class="btn-ghost" onclick="verAlbaran('${r.id}')">Ver albarán</button>`
          : `<span style="font-size:10px;color:#aaa490;">sin foto</span>`;
        return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-top:1px solid #E2DBCB;">
          <span style="font-size:11px;color:#555040;">${f} · ${(r.importe_total||0).toFixed(2)} € · ${r.estado}${r.n_lineas?` · ${r.n_lineas} líneas`:""}</span>
          ${btn}</div>`;
      }).join("");
      const extra=`
        <div onclick="toggleAlb('${listId}')" style="cursor:pointer;font-size:11px;color:var(--olive);margin-top:8px;user-select:none;">
          <span id="${listId}-arrow">▸</span> Desplegar ${(p.recepciones||[]).length} albarán(es)</div>
        <div id="${listId}" style="display:none;margin-top:4px;">${filas}</div>`;
      return card(
        p.proveedor_nombre,
        `${p.importe_pendiente.toFixed(2)} € · ${p.albaranes_pendientes} albarán(es)`,
        `<button class="btn-ghost" onclick="marcarPagado('${p.proveedor_id}')">Marcar como pagado</button>`,
        extra
      );
    },"No hay pagos pendientes."));
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

function toggleAlb(id){
  const d=el(id); if(!d) return;
  const abierto=d.style.display!=="none";
  d.style.display=abierto?"none":"block";
  const a=el(id+"-arrow"); if(a) a.textContent=abierto?"▸":"▾";
}

// Abre el albarán como documento digital (foto + datos) en una ventana nueva.
async function verAlbaran(id){
  const w=window.open("","_blank");
  if(w) w.document.write("<p style='font-family:sans-serif;padding:20px;'>Cargando albarán…</p>");
  try{
    const r=await api(`/recepciones/${id}`);
    const f=new Date(r.fecha).toLocaleString("es-ES");
    const lineas=(r.lineas||[]).map(l=>`<tr>
      <td>${l.descripcion||""}</td>
      <td style="text-align:right;">${l.cantidad??""}</td>
      <td style="text-align:right;">${l.precio_unitario!=null?Number(l.precio_unitario).toFixed(2)+" €":""}</td>
      <td style="text-align:right;">${l.importe!=null?Number(l.importe).toFixed(2)+" €":""}</td></tr>`).join("");
    const html=`<!doctype html><html lang="es"><head><meta charset="utf-8">
      <meta name="viewport" content="width=device-width,initial-scale=1">
      <title>Albarán ${r.id}</title>
      <style>
        body{font-family:'Courier Prime',monospace;background:#F0EBE0;color:#111009;margin:0;padding:20px;}
        .doc{max-width:680px;margin:0 auto;background:#fff;border:1px solid #d8d0bf;border-radius:8px;padding:22px;}
        h1{font-size:18px;margin:0 0 2px;} .sub{font-size:11px;color:#5C6145;letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;}
        .meta{font-size:12px;margin:4px 0;} .meta b{color:#5C6145;}
        table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12px;}
        th,td{padding:6px 4px;border-bottom:1px solid #eee3cf;} th{text-align:left;color:#5C6145;font-size:10px;text-transform:uppercase;}
        .total{font-size:15px;font-weight:700;margin-top:12px;text-align:right;}
        img{max-width:100%;margin-top:18px;border-radius:6px;border:1px solid #e2dbcb;}
        @media print{button{display:none}}
        button{margin-top:16px;font-family:inherit;font-size:12px;padding:8px 16px;background:#5C6145;color:#F0EBE0;border:none;border-radius:4px;cursor:pointer;}
      </style></head><body><div class="doc">
        <h1>Albarán — ${r.proveedor_nombre||r.proveedor_id}</h1>
        <div class="sub">Control M · Documento digital</div>
        <div class="meta"><b>Fecha:</b> ${f}</div>
        <div class="meta"><b>Estado:</b> ${r.estado} · pendiente ${Number(r.pendiente_pago||0).toFixed(2)} €</div>
        ${lineas?`<table><thead><tr><th>Concepto</th><th style="text-align:right;">Cant.</th><th style="text-align:right;">Precio</th><th style="text-align:right;">Importe</th></tr></thead><tbody>${lineas}</tbody></table>`:""}
        <div class="total">Total: ${Number(r.importe_total||0).toFixed(2)} €</div>
        ${r.foto_albaran_url?`<img src="${r.foto_albaran_url}" alt="Foto del albarán">`:'<p style="font-size:11px;color:#888;margin-top:14px;">Sin foto adjunta.</p>'}
        <button onclick="window.print()">Imprimir / Guardar PDF</button>
      </div></body></html>`;
    if(w){ w.document.open(); w.document.write(html); w.document.close(); }
  }catch(e){
    if(w) w.document.body.innerHTML=`<p style='font-family:sans-serif;padding:20px;color:#9C5A2E;'>No se pudo abrir el albarán: ${e.message}</p>`;
    else alert(e.message);
  }
}

async function marcarPagado(id){
  if(!confirm("¿Marcar todos los albaranes de este proveedor como pagados?")) return;
  try{await api(`/pagos/${id}/marcar-pagado`,{method:"POST"});irA_pagos();}
  catch(e){alert(e.message);}
}

// ── CARTA Y MÁRGENES ──────────────────────────────────
async function irA_carta(){
  openSection("carta","Carta y márgenes");
  try{
    const d=await api("/carta");
    const resumen=`<div class="section-label">Resumen de la carta</div>
      <div class="card"><div class="card-name">Margen medio ${Math.round(d.margen_medio*100)}%</div>
        <div class="card-meta">Food cost medio ${Math.round(d.food_cost_medio*100)}% · ${d.total_productos} productos${d.hay_estimaciones?" · incluye costes estimados":""}</div></div>`;
    const items=section("Productos", d.productos, p=>{
      const col=p.rentabilidad==="alta"?"#5C6145":(p.rentabilidad==="media"?"#9C7A2E":"#9C5A2E");
      const w=Math.max(2,Math.round(p.margen_bruto*100));
      const barra=`<div style="margin-top:8px;height:6px;background:#E2DBCB;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${w}%;background:${col};"></div></div>`;
      const ing=p.ingredientes.map(i=>`${i.nombre} ${i.cantidad}${i.unidad}`).join(" · ");
      return card(
        `${p.nombre}${p.coste_estimado?' <span style="font-size:9px;color:#9C7A2E;">(estimado)</span>':""}`,
        `${p.precio_venta.toFixed(2)} € · coste ${p.coste.toFixed(2)} € · margen ${Math.round(p.margen_bruto*100)}% (${p.margen_euros.toFixed(2)} €)`,
        null,
        barra+`<div style="font-size:10px;color:#888070;margin-top:8px;">${ing}</div>`
      );
    }, "No hay productos en la carta.");
    setInner(resumen+items);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// ── ANÁLISIS ──────────────────────────────────────────
async function irA_analisis(){
  openSection("analisis","Análisis");
  try{
    const [sem,stock]=await Promise.all([api("/reportes/semana"),api("/reportes/stock")]);
    const maxCoste=Math.max(1,...sem.dias.map(x=>Math.max(x.coste_produccion,x.coste_mermas)));
    const barrasDias=sem.dias.map(x=>{
      const wp=Math.round(x.coste_produccion/maxCoste*100), wm=Math.round(x.coste_mermas/maxCoste*100);
      return `<div style="margin-bottom:10px;">
        <div style="font-size:10px;color:#888070;display:flex;justify-content:space-between;"><span>${x.fecha.slice(5)}</span><span>${x.coste_produccion.toFixed(2)} €</span></div>
        <div style="height:8px;background:#E2DBCB;border-radius:4px;overflow:hidden;"><div style="height:100%;width:${wp}%;background:#5C6145;"></div></div>
        ${x.coste_mermas>0?`<div style="height:5px;margin-top:2px;background:#E2DBCB;border-radius:4px;overflow:hidden;"><div style="height:100%;width:${wm}%;background:#9C5A2E;"></div></div>`:""}
      </div>`;
    }).join("");
    const masUsadas=section("Materias más usadas (7 días)", sem.materias_mas_usadas,
      m=>card(m.nombre, `${m.cantidad} ${m.unidad} · ${m.coste.toFixed(2)} €`), "Sin datos de uso esta semana.");
    const maxVal=Math.max(1,...stock.materias.map(m=>m.valor_stock));
    const barrasStock=section("Proyección de stock", stock.materias.slice(0,10), m=>{
      const w=Math.max(2,Math.round(m.valor_stock/maxVal*100));
      const dias=m.dias_restantes!=null?`${m.dias_restantes} días`:"sin ritmo";
      return `<div class="card"><div class="card-name">${m.nombre}${m.bajo_minimo?' <span style="color:#9C5A2E;font-size:9px;">bajo mínimo</span>':""}</div>
        <div class="card-meta">${m.valor_stock.toFixed(2)} € · ${m.disponibilidad_actual} ${m.unidad} · ${dias} restantes</div>
        <div style="margin-top:6px;height:6px;background:#E2DBCB;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${w}%;background:#5C6145;"></div></div></div>`;
    }, "Sin materias.");
    setInner(
      `<div class="section-label">Producción vs mermas (7 días)</div><div class="card">${barrasDias}</div>`+
      `<div class="card" style="font-size:11px;color:#888070;">Total semana — producción ${sem.totales.coste_produccion.toFixed(2)} € · mermas ${sem.totales.coste_mermas.toFixed(2)} € · ${sem.totales.preparaciones} preparaciones</div>`+
      masUsadas+barrasStock
    );
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// ── INIT ──────────────────────────────────────────────
const APP_SHELL = document.body.innerHTML;

// Pinta la app ya autenticada. Sin recargar la página (la recarga causaba el
// bucle de splash y la pérdida del contexto JS tras el login).
function entrarApp() {
  document.body.innerHTML = APP_SHELL;
  renderUserChips();
  loadHome();
}

async function arrancar() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div id="splash" style="min-height:100vh;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;text-align:center;">
      <div style="font-size:64px;font-weight:700;color:var(--cream);line-height:1;">M</div>
      <div style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#555040;margin-top:8px;margin-bottom:56px;">Control M · Producción</div>
      <div id="splash-estado" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#555040;">Conectando…</div>
      <div id="splash-count" style="font-size:10px;color:#333020;margin-top:8px;"></div>
      <div style="margin-top:20px;width:48px;height:1px;background:#2A2820;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--olive);animation:slidebar 1.4s ease-in-out infinite;"></div>
      </div>
      <style>@keyframes slidebar{0%{left:-100%}50%{left:0}100%{left:100%}}</style>
    </div>`;

  let intentos = 0;
  const mensajes = {
    3: "El sistema está arrancando…",
    8: "Un momento, casi listo…",
    15: "Tardando más de lo habitual…",
    25: "Sigue esperando…",
  };

  while (intentos < 60) {
    try {
      const r = await fetch("/api/salud", { cache: "no-store" });
      if (r.ok) {
        el("splash-estado").textContent = "Listo";
        await new Promise(r => setTimeout(r, 400));
        // Mostrar login o pintar la app — sin recargar (evita bucle de splash)
        if (!getUser()) {
          mostrarLogin();
        } else {
          entrarApp();
        }
        return;
      }
    } catch(e) {}
    intentos++;
    el("splash-count").textContent = intentos * 2 + "s";
    if (mensajes[intentos]) el("splash-estado").textContent = mensajes[intentos];
    await new Promise(r => setTimeout(r, 2000));
  }

  // Tras 2 minutos sin respuesta
  el("splash-estado").textContent = "Sin respuesta del servidor";
  el("splash-count").textContent = "Recarga la página para intentarlo de nuevo";
}

// Init
arrancar();
</script>
