<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Control M · M de Materia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F0EBE0;
  --paper: #F7F3EA;
  --ink:   #111009;
  --olive: #5C6145;
  --olive-light: #DDE0D0;
  --line:  #D4CDB8;
  --muted: #8A8470;
  --warn:  #9C5A2E;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; font-size: 13px; }

/* ── TOP BAR ──────────────────────────────────────────── */
.topbar {
  background: var(--ink);
  color: var(--cream);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 52px;
  flex-shrink: 0;
  gap: 16px;
}

.topbar-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.topbar-sep { color: #333020; }

.topbar-section {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #AAA490;
  flex: 1;
}

.topbar-back {
  background: none;
  border: none;
  color: var(--olive-light);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 0;
  display: none;
  align-items: center;
  gap: 6px;
}

.topbar-back.visible { display: flex; }
.topbar-back:hover { color: var(--cream); }

.topbar-user {
  display: flex;
  gap: 6px;
}

.user-chip {
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid #2A2820;
  color: #666050;
  background: none;
}

.user-chip.on {
  background: var(--olive);
  border-color: var(--olive);
  color: var(--cream);
}

/* ── MAIN VIEWPORT ───────────────────────────────────── */
.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 32px 36px;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  background: var(--cream);
}

.screen.active {
  transform: translateX(0);
}

.screen.exit {
  transform: translateX(-30%);
}

/* ── HOME GRID ───────────────────────────────────────── */
.home-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}

.kpi-box {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
}

.kpi-label {
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.kpi-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.kpi-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

.home-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.tile {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 24px 22px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
  position: relative;
}

.tile:hover {
  border-color: var(--olive);
  background: #F2EFE6;
}

.tile:active { opacity: 0.85; }

.tile.urgente {
  border-left: 3px solid var(--warn);
}

.tile.ok {
  border-left: 3px solid var(--olive);
}

.tile-num {
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}

.tile-title {
  font-size: 15px;
  font-weight: 700;
}

.tile-badge {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

.tile-badge.alert { color: var(--warn); }

.tile-arrow {
  position: absolute;
  bottom: 18px;
  right: 18px;
  font-size: 16px;
  color: var(--line);
}

/* ── INNER SCREENS ───────────────────────────────────── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 10px;
  margin-top: 24px;
}

.section-label:first-child { margin-top: 0; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
  margin-bottom: 8px;
}

.card-name { font-size: 14px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.btn-primary {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.02em;
}
.btn-primary:hover { background: var(--olive); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: none;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 10px 16px;
  font-size: 12px;
}
.btn-ghost:hover { border-color: var(--ink); }

.btn-warn {
  background: var(--warn);
  color: #FFF5EE;
  border: none;
  padding: 10px 16px;
  font-size: 12px;
}

.badge-low {
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid var(--warn);
  color: var(--warn);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 8px;
}

.empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 12px 0; }
.loading { font-size: 12px; color: var(--muted); padding: 32px 0; }
.err { font-size: 12px; color: var(--warn); padding: 32px 0; }

/* ── BANNER ──────────────────────────────────────────── */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 3px solid var(--olive);
  padding: 12px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.banner.warn { border-left-color: var(--warn); }
.banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--olive); flex-shrink: 0; }
.banner.warn .dot { background: var(--warn); }

/* ── FORM ────────────────────────────────────────────── */
.field { margin-top: 12px; }
.field label { display: block; font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field select, .field input { background: var(--cream); border: 1px solid var(--line); color: var(--ink); padding: 9px 10px; width: 100%; }
.field input[type="number"] { width: 140px; }

.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.toggle { background: var(--paper); border: 1px solid var(--line); color: var(--ink); font-size: 12px; padding: 7px 12px; }
.toggle.on { background: var(--olive); border-color: var(--olive); color: var(--cream); }
.toggle:hover:not(.on) { border-color: var(--ink); }

/* ── WIZARD ──────────────────────────────────────────── */
.wizard-overlay {
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 999;
  display: flex;
  flex-direction: column;
}

.wiz-bar {
  height: 3px;
  background: var(--line);
  flex-shrink: 0;
}

.wiz-bar-fill {
  height: 100%;
  background: var(--olive);
  transition: width 0.3s ease;
}

.wiz-top {
  padding: 20px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.wiz-close {
  background: none;
  border: none;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.wiz-close:hover { color: var(--ink); }

.wiz-step {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--olive);
}

.wiz-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 40px;
  text-align: center;
}

.wiz-recipe {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

.wiz-action {
  font-size: clamp(24px, 5.5vw, 40px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.1;
  max-width: 640px;
}

.wiz-num {
  font-size: clamp(88px, 20vw, 160px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.03em;
  margin-top: 4px;
}

.wiz-unit {
  font-size: clamp(18px, 3vw, 26px);
  color: var(--muted);
  margin-top: 6px;
}

.wiz-done {
  font-size: clamp(30px, 6vw, 52px);
  font-weight: 700;
  margin-bottom: 10px;
}

.wiz-done-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 48px;
}

.wiz-footer {
  padding: 0 40px 48px;
  flex-shrink: 0;
}

.wiz-ok {
  background: var(--ink);
  color: var(--cream);
  border: none;
  width: 100%;
  padding: 26px;
  font-size: 17px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.wiz-ok:hover { background: var(--olive); }

/* ── MANUAL ──────────────────────────────────────────── */
.manual-block { margin-bottom: 24px; }
.manual-block h3 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--olive); margin-bottom: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.manual-block ul { padding-left: 18px; font-size: 13px; line-height: 1.9; }

/* ── RESPONSIVE MOBILE ───────────────────────────────── */
@media (max-width: 680px) {
  .topbar { padding: 0 16px; }
  .screen { padding: 20px 18px; }
  .home-kpis { grid-template-columns: repeat(2, 1fr); }
  .home-tiles { grid-template-columns: repeat(2, 1fr); }
  .topbar-user { display: none; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">M</div>
  <span class="topbar-sep">·</span>
  <div class="topbar-section" id="topbar-section">Control M</div>
  <button class="topbar-back" id="topbar-back" onclick="goHome()">← Inicio</button>
  <div class="topbar-user" id="topbar-user"></div>
</header>

<!-- VIEWPORT -->
<div class="viewport" id="viewport">
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div id="home-content"><div class="loading">Cargando…</div></div>
  </div>
  <!-- INNER SCREEN -->
  <div class="screen" id="screen-inner">
    <div id="inner-content"></div>
  </div>
</div>

<!-- WIZARD -->
<div id="wizard-root"></div>

<script>
const API = "/api";
let currentSection = "home";

// ── SISTEMA DE USUARIOS CON ROLES ─────────────────────
const USUARIOS = {
  "Jon":  { pin: "1111", rol: "admin",  nombre: "Jon" },
  "Lara": { pin: "2222", rol: "equipo", nombre: "Lara" },
  "Moni": { pin: "3333", rol: "admin",  nombre: "Mónica" },
};

const MODULOS_EQUIPO = ["preparaciones","lotes","revisiones","ajustes"];
const MODULOS_ADMIN  = ["preparaciones","lotes","materias","revisiones","ajustes","proveedores","recepcion","pagos","manual"];

function getUser()  { try{ return JSON.parse(localStorage.getItem("cm_session")); }catch{ return null; } }
function setSession(u) { localStorage.setItem("cm_session", JSON.stringify(u)); }
function logout()   { localStorage.removeItem("cm_session"); location.reload(); }

function puedeVer(seccion) {
  const u = getUser();
  if (!u) return false;
  if (u.rol === "admin") return true;
  return MODULOS_EQUIPO.includes(seccion);
}

function modulosVisibles() {
  const u = getUser();
  if (!u) return [];
  return u.rol === "admin" ? MODULOS_ADMIN : MODULOS_EQUIPO;
}

// ── LOGIN SCREEN ──────────────────────────────────────
let _loginKey = null;

function mostrarLogin() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div style="min-height:100vh;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;">
      <div style="text-align:center;color:var(--cream);">
        <div style="font-size:52px;font-weight:700;line-height:1;">M</div>
        <div style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#555040;margin-top:6px;margin-bottom:52px;">Control M · Producción</div>
        <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#555040;margin-bottom:18px;">¿Quién prepara hoy?</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;">
          ${Object.entries(USUARIOS).map(([k,u]) => `
            <button id="ubtn-${k}" onclick="seleccionarUsuario('${k}')"
              style="font-family:inherit;font-size:13px;padding:14px 28px;background:none;border:1px solid #2A2820;color:#888070;cursor:pointer;">
              ${u.nombre}
            </button>`).join("")}
        </div>
        <div id="pin-wrap" style="display:none;">
          <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#555040;margin-bottom:12px;">PIN</div>
          <input type="password" inputmode="numeric" maxlength="4" id="pin-inp" autocomplete="off"
            style="font-family:inherit;font-size:28px;letter-spacing:0.4em;text-align:center;width:130px;background:none;border:none;border-bottom:1px solid #2A2820;color:var(--cream);padding:8px;outline:none;"
            oninput="if(this.value.length===4)checkPin();">
          <div id="pin-err" style="font-size:11px;color:#9C5A2E;margin-top:14px;min-height:16px;"></div>
        </div>
      </div>
    </div>`;
}

function seleccionarUsuario(key) {
  _loginKey = key;
  Object.keys(USUARIOS).forEach(k => {
    const b = document.getElementById("ubtn-"+k);
    if(b) b.style.borderColor = k===key ? "#5C6145" : "#2A2820";
    if(b) b.style.color = k===key ? "#F0EBE0" : "#888070";
  });
  const w = document.getElementById("pin-wrap");
  w.style.display = "block";
  document.getElementById("pin-inp").value = "";
  document.getElementById("pin-err").textContent = "";
  document.getElementById("pin-inp").focus();
}

function checkPin() {
  const pin = document.getElementById("pin-inp").value;
  const u = USUARIOS[_loginKey];
  if (pin === u.pin) {
    setSession({ key: _loginKey, nombre: u.nombre, rol: u.rol });
    location.reload();
  } else if (pin.length === 4) {
    document.getElementById("pin-err").textContent = "PIN incorrecto";
    document.getElementById("pin-inp").value = "";
  }
}

function renderUserChips() {
  const u = getUser();
  const el = document.getElementById("topbar-user");
  if (!el || !u) return;
  el.innerHTML = `
    <span style="font-size:11px;color:#AAA490;margin-right:10px;">${u.nombre}</span>
    <button class="user-chip" onclick="logout()">Salir</button>`;
}

// ── NAVEGACIÓN ────────────────────────────────────────
function goHome() {
  currentSection = "home";
  document.getElementById("topbar-section").textContent = "Control M";
  document.getElementById("topbar-back").classList.remove("visible");
  document.getElementById("screen-inner").classList.remove("active");
  document.getElementById("screen-inner").classList.add("exit");
  document.getElementById("screen-home").classList.add("active");
  document.getElementById("screen-home").classList.remove("exit");
  setTimeout(() => {
    document.getElementById("screen-inner").classList.remove("exit");
  }, 300);
  loadHome();
}

function openSection(id, title) {
  currentSection = id;
  document.getElementById("topbar-section").textContent = title;
  document.getElementById("topbar-back").classList.add("visible");
  document.getElementById("screen-home").classList.add("exit");
  document.getElementById("screen-home").classList.remove("active");
  document.getElementById("screen-inner").classList.add("active");
  document.getElementById("screen-inner").classList.remove("exit");
  document.getElementById("inner-content").innerHTML = `<div class="loading">Cargando…</div>`;
  setTimeout(() => {
    document.getElementById("screen-home").classList.remove("exit");
  }, 300);
}

// ── HELPERS ───────────────────────────────────────────
async function api(path, opts) {
  const r = await fetch(API + path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

function el(id) { return document.getElementById(id); }
function setInner(html) { el("inner-content").innerHTML = html; }

function card(name, meta, actions, extra) {
  return `<div class="card">
    <div class="card-name">${name}</div>
    ${meta ? `<div class="card-meta">${meta}</div>` : ""}
    ${extra || ""}
    ${actions ? `<div class="card-actions">${actions}</div>` : ""}
  </div>`;
}

function section(label, items, fn, empty) {
  return `<div class="section-label">${label}</div>` +
    (items && items.length ? items.map(fn).join("") : `<div class="empty">${empty||"Sin elementos."}</div>`);
}

function fmt(iso) {
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function whatsapp(num, msg) { window.open(`https://wa.me/${num}?text=${msg}`, "_blank"); }

// ── HOME ──────────────────────────────────────────────
async function loadHome() {
  try {
    const d = await api("/inicio");
    const k = d.kpis || {};
    const alerta = d.estado_servicio !== "Servicio en orden";

    const u = getUser();
    const esAdmin = u && u.rol === "admin";

    const kpisHTML = esAdmin ? `
      <div class="home-kpis">
        <div class="kpi-box">
          <div class="kpi-label">Producción hoy</div>
          <div class="kpi-val">${k.coste_produccion_hoy!=null?k.coste_produccion_hoy.toFixed(2)+" €":"—"}</div>
          <div class="kpi-sub">${k.preparaciones_hoy||0} preparaciones</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Mermas hoy</div>
          <div class="kpi-val" style="${(k.coste_mermas_hoy||0)>0?"color:var(--warn)":""}">${k.coste_mermas_hoy!=null?k.coste_mermas_hoy.toFixed(2)+" €":"—"}</div>
          <div class="kpi-sub">${k.ajustes_hoy||0} ajustes</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Valor stock</div>
          <div class="kpi-val">${k.valor_stock_total!=null?k.valor_stock_total.toFixed(2)+" €":"—"}</div>
          <div class="kpi-sub">en materias</div>
        </div>
        <div class="kpi-box">
          <div class="kpi-label">Estado</div>
          <div class="kpi-val" style="font-size:14px;padding-top:4px;${alerta?"color:var(--warn)":""}">${alerta?"Requiere atención":"En orden"}</div>
          <div class="kpi-sub">${d.preparar&&d.preparar.length?d.preparar.length+" pendientes de prep.":"Producción al día"}</div>
        </div>
      </div>` : "";

    const enCurso = d.en_curso && d.en_curso.length;
    const pendPrep = d.preparar && d.preparar.length;
    const pendPedir = d.pedir && d.pedir.length;
    const pendRevisar = d.revisar && d.revisar.length;
    const pendLotes = d.lotes_a_vigilar && d.lotes_a_vigilar.length;

    const u = getUser();
    const esAdmin = u && u.rol === "admin";

    const todosLosTiles = [
      { id:"preparaciones", title:"Preparaciones", num:"02", badge: enCurso ? `${enCurso} en curso` : (pendPrep ? `${pendPrep} recomendadas` : "Al día"), urgent: enCurso||pendPrep },
      { id:"lotes", title:"Lotes activos", num:"03", badge: pendLotes ? `${pendLotes} requieren atención` : "Sin alertas", urgent: pendLotes },
      { id:"materias", title:"Materias", num:"04", badge: pendPedir ? `${pendPedir} con disponibilidad baja` : "Stock correcto", urgent: pendPedir, soloAdmin: false },
      { id:"revisiones", title:"Revisiones", num:"05", badge: pendRevisar ? `${pendRevisar} pendientes` : "Completadas", urgent: pendRevisar },
      { id:"ajustes", title:"Ajustes", num:"06", badge: `${k.ajustes_hoy||0} registrados hoy` },
      { id:"proveedores", title:"Proveedores", num:"07", badge: pendPedir ? `${pendPedir} a contactar` : "Sin pedidos urgentes", soloAdmin: true },
      { id:"recepcion", title:"Recepción", num:"08", badge: "Entrada de mercancía", soloAdmin: true },
      { id:"pagos", title:"Pagos pendientes", num:"09", badge: "Por proveedor", soloAdmin: true },
      { id:"manual", title:"La forma de hacer las cosas", num:"10", badge: "Manual operativo", soloAdmin: true },
    ];

    const tiles = todosLosTiles.filter(t => !t.soloAdmin || esAdmin);

    const tilesHTML = `
      <div class="home-tiles">
        ${tiles.map(t => `
          <div class="tile ${t.urgent?"urgente":""}" onclick="irA_${t.id}()">
            <div class="tile-num">${t.num}</div>
            <div class="tile-title">${t.title}</div>
            <div class="tile-badge ${t.urgent?"alert":""}">${t.badge}</div>

}

// ── PREPARACIONES ─────────────────────────────────────
async function irA_preparaciones() {
  openSection("preparaciones","Preparaciones");
  try {
    const [recetas, enCurso, recientes] = await Promise.all([
      api("/recetas"),
      api("/preparaciones?estado=En curso"),
      api("/preparaciones?estado=Finalizada"),
    ]);
    let html = "";
    if (enCurso.length) {
      html += `<div class="section-label">En curso</div>`;
      html += enCurso.map(p => card(
        `${p.nombre_receta} — ${p.cantidad_objetivo} g`,
        `${p.responsable} · Paso ${Math.min(p.paso_actual+1,p.pasos.length)} de ${p.pasos.length}`,
        `<button class="btn-primary" onclick="abrirWizard('${p.id}')">Continuar</button>`
      )).join("");
    }
    html += `<div class="section-label">Elegir preparación</div>`;
    html += recetas.map(r => `
      <div class="card">
        <div class="card-name">${r.nombre}</div>
        <div class="card-meta">Disponible: ${r.disponible_ahora} ${r.unidad} · vida útil ${r.vida_util_horas} h</div>
        <div class="card-actions">
          ${r.opciones_tamano.map(o => `
            <button class="btn-ghost" onclick="iniciarYAbrir('${r.id}',${o.cantidad},this)">
              ${o.cantidad} ${r.unidad} · ${o.coste_estimado.toFixed(2)} €
            </button>`).join("")}
        </div>
      </div>`).join("");
    if (recientes.length) {
      html += section("Historial reciente", recientes.slice(-5).reverse(), p =>
        card(`${p.nombre_receta} — ${p.cantidad_objetivo} g`, `${p.responsable} · ${fmt(p.finalizada_en)}`)
      );
    }
    setInner(html);
  } catch(e) { setInner(`<div class="err">${e.message}</div>`); }
}

// ── WIZARD ────────────────────────────────────────────
async function iniciarYAbrir(rid, cantidad, btn) {
  if(btn) btn.disabled=true;
  try {
    const p = await api("/preparaciones",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({receta_id:rid,cantidad_objetivo:cantidad,responsable:getUser()||"Sin asignar"})});
    pintarWizard(p);
  } catch(e){alert(e.message);if(btn)btn.disabled=false;}
}

async function abrirWizard(id) {
  try {
    const todas = await api("/preparaciones?estado=En curso");
    const p = todas.find(x=>x.id===id);
    if(!p){alert("No encontrada.");return;}
    pintarWizard(p);
  } catch(e){alert(e.message);}
}

function cerrarWizard() {
  el("wizard-root").innerHTML="";
  if(currentSection==="preparaciones") irA_preparaciones();
  else loadHome();
}

function pintarWizard(p) {
  const total=p.pasos.length, actual=p.paso_actual;
  const pct=Math.round((actual/total)*100);
  if(actual>=total){
    el("wizard-root").innerHTML=`
      <div class="wizard-overlay">
        <div class="wiz-bar"><div class="wiz-bar-fill" style="width:100%"></div></div>
        <div class="wiz-top"><span class="wiz-step">Completado</span><button class="wiz-close" onclick="cerrarWizard()">Cerrar</button></div>
        <div class="wiz-body">
          <div class="wiz-done">Preparación finalizada</div>
          <div class="wiz-done-meta">${p.nombre_receta} · ${p.cantidad_objetivo} g · ${p.responsable}</div>
          <button class="wiz-ok" onclick="finalizarPrep('${p.id}')">Crear lote</button>
        </div>
      </div>`;
    return;
  }
  const paso=p.pasos[actual];
  const esIng=paso.tipo==="ingrediente";
  el("wizard-root").innerHTML=`
    <div class="wizard-overlay">
      <div class="wiz-bar"><div class="wiz-bar-fill" style="width:${pct}%"></div></div>
      <div class="wiz-top">
        <span class="wiz-step">Paso ${actual+1} de ${total}</span>
        <button class="wiz-close" onclick="cerrarWizard()">Cerrar</button>
      </div>
      <div class="wiz-body">
        <div class="wiz-recipe">${p.nombre_receta}</div>
        <div class="wiz-action">${paso.texto}</div>
        ${esIng?`<div class="wiz-num">${paso.cantidad}</div><div class="wiz-unit">${paso.unidad}</div>`:""}
      </div>
      <div class="wiz-footer">
        <button class="wiz-ok" onclick="confirmarPaso('${p.id}')">OK — Siguiente</button>
      </div>
    </div>`;
}

async function confirmarPaso(id){
  try{const p=await api(`/preparaciones/${id}/confirmar-paso`,{method:"POST"});pintarWizard(p);}
  catch(e){alert(e.message);}
}

async function finalizarPrep(id){
  try{
    const d=await api(`/preparaciones/${id}/finalizar`,{method:"POST"});
    if(d.etiqueta) window.open(`/etiqueta/${d.etiqueta.id}`,"_blank");
    cerrarWizard();
  }catch(e){alert(e.message);}
}

// ── REVISIONES ────────────────────────────────────────
async function irA_revisiones(){
  openSection("revisiones","Revisiones");
  try{
    const [tipos,revs]=await Promise.all([api("/revisiones/tipos"),api("/revisiones")]);
    const hoy=new Date().toDateString();
    const deHoy=revs.filter(r=>new Date(r.fecha).toDateString()===hoy);
    let html=`<div class="section-label">Revisiones de hoy</div>`;
    html+=tipos.map(t=>{
      const reg=deHoy.filter(r=>r.tipo===t.tipo).slice(-1)[0];
      if(reg?.estado==="Correcto") return card(t.tipo,`${reg.valor} · registrado`);
      if(reg&&reg.estado!=="Correcto") return card(
        t.tipo,`${reg.valor} · ${reg.estado}${reg.accion_correctiva?" · "+reg.accion_correctiva:""}`,
        `<button class="btn-primary" onclick="resolverRev('${reg.id}',irA_revisiones)">Marcar revisado</button>`);
      if(t.clase==="temperatura") return `
        <div class="card">
          <div class="card-name">${t.tipo}</div>
          <div class="field" style="margin-top:10px;">
            <label>Temperatura en ${t.unidad}</label>
            <input type="number" step="0.1" id="rev_${t.tipo.replace(/\s/g,"_")}" style="width:110px;">
          </div>
          <div class="card-actions">
            <button class="btn-ghost" onclick="regRev('${t.tipo}',document.getElementById('rev_${t.tipo.replace(/\s/g,"_")}').value)">Registrar</button>
          </div>
        </div>`;
      return card(t.tipo,"",`<button class="btn-ghost" onclick="regRev('${t.tipo}','Realizada')">Marcar realizada</button>`);
    }).join("");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function regRev(tipo,valor){
  if(!valor){alert("Introduce un valor.");return;}
  try{
    await api("/revisiones/registrar",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo,valor,responsable:getUser()||"Sin asignar"})});
    irA_revisiones();
  }catch(e){alert(e.message);}
}

async function resolverRev(id,cb){
  try{await api(`/revisiones/${id}/resolver`,{method:"POST"});cb();}
  catch(e){alert(e.message);}
}

// ── AJUSTES ───────────────────────────────────────────
let _aj={tipo:"materia",motivo:null};

async function irA_ajustes(){
  openSection("ajustes","Ajustes");
  try{
    const [mat,lotes,motivos,hist]=await Promise.all([
      api("/materias"),api("/lotes"),api("/ajustes/motivos"),api("/ajustes")]);
    _aj={tipo:"materia",motivo:null};
    window._ajMat=mat; window._ajLotes=lotes;
    let html=`
      <div class="section-label">Registrar ajuste</div>
      <div class="card">
        <div class="field">
          <label>¿Qué se ajusta?</label>
          <div class="toggle-row">
            <button class="toggle on" id="aj-m" onclick="ajTipo('materia')">Materia</button>
            <button class="toggle" id="aj-l" onclick="ajTipo('lote')">Lote</button>
          </div>
        </div>
        <div class="field">
          <label id="aj-ol">Materia</label>
          <select id="aj-obj" onchange="_aj.objetivoId=this.value">
            <option value="">Selecciona…</option>
            ${mat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Cantidad</label><input type="number" id="aj-cant" style="width:130px;"></div>
        <div class="field">
          <label>Motivo</label>
          <div class="toggle-row" id="aj-motivos">
            ${motivos.map(m=>`<button class="toggle" onclick="ajMotivo('${m}',this)">${m}</button>`).join("")}
          </div>
        </div>
        <div class="field"><label>Observación (opcional)</label><input type="text" id="aj-obs" style="width:100%;"></div>
        <div class="card-actions"><button class="btn-primary" onclick="regAjuste()">Registrar ajuste</button></div>
      </div>`;
    html+=section("Historial reciente",hist.slice(0,6),a=>card(
      `${a.objetivo_nombre} — ${a.cantidad}`,
      `${a.motivo} · ${a.coste_estimado.toFixed(2)} € · ${a.responsable} · ${fmt(a.fecha)}`
    ),"Sin ajustes.");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

function ajTipo(t){
  _aj.tipo=t;_aj.objetivoId=null;
  el("aj-m").classList.toggle("on",t==="materia");
  el("aj-l").classList.toggle("on",t==="lote");
  el("aj-ol").textContent=t==="materia"?"Materia":"Lote";
  const ops=t==="materia"
    ?window._ajMat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`)
    :window._ajLotes.map(l=>`<option value="${l.id}">${l.codigo} — ${l.nombre} (${l.cantidad_restante} restantes)</option>`);
  el("aj-obj").innerHTML=`<option value="">Selecciona…</option>${ops.join("")}`;
}

function ajMotivo(m,btn){
  _aj.motivo=m;
  document.querySelectorAll("#aj-motivos .toggle").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
}

async function regAjuste(){
  const obj=el("aj-obj").value,cant=Number(el("aj-cant").value),obs=el("aj-obs").value;
  if(!obj){alert("Selecciona materia o lote.");return;}
  if(!cant||cant<=0){alert("Cantidad inválida.");return;}
  if(!_aj.motivo){alert("Selecciona un motivo.");return;}
  try{
    await api("/ajustes",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo_objetivo:_aj.tipo,objetivo_id:obj,cantidad:cant,motivo:_aj.motivo,observacion:obs,responsable:getUser()||"Sin asignar"})});
    irA_ajustes();
  }catch(e){alert(e.message);}
}

// ── RECEPCIÓN ────────────────────────────────────────
async function irA_recepcion(){
  openSection("recepcion","Recepción");
  try{
    const [provs,recs]=await Promise.all([api("/proveedores"),api("/recepciones")]);
    let html=`
      <div class="section-label">Entrada manual</div>
      <div class="card">
        <div class="field"><label>Proveedor</label>
          <select id="rcp-prov">
            <option value="">Selecciona…</option>
            ${provs.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Importe total (€)</label><input type="number" step="0.01" id="rcp-imp" style="width:140px;"></div>
        <div class="card-actions"><button class="btn-primary" onclick="nuevaRcp()">Registrar recepción</button></div>
      </div>
      <div class="card" style="opacity:0.55;">
        <div class="card-name">Escanear albarán</div>
        <div class="card-meta">Disponible en una fase posterior.</div>
      </div>`;
    html+=section("Recepciones",recs.slice().reverse(),r=>{
      const prov=provs.find(p=>p.id===r.proveedor_id);
      return card(
        `${prov?.nombre||r.proveedor_id} — ${r.importe_total.toFixed(2)} €`,
        `${r.estado} · pendiente ${r.pendiente_pago.toFixed(2)} € · ${new Date(r.fecha).toLocaleDateString("es-ES")}`,
        r.estado==="Pendiente de confirmar"?`<button class="btn-primary" onclick="confirmarRcp('${r.id}')">Confirmar entrada</button>`:""
      );

    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function nuevaRcp(){

  if(!imp||imp<=0){alert("Importe inválido.");return;}
  try{await api("/recepciones",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({proveedor_id:prov,importe_total:imp})});irA_recepcion();}
  catch(e){alert(e.message);}
}

async function confirmarRcp(id){
  try{await api(`/recepciones/${id}/confirmar`,{method:"POST"});irA_recepcion();}

// ── INIT ──────────────────────────────────────────────
async function arrancar() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div id="splash" style="min-height:100vh;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;text-align:center;">
      <div style="font-size:64px;font-weight:700;color:var(--cream);line-height:1;">M</div>
      <div style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#555040;margin-top:8px;margin-bottom:56px;">Control M · Producción</div>
      <div id="splash-estado" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#555040;">Conectando…</div>
      <div id="splash-count" style="font-size:10px;color:#333020;margin-top:8px;"></div>
      <div style="margin-top:20px;width:48px;height:1px;background:#2A2820;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--olive);animation:slidebar 1.4s ease-in-out infinite;"></div>
      </div>
      <style>@keyframes slidebar{0%{left:-100%}50%{left:0}100%{left:100%}}</style>
    </div>`;

  let intentos = 0;
  const mensajes = {
    3: "El sistema está arrancando…",
    8: "Un momento, casi listo…",
    15: "Tardando más de lo habitual…",
    25: "Sigue esperando…",
  };

  while (intentos < 60) {
    try {
      const r = await fetch("/api/salud", { cache: "no-store" });
      if (r.ok) {
        el("splash-estado").textContent = "Listo";
        await new Promise(r => setTimeout(r, 400));
        // Mostrar login o app directamente sin recargar
        document.body.innerHTML = document.body.innerHTML; // reset
        if (!getUser()) {
          mostrarLogin();
        } else {
          location.reload();
        }
        return;
      }
    } catch(e) {}
    intentos++;
    el("splash-count").textContent = intentos * 2 + "s";
    if (mensajes[intentos]) el("splash-estado").textContent = mensajes[intentos];
    await new Promise(r => setTimeout(r, 2000));
  }

  // Tras 2 minutos sin respuesta
  el("splash-estado").textContent = "Sin respuesta del servidor";
  el("splash-count").textContent = "Recarga la página para intentarlo de nuevo";
}

// Init
arrancar();
