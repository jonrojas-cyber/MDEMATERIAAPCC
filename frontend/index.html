<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Control M · Producción</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#F2EEE4;
    --paper:#FAF8F2;
    --black:#15140F;
    --olive:#6B7353;
    --olive-dark:#4A4F3A;
    --olive-soft:#E4E5D8;
    --line:#D9D3C2;
    --line-strong:#C3BCA8;
    --amber:#A8793F;
    --rust:#9C5A3A;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    color:var(--black);
    font-family:'Courier Prime','Courier New',monospace;
    font-size:14px;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;}

  .app{display:grid;grid-template-columns:240px 1fr;min-height:100vh;}

  /* ---- SIDEBAR ---- */
  .sidebar{
    background:var(--black);color:var(--cream);
    padding:36px 22px;display:flex;flex-direction:column;gap:32px;
    position:sticky;top:0;height:100vh;
  }
  .brand .mark{font-size:20px;font-weight:700;letter-spacing:0.04em;}
  .brand .sub{font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:#B9BCA8;margin-top:4px;}
  .nav{display:flex;flex-direction:column;gap:2px;flex:1;overflow-y:auto;}
  .nav-item{display:flex;align-items:baseline;gap:10px;padding:9px 8px;font-size:12.5px;color:#D8D9CC;}
  .nav-item .num{font-size:10px;color:#76795F;min-width:16px;}
  .nav-item.active{background:var(--olive-dark);color:var(--cream);border-radius:2px;}
  .nav-item.pending{color:#6E7160;cursor:default;}
  .nav-item.pending .tag{margin-left:auto;font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:#5C5E4E;border:1px solid #3A3A2E;padding:2px 6px;border-radius:2px;}
  .sidebar-footer{font-size:10px;letter-spacing:0.05em;color:#6E7160;border-top:1px solid #2A291F;padding-top:14px;}

  /* ---- MAIN ---- */
  .main{padding:36px 56px;max-width:980px;}
  .top-row{margin-bottom:28px;border-bottom:1px solid var(--line-strong);padding-bottom:18px;}
  .eyebrow{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:var(--olive-dark);margin-bottom:6px;}
  h1{font-size:21px;font-weight:700;margin:0;}

  .estado-banner{
    display:flex;align-items:center;gap:10px;
    background:var(--paper);border:1px solid var(--line);border-left:3px solid var(--olive);
    padding:12px 16px;margin-bottom:30px;font-size:13px;
  }
  .estado-banner.alerta{border-left-color:var(--amber);}
  .estado-banner .dot{width:7px;height:7px;border-radius:50%;background:var(--olive);flex-shrink:0;}
  .estado-banner.alerta .dot{background:var(--amber);}

  .seccion{margin-bottom:34px;}
  .seccion-titulo{
    font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--olive-dark);
    margin-bottom:12px;
  }

  .tarjeta{
    background:var(--paper);border:1px solid var(--line);
    padding:16px 18px;margin-bottom:10px;
  }
  .tarjeta-fila{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;}
  .tarjeta-titulo{font-size:14px;font-weight:700;}
  .tarjeta-meta{font-size:11.5px;color:#7E7A66;margin-top:3px;}
  .tarjeta-acciones{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

  .btn{
    font-family:inherit;font-size:12px;letter-spacing:0.02em;
    background:var(--black);color:var(--cream);border:none;
    padding:9px 14px;cursor:pointer;transition:background .15s ease;
  }
  .btn:hover{background:var(--olive-dark);}
  .btn.secundario{background:transparent;color:var(--black);border:1px solid var(--line-strong);}
  .btn.secundario:hover{background:var(--olive-soft);border-color:var(--olive);}
  .btn.alerta{background:var(--rust);}
  .btn.alerta:hover{background:#7E4528;}
  .btn:disabled{opacity:0.45;cursor:default;}

  .empty-state{font-size:12.5px;color:#857F68;font-style:italic;padding:4px 0 14px;}
  .loading,.error-state{font-size:12.5px;color:#857F68;padding:24px 0;}
  .error-state{color:var(--rust);}

  .placeholder{background:var(--paper);border:1px dashed var(--line-strong);padding:40px;text-align:center;color:#7E7A66;font-size:13px;}
  .placeholder .eyebrow{margin-bottom:10px;}

  .coste-tag{font-size:11px;color:var(--olive-dark);}

  .quien-pill{
    display:flex;align-items:center;gap:8px;
    font-size:11px;color:#B9BCA8;cursor:pointer;
  }
  .quien-pill .punto{width:6px;height:6px;border-radius:50%;background:var(--olive);}
  .quien-pill b{color:var(--cream);font-weight:700;}
  .quien-opciones{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
  .quien-opciones button{
    font-family:inherit;font-size:11px;background:#211F17;color:#D8D9CC;
    border:1px solid #3A3A2E;padding:5px 9px;cursor:pointer;
  }
  .quien-opciones button:hover{background:var(--olive-dark);color:var(--cream);}

  .ingredientes-lista{margin-top:10px;border-top:1px solid var(--line);padding-top:10px;}
  .ingredientes-lista .fila{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;}
  .ingredientes-lista .fila.insuficiente{color:var(--rust);}

  select, input[type="number"], input[type="text"]{
    font-family:inherit;font-size:13px;background:var(--cream);color:var(--black);
    border:1px solid var(--line-strong);padding:8px 10px;
  }
  .campo{margin-top:10px;}
  .campo label{display:block;font-size:11px;color:#7E7A66;margin-bottom:4px;}
  .grupo-botones{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
  .grupo-botones button{
    font-family:inherit;font-size:12px;background:var(--paper);color:var(--black);
    border:1px solid var(--line-strong);padding:7px 11px;cursor:pointer;
  }
  .grupo-botones button.activo{background:var(--olive-dark);color:var(--cream);border-color:var(--olive-dark);}
  .tabla-simple{width:100%;border-collapse:collapse;font-size:12.5px;}
  .tabla-simple th{text-align:left;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--olive-dark);padding:6px 8px;border-bottom:1px solid var(--line-strong);}
  .tabla-simple td{padding:8px;border-bottom:1px solid var(--line);}
  .badge{font-size:10.5px;padding:2px 7px;border:1px solid var(--line-strong);}
  .badge.baja{color:var(--rust);border-color:var(--rust);}
  .manual-bloque{margin-bottom:24px;}
  .manual-bloque h3{font-size:13px;margin:0 0 8px;color:var(--olive-dark);}
  .manual-bloque ul{margin:0;padding-left:18px;font-size:13px;line-height:1.7;}

  @media (max-width:860px){
    .app{grid-template-columns:1fr;}
    .sidebar{position:relative;height:auto;}
    .main{padding:24px 18px;}
  }
</style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="mark">M</div>
      <div class="sub">Control M · Producción</div>
    </div>
    <nav class="nav" id="nav"></nav>
    <div class="sidebar-footer">
      <div id="quien-prepara"></div>
      <div style="margin-top:10px;">El Palo · Pedregalejo<br/>v0.3 — preparaciones</div>
    </div>
  </aside>

  <main class="main">
    <div class="top-row">
      <div class="eyebrow" id="vista-eyebrow">Sección 1</div>
      <h1 id="vista-titulo">Inicio</h1>
    </div>
    <div id="contenido"></div>
  </main>
</div>

<script>
const API = "/api";

const SECCIONES = [
  { id: "inicio", num: 1, nombre: "Inicio" },
  { id: "preparaciones", num: 2, nombre: "Preparaciones" },
  { id: "lotes", num: 3, nombre: "Lotes activos" },
  { id: "materias", num: 4, nombre: "Materias" },
  { id: "revisiones", num: 5, nombre: "Revisiones" },
  { id: "ajustes", num: 6, nombre: "Ajustes" },
  { id: "proveedores", num: 7, nombre: "Proveedores" },
  { id: "recepcion", num: 8, nombre: "Recepción" },
  { id: "pagos", num: 9, nombre: "Pagos pendientes" },
  { id: "manual", num: 10, nombre: "La forma de hacer las cosas" },
];

const MODULOS_LISTOS = ["inicio", "preparaciones", "lotes", "materias", "revisiones", "ajustes", "proveedores", "recepcion", "pagos", "manual"];

const EQUIPO = ["Diego", "Laura", "Mónica"];

function quienPrepara(){
  return localStorage.getItem("quien_prepara") || null;
}

function fijarQuienPrepara(nombre){
  localStorage.setItem("quien_prepara", nombre);
  renderQuienPrepara();
}

function renderQuienPrepara(){
  const actual = quienPrepara();
  const el = document.getElementById("quien-prepara");
  if(actual){
    el.innerHTML = `<div class="quien-pill" onclick="renderQuienPreparaOpciones()"><span class="punto"></span>Preparas como <b>${actual}</b></div>`;
  } else {
    el.innerHTML = `
      <div style="font-size:11px;color:#B9BCA8;margin-bottom:6px;">¿Quién prepara hoy?</div>
      <div class="quien-opciones">${EQUIPO.map(n => `<button onclick="fijarQuienPrepara('${n}')">${n}</button>`).join("")}</div>`;
  }
}

function renderQuienPreparaOpciones(){
  const el = document.getElementById("quien-prepara");
  el.innerHTML = `
    <div style="font-size:11px;color:#B9BCA8;margin-bottom:6px;">Cambiar a:</div>
    <div class="quien-opciones">${EQUIPO.map(n => `<button onclick="fijarQuienPrepara('${n}')">${n}</button>`).join("")}</div>`;
}

let vistaActual = "inicio";

function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = "";
  SECCIONES.forEach(s => {
    const habilitada = MODULOS_LISTOS.includes(s.id);
    const el = document.createElement("div");
    el.className = "nav-item" + (s.id === vistaActual ? " active" : "") + (!habilitada ? " pending" : "");
    el.innerHTML = `<span class="num">${String(s.num).padStart(2,"0")}</span><span>${s.nombre}</span>` +
      (!habilitada ? `<span class="tag">Próximamente</span>` : "");
    el.addEventListener("click", () => irA(s));
    nav.appendChild(el);
  });
}

function irA(seccion){
  vistaActual = seccion.id;
  document.getElementById("vista-eyebrow").textContent = `Sección ${seccion.num}`;
  document.getElementById("vista-titulo").textContent = seccion.nombre;
  renderNav();
  if(seccion.id === "inicio") cargarInicio();
  else if(seccion.id === "preparaciones") cargarPreparaciones();
  else if(seccion.id === "lotes") cargarLotes();
  else if(seccion.id === "materias") cargarMaterias();
  else if(seccion.id === "revisiones") cargarRevisiones();
  else if(seccion.id === "ajustes") cargarAjustes();
  else if(seccion.id === "proveedores") cargarProveedores();
  else if(seccion.id === "recepcion") cargarRecepcion();
  else if(seccion.id === "pagos") cargarPagos();
  else if(seccion.id === "manual") cargarManual();
  else mostrarPlaceholder();
}

function mostrarPlaceholder(){
  document.getElementById("contenido").innerHTML = `
    <div class="placeholder">
      <div class="eyebrow">En espera de incorporación</div>
      Este módulo se añade en el siguiente paso, tras revisión conjunta.
    </div>`;
}

async function cargarInicio(){
  const contenido = document.getElementById("contenido");
  contenido.innerHTML = `<div class="loading">Cargando estado del servicio…</div>`;
  try{
    const res = await fetch(`${API}/inicio`);
    if(!res.ok) throw new Error("Respuesta no válida del servidor");
    pintarInicio(await res.json());
  } catch(err){
    contenido.innerHTML = `<div class="error-state">No se ha podido conectar con el backend local (${err.message}). Comprueba que el servidor esté en marcha.</div>`;
  }
}

function seccionTarjetas(titulo, items, render, vacio){
  if(!items || items.length === 0){
    return `<div class="seccion"><div class="seccion-titulo">${titulo}</div><div class="empty-state">${vacio}</div></div>`;
  }
  return `<div class="seccion"><div class="seccion-titulo">${titulo}</div>${items.map(render).join("")}</div>`;
}

function pintarInicio(d){
  const alerta = d.estado_servicio !== "Servicio en orden";
  const banner = `
    <div class="estado-banner ${alerta ? "alerta" : ""}">
      <span class="dot"></span><span>${d.estado_servicio}</span>
    </div>`;

  const enCursoHTML = seccionTarjetas(
    "En curso",
    d.en_curso,
    p => `
      <div class="tarjeta">
        <div class="tarjeta-fila">
          <div>
            <div class="tarjeta-titulo">${p.nombre} — ${p.cantidad_objetivo} ${p.unidad}</div>
            <div class="tarjeta-meta">${p.responsable}</div>
          </div>
        </div>
        <div class="tarjeta-acciones">
          <button class="btn" onclick="finalizarPreparacion('${p.id}')">Finalizar producción</button>
        </div>
      </div>`,
    "No hay preparaciones en curso."
  );

  const prepararHTML = seccionTarjetas(
    "Preparar",
    d.preparar,
    p => `
      <div class="tarjeta">
        <div class="tarjeta-fila">
          <div>
            <div class="tarjeta-titulo">${p.nombre}</div>
            <div class="tarjeta-meta">Disponible ahora: ${p.disponible_ahora} ${p.unidad}</div>
          </div>
        </div>
        <div class="tarjeta-acciones">
          ${p.opciones_tamano.map(o => `
            <button class="btn secundario" onclick="iniciarPreparacion('${p.receta_id}', ${o.cantidad}, this)">
              ${o.cantidad} ${p.unidad} <span class="coste-tag">· ${o.coste_estimado.toFixed(2)} €</span>
            </button>
          `).join("")}
        </div>
      </div>`,
    "No hay preparaciones pendientes en este momento."
  );

  const pedirHTML = seccionTarjetas(
    "Pedir",
    d.pedir,
    m => `
      <div class="tarjeta">
        <div class="tarjeta-fila">
          <div>
            <div class="tarjeta-titulo">${m.nombre}</div>
            <div class="tarjeta-meta">${m.disponibilidad_actual} ${m.unidad} disponibles · valor en stock ${m.valor_stock_actual.toFixed(2)} € · ${m.proveedor}</div>
          </div>
        </div>
        <div class="tarjeta-acciones">
          ${m.whatsapp
            ? `<button class="btn" onclick="pedirPorWhatsapp('${m.whatsapp}', '${encodeURIComponent(m.mensaje_whatsapp)}')">Pedir ${m.cantidad_sugerida} ${m.unidad} por WhatsApp</button>`
            : `<button class="btn" disabled>Sin contacto de proveedor</button>`}
        </div>
      </div>`,
    "Todas las materias están dentro del rango esperado."
  );

  const revisarHTML = seccionTarjetas(
    "Revisar",
    d.revisar,
    r => `
      <div class="tarjeta">
        <div class="tarjeta-fila">
          <div>
            <div class="tarjeta-titulo">${r.tipo}</div>
            <div class="tarjeta-meta">${r.valor}${r.accion_correctiva ? " · " + r.accion_correctiva : ""}</div>
          </div>
        </div>
        <div class="tarjeta-acciones">
          <button class="btn" onclick="resolverRevision('${r.id}')">Marcar revisado</button>
        </div>
      </div>`,
    "Revisiones del día completadas."
  );

  const lotesHTML = seccionTarjetas(
    "Lotes a vigilar",
    d.lotes_a_vigilar,
    l => `
      <div class="tarjeta">
        <div class="tarjeta-fila">
          <div>
            <div class="tarjeta-titulo">${l.codigo} — ${l.nombre}</div>
            <div class="tarjeta-meta">${l.ubicacion} · ${l.cantidad_restante} g restantes · ${l.caducado ? "Fuera de plazo" : l.horas_restantes + " h restantes"}</div>
          </div>
        </div>
        ${l.caducado ? `
          <div class="tarjeta-acciones">
            <button class="btn alerta" onclick="darDeBajaLote('${l.id}')">Dar de baja</button>
          </div>` : ""}
      </div>`,
    "Ningún lote requiere atención inmediata."
  );

  document.getElementById("contenido").innerHTML =
    banner + enCursoHTML + prepararHTML + pedirHTML + revisarHTML + lotesHTML;
}

async function iniciarPreparacion(recetaId, cantidad, boton, callback){
  if(boton) boton.disabled = true;
  try{
    const res = await fetch(`${API}/preparaciones`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ receta_id: recetaId, cantidad_objetivo: cantidad, responsable: quienPrepara() || "Sin asignar" })
    });
    if(!res.ok) throw new Error((await res.json()).error || "No se ha podido iniciar");
    if(callback) callback(); else cargarInicio();
  } catch(err){
    alert(err.message);
    if(boton) boton.disabled = false;
  }
}

async function finalizarPreparacion(id, callback){
  try{
    const res = await fetch(`${API}/preparaciones/${id}/finalizar`, { method: "POST" });
    if(!res.ok) throw new Error((await res.json()).error || "No se ha podido finalizar");
    const data = await res.json();
    if(data.etiqueta) window.open(`/etiqueta/${data.etiqueta.id}`, "_blank");
    if(callback) callback(); else cargarInicio();
  } catch(err){ alert(err.message); }
}

async function resolverRevision(id, callback){
  try{
    const res = await fetch(`${API}/revisiones/${id}/resolver`, { method: "POST" });
    if(!res.ok) throw new Error("No se ha podido marcar como revisado");
    if(callback) callback(); else cargarInicio();
  } catch(err){ alert(err.message); }
}

async function darDeBajaLote(id, callback){
  try{
    const res = await fetch(`${API}/lotes/${id}/dar-de-baja`, { method: "POST" });
    if(!res.ok) throw new Error("No se ha podido dar de baja el lote");
    if(callback) callback(); else cargarInicio();
  } catch(err){ alert(err.message); }
}

function pedirPorWhatsapp(numero, mensajeCodificado){
  window.open(`https://wa.me/${numero}?text=${mensajeCodificado}`, "_blank");
}

// ============ PREPARACIONES ============

function pasoIconoTexto(paso){
  if(paso.tipo === "ingrediente") return `${paso.texto.charAt(0).toUpperCase() + paso.texto.slice(1)}: ${paso.cantidad} ${paso.unidad}`;
  return paso.texto;
}

function pintarAsistente(p){
  const total = p.pasos.length;
  const actual = p.paso_actual;
  const terminado = actual >= total;

  const listaPasos = p.pasos.map((paso, i) => `
    <div class="fila ${i < actual ? "" : ""}" style="opacity:${i < actual ? '0.45' : (i === actual ? '1' : '0.35')};">
      <span>${i < actual ? "✓ " : ""}${pasoIconoTexto(paso)}</span>
    </div>
  `).join("");

  return `
    <div class="tarjeta">
      <div class="tarjeta-fila">
        <div>
          <div class="tarjeta-titulo">${p.nombre_receta} — ${p.cantidad_objetivo}</div>
          <div class="tarjeta-meta">${p.responsable} · Paso ${Math.min(actual + 1, total)} de ${total}</div>
        </div>
      </div>
      <div class="ingredientes-lista">${listaPasos}</div>
      ${!terminado ? `
        <div class="tarjeta-acciones">
          <button class="btn" onclick="confirmarPaso('${p.id}')">Confirma cuando esté listo · OK</button>
        </div>` : `
        <div class="tarjeta-acciones">
          <button class="btn" onclick="finalizarPreparacion('${p.id}', cargarPreparaciones)">Preparación finalizada — Crear lote</button>
        </div>`}
    </div>`;
}

async function confirmarPaso(id){
  try{
    const res = await fetch(`${API}/preparaciones/${id}/confirmar-paso`, { method: "POST" });
    if(!res.ok) throw new Error((await res.json()).error || "No se ha podido confirmar el paso");
    cargarPreparaciones();
  } catch(err){ alert(err.message); }
}

async function cargarPreparaciones(){
  const contenido = document.getElementById("contenido");
  contenido.innerHTML = `<div class="loading">Cargando recetas y producción en curso…</div>`;
  try{
    const [recetas, enCurso, recientes] = await Promise.all([
      fetch(`${API}/recetas`).then(r => r.json()),
      fetch(`${API}/preparaciones?estado=En curso`).then(r => r.json()),
      fetch(`${API}/preparaciones?estado=Finalizada`).then(r => r.json()),
    ]);
    pintarPreparaciones(recetas, enCurso, recientes.slice(-6).reverse());
  } catch(err){
    contenido.innerHTML = `<div class="error-state">No se ha podido cargar (${err.message}).</div>`;
  }
}

function pintarPreparaciones(recetas, enCurso, recientes){
  const enCursoHTML = seccionTarjetas(
    "En curso",
    enCurso,
    p => pintarAsistente(p),
    "No hay preparaciones en curso."
  );

  const recetasHTML = `
    <div class="seccion">
      <div class="seccion-titulo">Elegir preparación</div>
      ${recetas.map(r => `
        <div class="tarjeta">
          <div class="tarjeta-fila">
            <div>
              <div class="tarjeta-titulo">${r.nombre}</div>
              <div class="tarjeta-meta">Disponible ahora: ${r.disponible_ahora} ${r.unidad} · vida útil ${r.vida_util_horas} h</div>
            </div>
          </div>
          <div class="tarjeta-acciones">
            ${r.opciones_tamano.map(o => `
              <button class="btn secundario" onclick="iniciarPreparacion('${r.id}', ${o.cantidad}, this, cargarPreparaciones)">
                ${o.cantidad} ${r.unidad} <span class="coste-tag">· ${o.coste_estimado.toFixed(2)} €</span>
              </button>
            `).join("")}

// ============ REVISIONES ============

async function cargarRevisiones(){
  const contenido = document.getElementById("contenido");
  contenido.innerHTML = `<div class="loading">Cargando revisiones de hoy…</div>`;
  try{
    const [tipos, revisiones] = await Promise.all([
      fetch(`${API}/revisiones/tipos`).then(r => r.json()),
      fetch(`${API}/revisiones`).then(r => r.json()),
    ]);
    pintarRevisiones(tipos, revisiones);
  } catch(err){
    contenido.innerHTML = `<div class="error-state">No se ha podido cargar (${err.message}).</div>`;
  }
}

function pintarRevisiones(tipos, revisiones){
  const hoy = new Date().toDateString();
  const deHoy = revisiones.filter(r => new Date(r.fecha).toDateString() === hoy);

  const checklistHTML = tipos.map(t => {
    const registroHoy = deHoy.filter(r => r.tipo === t.tipo).slice(-1)[0];
    if(registroHoy && registroHoy.estado === "Correcto"){
      return `
        <div class="tarjeta">
          <div class="tarjeta-fila">
            <div>
              <div class="tarjeta-titulo">${t.tipo}</div>
              <div class="tarjeta-meta">${registroHoy.valor} · registrado</div>
            </div>
          </div>
        </div>`;
    }
    if(registroHoy && registroHoy.estado !== "Correcto"){
      return `
        <div class="tarjeta">
          <div class="tarjeta-fila">
            <div>
              <div class="tarjeta-titulo">${t.tipo}</div>
              <div class="tarjeta-meta">${registroHoy.valor} · ${registroHoy.estado} · ${registroHoy.accion_correctiva}</div>
            </div>
          </div>
          <div class="tarjeta-acciones">
            <button class="btn" onclick="resolverRevision('${registroHoy.id}', cargarRevisiones)">Marcar revisado</button>
          </div>
        </div>`;
    }
    if(t.clase === "temperatura"){
      return `
        <div class="tarjeta">
          <div class="tarjeta-fila">
            <div class="tarjeta-titulo">${t.tipo}</div>
          </div>
          <div class="campo">
            <label>Valor en ${t.unidad}</label>
            <input type="number" step="0.1" id="input-${t.tipo.replace(/\s/g,'_')}" style="width:100px;">
          </div>
          <div class="tarjeta-acciones">
            <button class="btn secundario" onclick="registrarRevision('${t.tipo}', document.getElementById('input-${t.tipo.replace(/\s/g,'_')}').value)">Registrar</button>
          </div>
        </div>`;
    }
    return `
      <div class="tarjeta">
        <div class="tarjeta-fila">
          <div class="tarjeta-titulo">${t.tipo}</div>
        </div>
        <div class="tarjeta-acciones">
          <button class="btn secundario" onclick="registrarRevision('${t.tipo}', 'Realizada')">Marcar realizada</button>
        </div>
      </div>`;
  }).join("");

  document.getElementById("contenido").innerHTML = `
    <div class="seccion">
      <div class="seccion-titulo">Revisiones de hoy</div>
      ${checklistHTML}
    </div>`;
}

async function registrarRevision(tipo, valor){
  if(valor === "" || valor === null){ alert("Introduce un valor."); return; }
  try{
    const res = await fetch(`${API}/revisiones/registrar`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ tipo, valor, responsable: quienPrepara() || "Sin asignar" })
    });
    if(!res.ok) throw new Error((await res.json()).error || "No se ha podido registrar");
    cargarRevisiones();
  } catch(err){ alert(err.message); }
}

// ============ AJUSTES ============

let ajustesEstado = { tipo: "materia", objetivoId: null, motivo: null };

async function cargarAjustes(){
  const contenido = document.getElementById("contenido");
  contenido.innerHTML = `<div class="loading">Cargando…</div>`;
  try{
    const [materias, lotes, motivos, historial] = await Promise.all([
      fetch(`${API}/materias`).then(r => r.json()),
      fetch(`${API}/lotes`).then(r => r.json()),
      fetch(`${API}/ajustes/motivos`).then(r => r.json()),
      fetch(`${API}/ajustes`).then(r => r.json()),
    ]);
    pintarAjustes(materias, lotes, motivos, historial.slice(0, 8));
  } catch(err){
    contenido.innerHTML = `<div class="error-state">No se ha podido cargar (${err.message}).</div>`;
  }
}

function pintarAjustes(materias, lotes, motivos, historial){
  ajustesEstado = { tipo: "materia", objetivoId: null, motivo: null };

  const formHTML = `
    <div class="seccion">
      <div class="seccion-titulo">Registrar ajuste</div>
      <div class="tarjeta">
        <div class="campo">
          <label>¿Qué se ajusta?</label>
          <div class="grupo-botones">
            <button class="activo" id="btn-tipo-materia" onclick="ajustesCambiarTipo('materia')">Materia</button>
            <button id="btn-tipo-lote" onclick="ajustesCambiarTipo('lote')">Lote</button>
          </div>
        </div>
        <div class="campo">
          <label id="label-objetivo">Materia</label>
          <select id="select-objetivo" onchange="ajustesEstado.objetivoId = this.value">
            <option value="">Selecciona...</option>
            ${materias.map(m => `<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`).join("")}
          </select>
        </div>
        <div class="campo">
          <label>Cantidad (g/ml/ud)</label>
          <input type="number" id="input-cantidad" style="width:120px;">
        </div>
        <div class="campo">
          <label>Motivo</label>
          <div class="grupo-botones" id="grupo-motivos">
            ${motivos.map(m => `<button onclick="ajustesElegirMotivo('${m}', this)">${m}</button>`).join("")}
          </div>
        </div>
        <div class="campo">
          <label>Observación (opcional)</label>
          <input type="text" id="input-observacion" style="width:100%;">
        </div>
        <div class="tarjeta-acciones">
          <button class="btn" onclick="registrarAjuste()">Registrar ajuste</button>
        </div>
      </div>
    </div>`;

  window._materiasAjuste = materias;
  window._lotesAjuste = lotes;

  const historialHTML = seccionTarjetas(
    "Historial reciente",
    historial,
    a => `
      <div class="tarjeta">
        <div class="tarjeta-fila">
          <div>
            <div class="tarjeta-titulo">${a.objetivo_nombre} — ${a.cantidad}</div>
            <div class="tarjeta-meta">${a.motivo} · ${a.coste_estimado.toFixed(2)} € · ${a.responsable} · ${new Date(a.fecha).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}</div>
          </div>
        </div>
      </div>`,
    "Aún no hay ajustes registrados."
  );

  document.getElementById("contenido").innerHTML = formHTML + historialHTML;
}

function ajustesCambiarTipo(tipo){
  ajustesEstado.tipo = tipo;
  ajustesEstado.objetivoId = null;
  document.getElementById("btn-tipo-materia").classList.toggle("activo", tipo === "materia");
  document.getElementById("btn-tipo-lote").classList.toggle("activo", tipo === "lote");
  document.getElementById("label-objetivo").textContent = tipo === "materia" ? "Materia" : "Lote";
  const select = document.getElementById("select-objetivo");
  const opciones = tipo === "materia" ? window._materiasAjuste : window._lotesAjuste;
  select.innerHTML = `<option value="">Selecciona...</option>` + opciones.map(o =>
    tipo === "materia"
      ? `<option value="${o.id}">${o.nombre} (${o.disponibilidad_actual} ${o.unidad})</option>`
      : `<option value="${o.id}">${o.codigo} — ${o.nombre} (${o.cantidad_restante} restantes)</option>`
  ).join("");
}

function ajustesElegirMotivo(motivo, boton){
  ajustesEstado.motivo = motivo;
  document.querySelectorAll("#grupo-motivos button").forEach(b => b.classList.remove("activo"));
  boton.classList.add("activo");
}

async function registrarAjuste(){
  const objetivoId = document.getElementById("select-objetivo").value;
  const cantidad = Number(document.getElementById("input-cantidad").value);
  const observacion = document.getElementById("input-observacion").value;

  if(!objetivoId){ alert("Selecciona materia o lote."); return; }
  if(!cantidad || cantidad <= 0){ alert("Introduce una cantidad válida."); return; }
  if(!ajustesEstado.motivo){ alert("Selecciona un motivo."); return; }

  try{
    const res = await fetch(`${API}/ajustes`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tipo_objetivo: ajustesEstado.tipo,
        objetivo_id: objetivoId,
        cantidad,
        motivo: ajustesEstado.motivo,
        observacion,
        responsable: quienPrepara() || "Sin asignar",
      })
    });
    if(!res.ok) throw new Error((await res.json()).error || "No se ha podido registrar el ajuste");
    cargarAjustes();
  } catch(err){ alert(err.message); }
}

          <label>Importe total (€)</label>
          <input type="number" step="0.01" id="rcp-importe" style="width:140px;">
        </div>
        <div class="tarjeta-acciones">
          <button class="btn" onclick="registrarRecepcion()">Registrar recepción</button>
        </div>
      </div>
      <div class="tarjeta" style="opacity:0.6;">
        <div class="tarjeta-fila">
          <div>
            <div class="tarjeta-titulo">Escanear albarán</div>

          </div>

      return `
        <div class="tarjeta">

        </div>`;
    },

async function registrarRecepcion(){
  const proveedorId = document.getElementById("rcp-proveedor").value;
  const importe = Number(document.getElementById("rcp-importe").value);
  if(!proveedorId){ alert("Selecciona un proveedor."); return; }
  if(!importe || importe <= 0){ alert("Introduce un importe válido."); return; }
  try{
    const res = await fetch(`${API}/recepciones`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ proveedor_id: proveedorId, importe_total: importe })
    });
    if(!res.ok) throw new Error("No se ha podido registrar la recepción");
    cargarRecepcion();
  } catch(err){ alert(err.message); }
}

async function confirmarRecepcion(id){
  try{
    const res = await fetch(`${API}/recepciones/${id}/confirmar`, { method: "POST" });

    cargarRecepcion();
  } catch(err){ alert(err.message); }
