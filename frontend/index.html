<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#3E4534"/>
<title>Control M · m de materia</title>
<!-- Tipografía autoalojada (Courier Prime WOFF2). Sin dependencias externas. -->
<style>
/* Courier Prime autoalojada (clon de Courier New con NEGRITA REAL) en WOFF2.
   Evita el engordado sintético que duplica trazos en móviles sin Courier New. */
@font-face { font-family:'Courier Prime'; font-style:normal; font-weight:400;
  font-display:swap; src:url('/fonts/CourierPrime-Regular.woff2') format('woff2'); }
@font-face { font-family:'Courier Prime'; font-style:normal; font-weight:700;
  font-display:swap; src:url('/fonts/CourierPrime-Bold.woff2') format('woff2'); }

/* ════════════════════════════════════════════════════════════════════
   DESIGN TOKENS · única fuente de verdad para color y tipografía.
   ════════════════════════════════════════════════════════════════════ */
:root {
  /* Superficie y papel */
  --cream: #ECEAE3;   /* fondo papel */
  --paper: #F1EFE9;   /* celdas / tarjetas */
  /* Tinta (verde botella oscuro · no negro, corporativo) */
  --ink:   #2A332B;   /* texto y superficies oscuras */
  --olive: #2A332B;   /* acentos = tinta */
  --olive-light: #CFCABB;
  --muted: #82857A;   /* gris ceniza secundario */
  --warn:  #2A332B;   /* alertas: por peso, sin rojo */
  --ok:    #2A332B;
  --alert: #2A332B;
  --gold:  #2A332B;
  /* Líneas y sombra */
  --line:  #B4AE9B;   /* keyline */
  --shadow: none;
  /* Marco oliva (barra superior e inferior) */
  --olivebar: #3E4534;
  --oliveink: #E7E4D7;
  /* Tipografía */
  --sans:  'Courier New', 'Courier Prime', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* App anclada a la pantalla visible: position:fixed (arriba) + altura 100dvh.
   Fijo arriba ⇒ el documento no puede arrastrarse; altura = pantalla visible
   real ⇒ el pie queda dentro. Así NINGÚN navegador móvil (Samsung/Chrome)
   hace scroll de página. Sin "bottom" para que no anule la altura dvh. */
html { height: 100%; overflow: hidden; }

body {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 100vh;
  height: 100dvh;
  width: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--cream);
  color: var(--ink);
  font-family: 'Courier New', 'Courier Prime', monospace;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; font-size: 13px; }

/* ── TOP BAR ──────────────────────────────────────────── */
.topbar {
  background: var(--ink);
  color: var(--cream);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 52px;
  flex-shrink: 0;
  gap: 16px;
}

.topbar-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.topbar-sep { color: #333020; }

.topbar-section {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #AAA490;
  flex: 1;
}

.topbar-back {
  background: none;
  border: none;
  color: var(--olive-light);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 0;
  display: none;
  align-items: center;
  gap: 6px;
}

.topbar-back.visible { display: flex; }
.topbar-back:hover { color: var(--cream); }

.topbar-user {
  display: flex;
  gap: 6px;
}

.user-chip {
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid #2A2820;
  color: #666050;
  background: none;
}

.user-chip.on {
  background: var(--olive);
  border-color: var(--olive);
  color: var(--cream);
}

/* ── MAIN VIEWPORT ───────────────────────────────────── */
.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 32px 36px;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  background: var(--cream);
}

.screen.active {
  transform: translateX(0);
}

.screen.exit {
  transform: translateX(-30%);
}

/* ── HOME GRID ───────────────────────────────────────── */
.home-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}

.kpi-box {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
}

.kpi-label {
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.kpi-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.kpi-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

.home-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.tile {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 24px 22px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
  position: relative;
}

.tile:hover {
  border-color: var(--olive);
  background: #F2EFE6;
}

.tile:active { opacity: 0.85; }

.tile.urgente {
  border-left: 3px solid var(--warn);
}

.tile.ok {
  border-left: 3px solid var(--olive);
}

.tile-num {
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}

.tile-title {
  font-size: 15px;
  font-weight: 700;
}

.tile-badge {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

.tile-badge.alert { color: var(--warn); }

.tile-arrow {
  position: absolute;
  bottom: 18px;
  right: 18px;
  font-size: 16px;
  color: var(--line);
}

/* ── INNER SCREENS ───────────────────────────────────── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 10px;
  margin-top: 24px;
}

.section-label:first-child { margin-top: 0; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
  margin-bottom: 8px;
}

.card-name { font-size: 14px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.btn-primary {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.02em;
}
.btn-primary:hover { background: var(--olive); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: none;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 10px 16px;
  font-size: 12px;
}
.btn-ghost:hover { border-color: var(--ink); }

.btn-warn {
  background: var(--warn);
  color: #FFF5EE;
  border: none;
  padding: 10px 16px;
  font-size: 12px;
}

.badge-low {
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid var(--warn);
  color: var(--warn);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 8px;
}

.empty { font-size: 11px; color: var(--muted); letter-spacing: .04em; padding: 14px 0; }
.loading { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; padding: 32px 0; }
.err { font-size: 12px; color: var(--ink); font-weight: 700; padding: 32px 0; }

/* ── BANNER ──────────────────────────────────────────── */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 3px solid var(--olive);
  padding: 12px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.banner.warn { border-left-color: var(--warn); }
.banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--olive); flex-shrink: 0; }
.banner.warn .dot { background: var(--warn); }

/* ── FORM ────────────────────────────────────────────── */
.field { margin-top: 12px; }
.field label { display: block; font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field select, .field input { background: var(--cream); border: 1px solid var(--line); color: var(--ink); padding: 9px 10px; width: 100%; }
.field input[type="number"] { width: 140px; }

.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.toggle { background: var(--paper); border: 1px solid var(--line); color: var(--ink); font-size: 12px; padding: 7px 12px; }
.toggle.on { background: var(--olive); border-color: var(--olive); color: var(--cream); }
.toggle:hover:not(.on) { border-color: var(--ink); }

/* ── WIZARD ──────────────────────────────────────────── */
.wizard-overlay {
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 999;
  display: flex;
  flex-direction: column;
}

.wiz-bar {
  height: 3px;
  background: var(--line);
  flex-shrink: 0;
}

.wiz-bar-fill {
  height: 100%;
  background: var(--olive);
  transition: width 0.3s ease;
}

.wiz-top {
  padding: 20px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.wiz-close {
  background: none;
  border: none;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.wiz-close:hover { color: var(--ink); }

.wiz-step {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--olive);
}

.wiz-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 40px;
  text-align: center;
}

.wiz-recipe {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

.wiz-action {
  font-size: clamp(24px, 5.5vw, 40px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.1;
  max-width: 640px;
}

.wiz-num {
  font-size: clamp(88px, 20vw, 160px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.03em;
  margin-top: 4px;
}

.wiz-unit {
  font-size: clamp(18px, 3vw, 26px);
  color: var(--muted);
  margin-top: 6px;
}

.wiz-done {
  font-size: clamp(30px, 6vw, 52px);
  font-weight: 700;
  margin-bottom: 10px;
}

.wiz-done-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 48px;
}

.wiz-footer {
  padding: 0 40px 48px;
  flex-shrink: 0;
}

.wiz-ok {
  background: var(--ink);
  color: var(--cream);
  border: none;
  width: 100%;
  padding: 26px;
  font-size: 17px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.wiz-ok:hover { background: var(--olive); }

/* ── MANUAL ──────────────────────────────────────────── */
.manual-block { margin-bottom: 24px; }
.manual-block h3 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--olive); margin-bottom: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.manual-block ul { padding-left: 18px; font-size: 13px; line-height: 1.9; }

/* ── RESPONSIVE MOBILE ───────────────────────────────── */
@media (max-width: 680px) {
  .topbar { padding: 0 16px; }
  .screen { padding: 20px 18px; }
  .home-kpis { grid-template-columns: repeat(2, 1fr); }
  .home-tiles { grid-template-columns: repeat(2, 1fr); }
  .topbar-user { display: none; }
}

/* ════════════════════════════════════════════════════════
   REDISEÑO · EFICIENCIA Y CLARIDAD (capa de mejora)
   ════════════════════════════════════════════════════════ */

.screen { padding: 28px 32px; }

.home-kpis { grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 22px; }
.kpi-box { border-radius: 8px; box-shadow: var(--shadow); position: relative; overflow: hidden; padding: 15px 16px 15px 18px; }
.kpi-box::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--olive); opacity:.45; }
.kpi-box.warn::before { background: var(--alert); opacity:1; }
.kpi-val { font-size: 23px; }

.todo { background: var(--ink); color: var(--cream); border-radius: 10px; padding: 15px 18px; margin-bottom: 22px; }
.todo-h { font-size: 9px; letter-spacing:.18em; text-transform:uppercase; color:#9a9683; margin-bottom: 10px; }
.todo-row { display:flex; flex-wrap:wrap; gap:8px; }
.todo-chip { background:#1d1b12; border:1px solid #2c2a1d; color:var(--cream); border-radius:999px; padding:8px 8px 8px 14px; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:9px; }
.todo-chip:hover { border-color: var(--olive); }
.todo-chip .n { background: var(--alert); color:#fff; border-radius:999px; font-size:11px; padding:1px 8px; font-weight:700; }
.todo-clear { font-size:13px; color:#cfe0b8; }
.agora-line { font-size:10px; color:var(--muted); margin:-8px 0 16px; letter-spacing:.04em; }

.group-label { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin:24px 0 10px; display:flex; align-items:center; gap:10px; }
.group-label::after { content:""; flex:1; height:1px; background:var(--line); }

.home-tiles { gap: 10px; }
.tile { border-radius:10px; box-shadow:var(--shadow); min-height:102px; padding:18px; gap:6px; transition:transform .12s, box-shadow .12s, border-color .12s; }
.tile:hover { transform: translateY(-2px); box-shadow:0 5px 16px rgba(17,16,9,.09); background: var(--paper); }
.tile.urgente { border-left: 1px solid var(--line); }
.tile-status { position:absolute; top:16px; right:16px; width:8px; height:8px; border-radius:50%; background:var(--olive); opacity:.4; }
.tile.urgente .tile-status { background: var(--alert); opacity:1; }
.tile-title { font-size:14px; }
.tile-arrow { bottom:14px; right:16px; }

.card { border-radius:8px; box-shadow:var(--shadow); }
.card.alerta { border-left:3px solid var(--alert); }
.btn-primary, .btn-ghost, .btn-warn { border-radius:6px; }
.banner { border-radius:8px; }
.field select, .field input { border-radius:6px; }

@media (max-width: 680px) {
  .home-kpis { grid-template-columns: repeat(2, 1fr); }
  .screen { padding: 18px 16px; }
}

/* ════════════════════════════════════════════════════════
   IDENTIDAD M DE MATERIA · home por categorías (minimal)
   ════════════════════════════════════════════════════════ */

/* Imagotipo ||| */
.mark { display:inline-flex; gap:3px; align-items:center; line-height:0; }
.mark i { display:block; width:2px; height:15px; background:currentColor; }

/* Topbar con marca */
.topbar-logo { display:flex; align-items:center; gap:10px; color:var(--cream); }
.brandword { font-family:var(--sans); font-size:18px; font-weight:400; letter-spacing:.01em; }

/* Home: marca y categorías */
.home-brand { text-align:center; padding:34px 0 8px; color:var(--ink); }
.home-brand .mark { color:var(--olive); gap:4px; }
.home-brand .mark i { width:2.5px; height:26px; }
.home-brand h1 { font-family:var(--sans); font-size:46px; font-weight:300; margin-top:18px; letter-spacing:0; line-height:1; }
.home-brand .tag { font-size:9px; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); margin-top:12px; }
.home-status { text-align:center; font-size:11px; color:var(--muted); letter-spacing:.04em; margin:6px 0 34px; }
.home-status b { color:var(--alert); font-weight:400; }

.cats { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; max-width:780px; margin:0 auto; }
.cat { background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:30px 28px; cursor:pointer; transition:transform .14s, box-shadow .14s; position:relative; min-height:158px; display:flex; flex-direction:column; justify-content:flex-end; }
.cat:hover { transform:translateY(-3px); box-shadow:0 8px 22px rgba(17,16,9,.08); }
.cat-name { font-family:var(--sans); font-size:30px; font-weight:300; line-height:1; text-transform:lowercase; }
.cat-desc { font-size:10.5px; color:var(--muted); margin-top:11px; line-height:1.6; letter-spacing:.02em; }
.cat-alert { position:absolute; top:22px; right:22px; min-width:22px; text-align:center; font-size:10px; background:var(--alert); color:#fff; border-radius:999px; padding:3px 9px; letter-spacing:.04em; }
.cat-arrow { position:absolute; top:24px; left:28px; color:var(--line); font-size:18px; }

/* Lista de módulos dentro de una categoría */
.cat-title { font-family:var(--sans); font-size:30px; font-weight:300; margin-bottom:20px; letter-spacing:.01em; text-transform:lowercase; }
.modrow { background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:17px 20px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:border-color .12s, transform .12s; }
.modrow:hover { border-color:var(--olive); transform:translateX(3px); }
.modrow .mnum { font-size:9px; letter-spacing:.14em; color:var(--muted); width:22px; }
.modrow .mname { font-size:16px; font-weight:700; flex:1; }
.modrow .mbadge { font-size:11px; color:var(--muted); }
.modrow .marrow { color:var(--line); font-size:18px; }

@media (max-width: 680px) {
  .cats { grid-template-columns:1fr; }
  .home-brand h1 { font-size:34px; }
}

/* ════════════════════════════════════════════════════════
   PANTALLAS INTERNAS · misma línea minimalista que la home
   ════════════════════════════════════════════════════════ */
/* Título serif en cada módulo (inyectado por setInner). */
.screen-head {
  font-family: var(--sans);
  font-size: 32px;
  font-weight: 300;
  letter-spacing: .005em;
  line-height: 1;
  margin: 4px 0 28px;
  text-transform: lowercase;
}
/* La cabecera reemplaza al antiguo título con borde. */
.screen-title { display: none; }
/* Etiquetas de sección más aireadas y discretas. */
.section-label {
  font-size: 9px; letter-spacing: .2em; color: var(--muted);
  margin: 30px 0 12px;
}
.section-label:first-child { margin-top: 4px; }
/* Tarjetas más limpias, con la misma elevación sutil y hover de la home. */
.card {
  border: 1px solid var(--line); border-radius: 12px;
  padding: 18px 20px; margin-bottom: 10px;
  box-shadow: none; transition: border-color .12s, box-shadow .12s, transform .12s;
}
.card:hover { border-color: #c4bda4; box-shadow: 0 6px 18px rgba(17,16,9,.06); }
.card-name { font-size: 15px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.card-actions { margin-top: 14px; }
/* Botones con un toque más editorial. */
.btn-primary, .btn-ghost, .btn-warn { border-radius: 999px; padding: 10px 20px; letter-spacing: .03em; }
.btn-ghost { border-color: var(--line); }
.btn-ghost:hover { border-color: var(--olive); color: var(--olive); }
.banner { border-radius: 12px; }
.field select, .field input { border-radius: 10px; padding: 10px 12px; }
.field label { letter-spacing: .12em; }

/* ════════════════════════════════════════════════════════
   FICHA TÉCNICA · sistema visual estilo etiquetas m de materia
   Monocromo · rejilla de keylines · sans tracked + monoespaciada
   ════════════════════════════════════════════════════════ */
/* Esquinas rectas y sin sombras en todo (look técnico/etiqueta). */
.cat, .card, .tile, .kpi-box, .banner, .modrow, .btn-primary, .btn-ghost,
.btn-warn, .toggle, .field select, .field input, .todo, .todo-chip,
.cat-alert, .user-chip, .badge-low { border-radius: 0 !important; box-shadow: none !important; }

/* Tipos de letra display: grotesca neutra para titulares en mayúscula. */
.brandword { font-family: var(--sans); font-weight: 700; font-size: 13px;
  letter-spacing: .02em; text-transform: lowercase; }

/* Home: bloque de marca como cabecera de etiqueta. */
.home-brand { padding: 30px 0 6px; }
.home-brand .mark { color: var(--ink); }
.home-brand .mark i { width: 2.5px; height: 24px; }
.home-brand h1 { font-family: var(--sans); font-weight: 700; font-size: 30px;
  text-transform: lowercase; letter-spacing: .005em; margin-top: 14px; }
.home-brand .tag { font-size: 9px; letter-spacing: .26em; color: var(--muted); margin-top: 10px; }
.home-status { font-size: 9.5px; letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); margin: 8px 0 30px; }
.home-status b { color: var(--ink); font-weight: 700; }

/* Tarjetas de categoría = celdas keyline con índice y código de estado. */
.cats { gap: 0; border: 1px solid var(--line); max-width: 820px; }
.cat { background: transparent; border: none; border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line); padding: 22px 24px 26px; min-height: 150px;
  display: block; transition: background .12s; }
.cat:hover { transform: none; background: var(--paper); }
.cats .cat:nth-child(2n) { border-right: none; }
.cat-top { display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--line); padding-bottom: 9px; margin-bottom: 16px; }
.cat-idx { font-family: var(--mono, 'Courier Prime', monospace); font-size: 11px;
  letter-spacing: .1em; color: var(--ink); }
.cat-code { font-size: 9px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); }
.cat-code.alerta { color: var(--ink); font-weight: 700; }
.cat-name { font-family: var(--sans); font-weight: 700; font-size: 21px;
  text-transform: uppercase; letter-spacing: .04em; line-height: 1.05; }
.cat-desc { font-size: 10px; color: var(--muted); margin-top: 10px; line-height: 1.7;
  letter-spacing: .03em; text-transform: uppercase; }
.cat-arrow, .cat-alert { display: none; }

/* Cabecera de pantalla interna = título técnico en mayúscula. */
.screen-head, .cat-title { font-family: var(--sans); font-weight: 700; font-size: 19px;
  text-transform: uppercase; letter-spacing: .06em; margin: 2px 0 24px;
  padding-bottom: 14px; border-bottom: 1px solid var(--line); }

/* Etiquetas de sección. */
.section-label { font-size: 9px; letter-spacing: .22em; color: var(--muted); text-transform: uppercase; }

/* Filas de módulo = renglones keyline con índice mono y nombre tracked. */
.modrow { background: transparent; border: none; border-bottom: 1px solid var(--line);
  margin: 0; padding: 16px 4px; gap: 16px; }
.modrow:hover { transform: none; background: var(--paper); border-color: var(--line); }
.modrow .mnum { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .1em; color: var(--ink); }
.modrow .mname { font-family: var(--sans); font-weight: 700; text-transform: uppercase;
  letter-spacing: .04em; font-size: 13px; }
.modrow .mbadge { font-size: 10px; letter-spacing: .04em; text-transform: uppercase; color: var(--muted); }
.modrow .marrow { color: var(--muted); }

/* Tarjetas de contenido = celdas keyline tipo ficha. */
.card { background: transparent; border: 1px solid var(--line); padding: 16px 18px; margin-bottom: -1px; }
.card:hover { border-color: var(--line); background: var(--paper); }
.card-name { font-family: var(--sans); font-weight: 700; text-transform: uppercase;
  letter-spacing: .04em; font-size: 13px; }
.card-meta { font-size: 11px; letter-spacing: .02em; }

/* Botones rectangulares, monoespaciada en mayúscula. */
.btn-primary, .btn-ghost, .btn-warn { font-size: 10px; letter-spacing: .14em;
  text-transform: uppercase; padding: 11px 18px; }
.btn-primary { background: var(--ink); color: var(--cream); }
.btn-primary:hover { background: #2c2920; }
.btn-ghost { background: transparent; border: 1px solid var(--ink); color: var(--ink); }
.btn-ghost:hover { background: var(--ink); color: var(--cream); }
.btn-warn { background: var(--ink); color: var(--cream); }

/* Indicadores en monocromo: punto/recuadro de tinta, sin color. */
.banner { background: transparent; border: 1px solid var(--line); border-left: 1px solid var(--line); }
.banner .dot, .banner.warn .dot { background: var(--ink); border-radius: 0; width: 6px; height: 6px; }
.badge-low { border: 1px solid var(--ink); color: var(--ink); }

/* "Qué hacer ahora": caja de tinta con chips keyline. */
.todo { background: var(--ink); }
/* Líneas claras y marcadas sobre el verde oscuro (antes casi invisibles). */
.todo-h { color: rgba(236,234,227,.72); }
.todo-chip { background: transparent; border: 1px solid rgba(236,234,227,.45); color: var(--cream); }
.todo-chip:hover { border-color: rgba(236,234,227,.9); background: rgba(236,234,227,.06); }
.todo-chip .n { background: var(--cream); color: var(--ink); border-radius: 0; }
.todo-clear { color: rgba(236,234,227,.82); }

/* KPIs como celdas de ficha técnica (key/val). */
.home-kpis { border: 1px solid var(--line); gap: 0; }
.kpi-box { border: none; border-right: 1px solid var(--line); padding: 16px 16px; }
.kpi-box:last-child { border-right: none; }
.kpi-box::before { display: none; }
.kpi-label { font-size: 8.5px; letter-spacing: .14em; }
.kpi-val { font-family: 'Courier Prime', monospace; }

/* Imagotipo ||| más fino y en tinta. */
.mark i { background: currentColor; }

/* Tarjetas de producto clicables (abren la ficha a pantalla completa). */
.card.clickable { cursor: pointer; }
.card.clickable:hover { background: var(--paper); }
.card-acts { margin-top: 14px; }

/* ── FICHA TÉCNICA a pantalla completa (layout de etiqueta) ── */
.ficha-overlay { position: fixed; inset: 0; background: var(--cream); z-index: 1000;
  display: flex; flex-direction: column; overflow-y: auto; }
.ficha-top { display: flex; justify-content: space-between; align-items: center;
  padding: 18px 24px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.ficha-eyebrow { font-size: 9px; letter-spacing: .22em; text-transform: uppercase; color: var(--muted); }
.ficha-wrap { flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 40px 24px; }
.ficha-card { width: 100%; max-width: 680px; border: 1px solid var(--ink); display: flex; background: var(--cream); }
.ficha-spine { width: 92px; flex-shrink: 0; border-right: 1px solid var(--ink);
  display: flex; flex-direction: column; justify-content: space-between; padding: 18px 0 18px 16px; }
.ficha-spine .mark i { height: 18px; width: 2.5px; }
.ficha-brand { font-family: var(--sans); font-size: 11px; font-weight: 700; line-height: 1.3;
  text-transform: lowercase; letter-spacing: .02em; }
.ficha-body { flex: 1; }
.ficha-head { padding: 18px 20px; border-bottom: 1px solid var(--ink); position: relative; }
.ficha-name { font-family: var(--sans); font-size: 24px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .04em; line-height: 1; }
.ficha-sub { font-size: 11px; color: var(--muted); margin-top: 7px; letter-spacing: .04em; }
.ficha-code { position: absolute; top: 18px; right: 20px; text-align: right;
  font-family: 'Courier Prime', monospace; font-size: 10px; letter-spacing: .08em; color: var(--muted); line-height: 1.5; }
.ficha-rows { padding: 6px 20px 14px; }
.frow { display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
  padding: 10px 0; border-bottom: 1px solid var(--line); font-family: 'Courier Prime', monospace; font-size: 12px; }
.frow:last-child { border-bottom: none; }
.frow .k { color: var(--muted); letter-spacing: .12em; text-transform: uppercase; font-size: 10px; }
.frow .v { color: var(--ink); text-align: right; }
.frow .v.alert { font-weight: 700; }
.ficha-note { padding: 14px 20px; border-top: 1px solid var(--ink);
  font-family: 'Courier Prime', monospace; font-size: 9.5px; letter-spacing: .04em;
  text-transform: uppercase; color: var(--muted); line-height: 1.7; }
.ficha-actions { width: 100%; max-width: 680px; display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
@media (max-width: 680px) {
  .ficha-spine { width: 64px; padding: 14px 0 14px 12px; }
  .ficha-name { font-size: 20px; }
  .ficha-code { position: static; text-align: left; margin-top: 8px; }
}

/* ════════════════════════════════════════════════════════
   LAYOUT PRO · marco oliva + inicio en filas (referencia TPV)
   ════════════════════════════════════════════════════════ */

/* Barra superior oliva con 3 zonas: marca · ||| · control total */
.topbar { background: var(--olivebar); color: var(--oliveink); height: 94px;
  padding: 0 42px; gap: 0; justify-content: space-between;
  box-shadow: 0 2px 10px rgba(23,21,15,.16); z-index: 5; position: relative; }
.topbar-left { display: flex; align-items: center; gap: 14px; flex: 1; }
.topbar-center { flex: 0 0 auto; }
.topbar-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
.topbar .brandword { font-family: 'Courier Prime', monospace; font-size: 15px;
  font-weight: 400; letter-spacing: .2em; text-transform: lowercase; color: var(--oliveink);
  cursor: pointer; transition: opacity .15s ease; }
.topbar .brandword:hover { opacity: .7; }
.topbar .brandword:focus-visible { outline: 1px solid var(--oliveink); outline-offset: 3px; border-radius: 2px; }
/* Imagotipo ||| incrustado (en relieve) en verde sobre la barra oliva. */
.topbar-center .mark { gap: 8px; cursor: pointer; }
.topbar-center .mark i {
  width: 4.5px; height: 36px; border-radius: 4px;
  background: #353B2B; /* surco un punto más oscuro que la barra */
  box-shadow:
    inset 1.2px 1.2px 1.6px rgba(0,0,0,.55),
    inset -1px -1px 1.2px rgba(231,228,215,.10),
    0 1px 0 rgba(231,228,215,.14); /* labio de luz al pie (efecto tallado) */
}
.topbar-section { font-family: 'Courier Prime', monospace; font-size: 12px;
  letter-spacing: .18em; text-transform: uppercase; color: var(--oliveink); flex: 0; }
.topbar-back { background: none; border: none; color: var(--oliveink); font-size: 17px;
  width: auto; padding: 0 4px 0 0; display: none; }
.topbar-back.visible { display: block; }
.topbar-back:hover { opacity: .65; }
.topbar .user-chip { border-color: #5b6149; color: var(--oliveink); }
.topbar .user-chip:hover { background: #5b6149; }

/* Footer oliva (cierra el marco) */
.botbar { flex-shrink: 0; background: var(--olivebar); color: var(--oliveink);
  height: 62px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 42px; font-family: 'Courier Prime', monospace; font-size: 10px;
  letter-spacing: .16em; text-transform: lowercase; opacity: .95;
  box-shadow: 0 -2px 10px rgba(23,21,15,.14); z-index: 5; position: relative; }

/* Cabecera del inicio (sin wordmark grande: ya está en la barra). */
.home-brand { display: none; }
.home-head { padding: 6px 2px 22px; }
.home-sys { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .14em;
  text-transform: uppercase; color: var(--muted); }
.home-efimera { font-family: 'Courier Prime', monospace; font-size: 10px; letter-spacing: .04em;
  color: #fff; background: var(--olivebar); display: inline-block; padding: 4px 10px; margin-top: 10px; }
.home-alert { font-family: 'Courier Prime', monospace; font-size: 12px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--ink); margin-top: 8px; }
.home-status { display: none; }

/* Inicio en filas horizontales a todo el ancho. */
.cats { display: block; max-width: 1080px; margin: 0 auto; border: none; }
.cat { display: flex; flex-direction: row; align-items: stretch; gap: 0; background: var(--paper);
  border: 1px solid var(--line); padding: 0; margin-bottom: 12px; min-height: 0;
  transition: border-color .12s, background .12s; }
.cat:hover { background: #efece4; border-color: #b3ad9c; transform: none; }
.cats .cat:nth-child(2n) { border-right: 1px solid var(--line); }
.cat-numcol { flex: 0 0 168px; padding: 26px 24px; border-right: 1px solid var(--line);
  display: flex; flex-direction: column; justify-content: center; }
.cat-big { font-family: 'Courier Prime', monospace; font-weight: 700; font-size: 50px;
  line-height: 1; color: var(--ink); letter-spacing: .02em; }
.cat-state { font-family: 'Courier Prime', monospace; font-size: 9.5px; letter-spacing: .12em;
  text-transform: uppercase; color: var(--muted); margin-top: 12px; }
.cat-dots { font-family: 'Courier Prime', monospace; font-size: 14px; color: var(--ink);
  margin-top: 8px; letter-spacing: .18em; min-height: 14px; }
.cat-main { flex: 1; padding: 26px 28px; display: flex; flex-direction: column; justify-content: center; }
.cat-name { font-family: var(--sans); font-weight: 700; font-size: 22px; text-transform: uppercase;
  letter-spacing: .1em; line-height: 1; }
.cat-l1 { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--ink); margin-top: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--line); }
.cat-l2 { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .08em;
  text-transform: uppercase; color: var(--muted); margin-top: 12px; }
.cat-go { flex: 0 0 76px; display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: var(--ink); }
.cat-desc, .cat-top, .cat-idx, .cat-code, .cat-arrow, .cat-alert { display: none; }

/* ── INICIO A PANTALLA FIJA: los 4 menús se reparten el alto, sin scroll ── */
#screen-home { overflow: hidden; display: flex; flex-direction: column; }
#screen-home > #home-content { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.home-head { flex: 0 0 auto; padding: 2px 2px 14px; }
.cats { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; gap: 10px; max-width: 1080px; width: 100%; }
.cat { flex: 1 1 0; min-height: 0; margin-bottom: 0; overflow: hidden; }
/* Tamaños que escalan con el alto de la ventana para no desbordar nunca. */
.cat-big { font-size: clamp(26px, 6dvh, 52px); }
.cat-name { font-size: clamp(15px, 2.5dvh, 22px); }
.cat-numcol { padding-top: 0; padding-bottom: 0; }
.cat-main { padding-top: 0; padding-bottom: 0; }
.cat-l1 { margin-top: clamp(6px, 1.7dvh, 16px); padding-bottom: clamp(6px, 1.3dvh, 12px); }
.cat-l2 { margin-top: clamp(6px, 1.3dvh, 12px); }
/* Pantallas muy bajas (móvil apaisado): simplifica para que quepa sin recortes. */
@media (max-height: 600px) {
  .cat-l2, .cat-dots { display: none; }
  .cat-l1 { border-bottom: none; padding-bottom: 0; margin-top: clamp(4px, 1dvh, 10px); }
  .cat-big { font-size: clamp(22px, 7dvh, 34px); }
  .cat-state { margin-top: 5px; }
  .home-head { padding-bottom: 8px; }
  .home-efimera { display: none; }
}

@media (max-width: 680px) {
  .topbar { padding: 0 20px; height: 72px; }
  .botbar { padding: 0 20px; height: 48px; font-size: 8.5px; }
  .topbar .brandword { font-size: 12px; letter-spacing: .12em; }
  .topbar-center .mark i { height: 28px; width: 4px; }
  /* Cabecera compacta para dejar alto a los menús. */
  .home-head { padding: 0 2px 10px; }
  .home-sys { font-size: 9px; letter-spacing: .1em; }
  .home-alert { font-size: 10.5px; }
  .home-efimera { font-size: 8.5px; padding: 3px 8px; margin-top: 8px; }
  /* Menús: solo número + nombre + una línea de módulos. Nada se corta. */
  .cat-numcol { flex-basis: 72px; padding: 10px 12px; }
  .cat-big { font-size: clamp(24px, 6dvh, 34px); }
  .cat-state { font-size: 7.5px; letter-spacing: .08em; margin-top: 6px; }
  .cat-dots { font-size: 12px; margin-top: 5px; }
  .cat-main { padding: 10px 12px; min-width: 0; }
  .cat-name { font-size: 15px; letter-spacing: .02em; line-height: 1.1; }
  .cat-l1 { font-size: 9px; margin-top: 7px; padding-bottom: 0; border-bottom: none; line-height: 1.5; }
  .cat-l2 { display: none; }
  .cat-go { flex-basis: 34px; font-size: 17px; }
}

/* ── Accesibilidad: foco visible por teclado (no afecta al ratón) ── */
:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
.topbar :focus-visible, .botbar :focus-visible { outline-color: var(--oliveink); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}

/* ════════════════════════════════════════════════════════════════════
   PROFUNDIDAD · botones y tarjetas con relieve (serio, elegante, tactil)
   ════════════════════════════════════════════════════════════════════ */
.btn-primary, .btn-ghost, .btn-warn {
  border-radius: 3px !important;
  transition: transform .08s ease, box-shadow .14s ease, background .14s ease;
}
/* Botones sólidos (verde): convexos, iluminados desde arriba. */
.btn-primary, .btn-warn {
  background: linear-gradient(180deg, #38422F 0%, #2A332B 58%, #232B22 100%) !important;
  border: 1px solid #1B2117;
  color: var(--cream) !important;
  text-shadow: 0 1px 0 rgba(0,0,0,.28);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -1px 0 rgba(0,0,0,.28),
    0 2px 4px rgba(23,21,15,.22),
    0 1px 2px rgba(23,21,15,.14) !important;
}
.btn-primary:hover, .btn-warn:hover {
  background: linear-gradient(180deg, #3F4936 0%, #2F382E 58%, #283026 100%) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.12),
    inset 0 -1px 0 rgba(0,0,0,.30),
    0 3px 8px rgba(23,21,15,.26),
    0 1px 2px rgba(23,21,15,.16) !important;
}
.btn-primary:active, .btn-warn:active {
  transform: translateY(1px);
  box-shadow: inset 0 1px 3px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.05) !important;
}
.btn-primary:disabled { opacity: .45; box-shadow: 0 1px 2px rgba(23,21,15,.12) !important; }
/* Botones contorno (claro): tecla en relieve sobre el papel. */
.btn-ghost {
  background: linear-gradient(180deg, #FBFAF6 0%, #EFEDE6 100%) !important;
  border: 1px solid var(--line);
  color: var(--ink) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.7),
    0 1px 2px rgba(23,21,15,.10),
    0 1px 1px rgba(23,21,15,.05) !important;
}
.btn-ghost:hover {
  border-color: var(--ink);
  background: linear-gradient(180deg, #FFFFFF 0%, #ECEAE3 100%) !important;
  color: var(--ink) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 2px 6px rgba(23,21,15,.15) !important;
}
.btn-ghost:active { transform: translateY(1px); box-shadow: inset 0 1px 3px rgba(23,21,15,.16) !important; }
/* Toggles e interruptores: mismo lenguaje, más sutil. */
.toggle { box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 1px 1.5px rgba(23,21,15,.08) !important; border-radius: 3px !important; }
.toggle.on { box-shadow: inset 0 1px 2px rgba(0,0,0,.28) !important; }

/* Teclas del menú: relieve marcado (luz arriba, sombra abajo, borde inferior
   oscuro) para que se vean como teclas físicas serias. */
.cat {
  border: 1px solid #CBC5B3 !important;
  border-radius: 5px !important;
  background: linear-gradient(180deg, #FBF9F4 0%, #F1EFE8 52%, #E9E7DF 100%) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    inset 0 -2px 0 rgba(23,21,15,.07),
    0 4px 10px rgba(23,21,15,.17),
    0 1px 2px rgba(23,21,15,.10) !important;
  transition: transform .1s ease, box-shadow .14s ease, background .14s ease;
}
.cat:hover {
  background: linear-gradient(180deg, #FFFFFF 0%, #F3F1EA 52%, #EBE9E1 100%) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    inset 0 -2px 0 rgba(23,21,15,.08),
    0 10px 24px rgba(23,21,15,.22),
    0 2px 4px rgba(23,21,15,.10) !important;
  transform: translateY(-2px);
}
.cat:active {
  transform: translateY(0);
  box-shadow:
    inset 0 2px 6px rgba(23,21,15,.16),
    inset 0 1px 0 rgba(255,255,255,.4),
    0 1px 2px rgba(23,21,15,.10) !important;
}
.card.clickable { border-radius: 5px !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.7), 0 2px 5px rgba(23,21,15,.10), 0 1px 1px rgba(23,21,15,.06) !important;
  transition: box-shadow .12s ease, background .12s ease, transform .1s ease; }
.card.clickable:hover { box-shadow: inset 0 1px 0 rgba(255,255,255,.8), 0 5px 13px rgba(23,21,15,.16) !important; }
.card.clickable:active { transform: translateY(1px); box-shadow: inset 0 1px 4px rgba(23,21,15,.14) !important; }

/* Botones de submenú (filas de módulo dentro de una categoría) con relieve. */
.modrow {
  background: linear-gradient(180deg, #FBF9F4 0%, #F1EFE8 100%) !important;
  border: 1px solid #CBC5B3 !important;
  border-radius: 5px !important;
  padding: 16px 18px !important;
  margin-bottom: 10px !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.85),
    inset 0 -1px 0 rgba(23,21,15,.05),
    0 2px 6px rgba(23,21,15,.11),
    0 1px 1px rgba(23,21,15,.05) !important;
  transition: transform .1s ease, box-shadow .14s ease, background .12s ease;
}
.modrow:hover {
  background: linear-gradient(180deg, #FFFFFF 0%, #F2F0E9 100%) !important;
  border-color: var(--olive) !important;
  transform: translateY(-1px);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.95),
    0 6px 15px rgba(23,21,15,.16),
    0 1px 2px rgba(23,21,15,.07) !important;
}
.modrow:active {
  transform: translateY(1px);
  box-shadow: inset 0 1px 4px rgba(23,21,15,.14), inset 0 1px 0 rgba(255,255,255,.4) !important;
}

    <span class="brandword" role="button" tabindex="0" title="Ir al inicio" onclick="goHome()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();goHome();}">m de materia</span>
  </div>
  <div class="topbar-center"><span class="mark" role="button" tabindex="0" title="Ir al inicio" onclick="goHome()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();goHome();}"><i></i><i></i><i></i></span></div>
  <div class="topbar-right">
    <span class="topbar-section" id="topbar-section">Control total</span>

</header>

<!-- VIEWPORT -->
<div class="viewport" id="viewport">
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div id="home-content"><div class="loading">Cargando…</div></div>
  </div>
  <!-- INNER SCREEN -->
  <div class="screen" id="screen-inner">
    <div id="inner-content"></div>
  </div>
</div>

<!-- FOOTER (marco oliva) -->
<footer class="botbar"><span>m de materia · sistema rtd 01</span><span>control de producción · v57</span></footer>

<!-- WIZARD -->
<div id="wizard-root"></div>

<script>
const API = "/api";
let currentSection = "home";

// Accesibilidad: Enter/Espacio activan los elementos role="button" (tarjetas,
// filas) igual que un clic, para navegación por teclado.
document.addEventListener("keydown", (e) => {
  if ((e.key === "Enter" || e.key === " ") && e.target && e.target.matches && e.target.matches('[role="button"]')) {
    e.preventDefault();
    e.target.click();
  }
});

// ── SISTEMA DE USUARIOS CON ROLES ─────────────────────
// Solo para pintar los botones de login. La autenticación (PIN) la valida el
// backend vía JWT; los PIN ya no viven en el frontend.
const USUARIOS = {
  "Jon":  { rol: "admin",  nombre: "Jon" },
  "Lara": { rol: "equipo", nombre: "Lara" },
  "Moni": { rol: "admin",  nombre: "Mónica" },
};

const MODULOS_EQUIPO = ["preparaciones","lotes","revisiones","ajustes"];
const MODULOS_ADMIN  = ["preparaciones","lotes","materias","revisiones","ajustes","proveedores","recepcion","pagos","manual"];

function getUser()  { try{ return JSON.parse(localStorage.getItem("cm_session")); }catch{ return null; } }
function getToken() { const u = getUser(); return u && u.token; }
function setSession(u) { localStorage.setItem("cm_session", JSON.stringify(u)); }
function logout()   { localStorage.removeItem("cm_session"); location.reload(); }

function puedeVer(seccion) {
  const u = getUser();
  if (!u) return false;
  if (u.rol === "admin") return true;
  return MODULOS_EQUIPO.includes(seccion);
}

function modulosVisibles() {
  const u = getUser();
  if (!u) return [];
  return u.rol === "admin" ? MODULOS_ADMIN : MODULOS_EQUIPO;
}

// ── LOGIN SCREEN ──────────────────────────────────────
let _loginKey = null;

function mostrarLogin() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div style="min-height:100vh;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;">
      <div style="text-align:center;color:var(--cream);">
        <span class="mark" style="color:var(--cream);justify-content:center;gap:5px;"><i style="height:30px;width:3px;"></i><i style="height:30px;width:3px;"></i><i style="height:30px;width:3px;"></i></span>
        <div style="font-family:var(--sans);font-size:30px;font-weight:700;line-height:1;margin-top:18px;letter-spacing:.01em;">m de materia</div>
        <div style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#555040;margin-top:8px;margin-bottom:52px;">Control de producción</div>
        <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#555040;margin-bottom:18px;">¿Quién prepara hoy?</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;">
          ${Object.entries(USUARIOS).map(([k,u]) => `
            <button id="ubtn-${k}" class="ubtn" onclick="seleccionarUsuario('${k}')"
              style="font-family:inherit;font-size:13px;padding:15px 30px;border:1px solid #2A2820;color:#888070;cursor:pointer;">
              ${u.nombre}
            </button>`).join("")}
        </div>
        <div id="pin-wrap" style="display:none;">
          <div style="font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:#555040;margin-bottom:12px;">PIN</div>
          <input type="password" inputmode="numeric" maxlength="4" id="pin-inp" autocomplete="off"
            style="font-family:inherit;font-size:28px;letter-spacing:0.4em;text-align:center;width:130px;background:none;border:none;border-bottom:1px solid #2A2820;color:var(--cream);padding:8px;outline:none;"
            oninput="if(this.value.length===4)checkPin();">
          <div id="pin-err" style="font-size:11px;color:#E7E4D7;margin-top:14px;min-height:16px;"></div>
        </div>
      </div>
    </div>`;
}

function seleccionarUsuario(key) {
  _loginKey = key;
  Object.keys(USUARIOS).forEach(k => {
    const b = document.getElementById("ubtn-"+k);
    if(b) b.style.borderColor = k===key ? "#5C6145" : "#2A2820";
    if(b) b.style.color = k===key ? "#F0EBE0" : "#888070";
  });
  const w = document.getElementById("pin-wrap");
  w.style.display = "block";
  document.getElementById("pin-inp").value = "";
  document.getElementById("pin-err").textContent = "";
  document.getElementById("pin-inp").focus();
}

async function checkPin() {
  const pin = document.getElementById("pin-inp").value;
  if (pin.length !== 4) return;
  document.getElementById("pin-err").textContent = "";
  try {
    const r = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: _loginKey, pin }),
    });
    if (!r.ok) throw new Error();
    const data = await r.json();
    setSession({ key: data.usuario.key, nombre: data.usuario.nombre, rol: data.usuario.rol, token: data.token });
    entrarApp();
  } catch (e) {
    document.getElementById("pin-err").textContent = "PIN incorrecto";
    document.getElementById("pin-inp").value = "";
    document.getElementById("pin-inp").focus();
  }
}

function renderUserChips() {
  const u = getUser();
  const el = document.getElementById("topbar-user");
  if (!el || !u) return;
  el.innerHTML = `
    <span style="font-size:11px;color:#AAA490;margin-right:10px;">${u.nombre}</span>
    <button class="user-chip" onclick="logout()">Salir</button>`;
}

// ── NAVEGACIÓN ────────────────────────────────────────
function goHome() {
  currentSection = "home";
  document.getElementById("topbar-section").textContent = "Control total";
  document.getElementById("topbar-back").classList.remove("visible");
  document.getElementById("screen-inner").classList.remove("active");
  document.getElementById("screen-inner").classList.add("exit");
  document.getElementById("screen-home").classList.add("active");
  document.getElementById("screen-home").classList.remove("exit");
  setTimeout(() => {
    document.getElementById("screen-inner").classList.remove("exit");
  }, 300);
  loadHome();
}

// "Volver": si estamos en una sección que pertenece a una categoría, regresa
// a su submenú (no al inicio). Desde un submenú o el resumen, va al inicio.
function goBack() {
  const s = currentSection;
  if (s === "home" || s === "resumen" || (typeof s === "string" && s.indexOf("cat-") === 0)) {
    goHome();
    return;
  }
  let parent = null;
  for (const k in CATS) {
    if (CATS[k].ids && CATS[k].ids.indexOf(s) !== -1) { parent = k; break; }
  }
  if (parent) irA_categoria(parent);
  else goHome();
}

let _sectionTitle = "";
function openSection(id, title) {
  currentSection = id;
  _sectionTitle = title;
  document.getElementById("topbar-section").textContent = title;
  document.getElementById("topbar-back").classList.add("visible");
  document.getElementById("screen-home").classList.add("exit");
  document.getElementById("screen-home").classList.remove("active");
  document.getElementById("screen-inner").classList.add("active");
  document.getElementById("screen-inner").classList.remove("exit");
  document.getElementById("inner-content").innerHTML = `<div class="loading">Cargando…</div>`;
  setTimeout(() => {
    document.getElementById("screen-home").classList.remove("exit");
  }, 300);
}

// ── HELPERS ───────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  const t = getToken();
  if (t) headers["Authorization"] = "Bearer " + t;
  const r = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (r.status === 401) { localStorage.removeItem("cm_session"); location.reload(); throw new Error("Sesión expirada"); }
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    // Nunca dejar el mensaje vacío: si el servidor no da detalle (502/timeout,
    // HTTP/2 sin statusText…), mostramos al menos el código para diagnosticar.
    const detalle = e.error || r.statusText || (r.status === 502 || r.status === 504 ? "el servidor tardó demasiado en responder" : "");
    throw new Error(detalle || ("error " + r.status));
  }
  return r.json();
}

function el(id) { return document.getElementById(id); }
// Escapa texto para meterlo con seguridad en HTML (valores de campos, etc.).
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
// Cada pantalla interna lleva su título serif (misma línea que la home).
function setInner(html) {
  el("inner-content").innerHTML =
    (_sectionTitle ? `<div class="screen-head">${_sectionTitle}</div>` : "") + html;
}

function card(name, meta, actions, extra) {
  return `<div class="card">
    <div class="card-name">${name}</div>
    ${meta ? `<div class="card-meta">${meta}</div>` : ""}
    ${extra || ""}
    ${actions ? `<div class="card-actions">${actions}</div>` : ""}
  </div>`;
}

function section(label, items, fn, empty) {
  return `<div class="section-label">${label}</div>` +
    (items && items.length ? items.map(fn).join("") : `<div class="empty">${empty||"Sin elementos."}</div>`);
}

function fmt(iso) {
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function whatsapp(num, msg) { window.open(`https://wa.me/${num}?text=${msg}`, "_blank"); }

// ── HOME ──────────────────────────────────────────────
// Metadatos vivos de cada módulo (nombre, número, aviso) a partir de /inicio.
function modulosMeta(d) {
  const k = d.kpis || {};
  const enCurso = (d.en_curso||[]).length, pendPrep = (d.preparar||[]).length,
        pendPedir = (d.pedir||[]).length, pendRevisar = (d.revisar||[]).length,
        pendLotes = (d.lotes_a_vigilar||[]).length;
  return {
    preparaciones:{ num:"01", name:"Preparaciones", badge: enCurso?`${enCurso} en curso`:(pendPrep?`${pendPrep} recomendadas`:"Al día"), urgent: !!(enCurso||pendPrep) },
    lotes:        { num:"02", name:"Lotes activos", badge: pendLotes?`${pendLotes} requieren atención`:"Sin alertas", urgent: !!pendLotes },
    materias:     { num:"03", name:"Materias", badge: pendPedir?`${pendPedir} con disponibilidad baja`:"Stock correcto", urgent: !!pendPedir },
    revisiones:   { num:"04", name:"Revisiones", badge: pendRevisar?`${pendRevisar} pendientes`:"Completadas", urgent: !!pendRevisar },
    ajustes:      { num:"05", name:"Ajustes", badge:`${k.ajustes_hoy||0} registrados hoy`, urgent:false },
    proveedores:  { num:"01", name:"Proveedores", badge: pendPedir?`${pendPedir} a contactar`:"Sin pedidos urgentes", urgent:false },
    pedidos:      { num:"02", name:"Pedidos", badge:"Crear y enviar a proveedores", urgent:false },
    recepcion:    { num:"03", name:"Recepción", badge:"Escanear albarán y entrada", urgent:false },
    pagos:        { num:"04", name:"Pagos y justificantes", badge:"Por proveedor", urgent:false },
    archivo:      { num:"05", name:"Archivo albaranes", badge:"Por trimestre · gestoría", urgent:false },
    carta:        { num:"01", name:"Carta y márgenes", badge: k.margen_medio_carta!=null?`Margen medio ${Math.round(k.margen_medio_carta*100)}%`:"Escandallos", urgent:false },
    analisis:     { num:"02", name:"Análisis", badge:"Reportes y stock", urgent:false },
    ventas:       { num:"03", name:"Importar ventas", badge:"CSV de Ágora", urgent:false },
    manual:       { num:"04", name:"La forma de hacer las cosas", badge:"Manual operativo", urgent:false },
    avisos:       { num:"05", name:"Avisos", badge:"Notificación · pedidos y caducidades", urgent:false },
  };
}

const CATS = {
  operacion: { name:"Operación", desc:"Preparaciones · Lotes · Materias · Revisiones · Ajustes", ids:["preparaciones","lotes","materias","revisiones","ajustes"] },
  compras:   { name:"Compras", desc:"Proveedores · Pedidos · Recepción · Pagos · Archivo", ids:["proveedores","pedidos","recepcion","pagos","archivo"], admin:true },
  gestion:   { name:"Gestión", desc:"Carta · Análisis · Ventas · Avisos · Manual", ids:["carta","analisis","ventas","manual","avisos"], admin:true },
};

// Dashboard (KPIs + qué hacer ahora) — vive ahora en "Resumen del día".
function dashboardHTML(d, esAdmin) {
  const k = d.kpis || {};
  const alerta = d.estado_servicio !== "Servicio en orden";
  const enCurso=(d.en_curso||[]).length, pendPrep=(d.preparar||[]).length,
        pendPedir=(d.pedir||[]).length, pendRevisar=(d.revisar||[]).length, pendLotes=(d.lotes_a_vigilar||[]).length;
  const kpisHTML = esAdmin ? `
      <div class="home-kpis">
        <div class="kpi-box"><div class="kpi-label">Producción hoy</div><div class="kpi-val">${k.coste_produccion_hoy!=null?k.coste_produccion_hoy.toFixed(2)+" €":"—"}</div><div class="kpi-sub">${k.preparaciones_hoy||0} preparaciones</div></div>
        <div class="kpi-box ${(k.coste_mermas_hoy||0)>0?"warn":""}"><div class="kpi-label">Mermas hoy</div><div class="kpi-val" style="${(k.coste_mermas_hoy||0)>0?"color:var(--warn)":""}">${k.coste_mermas_hoy!=null?k.coste_mermas_hoy.toFixed(2)+" €":"—"}</div><div class="kpi-sub">${k.ajustes_hoy||0} ajustes</div></div>
        <div class="kpi-box"><div class="kpi-label">Valor stock</div><div class="kpi-val">${k.valor_stock_total!=null?k.valor_stock_total.toFixed(2)+" €":"—"}</div><div class="kpi-sub">en materias</div></div>
        <div class="kpi-box"><div class="kpi-label">Margen carta</div><div class="kpi-val">${k.margen_medio_carta!=null?Math.round(k.margen_medio_carta*100)+" %":"—"}</div><div class="kpi-sub">${k.productos_carta||0} productos</div></div>
        <div class="kpi-box ${alerta?"warn":""}"><div class="kpi-label">Estado</div><div class="kpi-val" style="font-size:14px;padding-top:4px;${alerta?"color:var(--warn)":""}">${alerta?"Requiere atención":"En orden"}</div><div class="kpi-sub">${pendPrep?pendPrep+" pendientes de prep.":"Producción al día"}</div></div>
      </div>` : "";
  const acc = [];
  if (enCurso) acc.push({ txt:"Preparaciones en curso", n:enCurso, go:"preparaciones" });
  else if (pendPrep) acc.push({ txt:"Preparaciones recomendadas", n:pendPrep, go:"preparaciones" });
  if (pendLotes) acc.push({ txt:"Lotes a vigilar", n:pendLotes, go:"lotes" });
  if (pendRevisar) acc.push({ txt:"Revisiones pendientes", n:pendRevisar, go:"revisiones" });
  if (esAdmin && pendPedir) acc.push({ txt:"Materias con stock bajo", n:pendPedir, go:"materias" });
  const todoHTML = `<div class="todo"><div class="todo-h">Qué hacer ahora</div>${acc.length
        ? `<div class="todo-row">${acc.map(a=>`<button class="todo-chip" onclick="irA_${a.go}()">${a.txt}<span class="n">${a.n}</span></button>`).join("")}</div>`
        : `<div class="todo-clear">✓ Todo al día. Sin acciones pendientes.</div>`}</div>`;
  return `
      <div class="banner ${alerta?"warn":""}"><span class="dot"></span><span>${d.estado_servicio}</span></div>
      ${esAdmin && d.agora ? `<div class="agora-line">${d.agora.mensaje}</div>` : ""}

      ${kpisHTML}`;
}

// ── PREPARACIONES ─────────────────────────────────────
async function irA_preparaciones() {
  openSection("preparaciones","Preparaciones");
  try {
    const [recetas, enCurso, recientes] = await Promise.all([
      api("/recetas"),
      api("/preparaciones?estado=En curso"),

    ]);
    let html = "";
    if (enCurso.length) {
      html += `<div class="section-label">En curso</div>`;
      html += enCurso.map(p => card(
        `${p.nombre_receta} — ${p.cantidad_objetivo} g`,
        `${p.responsable} · Paso ${Math.min(p.paso_actual+1,p.pasos.length)} de ${p.pasos.length}`,
        `<button class="btn-primary" onclick="abrirWizard('${p.id}')">Continuar</button>`
      )).join("");
    }
    html += `<div class="section-label">Elegir preparación</div>`;
    html += recetas.map(r => `
      <div class="card">
        <div class="card-name">${r.nombre}</div>
        <div class="card-meta">Disponible: ${r.disponible_ahora} ${r.unidad} · vida útil ${r.vida_util_horas} h</div>
        <div class="card-actions">
          ${r.opciones_tamano.map(o => `
            <button class="btn-ghost" onclick="iniciarYAbrir('${r.id}',${o.cantidad},this)">

        </div>

        card(`${p.nombre_receta} — ${p.cantidad_objetivo} g`, `${p.responsable} · ${fmt(p.finalizada_en)}`)
      );
    }
    setInner(html);

// ── WIZARD ────────────────────────────────────────────
async function iniciarYAbrir(rid, cantidad, btn) {
  if(btn) btn.disabled=true;
  try {
    const p = await api("/preparaciones",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({receta_id:rid,cantidad_objetivo:cantidad,responsable:getUser()||"Sin asignar"})});
    pintarWizard(p);
  } catch(e){alert(e.message);if(btn)btn.disabled=false;}
}

async function abrirWizard(id) {
  try {
    const todas = await api("/preparaciones?estado=En curso");
    const p = todas.find(x=>x.id===id);
    if(!p){alert("No encontrada.");return;}
    pintarWizard(p);
  } catch(e){alert(e.message);}
}

function cerrarWizard() {
  el("wizard-root").innerHTML="";
  if(currentSection==="preparaciones") irA_preparaciones();
  else loadHome();
}

function pintarWizard(p) {
  const total=p.pasos.length, actual=p.paso_actual;
  const pct=Math.round((actual/total)*100);
  if(actual>=total){
    el("wizard-root").innerHTML=`
      <div class="wizard-overlay">
        <div class="wiz-bar"><div class="wiz-bar-fill" style="width:100%"></div></div>
        <div class="wiz-top"><span class="wiz-step">Completado</span><button class="wiz-close" onclick="cerrarWizard()">Cerrar</button></div>
        <div class="wiz-body">
          <div class="wiz-done">Preparación finalizada</div>
          <div class="wiz-done-meta">${p.nombre_receta} · ${p.cantidad_objetivo} g · ${p.responsable}</div>
          <button class="wiz-ok" onclick="finalizarPrep('${p.id}')">Crear lote</button>
        </div>
      </div>`;
    return;
  }
  const paso=p.pasos[actual];
  const esIng=paso.tipo==="ingrediente";
  el("wizard-root").innerHTML=`
    <div class="wizard-overlay">
      <div class="wiz-bar"><div class="wiz-bar-fill" style="width:${pct}%"></div></div>
      <div class="wiz-top">
        <span class="wiz-step">Paso ${actual+1} de ${total}</span>
        <button class="wiz-close" onclick="cerrarWizard()">Cerrar</button>
      </div>
      <div class="wiz-body">
        <div class="wiz-recipe">${p.nombre_receta}</div>
        <div class="wiz-action">${paso.texto}</div>
        ${esIng?`<div class="wiz-num">${paso.cantidad}</div><div class="wiz-unit">${paso.unidad}</div>`:""}
      </div>
      <div class="wiz-footer">
        <button class="wiz-ok" onclick="confirmarPaso('${p.id}')">OK — Siguiente</button>
      </div>
    </div>`;
}

async function confirmarPaso(id){
  try{const p=await api(`/preparaciones/${id}/confirmar-paso`,{method:"POST"});pintarWizard(p);}
  catch(e){alert(e.message);}
}

async function finalizarPrep(id){
  const u=getUser(); const resp=encodeURIComponent(u?u.nombre:"");
  // Abrimos la ventana YA (dentro del clic) para que el móvil no la bloquee;
  // luego la redirigimos a la etiqueta del lote recién creado.
  const w=window.open("","_blank");
  try{
    const d=await api(`/preparaciones/${id}/finalizar`,{method:"POST"});
    const loteId=(d.lote&&d.lote.id)||(d.etiqueta&&d.etiqueta.lote_id);
    if(loteId&&w){ w.location.href=`/etiqueta/lote/${loteId}?print=1&usuario=${resp}&responsable=${resp}`; }
    else if(w){ w.close(); }
    cerrarWizard();
  }catch(e){ if(w)w.close(); alert(e.message); }
}

// ── FICHA TÉCNICA · detalle de producto a pantalla completa (layout etiqueta) ──
function fmtFecha(iso){ try{return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});}catch(e){return "—";} }

function fichaTecnica({ eyebrow, nombre, sub, code, filas, nota, acciones }){
  const rows = (filas||[]).map(f=>`<div class="frow"><span class="k">${f.k}</span><span class="v${f.alerta?" alert":""}">${f.v}</span></div>`).join("");
  el("wizard-root").innerHTML = `
    <div class="ficha-overlay">
      <div class="ficha-top">
        <span class="ficha-eyebrow">${eyebrow||"Ficha técnica"}</span>
        <button class="wiz-close" onclick="cerrarFicha()">Cerrar ✕</button>
      </div>
      <div class="ficha-wrap">
        <div class="ficha-card">
          <div class="ficha-spine">
            <span class="mark"><i></i><i></i><i></i></span>
            <div class="ficha-brand">m de<br>materia</div>
          </div>
          <div class="ficha-body">
            <div class="ficha-head">
              <div class="ficha-name">${nombre}</div>
              ${sub?`<div class="ficha-sub">${sub}</div>`:""}
              ${code?`<div class="ficha-code">${code}</div>`:""}
            </div>
            <div class="ficha-rows">${rows}</div>
            ${nota?`<div class="ficha-note">${nota}</div>`:""}
          </div>
        </div>
        ${acciones?`<div class="ficha-actions">${acciones}</div>`:""}
      </div>
    </div>`;
  document.body.style.overflow="hidden";
}
function cerrarFicha(){ el("wizard-root").innerHTML=""; document.body.style.overflow=""; }

async function verMateria(id){
  try{
    const m=await api("/materias/"+id);
    const baja=m.disponibilidad_estado==="Disponibilidad baja";
    const filas=[
      { k:"Referencia", v:(m.id||"").toUpperCase() },
      { k:"Disponible", v:`${m.disponibilidad_actual} ${m.unidad}`, alerta:baja },
      { k:"Stock mín · ideal", v:`${m.stock_minimo} · ${m.stock_ideal} ${m.unidad}` },
      { k:"Coste medio", v:`${m.coste_medio.toFixed(4)} €/${m.unidad}` },
      { k:"Valor stock", v:`${m.valor_stock_actual.toFixed(2)} €` },
      { k:"Vida útil", v:`${m.vida_util_horas} h` },
      { k:"Ubicación", v:m.ubicacion },
      { k:"Proveedor", v:m.proveedor_nombre },
      { k:"Estado", v:baja?"Disponibilidad baja":"Correcto", alerta:baja },
    ];
    const acc=baja&&m.proveedor_whatsapp
      ?`<button class="btn-primary" onclick="whatsapp('${m.proveedor_whatsapp.replace(/[^0-9+]/g,"")}','${encodeURIComponent("Hola, necesitamos reponer "+m.nombre+" para m de materia.")}')">Pedir por WhatsApp</button>`:"";
    fichaTecnica({ eyebrow:"Ficha técnica · Materia", nombre:m.nombre, sub:`materia prima · ${m.unidad}`,
      code:`${(m.id||"").toUpperCase()}<br>SERIE 01`, filas,
      nota:"Materia prima · control de stock m de materia. Sin colorantes, sin conservantes.", acciones:acc });
  }catch(e){alert(e.message);}
}

async function verLote(id){
  try{
    const lotes=await api("/lotes");
    const l=lotes.find(x=>x.id===id); if(!l){alert("Lote no encontrado");return;}
    const alerta=(l.estado==="Requiere atención"||l.caducado);
    const filas=[
      { k:"Código", v:l.codigo },
      { k:"Producto", v:l.nombre||"—" },
      { k:"Cantidad", v:`${l.cantidad_restante} / ${l.cantidad_inicial} g` },
      { k:"Estado", v:l.estado, alerta },
      { k:"Ubicación", v:l.ubicacion },
      { k:"Producido", v:fmtFecha(l.producido_en) },
      { k:"Caduca", v:l.caducado?"Fuera de plazo":fmtFecha(l.caduca_en), alerta:l.caducado },
      { k:"Restante", v:l.caducado?"—":`${l.horas_restantes} h` },
    ];
    const acc=
      `<button class="btn-ghost" onclick="imprimirEtiqueta('${l.id}')">Imprimir etiqueta</button>`
      +`<button class="btn-ghost" onclick="verQRLote('${l.id}')">Ver QR · vida útil</button>`
      +`<button class="btn-ghost" onclick="copiarEnlaceLote('${l.id}')">Copiar enlace</button>`
      +(l.caducado&&l.estado!=="Fuera de servicio"?`<button class="btn-warn" onclick="darDeBaja('${l.id}',()=>{cerrarFicha();irA_lotes();})">Dar de baja</button>`:"");
    fichaTecnica({ eyebrow:"Ficha técnica · Lote", nombre:l.codigo, sub:l.nombre||"lote de producción",
      code:"LOTE<br>SERIE 01", filas,
      nota:"Lote de producción · conservar siempre en frío. Elaborado en pequeñas cantidades.", acciones:acc });
  }catch(e){alert(e.message);}
}

// ── REVISIONES ────────────────────────────────────────
async function irA_revisiones(){
  openSection("revisiones","Revisiones");
  try{
    const [tipos,revs]=await Promise.all([api("/revisiones/tipos"),api("/revisiones")]);
    const hoy=new Date().toDateString();
    const deHoy=revs.filter(r=>new Date(r.fecha).toDateString()===hoy);
    let html=`<div class="section-label">Revisiones de hoy</div>`;
    html+=tipos.map(t=>{
      const reg=deHoy.filter(r=>r.tipo===t.tipo).slice(-1)[0];
      if(reg?.estado==="Correcto") return card(t.tipo,`${reg.valor} · registrado`);
      if(reg&&reg.estado!=="Correcto") return card(
        t.tipo,`${reg.valor} · ${reg.estado}${reg.accion_correctiva?" · "+reg.accion_correctiva:""}`,
        `<button class="btn-primary" onclick="resolverRev('${reg.id}',irA_revisiones)">Marcar revisado</button>`);
      if(t.clase==="temperatura") return `
        <div class="card">
          <div class="card-name">${t.tipo}</div>
          <div class="field" style="margin-top:10px;">
            <label>Temperatura en ${t.unidad}</label>
            <input type="number" step="0.1" id="rev_${t.tipo.replace(/\s/g,"_")}" style="width:110px;">
          </div>
          <div class="card-actions">
            <button class="btn-ghost" onclick="regRev('${t.tipo}',document.getElementById('rev_${t.tipo.replace(/\s/g,"_")}').value)">Registrar</button>
          </div>
        </div>`;
      return card(t.tipo,"",`<button class="btn-ghost" onclick="regRev('${t.tipo}','Realizada')">Marcar realizada</button>`);
    }).join("");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function regRev(tipo,valor){
  if(!valor){alert("Introduce un valor.");return;}
  try{
    await api("/revisiones/registrar",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo,valor,responsable:getUser()||"Sin asignar"})});
    irA_revisiones();
  }catch(e){alert(e.message);}
}

async function resolverRev(id,cb){
  try{await api(`/revisiones/${id}/resolver`,{method:"POST"});cb();}
  catch(e){alert(e.message);}
}

let _aj={tipo:"materia",motivo:null};

async function irA_ajustes(){

    const [mat,lotes,motivos,hist]=await Promise.all([
      api("/materias"),api("/lotes"),api("/ajustes/motivos"),api("/ajustes")]);

    let html=`
      <div class="section-label">Registrar ajuste</div>
      <div class="card">
        <div class="field">
          <label>¿Qué se ajusta?</label>
          <div class="toggle-row">
            <button class="toggle on" id="aj-m" onclick="ajTipo('materia')">Materia</button>
            <button class="toggle" id="aj-l" onclick="ajTipo('lote')">Lote</button>
          </div>
        </div>
        <div class="field">
          <label id="aj-ol">Materia</label>
          <select id="aj-obj" onchange="_aj.objetivoId=this.value">
            <option value="">Selecciona…</option>
            ${mat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Cantidad</label><input type="number" id="aj-cant" style="width:130px;"></div>
        <div class="field">
          <label>Motivo</label>
          <div class="toggle-row" id="aj-motivos">
            ${motivos.map(m=>`<button class="toggle" onclick="ajMotivo('${m}',this)">${m}</button>`).join("")}
          </div>
        </div>
        <div class="field"><label>Observación (opcional)</label><input type="text" id="aj-obs" style="width:100%;"></div>
        <div class="card-actions"><button class="btn-primary" onclick="regAjuste()">Registrar ajuste</button></div>
      </div>`;
    const nombreObjetivo=a=>{
      if(a.objetivo_nombre) return a.objetivo_nombre;
      if(a.tipo_objetivo==="materia"){ const m=mat.find(x=>x.id===a.objetivo_id); return m?m.nombre:a.objetivo_id; }
      const l=lotes.find(x=>x.id===a.objetivo_id); return l?l.codigo:a.objetivo_id;
    };
    html+=section("Historial reciente",hist.slice(0,6),a=>card(
      `${nombreObjetivo(a)} — ${a.cantidad}`,
      `${a.motivo} · ${a.coste_estimado.toFixed(2)} € · ${a.responsable} · ${fmt(a.fecha)}`
    ),"Sin ajustes.");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

function ajTipo(t){
  _aj.tipo=t;_aj.objetivoId=null;
  el("aj-m").classList.toggle("on",t==="materia");
  el("aj-l").classList.toggle("on",t==="lote");
  el("aj-ol").textContent=t==="materia"?"Materia":"Lote";

    ?window._ajMat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`)
    :window._ajLotes.map(l=>`<option value="${l.id}">${l.codigo} — ${l.nombre} (${l.cantidad_restante} restantes)</option>`);
  el("aj-obj").innerHTML=`<option value="">Selecciona…</option>${ops.join("")}`;
}

async function regAjuste(){

// ── PROVEEDORES ───────────────────────────────────────
const PROV_EST_COLOR={ "Activo":"var(--olive)", "Pausado":"var(--muted)", "Sustituido":"var(--alert)" };
async function irA_proveedores(){
  openSection("proveedores","Proveedores");
  try{
    const [provs,meta]=await Promise.all([api("/proveedores"),api("/proveedores/meta")]);
    window._provMeta=meta;
    const cab=`<div class="card-actions" style="margin-bottom:14px;"><button class="btn-primary" onclick="formProveedor()">Agregar proveedor</button></div>`;
    if(!provs.length){ setInner(cab+`<div class="empty">Aún no hay proveedores. Pulsa “Agregar proveedor” para crear el primero.</div>`); return; }
    // Orden: activos primero, luego por nombre.
    provs.sort((a,b)=> (a.estado==="Activo"?0:1)-(b.estado==="Activo"?0:1) || a.nombre.localeCompare(b.nombre));
    const html=cab+provs.map(p=>{
      const tel=(p.telefono||p.whatsapp||"").replace(/[^0-9+]/g,"");
      const estado=p.estado||"Activo";
      const meta2=[p.categoria||"Otros", p.contacto||"", (p.productos_nombres||[]).slice(0,3).join(", ")].filter(Boolean).join(" · ");
      const acc=`<button class="btn-primary" onclick="irA_productosProveedor('${p.id}')">Productos</button>`+
        `<button class="btn-ghost" onclick="formProveedor('${p.id}')">Editar</button>`+
        (tel?`<button class="btn-ghost" onclick="whatsapp('${tel}','${encodeURIComponent("Hola "+(p.contacto||"")+", ")}')">WhatsApp</button>`:"");
      return `<div class="card">
        <div class="card-name">${p.nombre} <span style="font-size:10px;font-weight:700;color:${PROV_EST_COLOR[estado]||"var(--muted)"};letter-spacing:.06em;text-transform:uppercase;">· ${estado}</span></div>
        <div class="card-meta">${meta2}</div>
        <div class="card-actions">${acc}</div>
      </div>`;
    }).join("");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function guardarProveedor(btn){
  const msg=el("pv-msg");
  const body={
    nombre:el("pv-nombre").value.trim(),
    categoria:el("pv-cat").value,
    contacto:el("pv-contacto").value.trim(),
    telefono:el("pv-tel").value.trim(),
    email:el("pv-email").value.trim(),
    direccion:el("pv-dir").value.trim(),
    estado:el("pv-estado").value,
    notas:el("pv-notas").value.trim(),
  };
  if(window._provFoto!==undefined && window._provFoto!==null) body.foto_url=window._provFoto; // "" borra, dataURL nueva
  if(!body.nombre){ if(msg) msg.textContent="Revísalo antes de continuar: indica el nombre del proveedor."; return; }
  if(btn){btn.disabled=true;}
  try{
    if(window._provEditId){
      await api("/proveedores/"+window._provEditId,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});

// ── PRODUCTOS POR PROVEEDOR ───────────────────────────
const eur4=(n)=>Number(n||0).toFixed(2);
async function irA_productosProveedor(provId){
  openSection("prov-productos","Productos del proveedor");
  try{
    const [prov,prods,meta]=await Promise.all([
      api("/proveedores/"+provId),
      api("/compras-productos?proveedor_id="+provId),
      api("/compras-productos/meta"),
    ]);
    window._cprMeta=meta; window._cprProv=prov;
    const cab=`<div class="section-label">${esc(prov.nombre)}</div>
      <div class="card-actions" style="margin-bottom:14px;">
        <button class="btn-primary" onclick="formProductoCompra('${provId}')">Agregar producto</button>
        <button class="btn-ghost" onclick="irA_proveedores()">← Proveedores</button>
      </div>`;
    if(!prods.length){ setInner(cab+`<div class="empty">Aún no hay productos de este proveedor. Pulsa “Agregar producto”.</div>`); return; }
    prods.sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||""));
    const html=cab+prods.map(p=>`<div class="card">
      <div class="card-name">${esc(p.nombre)}</div>
      <div class="card-meta">${esc(p.categoria||"")} · ${p.cantidad_formato||1} ${esc(p.formato||"")} · pactado ${eur4(p.precio_con_iva)} € (IVA ${p.iva||0}%) · unitario ${eur4(p.precio_unitario_real)} €/${esc(p.formato||"ud")}</div>
      ${(p.alergenos&&p.alergenos.length)?`<div class="card-meta" style="color:var(--alert)">Alérgenos: ${p.alergenos.map(esc).join(", ")}</div>`:""}
      <div class="card-actions">
        <button class="btn-ghost" onclick="irA_precioProducto('${p.id}','${provId}')">Precio / histórico</button>
        <button class="btn-ghost" onclick="formProductoCompra('${provId}','${p.id}')">Editar</button>
        <button class="btn-ghost" onclick="borrarProductoCompra('${p.id}','${provId}')">Eliminar</button>
      </div>
    </div>`).join("");
    setInner(html);
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}

function calcPrecioProd(){
  const sin=Number(el("cp-siniva").value)||0;
  const iva=Number(el("cp-iva").value)||0;
  const cant=Number(el("cp-cant").value)||0;
  const con=sin*(1+iva/100);
  const uni=cant>0?con/cant:con;
  const out=el("cp-calc");
  if(out) out.innerHTML=`Precio con IVA: <b>${con.toFixed(2)} €</b> · Precio unitario real: <b>${uni.toFixed(4)} €</b>`;
}

async function elegirFotoProd(input){

// ── PRECIO PACTADO + HISTÓRICO ────────────────────────
async function irA_precioProducto(prodId,provId){
  openSection("prov-precio","Precio del producto");
  try{
    const [p,hist]=await Promise.all([api("/compras-productos/"+prodId),api("/compras-productos/"+prodId+"/historico")]);
    window._precProd=p; window._precProvId=provId; window._precDoc=null;
    const histHtml=hist.length?hist.map(h=>{
      const f=new Date(h.fecha).toLocaleDateString("es-ES");
      const sube=h.precio_nuevo>h.precio_anterior;
      return `<div class="card">
        <div class="card-meta">${f} · <b style="color:${sube?"var(--alert)":"var(--olive)"}">${eur4(h.precio_anterior)} € → ${eur4(h.precio_nuevo)} €</b> ${sube?"↑":"↓"}</div>
        <div class="card-meta">${esc(h.motivo)} · ${esc(h.responsable)}${h.tiene_documento?" · 📎 con documento":""}</div>
      </div>`;
    }).join(""):`<div class="empty">Sin cambios de precio registrados.</div>`;
    setInner(`
      <div class="section-label">${esc(p.nombre)}</div>
      <div class="card">
        <div class="card-name">Precio pactado actual</div>
        <div class="card-meta">Sin IVA: <b>${eur4(p.precio_sin_iva)} €</b> · IVA ${p.iva||0}% · Con IVA: <b>${eur4(p.precio_con_iva)} €</b> · Unitario real: <b>${eur4(p.precio_unitario_real)} €/${esc(p.formato||"ud")}</b></div>
      </div>
      <div class="card">
        <div class="card-name">Cambiar precio</div>
        <div class="field"><label>Nuevo precio sin IVA (€)</label><input id="pr-nuevo" type="number" step="0.0001" value="${p.precio_sin_iva||0}" style="width:140px;"></div>
        <div class="field"><label>Motivo</label><input id="pr-motivo" placeholder="p. ej. Subida de proveedor" style="width:100%;"></div>
        <input type="file" accept="image/*" capture="environment" id="pr-file" style="display:none" onchange="elegirDocPrecio(this)">
        <div class="card-actions">
          <button class="btn-ghost" onclick="document.getElementById('pr-file').click()">Adjuntar documento/foto</button>
        </div>
        <div id="pr-doc-prev"></div>
        <div class="card-actions">
          <button class="btn-primary" onclick="guardarCambioPrecio(this)">Guardar cambio de precio</button>
          <button class="btn-ghost" onclick="irA_productosProveedor('${provId}')">← Productos</button>
        </div>
        <div id="pr-msg" style="font-size:12px;color:var(--alert);margin-top:8px;"></div>
      </div>
      <div class="section-label">Histórico de precios</div>
      ${histHtml}`);
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}

async function elegirDocPrecio(input){
  const file=input.files&&input.files[0]; if(!file)return;
  try{ window._precDoc=await reducirImagen(file,1400,0.7);
    el("pr-doc-prev").innerHTML=`<img src="${window._precDoc}" style="max-width:100%;max-height:180px;border-radius:6px;margin-top:8px;">`;
  }catch(e){ const m=el("pr-msg"); if(m) m.textContent="No se pudo cargar el documento: "+e.message; }

}

async function guardarCambioPrecio(btn){
  const msg=el("pr-msg");
  const nuevo=Number(el("pr-nuevo").value);
  if(!(nuevo>=0)){ if(msg) msg.textContent="Revísalo antes de continuar: indica un precio válido."; return; }
  const u=getUser();
  const body={ precio_sin_iva:nuevo, motivo:el("pr-motivo").value.trim(), responsable:(u&&u.nombre)||"Sin asignar" };
  if(window._precDoc) body.precio_doc=window._precDoc;
  if(btn){btn.disabled=true;}
  try{
    await api("/compras-productos/"+window._precProd.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    irA_precioProducto(window._precProd.id,window._precProvId);

async function crearPedido(){

  try{

async function enviarPedidoWA(id){
  try{
    const p=await api(`/pedidos/${id}`);
    let prov=(window._provPed||[]).find(x=>x.id===p.proveedor_id);
    if(!prov) prov=await api(`/proveedores/${p.proveedor_id}`);
    const tel=(prov.whatsapp||"").replace(/[^0-9+]/g,"").replace(/^\+/,"");
    if(!tel){alert("Este proveedor no tiene WhatsApp.");return;}
    const lineas=p.lineas.map(l=>{const pu=Number(l.precio_esperado)||0;return `• ${l.nombre}: ${l.cantidad} ${l.unidad} × ${pu.toFixed(2)} €/${l.unidad||"ud"} = ${(l.cantidad*pu).toFixed(2)} €`;}).join("\n");
    const total=(Number(p.total_estimado)||p.lineas.reduce((s,l)=>s+l.cantidad*(Number(l.precio_esperado)||0),0)).toFixed(2);
    const texto=`Hola ${prov.contacto||""}, pedido de M de Materia (${p.codigo}):\n${lineas}\n\nTotal estimado: ${total} €\n\nGracias.`;
    window.open(`https://wa.me/${tel}?text=${encodeURIComponent(texto)}`,"_blank");
    await api(`/pedidos/${id}/enviado`,{method:"POST"}).catch(()=>{});
    irA_pedidos();

}
