<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#3E4534"/>
<title>Control M · m de materia</title>
<!-- Tipografía autoalojada (Courier Prime WOFF2). Sin dependencias externas. -->
<style>
/* Courier Prime autoalojada (clon de Courier New con NEGRITA REAL) en WOFF2.
   Evita el engordado sintético que duplica trazos en móviles sin Courier New. */
@font-face { font-family:'Courier Prime'; font-style:normal; font-weight:400;
  font-display:swap; src:url('/fonts/CourierPrime-Regular.woff2') format('woff2'); }
@font-face { font-family:'Courier Prime'; font-style:normal; font-weight:700;
  font-display:swap; src:url('/fonts/CourierPrime-Bold.woff2') format('woff2'); }

/* ════════════════════════════════════════════════════════════════════
   DESIGN TOKENS · única fuente de verdad para color y tipografía.
   ════════════════════════════════════════════════════════════════════ */
:root {
  /* ── TEMA OLIVO OSCURO (línea "grifos") · superficie plana, sin degradado ──
     Fondo verde oliva, texto crema, un único acento sage y rojo Marzocco solo
     para lo crítico. cream/ink invierten su rol respecto al tema claro previo. */
  --cream: #2A332B;   /* fondo: verde oliva de la app de grifos (mismo tono) */
  --paper: #333C34;   /* celdas / tarjetas: un punto más claras (como grifos) */
  --ink:   #F5F4EF;   /* texto principal = blanco cálido (máxima lectura) */
  --olive: #A7B96E;   /* acento vivo sage (activo / selección / relleno) */
  --olive-light: #3A4139;  /* superficies/entradas oscuras, tracks */
  --muted: #DFE1D8;   /* secundario casi blanco · alta intensidad de lectura */
  --warn:  #ECEAE3;   /* jerarquía por peso, sin color (= texto) */
  --ok:    #ECEAE3;
  --alert: #D62A1C;   /* rojo La Marzocco · solo criticidad */
  --gold:  #A7B96E;   /* secundario colapsado al acento sage */
  /* Líneas y sombra */
  --line:  rgba(236,234,227,0.32);   /* keyline a hilo sobre olivo */
  --shadow: none;
  /* Marco oliva (barra superior e inferior) = mismo olivo plano */
  --olivebar: #2A332B;
  --oliveink: #C7CABF;
  /* Tipografía · fuente ÚNICA de marca (Courier). Todo hereda de aquí; ningún
     módulo debe declarar otra familia. --sans es el alias histórico de la marca. */
  --font: 'Courier New', 'Courier Prime', monospace;
  --sans:  var(--font); /* alias histórico → misma fuente de marca (no duplicar) */
  /* ── Sistema proporcional · tokens de forma y ritmo (usar en TODA pantalla) ──
     La pantalla principal es la referencia: tarjeta-celda cuadrada de keyline.
     Radio 0 = ritmo de tarjeta cuadrada; los botones llevan un 3px sutil aparte. */
  --r-card: 0px;      /* tarjetas y celdas: cuadradas, como la home */
  --r-pill: 3px;      /* chips / toggles: casi cuadrados (familia de los botones) */
  --pad-card: 16px 18px;   /* padding interno canónico de tarjeta */
  --gap-grid: 10px;        /* separación de rejilla de tarjetas */
  /* Jerarquía de KPIs (números de titular, en fuente de marca) */
  --kpi-lg: 34px;
  --kpi-md: 26px;
  --kpi-sm: 20px;
  --track: #3A4139;        /* fondo de barras de progreso (oscuro) */
  /* ── Color de ESTADO · única gramática cromática, solo con función ──
     rojo=riesgo · ámbar=atención · azul=info · verde=correcto.
     Ajustados para leerse como marca (punto/filete) sobre el olivo. */
  --sev-risk: #EF4335;
  --sev-warn: #D9A94A;
  --sev-info: #86ABC6;
  --sev-ok:   #7FB98F;
  --div: rgba(236,234,227,0.14);   /* divisoria fina entre filas del feed */
  color-scheme: dark;              /* controles nativos (select, spinner, date) en oscuro */
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* CRÍTICO · desactiva el "auto-inflado" de fuente de Chrome/Samsung en Android.
   Sin esto, el navegador agranda por su cuenta títulos como los de las tarjetas
   de inicio (dashcard-name) y los recorta dentro de la tarjeta. Con 100% el
   texto respeta SIEMPRE el tamaño en px del sistema de diseño. */
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
body, .dashcard-name, .saludo-hola, .cc-kpi, .cc-score { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
/* App anclada a la pantalla visible: position:fixed (arriba) + altura 100dvh.
   Fijo arriba ⇒ el documento no puede arrastrarse; altura = pantalla visible
   real ⇒ el pie queda dentro. Así NINGÚN navegador móvil (Samsung/Chrome)
   hace scroll de página. Sin "bottom" para que no anule la altura dvh. */
html { height: 100%; overflow: hidden; }

body {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 100vh;
  height: 100dvh;
  width: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--cream);
  color: var(--ink);
  font-family: var(--font);
  font-size: 14px;
  font-weight: 700;   /* toda la interfaz en negrita para máxima legibilidad */
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}
/* refuerzo: botones e inputs también en negrita (heredan de body pero lo fijamos) */
button, input, select, textarea { font-weight: 700; }

button { font-family: inherit; cursor: pointer; -webkit-appearance: none; appearance: none; background: none; color: inherit; }
input, select { font-family: inherit; font-size: 13px; }
/* Defecto oscuro para CUALQUIER campo sin clase: evita el recuadro blanco con
   texto negro sobre el tema olivo. Las clases específicas (.field, .ped-row…)
   mantienen su estilo por mayor especificidad. Excluye controles nativos
   (range/checkbox/radio/color/file) que no deben llevar recuadro. */
input:not([type="range"]):not([type="checkbox"]):not([type="radio"]):not([type="color"]):not([type="file"]):not([type="submit"]):not([type="button"]),
select, textarea {
  background: var(--paper); color: var(--ink);
  border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px;
}
input::placeholder, textarea::placeholder { color: var(--muted); opacity: 1; }

/* ── TOP BAR ──────────────────────────────────────────── */
.topbar {
  background: var(--ink);
  color: var(--ink);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 52px;
  flex-shrink: 0;
  gap: 16px;
}

.topbar-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.topbar-sep { color: #333020; }

.topbar-section {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: lowercase;
  color: #AAA490;
  flex: 1;
}

.topbar-back {
  background: none;
  border: none;
  color: var(--olive-light);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: lowercase;
  padding: 6px 0;
  display: none;
  align-items: center;
  gap: 6px;
}

.topbar-back.visible { display: flex; }
.topbar-back:hover { color: var(--ink); }

.topbar-user {
  display: flex;
  gap: 6px;
}

.user-chip {
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid #2A2820;
  color: #666050;
  background: none;
}

.user-chip.on {
  background: var(--olive);
  border-color: var(--olive);
  color: var(--ink);
}

/* ── MAIN VIEWPORT ───────────────────────────────────── */
.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
  background: var(--cream);   /* olivo plano bajo las pantallas */
}

/* Sin marca de agua tras las pantallas: app seria, cero ruido visual, máxima
   legibilidad del dato. El imagotipo vive solo en la barra superior y el login. */
.brandmark { display: none; }

.screen {
  position: absolute;
  inset: 0;
  z-index: 1;
  overflow-y: auto;
  padding: 32px 36px;
  transform: translateX(100%);
  transition: none;          /* cambio de pantalla INSTANTÁNEO · sin deslizamiento */
  background: transparent;   /* deja ver la marca de agua del viewport */
}

.screen.active {
  transform: translateX(0);
}

/* La pantalla que sale se oculta del todo al instante (sin dejar franja visible). */
.screen.exit {
  transform: translateX(100%);
}

/* ── HOME GRID ───────────────────────────────────────── */
.home-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}

.kpi-box {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
}

.kpi-label {
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: lowercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.kpi-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.kpi-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

.home-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.tile {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 24px 22px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
  position: relative;
}

.tile:hover {
  border-color: var(--olive);
  background: #383F37;
}

.tile:active { opacity: 0.85; }

.tile.urgente {
  border-left: 3px solid var(--warn);
}

.tile.ok {
  border-left: 3px solid var(--olive);
}

.tile-num {
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: lowercase;
}

.tile-title {
  font-size: 15px;
  font-weight: 700;
}

.tile-badge {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

.tile-badge.alert { color: var(--warn); }

.tile-arrow {
  position: absolute;
  bottom: 18px;
  right: 18px;
  font-size: 16px;
  color: var(--line);
}

/* ── INNER SCREENS ───────────────────────────────────── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: lowercase;
  color: var(--olive);
  margin-bottom: 10px;
  margin-top: 24px;
}

.section-label:first-child { margin-top: 0; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
  margin-bottom: 8px;
}

.card-name { font-size: 14px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.btn-primary {
  background: var(--ink);
  color: var(--ink);
  border: none;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.02em;
}
.btn-primary:hover { background: var(--olive); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: none;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 10px 16px;
  font-size: 12px;
}
.btn-ghost:hover { border-color: var(--ink); }

.btn-warn {
  background: var(--warn);
  color: #FFF5EE;
  border: none;
  padding: 10px 16px;
  font-size: 12px;
}

.badge-low {
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid var(--warn);
  color: var(--warn);
  letter-spacing: 0.06em;
  text-transform: lowercase;
  margin-left: 8px;
}

.empty { font-size: 11px; color: var(--muted); letter-spacing: .04em; padding: 14px 0; }
.loading { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: lowercase; padding: 32px 0; }
.err { font-size: 12px; color: var(--ink); font-weight: 700; padding: 32px 0; }

/* ── BANNER ──────────────────────────────────────────── */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 3px solid var(--olive);
  padding: 12px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.banner.warn { border-left-color: var(--warn); }
.banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--olive); flex-shrink: 0; }
.banner.warn .dot { background: var(--warn); }

/* ── FORM ────────────────────────────────────────────── */
.field { margin-top: 12px; }
.field label { display: block; font-size: 9.5px; letter-spacing: 0.1em; text-transform: lowercase; color: var(--muted); margin-bottom: 5px; }
.field select, .field input { background: var(--cream); border: 1px solid var(--line); color: var(--ink); padding: 9px 10px; width: 100%; }
.field input[type="number"] { width: 140px; }

.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.toggle { background: var(--paper); border: 1px solid var(--line); color: var(--ink); font-size: 12px; padding: 7px 12px; }
.toggle.on { background: var(--olive); border-color: var(--olive); color: var(--ink); }
.toggle:hover:not(.on) { border-color: var(--ink); }

/* ── WIZARD ──────────────────────────────────────────── */
.wizard-overlay {
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 999;
  display: flex;
  flex-direction: column;
}

/* Pantalla de preparación (previa al paso a paso) — estilo Aesop, mucho aire. */
.prep-overlay { position: fixed; inset: 0; background: var(--cream); z-index: 999; display: flex; flex-direction: column; }
.prep-top { padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.prep-eyebrow { font-size: 10px; letter-spacing: 0.16em; text-transform: lowercase; color: var(--muted); }
.prep-wrap { flex: 1; overflow-y: auto; padding: 4px 22px 24px; max-width: 560px; width: 100%; margin: 0 auto; -webkit-overflow-scrolling: touch; }
.prep-title { font-size: 26px; font-weight: 700; line-height: 1.1; }
.prep-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
.prep-lead { font-size: 13.5px; line-height: 1.5; margin: 18px 0 4px; color: var(--ink); }
.prep-h { font-size: 11px; letter-spacing: 0.14em; text-transform: lowercase; color: var(--muted); margin: 26px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.prep-list { display: flex; flex-direction: column; }
.prep-row { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; padding: 11px 0; border-bottom: 1px solid var(--line); }
.prep-name { font-size: 15px; }
.prep-cat { font-size: 10px; letter-spacing: .08em; text-transform: lowercase; color: var(--muted); margin-left: 8px; }
.prep-obs { display: block; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.prep-qty { font-size: 15px; font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
.prep-qty.falta { text-decoration: line-through dotted; }
.prep-warn { font-size: 11.5px; color: #9C5A2E; padding: 4px 0 8px; }
.prep-mat { font-size: 14.5px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.prep-tick { color: var(--muted); margin-right: 8px; }
.prep-empty { font-size: 13px; color: var(--muted); padding: 10px 0; }
.prep-footer { flex-shrink: 0; padding: 14px 22px max(16px, env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
.prep-footer .wiz-ok { width: 100%; }

/* Materia · almacén por categorías */
.catgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.catcard { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 16px 14px; cursor: pointer; position: relative; min-height: 78px; }
.catcard:hover { border-color: var(--ink); }
.catcard-name { font-size: 15px; font-weight: 700; line-height: 1.1; }
.catcard-meta { font-size: 11px; color: var(--muted); }
.catcard-meta .cc-low { color: #9C5A2E; }
.catcard-go { position: absolute; top: 13px; right: 14px; color: var(--muted); font-size: 13px; }
.mat-q { width: 100%; padding: 11px 13px; font-family: var(--sans); font-size: 14px; border: 1px solid var(--line);
  border-radius: 9px; background: var(--paper); color: var(--ink); margin: 8px 0; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.chip { font-family: var(--sans); font-size: 12px; padding: 7px 13px; border-radius: 20px; border: 1px solid var(--line);
  background: transparent; color: var(--ink); cursor: pointer; }
.chip.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.ficha-recat { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.ficha-recat label { font-size: 10px; letter-spacing: 0.12em; text-transform: lowercase; color: var(--muted); }
.ficha-recat select { font-family: var(--sans); font-size: 13.5px; padding: 9px 11px; border: 1px solid var(--line);
  border-radius: 8px; background: var(--cream); color: var(--ink); }

/* ── ALMACÉN · 3 niveles (Aesop: aire, orden, premium) ── */
.alm-grid { display: flex; flex-direction: column; gap: 10px; }
/* Nivel 1: macrocategorías, tarjetas amplias y limpias. */
.alm-macro { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 20px 18px; cursor: pointer; }
.alm-macro:hover { border-color: var(--ink); }
.alm-macro-name { font-size: 17px; font-weight: 700; letter-spacing: .01em; }
.alm-macro-meta { font-size: 11px; color: var(--muted); margin-left: 4px; }
.alm-go { margin-left: auto; color: var(--muted); font-size: 16px; }
.alm-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: .02em; }
.alm-badge.crit { background: #f3ddd2; color: #D62A1C; }
.alm-badge.pedir { background: #f6ecd5; color: #8a6a1e; }
/* Nivel 2: subcategorías */
.alm-sublist { display: flex; flex-direction: column; gap: 8px; }
.alm-sub { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 15px 16px; cursor: pointer; }
.alm-sub:hover { border-color: var(--ink); }
.alm-sub-empty { opacity: .5; }
.alm-sub-name { font-size: 14.5px; font-weight: 600; }
.alm-sub-right { display: flex; align-items: center; gap: 10px; }
.alm-sub-meta { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 18px; text-align: right; }
/* Nivel 3: filas de producto con punto de semáforo */
.alm-row { display: flex; align-items: center; gap: 12px; }
.alm-dot { flex: 0 0 auto; width: 11px; height: 11px; border-radius: 50%; }
.alm-row-main { display: flex; flex-direction: column; min-width: 0; }
.alm-actions { margin-top: 16px; }
/* Formulario de producto */
.pf { display: flex; flex-direction: column; gap: 2px; }
.pf-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.pf-row > label { font-size: 10px; letter-spacing: .12em; text-transform: lowercase; color: var(--muted); }
.pf-row input, .pf-row select, .pf-row textarea { font-family: var(--sans); font-size: 14px; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 8px; background: var(--paper); color: var(--ink); width: 100%; }
.pf-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pf-2 .pf-row { margin-bottom: 12px; }

/* ── TAREAS · bandeja de mando (compacto) ── */
/* Identidad m de materia: Courier Prime en todo (sin serif ajeno). */
.home-question { font-family: var(--sans); font-size: 19px; font-weight: 700; line-height: 1.15; margin-top: 2px; }
.kpi-line { display: flex; flex-wrap: wrap; gap: 4px 16px; margin: 4px 0 16px; padding: 10px 12px; background: var(--paper); border: 1px solid var(--line); border-radius: 9px; }
.kpi-i { font-size: 11.5px; color: var(--muted); }
.kpi-i b { color: var(--ink); font-variant-numeric: tabular-nums; }
.tareas-cuenta { font-size: 12px; font-weight: 700; margin-bottom: 12px; }
.qha { margin: 0 0 16px; }
.qha-allbtn { width: 100%; background: none; border: 1px solid var(--line); border-radius: 9px; font-family: var(--sans);
  font-size: 12.5px; color: var(--ink); padding: 11px; cursor: pointer; margin-top: 4px; }
.dec-group { margin-bottom: 14px; }
.dec-gh { font-size: 11px; font-weight: 700; letter-spacing: .04em; margin: 0 0 6px; }
/* Tarjeta de acción compacta: 2 líneas, mínima altura. */
.dec-act { background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 10px 12px; margin-bottom: 7px; }
.dec-act-top { display: flex; align-items: center; gap: 10px; }
.dec-act-title { flex: 1; min-width: 0; font-size: 14px; font-weight: 700; line-height: 1.15; }
.dec-act-sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.dec-act-btn { flex: 0 0 auto; font-family: var(--sans); font-size: 12.5px; font-weight: 700; padding: 8px 13px;
  border-radius: 7px; border: 0; background: var(--ink); color: var(--cream); cursor: pointer; white-space: nowrap; }
.dec-act-btn:active { transform: translateY(1px); }
.dec-more { background: none; border: 0; font-family: var(--sans); font-size: 11.5px; color: var(--muted); cursor: pointer; padding: 4px 0; text-decoration: underline; }
/* Bloque HOY operativo */

/* Navegación compacta a las 5 áreas */
.home-nav { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.navchip { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: var(--paper);

.navchip:hover { border-color: var(--ink); }
.navchip-num { font-family: 'Courier Prime', monospace; font-size: 16px; font-weight: 700; color: var(--muted); }
.navchip-name { font-size: 15px; font-weight: 700; letter-spacing: .02em; }
.navchip-pend { font-size: 11px; font-weight: 700; color: #D62A1C; background: #f3ddd2; border-radius: 20px; padding: 2px 9px; margin-left: auto; }
.navchip-go { color: var(--muted); font-size: 15px; margin-left: auto; }
.navchip-pend + .navchip-go { margin-left: 8px; }
.home-nav-label { font-size: 10px; letter-spacing: .16em; text-transform: lowercase; color: var(--muted); margin: 6px 0 8px; }
/* APPCC hub */
.appcc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.appcc-tile { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; text-align: left; position: relative;
  background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 16px 14px; cursor: pointer; min-height: 80px; }
.appcc-tile:hover { border-color: var(--ink); }
.appcc-tile-name { font-size: 14.5px; font-weight: 700; line-height: 1.2; }
.appcc-tile-sub { font-size: 11px; color: var(--muted); line-height: 1.35; }
/* Contador en el flujo (no encima del título): píldora roja fina, sin solaparse. */
.appcc-badge { align-self: flex-start; margin-top: 4px; font-family: var(--sans); font-size: 10px; font-weight: 700;
  letter-spacing: .03em; text-transform: lowercase; color: var(--sev-risk);
  background: rgba(214,42,28,.14); border: 1px solid rgba(214,42,28,.42); border-radius: 100px; padding: 3px 10px; }
.appcc-nota { font-size: 11.5px; color: var(--muted); margin-top: 14px; line-height: 1.5; }

/* Registro APPCC para inspección (documento imprimible) */
.appcc-doc { background: #fff; border: 1px solid var(--line); border-radius: 3px; padding: 18px; }
.appcc-doc-head { border-bottom: 2px solid var(--ink); padding-bottom: 10px; margin-bottom: 12px; }
.appcc-doc-title { font-size: 15px; font-weight: 700; }
.appcc-doc-sub { font-size: 12px; margin-top: 2px; }
.appcc-doc-meta { font-size: 10.5px; color: var(--muted); margin-top: 4px; }
.appcc-dia { margin-bottom: 14px; }
.appcc-dia-cab { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.appcc-tabla { width: 100%; border-collapse: collapse; font-size: 10.5px; }
.appcc-tabla th, .appcc-tabla td { border: 1px solid var(--line); padding: 4px 6px; text-align: left; vertical-align: top; }
.appcc-tabla th { background: var(--paper); font-weight: 700; }
.appcc-tabla tr.appcc-fuera td { font-weight: 700; }
.appcc-tabla tr.appcc-fuera td:first-child::before { content: "▲ "; }
.appcc-doc-firma { margin-top: 18px; padding-top: 10px; border-top: 1px solid var(--line); font-size: 11px; line-height: 2.2; }
.btn-ghost.activo { border-color: var(--ink); font-weight: 700; }

/* Inventario físico vs teórico */
.inv-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--line);
  border-radius: 3px; margin-bottom: 6px; background: var(--paper); }
.inv-row.inv-desc { border-color: var(--ink); }
.inv-info { flex: 1; min-width: 0; }
.inv-nombre { font-size: 13px; font-weight: 700; }
.inv-teo { font-size: 10.5px; color: var(--muted); margin-top: 1px; }
.inv-dif { font-weight: 700; color: var(--ink); }
.inv-resumen { font-size: 12px; font-weight: 700; margin-top: 10px; padding: 8px 12px;
  border: 1px dashed var(--line); border-radius: 8px; background: var(--cream); }
@media print {
  body * { visibility: hidden; }
  .appcc-doc, .appcc-doc * { visibility: visible; }
  .appcc-doc { position: absolute; left: 0; top: 0; width: 100%; border: none; padding: 0; }
  .no-print { display: none !important; }
  .appcc-dia { page-break-inside: avoid; }
}

/* ── MANUAL ──────────────────────────────────────────── */

/* ════════════════════════════════════════════════════════
   REDISEÑO · EFICIENCIA Y CLARIDAD (capa de mejora)
   ════════════════════════════════════════════════════════ */

.screen { padding: 28px 32px; }

.home-kpis { grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 22px; }
.kpi-box { border-radius: 8px; box-shadow: var(--shadow); position: relative; overflow: hidden; padding: 15px 16px 15px 18px; }

/* ════════════════════════════════════════════════════════
   IDENTIDAD M DE MATERIA · home por categorías (minimal)
   ════════════════════════════════════════════════════════ */

/* Imagotipo ||| */

.cats { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; max-width:780px; margin:0 auto; }

/* Lista de módulos dentro de una categoría */

/* ════════════════════════════════════════════════════════
   PANTALLAS INTERNAS · misma línea minimalista que la home
   ════════════════════════════════════════════════════════ */
/* Título serif en cada módulo (inyectado por setInner). */

  font-weight:700;
  letter-spacing: .005em;
  line-height: 1;
  margin: 4px 0 28px;
  text-transform: lowercase;
}
/* La cabecera reemplaza al antiguo título con borde. */
.screen-title { display: none; }
/* Etiquetas de sección más aireadas y discretas. */

  font-size: 9px; letter-spacing: .2em; color: var(--muted);
  margin: 30px 0 12px;
}
.section-label:first-child { margin-top: 4px; }
/* Tarjetas más limpias, con la misma elevación sutil y hover de la home. */
.card {
  border: 1px solid var(--line); border-radius: 3px;
  padding: 18px 20px; margin-bottom: 10px;

}
.card:hover { border-color: #c4bda4; box-shadow: 0 6px 18px rgba(17,16,9,.06); }
.card-name { font-size: 15px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

/* Botones con un toque más editorial. */

.btn-ghost { border-color: var(--line); }
.btn-ghost:hover { border-color: var(--olive); color: var(--olive); }
.banner { border-radius: 3px; }
.field select, .field input { border-radius: 3px; padding: 10px 12px; }
.field label { letter-spacing: .12em; }

/* ════════════════════════════════════════════════════════
   FICHA TÉCNICA · sistema visual estilo etiquetas m de materia
   Monocromo · rejilla de keylines · sans tracked + monoespaciada
   ════════════════════════════════════════════════════════ */
/* Esquinas rectas y sin sombras en todo (look técnico/etiqueta). */
.cat, .card, .tile, .kpi-box, .banner, .modrow, .btn-primary, .btn-ghost,
.btn-warn, .toggle, .field select, .field input, .todo, .todo-chip,
.cat-alert, .user-chip, .badge-low { border-radius: 0 !important; box-shadow: none !important; }

/* Tipos de letra display: grotesca neutra para titulares en mayúscula. */
.brandword { font-family: var(--sans); font-weight: 700; font-size: 13px;
  letter-spacing: .02em; text-transform: lowercase; }

/* Home: bloque de marca como cabecera de etiqueta. */
.home-brand { padding: 30px 0 6px; }
.home-brand .mark { color: var(--ink); }
.home-brand .mark i { width: 2.5px; height: 24px; }
.home-brand h1 { font-family: var(--sans); font-weight: 700; font-size: 30px;
  text-transform: lowercase; letter-spacing: .005em; margin-top: 14px; }
.home-brand .tag { font-size: 9px; letter-spacing: .26em; color: var(--muted); margin-top: 10px; }
.home-status { font-size: 9.5px; letter-spacing: .18em; text-transform: lowercase;
  color: var(--muted); margin: 8px 0 30px; }
.home-status b { color: var(--ink); font-weight: 700; }

/* Tarjetas de categoría = celdas keyline con índice y código de estado. */
.cats { gap: 0; border: 1px solid var(--line); max-width: 820px; }
.cat { background: transparent; border: none; border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line); padding: 22px 24px 26px; min-height: 150px;
  display: block; transition: background .12s; }
.cat:hover { transform: none; background: var(--paper); }
.cats .cat:nth-child(2n) { border-right: none; }
.cat-top { display: flex; justify-content: space-between; align-items: baseline;
  border-bottom: 1px solid var(--line); padding-bottom: 9px; margin-bottom: 16px; }
.cat-idx { font-family: var(--mono, 'Courier Prime', monospace); font-size: 11px;
  letter-spacing: .1em; color: var(--ink); }
.cat-code { font-size: 9px; letter-spacing: .16em; text-transform: lowercase; color: var(--muted); }
.cat-code.alerta { color: var(--ink); font-weight: 700; }
.cat-name { font-family: var(--sans); font-weight: 700; font-size: 21px;
  text-transform: lowercase; letter-spacing: .04em; line-height: 1.05; }
.cat-desc { font-size: 10px; color: var(--muted); margin-top: 10px; line-height: 1.7;
  letter-spacing: .03em; text-transform: lowercase; }
.cat-arrow, .cat-alert { display: none; }

/* Cabecera de pantalla interna = título técnico en mayúscula. */
.screen-head, .cat-title { font-family: var(--sans); font-weight: 700; font-size: 19px;
  text-transform: lowercase; letter-spacing: .06em; margin: 2px 0 24px;
  padding-bottom: 14px; border-bottom: 1px solid var(--line); }

/* Etiquetas de sección. */
.section-label { font-size: 9px; letter-spacing: .22em; color: var(--muted); text-transform: lowercase; }

/* Filas de módulo = renglones keyline con índice mono y nombre tracked. */
.modrow { background: transparent; border: none; border-bottom: 1px solid var(--line);
  margin: 0; padding: 16px 4px; gap: 16px; }
.modrow:hover { transform: none; background: var(--paper); border-color: var(--line); }
.modrow .mnum { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .1em; color: var(--ink); }
.modrow .mname { font-family: var(--sans); font-weight: 700; text-transform: lowercase;
  letter-spacing: .04em; font-size: 13px; }
.modrow .mbadge { font-size: 10px; letter-spacing: .04em; text-transform: lowercase; color: var(--muted); }
.modrow .marrow { color: var(--muted); }

/* Tarjetas de contenido = celdas keyline tipo ficha. */
.card { background: transparent; border: 1px solid var(--line); padding: 16px 18px; margin-bottom: -1px; }
.card:hover { border-color: var(--line); background: var(--paper); }
.card-name { font-family: var(--sans); font-weight: 700; text-transform: lowercase;
  letter-spacing: .04em; font-size: 13px; }
.card-meta { font-size: 11px; letter-spacing: .02em; }

/* Botones rectangulares, monoespaciada en mayúscula. */

  text-transform: lowercase; padding: 11px 18px; }

/* Indicadores en monocromo: punto/recuadro de tinta, sin color. */
.banner { background: transparent; border: 1px solid var(--line); border-left: 1px solid var(--line); }
.banner .dot, .banner.warn .dot { background: var(--ink); border-radius: 0; width: 6px; height: 6px; }
.badge-low { border: 1px solid var(--ink); color: var(--ink); }

/* "Qué hacer ahora": caja de tinta con chips keyline. */
.todo { background: var(--paper); }
/* Líneas claras y marcadas sobre el verde oscuro (antes casi invisibles). */
.todo-h { color: rgba(236,234,227,.72); }
