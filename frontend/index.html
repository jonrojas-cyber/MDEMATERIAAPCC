<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Control M · M de Materia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F0EBE0;
  --paper: #F7F3EA;
  --ink:   #111009;
  --olive: #5C6145;
  --olive-soft: #DDE0D0;
  --line:  #D4CDB8;
  --muted: #8A8470;
  --warn:  #9C5A2E;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
}

button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; font-size: 13px; }

/* ─── LAYOUT ─────────────────────────────────────────── */

.shell {
  display: grid;
  grid-template-columns: 220px 1fr;
  min-height: 100vh;
}

/* ─── SIDEBAR ────────────────────────────────────────── */

.side {
  background: var(--ink);
  color: var(--cream);
  display: flex;
  flex-direction: column;
  padding: 32px 20px 24px;
  position: sticky;
  top: 0;
  height: 100vh;
  gap: 0;
}

.side-logo {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-bottom: 4px;
}

.side-sub {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: #888070;
  margin-bottom: 36px;
}

.side-nav {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 1px;
  overflow-y: auto;
}

.nav-btn {
  display: flex;
  align-items: baseline;
  gap: 10px;
  padding: 9px 10px;
  font-size: 12px;
  color: #AAA490;
  background: none;
  border: none;
  text-align: left;
  width: 100%;
  letter-spacing: 0.01em;
  transition: color 0.1s, background 0.1s;
}

.nav-btn .n { font-size: 9px; color: #555040; min-width: 14px; }
.nav-btn:hover { color: var(--cream); background: #1E1C14; }
.nav-btn.on { color: var(--cream); background: var(--olive); }
.nav-btn.on .n { color: var(--olive-soft); }

.side-user {
  border-top: 1px solid #222018;
  padding-top: 16px;
  margin-top: 16px;
}

.user-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: #555040; margin-bottom: 8px; }

.user-chips { display: flex; flex-wrap: wrap; gap: 6px; }

.chip {
  font-size: 11px;
  padding: 4px 9px;
  border: 1px solid #333020;
  color: #888070;
  background: none;
  transition: all 0.1s;
}

.chip:hover { border-color: var(--olive); color: var(--cream); }
.chip.on { background: var(--olive); border-color: var(--olive); color: var(--cream); }

/* ─── MAIN ───────────────────────────────────────────── */

.main {
  padding: 40px 52px;
  max-width: 900px;
}

.page-head {
  border-bottom: 1px solid var(--line);
  padding-bottom: 18px;
  margin-bottom: 32px;
}

.page-eyebrow {
  font-size: 9px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 6px;
}

.page-title {
  font-size: 20px;
  font-weight: 700;
}

/* ─── CARDS ──────────────────────────────────────────── */

.section { margin-bottom: 32px; }
.section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 12px;
}

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 18px 20px;
  margin-bottom: 8px;
}

.card-top { display: flex; justify-content: space-between; align-items: flex-start; }
.card-name { font-size: 14px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

.btn-primary {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.03em;
}

.btn-primary:hover { background: var(--olive); }
.btn-primary:active { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: none;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.03em;
}

.btn-ghost:hover { border-color: var(--ink); }

.btn-warn {
  background: var(--warn);
  color: #FFF5EE;
  border: none;
  padding: 10px 16px;
  font-size: 12px;
}

.badge {
  font-size: 10px;
  padding: 2px 7px;
  border: 1px solid var(--line);
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.badge.low { color: var(--warn); border-color: var(--warn); }

.empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 4px 0 12px; }
.loading { font-size: 12px; color: var(--muted); padding: 24px 0; }
.err { font-size: 12px; color: var(--warn); padding: 24px 0; }

.placeholder-block {
  border: 1px dashed var(--line);
  padding: 40px;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
}

/* ─── STATUS BANNER ─────────────────────────────────── */

.banner {
  display: flex;
  align-items: center;
  gap: 12px;
  border: 1px solid var(--line);
  border-left: 3px solid var(--olive);
  padding: 13px 16px;
  margin-bottom: 28px;
  font-size: 13px;
  background: var(--paper);
}

.banner.warn { border-left-color: var(--warn); }
.banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--olive); flex-shrink: 0; }
.banner.warn .dot { background: var(--warn); }

/* ─── FORM ELEMENTS ─────────────────────────────────── */

.field { margin-top: 12px; }
.field label { display: block; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }

.field select,
.field input[type="number"],
.field input[type="text"] {
  background: var(--cream);
  border: 1px solid var(--line);
  color: var(--ink);
  padding: 8px 10px;
  width: 100%;
}

.field input[type="number"] { width: 140px; }

.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }

.toggle {
  background: var(--paper);
  border: 1px solid var(--line);
  color: var(--ink);
  font-size: 12px;
  padding: 7px 12px;
  transition: all 0.1s;
}

.toggle.on { background: var(--olive); border-color: var(--olive); color: var(--cream); }
.toggle:hover:not(.on) { border-color: var(--ink); }

/* ─── TABLE ──────────────────────────────────────────── */

.tbl { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.tbl th { text-align: left; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--olive); padding: 6px 8px; border-bottom: 1px solid var(--line); }
.tbl td { padding: 9px 8px; border-bottom: 1px solid var(--line); }

/* ─── WIZARD OVERLAY ─────────────────────────────────── */

.wizard {
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 999;
  display: flex;
  flex-direction: column;
}

.wizard-progress {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: var(--line);
}

.wizard-progress-fill {
  height: 100%;
  background: var(--olive);
  transition: width 0.3s ease;
}

.wizard-close {
  position: absolute;
  top: 20px;
  right: 24px;
  background: none;
  border: none;
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.wizard-close:hover { color: var(--ink); }

.wizard-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  text-align: center;
}

.wizard-step-label {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 24px;
}

.wizard-recipe-name {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 8px;
  letter-spacing: 0.04em;
}

.wizard-action {
  font-size: clamp(22px, 5vw, 36px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.15;
  max-width: 600px;
}

.wizard-number {
  font-size: clamp(80px, 18vw, 148px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.03em;
  margin-top: 4px;
}

.wizard-unit {
  font-size: clamp(16px, 3vw, 22px);
  color: var(--muted);
  margin-top: 4px;
}

.wizard-footer {
  padding: 0 32px 48px;
  display: flex;
  justify-content: center;
}

.wizard-ok {
  background: var(--ink);
  color: var(--cream);
  border: none;
  width: 100%;
  max-width: 560px;
  padding: 24px;
  font-size: 16px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: background 0.15s;
}

.wizard-ok:hover { background: var(--olive); }
.wizard-ok:active { opacity: 0.85; }

.wizard-done-title {
  font-size: clamp(28px, 6vw, 48px);
  font-weight: 700;
  letter-spacing: 0.01em;
  margin-bottom: 8px;
}

.wizard-done-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 40px;
}

/* ─── MANUAL ─────────────────────────────────────────── */

.manual-section { margin-bottom: 28px; }
.manual-section h3 { font-size: 13px; color: var(--olive); margin-bottom: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
.manual-section ul { padding-left: 18px; font-size: 13px; line-height: 1.8; }

/* ─── RESPONSIVE ─────────────────────────────────────── */

@media (max-width: 720px) {
  .shell { grid-template-columns: 1fr; }
  .side { position: relative; height: auto; padding: 24px 18px; }
  .side-nav { flex-direction: row; flex-wrap: wrap; gap: 4px; overflow: visible; }
  .nav-btn { padding: 6px 10px; font-size: 11px; }
  .nav-btn .n { display: none; }
  .main { padding: 24px 18px; }
}
</style>
</head>
<body>

<div class="shell">
  <aside class="side">
    <div class="side-logo">M</div>
    <div class="side-sub">Control M · Producción</div>
    <nav class="side-nav" id="nav"></nav>
    <div class="side-user">
      <div class="user-label">Preparas como</div>
      <div class="user-chips" id="user-chips"></div>
    </div>
  </aside>
  <main class="main">
    <div class="page-head">
      <div class="page-eyebrow" id="page-eyebrow">Sección 1</div>
      <div class="page-title" id="page-title">Inicio</div>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="wizard-root"></div>

<script>
const API = "/api";
const EQUIPO = ["Diego", "Laura", "Mónica"];

const SECCIONES = [
  { id:"inicio",        num:1,  label:"Inicio" },
  { id:"preparaciones", num:2,  label:"Preparaciones" },
  { id:"lotes",         num:3,  label:"Lotes activos" },
  { id:"materias",      num:4,  label:"Materias" },
  { id:"revisiones",    num:5,  label:"Revisiones" },
  { id:"ajustes",       num:6,  label:"Ajustes" },
  { id:"proveedores",   num:7,  label:"Proveedores" },
  { id:"recepcion",     num:8,  label:"Recepción" },
  { id:"pagos",         num:9,  label:"Pagos pendientes" },
  { id:"manual",        num:10, label:"La forma de hacer las cosas" },
];

let vista = "inicio";

// ── USUARIO ───────────────────────────────────────────
function getUser() { return localStorage.getItem("cm_user") || null; }
function setUser(u) { localStorage.setItem("cm_user", u); renderUser(); }

function renderUser() {
  const chips = document.getElementById("user-chips");
  chips.innerHTML = EQUIPO.map(u => `
    <button class="chip ${getUser()===u?"on":""}" onclick="setUser('${u}')">${u}</button>
  `).join("");
}

// ── NAV ───────────────────────────────────────────────
function renderNav() {
  document.getElementById("nav").innerHTML = SECCIONES.map(s => `
    <button class="nav-btn ${vista===s.id?"on":""}" onclick="irA('${s.id}')">
      <span class="n">${String(s.num).padStart(2,"0")}</span>${s.label}
    </button>
  `).join("");
}

function irA(id) {
  vista = id;
  const s = SECCIONES.find(x => x.id === id);
  document.getElementById("page-eyebrow").textContent = `Sección ${s.num}`;
  document.getElementById("page-title").textContent = s.label;
  renderNav();
  const mapa = {
    inicio: renderInicio,
    preparaciones: renderPreparaciones,
    lotes: renderLotes,
    materias: renderMaterias,
    revisiones: renderRevisiones,
    ajustes: renderAjustes,
    proveedores: renderProveedores,
    recepcion: renderRecepcion,
    pagos: renderPagos,
    manual: renderManual,
  };
  (mapa[id] || renderPlaceholder)();
}

// ── HELPERS ───────────────────────────────────────────
function el(id) { return document.getElementById(id); }

function section(label, items, renderFn, empty) {
  if (!items || !items.length) return `
    <div class="section">
      <div class="section-label">${label}</div>
      <div class="empty">${empty || "Sin elementos."}</div>
    </div>`;
  return `
    <div class="section">
      <div class="section-label">${label}</div>
      ${items.map(renderFn).join("")}
    </div>`;
}

function card(name, meta, actionsHTML, extraHTML) {
  return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-name">${name}</div>
          ${meta ? `<div class="card-meta">${meta}</div>` : ""}
        </div>
      </div>
      ${extraHTML || ""}
      ${actionsHTML ? `<div class="card-actions">${actionsHTML}</div>` : ""}
    </div>`;
}

async function api(path, opts) {
  const r = await fetch(API + path, opts);
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

function setContent(html) { el("content").innerHTML = html; }

function fmt(iso) {
  return new Date(iso).toLocaleString("es-ES", { day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit" });
}

// ── INICIO ────────────────────────────────────────────
async function renderInicio() {
  setContent(`<div class="loading">Cargando estado del servicio…</div>`);
  try {
    const d = await api("/inicio");
    const alerta = d.estado_servicio !== "Servicio en orden";

    const bannerHTML = `
      <div class="banner ${alerta?"warn":""}">
        <span class="dot"></span>
        <span>${d.estado_servicio}</span>
      </div>`;

    const enCursoHTML = section("En curso", d.en_curso, p => card(
      `${p.nombre} — ${p.cantidad_objetivo} ${p.unidad}`,
      p.responsable,
      `<button class="btn-primary" onclick="abrirWizard('${p.id}')">Continuar preparación</button>`
    ), "No hay preparaciones en curso.");

    const prepararHTML = section("Conviene preparar", d.preparar, p => `
      <div class="card">
        <div class="card-top">
          <div>
            <div class="card-name">${p.nombre}</div>
            <div class="card-meta">Disponible: ${p.disponible_ahora} ${p.unidad}</div>
          </div>
        </div>
        <div class="card-actions">
          ${p.opciones_tamano.map(o => `
            <button class="btn-ghost" onclick="iniciarYAbrir('${p.receta_id}', ${o.cantidad}, this)">
              ${o.cantidad} ${p.unidad} · ${o.coste_estimado.toFixed(2)} €
            </button>`).join("")}
        </div>
      </div>`, "No hay preparaciones recomendadas.");

    const pedirHTML = section("Pedir", d.pedir, m => card(
      m.nombre,
      `${m.disponibilidad_actual} ${m.unidad} · ${m.valor_stock_actual.toFixed(2)} € · ${m.proveedor}`,
      m.whatsapp ? `<button class="btn-primary" onclick="whatsapp('${m.whatsapp.replace(/[^0-9+]/g,'')}','${encodeURIComponent("Hola "+m.contacto+", necesitamos "+m.cantidad_sugerida+" "+m.unidad+" de "+m.nombre+" para M de Materia.")}')">Pedir por WhatsApp</button>` : ""
    ), "Todas las materias en rango.");

    const revisarHTML = section("Revisar", d.revisar, r => card(
      r.tipo, `${r.valor} · ${r.estado}${r.accion_correctiva ? " · "+r.accion_correctiva : ""}`,
      `<button class="btn-primary" onclick="resolverRevision('${r.id}', renderInicio)">Marcar revisado</button>`
    ), "Revisiones del día completadas.");

    const lotesHTML = section("Lotes a vigilar", d.lotes_a_vigilar, l => card(
      `${l.codigo} — ${l.nombre}`,
      `${l.ubicacion} · ${l.cantidad_restante} g · ${l.caducado ? "Fuera de plazo" : l.horas_restantes+" h restantes"}`,
      l.caducado ? `<button class="btn-warn" onclick="darDeBaja('${l.id}', renderInicio)">Dar de baja</button>` : ""
    ), "Ningún lote requiere atención.");

    setContent(bannerHTML + enCursoHTML + prepararHTML + pedirHTML + revisarHTML + lotesHTML);
  } catch(e) {
    setContent(`<div class="err">${e.message}</div>`);
  }
}

// ── PREPARACIONES ─────────────────────────────────────
async function renderPreparaciones() {
  setContent(`<div class="loading">Cargando…</div>`);
  try {
    const [recetas, enCurso, recientes] = await Promise.all([
      api("/recetas"),
      api("/preparaciones?estado=En curso"),
      api("/preparaciones?estado=Finalizada"),
    ]);

    const enCursoHTML = section("En curso", enCurso, p => card(
      `${p.nombre_receta} — ${p.cantidad_objetivo}`,
      `${p.responsable} · Paso ${Math.min(p.paso_actual+1, p.pasos.length)} de ${p.pasos.length}`,
      `<button class="btn-primary" onclick="abrirWizard('${p.id}')">Continuar</button>`
    ), "No hay preparaciones en curso.");

    const elegirHTML = `
      <div class="section">
        <div class="section-label">Elegir preparación</div>
        ${recetas.map(r => `
          <div class="card">
            <div class="card-top">
              <div>
                <div class="card-name">${r.nombre}</div>
                <div class="card-meta">Disponible: ${r.disponible_ahora} ${r.unidad} · vida útil ${r.vida_util_horas} h</div>
              </div>
            </div>
            <div class="card-actions">
              ${r.opciones_tamano.map(o => `
                <button class="btn-ghost" onclick="iniciarYAbrir('${r.id}', ${o.cantidad}, this)">
                  ${o.cantidad} ${r.unidad} · ${o.coste_estimado.toFixed(2)} €
                </button>`).join("")}
            </div>
          </div>`).join("")}
      </div>`;

    const histHTML = section("Historial reciente", recientes.slice(-6).reverse(), p => card(
      `${p.nombre_receta} — ${p.cantidad_objetivo} g`,
      `${p.responsable} · ${fmt(p.finalizada_en)}`
    ), "Aún no hay preparaciones finalizadas.");

    setContent(enCursoHTML + elegirHTML + histHTML);
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

// ── WIZARD ────────────────────────────────────────────
async function iniciarYAbrir(recetaId, cantidad, btn) {
  if (btn) btn.disabled = true;
  try {
    const p = await api("/preparaciones", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ receta_id: recetaId, cantidad_objetivo: cantidad, responsable: getUser() || "Sin asignar" }),
    });
    pintarWizard(p);
  } catch(e) { alert(e.message); if (btn) btn.disabled = false; }
}

async function abrirWizard(id) {
  try {
    const todas = await api("/preparaciones?estado=En curso");
    const p = todas.find(x => x.id === id);
    if (!p) { alert("Preparación no encontrada."); return; }
    pintarWizard(p);
  } catch(e) { alert(e.message); }
}

function cerrarWizard() {
  el("wizard-root").innerHTML = "";
  if (vista === "preparaciones") renderPreparaciones();
  else if (vista === "inicio") renderInicio();
}

function pintarWizard(p) {
  const total = p.pasos.length;
  const actual = p.paso_actual;
  const pct = Math.round((actual / total) * 100);
  const terminado = actual >= total;

  if (terminado) {
    el("wizard-root").innerHTML = `
      <div class="wizard">
        <div class="wizard-progress"><div class="wizard-progress-fill" style="width:100%"></div></div>
        <button class="wizard-close" onclick="cerrarWizard()">Cerrar</button>
        <div class="wizard-body">
          <div class="wizard-done-title">Preparación finalizada</div>
          <div class="wizard-done-meta">${p.nombre_receta} · ${p.cantidad_objetivo} g · ${p.responsable}</div>
          <button class="wizard-ok" onclick="finalizarPrep('${p.id}')">Crear lote</button>
        </div>
      </div>`;
    return;
  }

  const paso = p.pasos[actual];
  const esIng = paso.tipo === "ingrediente";

  el("wizard-root").innerHTML = `
    <div class="wizard">
      <div class="wizard-progress"><div class="wizard-progress-fill" style="width:${pct}%"></div></div>
      <button class="wizard-close" onclick="cerrarWizard()">Cerrar</button>
      <div class="wizard-body">
        <div class="wizard-step-label">Paso ${actual + 1} de ${total}</div>
        <div class="wizard-recipe-name">${p.nombre_receta}</div>
        <div class="wizard-action">${paso.texto}</div>
        ${esIng ? `
          <div class="wizard-number">${paso.cantidad}</div>
          <div class="wizard-unit">${paso.unidad}</div>` : ""}
      </div>
      <div class="wizard-footer">
        <button class="wizard-ok" onclick="confirmarPaso('${p.id}')">OK — Siguiente</button>
      </div>
    </div>`;
}

async function confirmarPaso(id) {
  try {
    const p = await api(`/preparaciones/${id}/confirmar-paso`, { method: "POST" });
    pintarWizard(p);
  } catch(e) { alert(e.message); }
}

async function finalizarPrep(id) {
  try {
    const d = await api(`/preparaciones/${id}/finalizar`, { method: "POST" });
    if (d.etiqueta) window.open(`/etiqueta/${d.etiqueta.id}`, "_blank");
    cerrarWizard();
  } catch(e) { alert(e.message); }
}

// ── LOTES ─────────────────────────────────────────────
async function renderLotes() {
  setContent(`<div class="loading">Cargando lotes…</div>`);
  try {
    const lotes = await api("/lotes");
    const orden = { "Requiere atención":0, "Priorizar uso":1, "Correcto":2, "Fuera de servicio":3 };
    const sorted = lotes.slice().sort((a,b) => (orden[a.estado]??9)-(orden[b.estado]??9));
    setContent(section("Todos los lotes", sorted, l => card(
      `${l.codigo} — ${l.nombre}`,
      `${l.ubicacion} · ${l.cantidad_restante}/${l.cantidad_inicial} g · ${l.estado} · ${l.caducado?"Fuera de plazo":l.horas_restantes+" h restantes"}`,
      (l.caducado && l.estado!=="Fuera de servicio" ? `<button class="btn-warn" onclick="darDeBaja('${l.id}', renderLotes)">Dar de baja</button>` : "")
      + (!l.caducado ? `<button class="btn-ghost" onclick="reimprimir('${l.id}')">Reimprimir etiqueta</button>` : "")
    ), "No hay lotes registrados."));
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

async function darDeBaja(id, cb) {
  try { await api(`/lotes/${id}/dar-de-baja`, { method:"POST" }); cb(); }
  catch(e) { alert(e.message); }
}

async function reimprimir(loteId) {
  try {
    const etqs = await api(`/etiquetas/lote/${loteId}`);
    if (!etqs.length) { alert("Sin etiqueta generada para este lote."); return; }
    window.open(`/etiqueta/${etqs[0].id}`, "_blank");
  } catch(e) { alert(e.message); }
}

// ── MATERIAS ──────────────────────────────────────────
async function renderMaterias() {
  setContent(`<div class="loading">Cargando materias…</div>`);
  try {
    const mat = await api("/materias");
    const sorted = mat.slice().sort((a,b) => a.disponibilidad_estado==="Disponibilidad baja"?-1:1);
    setContent(section("Materias", sorted, m => card(
      `${m.nombre} ${m.disponibilidad_estado==="Disponibilidad baja"?'<span class="badge low">Baja</span>':""}`,
      `${m.disponibilidad_actual} ${m.unidad} · ${m.valor_stock_actual.toFixed(2)} € · ${m.ubicacion} · ${m.proveedor_nombre}`,
      m.disponibilidad_estado==="Disponibilidad baja" && m.proveedor_whatsapp
        ? `<button class="btn-primary" onclick="whatsapp('${m.proveedor_whatsapp.replace(/[^0-9+]/g,"")}','${encodeURIComponent("Hola, necesitamos reponer "+m.nombre+" para M de Materia.")}')">Pedir por WhatsApp</button>`
        : ""
    )));
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

// ── REVISIONES ────────────────────────────────────────
async function renderRevisiones() {
  setContent(`<div class="loading">Cargando revisiones…</div>`);
  try {
    const [tipos, revs] = await Promise.all([api("/revisiones/tipos"), api("/revisiones")]);
    const hoy = new Date().toDateString();
    const deHoy = revs.filter(r => new Date(r.fecha).toDateString()===hoy);

    const html = tipos.map(t => {
      const reg = deHoy.filter(r => r.tipo===t.tipo).slice(-1)[0];
      if (reg?.estado === "Correcto") return card(t.tipo, `${reg.valor} · registrado`);
      if (reg && reg.estado !== "Correcto") return card(
        t.tipo,
        `${reg.valor} · ${reg.estado}${reg.accion_correctiva?" · "+reg.accion_correctiva:""}`,
        `<button class="btn-primary" onclick="resolverRevision('${reg.id}', renderRevisiones)">Marcar revisado</button>`
      );
      if (t.clase === "temperatura") return `
        <div class="card">
          <div class="card-name">${t.tipo}</div>
          <div class="field" style="margin-top:12px;">
            <label>Temperatura en ${t.unidad}</label>
            <input type="number" step="0.1" id="rev-${t.tipo.replace(/\s/g,"_")}" style="width:110px;">
          </div>
          <div class="card-actions">
            <button class="btn-ghost" onclick="registrarRev('${t.tipo}', document.getElementById('rev-${t.tipo.replace(/\s/g,"_")}').value)">Registrar</button>
          </div>
        </div>`;
      return card(t.tipo, "", `<button class="btn-ghost" onclick="registrarRev('${t.tipo}','Realizada')">Marcar realizada</button>`);
    }).join("");

    setContent(`<div class="section"><div class="section-label">Revisiones de hoy</div>${html}</div>`);
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

async function registrarRev(tipo, valor) {
  if (!valor) { alert("Introduce un valor."); return; }
  try {
    await api("/revisiones/registrar", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ tipo, valor, responsable: getUser()||"Sin asignar" }),
    });
    renderRevisiones();
  } catch(e) { alert(e.message); }
}

async function resolverRevision(id, cb) {
  try { await api(`/revisiones/${id}/resolver`, { method:"POST" }); cb(); }
  catch(e) { alert(e.message); }
}

// ── AJUSTES ───────────────────────────────────────────
let _ajState = { tipo:"materia", objetivoId:null, motivo:null };

async function renderAjustes() {
  setContent(`<div class="loading">Cargando…</div>`);
  try {
    const [mat, lotes, motivos, hist] = await Promise.all([
      api("/materias"), api("/lotes"), api("/ajustes/motivos"), api("/ajustes"),
    ]);
    _ajState = { tipo:"materia", objetivoId:null, motivo:null };
    window._ajMat = mat; window._ajLotes = lotes;

    const opsMat = mat.map(m => `<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`).join("");

    const form = `
      <div class="section">
        <div class="section-label">Registrar ajuste</div>
        <div class="card">
          <div class="field">
            <label>¿Qué se ajusta?</label>
            <div class="toggle-row">
              <button class="toggle on" id="aj-mat" onclick="ajTipo('materia')">Materia</button>
              <button class="toggle" id="aj-lote" onclick="ajTipo('lote')">Lote</button>
            </div>
          </div>
          <div class="field">
            <label id="aj-obj-label">Materia</label>
            <select id="aj-obj" onchange="_ajState.objetivoId=this.value">
              <option value="">Selecciona…</option>
              ${opsMat}
            </select>
          </div>
          <div class="field">
            <label>Cantidad</label>
            <input type="number" id="aj-cant" style="width:130px;">
          </div>
          <div class="field">
            <label>Motivo</label>
            <div class="toggle-row" id="aj-motivos">
              ${motivos.map(m => `<button class="toggle" onclick="ajMotivo('${m}',this)">${m}</button>`).join("")}
            </div>
          </div>
          <div class="field">
            <label>Observación (opcional)</label>
            <input type="text" id="aj-obs">
          </div>
          <div class="card-actions">
            <button class="btn-primary" onclick="registrarAjuste()">Registrar ajuste</button>
          </div>
        </div>
      </div>`;

    const histHTML = section("Historial", hist.slice(0,8), a => card(
      `${a.objetivo_nombre} — ${a.cantidad}`,
      `${a.motivo} · ${a.coste_estimado.toFixed(2)} € · ${a.responsable} · ${fmt(a.fecha)}`
    ), "Sin ajustes registrados.");

    setContent(form + histHTML);
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

function ajTipo(t) {
  _ajState.tipo = t; _ajState.objetivoId = null;
  el("aj-mat").classList.toggle("on", t==="materia");
  el("aj-lote").classList.toggle("on", t==="lote");
  el("aj-obj-label").textContent = t==="materia" ? "Materia" : "Lote";
  const ops = t==="materia"
    ? window._ajMat.map(m => `<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`)
    : window._ajLotes.map(l => `<option value="${l.id}">${l.codigo} — ${l.nombre} (${l.cantidad_restante} restantes)</option>`);
  el("aj-obj").innerHTML = `<option value="">Selecciona…</option>${ops.join("")}`;
}

function ajMotivo(m, btn) {
  _ajState.motivo = m;
  document.querySelectorAll("#aj-motivos .toggle").forEach(b => b.classList.remove("on"));
  btn.classList.add("on");
}

async function registrarAjuste() {
  const obj = el("aj-obj").value;
  const cant = Number(el("aj-cant").value);
  const obs = el("aj-obs").value;
  if (!obj) { alert("Selecciona materia o lote."); return; }
  if (!cant || cant<=0) { alert("Introduce una cantidad válida."); return; }
  if (!_ajState.motivo) { alert("Selecciona un motivo."); return; }
  try {
    await api("/ajustes", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ tipo_objetivo:_ajState.tipo, objetivo_id:obj, cantidad:cant, motivo:_ajState.motivo, observacion:obs, responsable:getUser()||"Sin asignar" }),
    });
    renderAjustes();
  } catch(e) { alert(e.message); }
}

// ── PROVEEDORES ───────────────────────────────────────
async function renderProveedores() {
  setContent(`<div class="loading">Cargando proveedores…</div>`);
  try {
    const provs = await api("/proveedores");
    setContent(section("Proveedores", provs, p => card(
      p.nombre,
      `${p.contacto} · ${p.dias_reparto.join(", ")} · ${p.productos_nombres.join(", ")}`,
      `<button class="btn-ghost" onclick="whatsapp('${p.whatsapp.replace(/[^0-9+]/g,"")}','${encodeURIComponent("Hola "+p.contacto+", ")}')">Contactar por WhatsApp</button>`
    )));
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

// ── RECEPCIÓN ────────────────────────────────────────
async function renderRecepcion() {
  setContent(`<div class="loading">Cargando…</div>`);
  try {
    const [provs, recs] = await Promise.all([api("/proveedores"), api("/recepciones")]);

    const opsProv = provs.map(p => `<option value="${p.id}">${p.nombre}</option>`).join("");
    const form = `
      <div class="section">
        <div class="section-label">Entrada manual</div>
        <div class="card">
          <div class="field">
            <label>Proveedor</label>
            <select id="rcp-prov"><option value="">Selecciona…</option>${opsProv}</select>
          </div>
          <div class="field">
            <label>Importe total (€)</label>
            <input type="number" step="0.01" id="rcp-imp">
          </div>
          <div class="card-actions">
            <button class="btn-primary" onclick="nuevaRecepcion()">Registrar recepción</button>
          </div>
        </div>
        <div class="card" style="opacity:0.55;">
          <div class="card-name">Escanear albarán</div>
          <div class="card-meta">Disponible en una fase posterior.</div>
        </div>
      </div>`;

    const histHTML = section("Recepciones", recs.slice().reverse(), r => {
      const prov = provs.find(p => p.id===r.proveedor_id);
      return card(
        `${prov?.nombre||r.proveedor_id} — ${r.importe_total.toFixed(2)} €`,
        `${r.estado} · pendiente ${r.pendiente_pago.toFixed(2)} € · ${new Date(r.fecha).toLocaleDateString("es-ES")}`,
        r.estado==="Pendiente de confirmar" ? `<button class="btn-primary" onclick="confirmarRecepcion('${r.id}')">Confirmar entrada</button>` : ""
      );
    }, "Sin recepciones registradas.");

    setContent(form + histHTML);
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

async function nuevaRecepcion() {
  const prov = el("rcp-prov").value;
  const imp = Number(el("rcp-imp").value);
  if (!prov) { alert("Selecciona un proveedor."); return; }
  if (!imp || imp<=0) { alert("Introduce un importe válido."); return; }
  try {
    await api("/recepciones", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({proveedor_id:prov, importe_total:imp}) });
    renderRecepcion();
  } catch(e) { alert(e.message); }
}

async function confirmarRecepcion(id) {
  try { await api(`/recepciones/${id}/confirmar`, {method:"POST"}); renderRecepcion(); }
  catch(e) { alert(e.message); }
}

// ── PAGOS ─────────────────────────────────────────────
async function renderPagos() {
  setContent(`<div class="loading">Cargando pagos…</div>`);
  try {
    const pagos = await api("/pagos");
    setContent(section("Pagos pendientes por proveedor", pagos, p => card(
      p.proveedor_nombre,
      `${p.importe_pendiente.toFixed(2)} € · ${p.albaranes_pendientes} albarán(es)`,
      `<button class="btn-ghost" onclick="marcarPagado('${p.proveedor_id}')">Marcar como pagado</button>`
    ), "No hay pagos pendientes."));
  } catch(e) { setContent(`<div class="err">${e.message}</div>`); }
}

async function marcarPagado(id) {
  try { await api(`/pagos/${id}/marcar-pagado`, {method:"POST"}); renderPagos(); }
  catch(e) { alert(e.message); }
}

// ── MANUAL ────────────────────────────────────────────

  setContent(`
    <div class="card" style="margin-bottom:16px;opacity:0.7;font-size:12px;color:var(--muted);">

      <li>Usar siempre el lote más próximo a caducar primero (FIFO)</li>
      <li>Todo producto retirado se registra en Ajustes — nunca se descarta sin registrar</li>

function renderPlaceholder() {
  setContent(`<div class="placeholder-block"><div class="page-eyebrow" style="margin-bottom:10px;">En preparación</div>Este módulo se incorpora en el siguiente paso.</div>`);

}
