// Reduce la imagen en el navegador antes de enviarla (tamaño y coste OCR).
function reducirImagen(file,maxLado,calidad){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      const escala=Math.min(1,maxLado/Math.max(w,h));
      w=Math.round(w*escala); h=Math.round(h*escala);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",calidad));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

// Entrada desde el selector de archivo (galería). Reduce y procesa.
async function escanearAlbaran(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const hint=el("ocr-hint"); if(hint) hint.textContent="Procesando imagen…";
  try{
    // Foto de la cámara nativa (nítida): resolución alta para que el texto se
    // lea bien. El editor recorta/endereza y deja la imagen final ligera.
    const dataUrl=await reducirImagen(file,2400,0.85);
    const doc=await abrirEditorDoc(dataUrl);
    if(doc) await procesarFotoAlbaran(doc);
  }catch(e){ if(hint) hint.textContent="No se pudo leer: "+e.message; }
  input.value=""; // permite re-elegir la misma foto
}

// Lógica compartida: guarda la foto, muestra preview, OCR, cotejo y avisos.
// La usan tanto el selector de archivo como la cámara en vivo.
async function procesarFotoAlbaran(dataUrl){
  const hint=el("ocr-hint");
  window._albFoto=dataUrl;
  const prev=el("alb-preview"); if(prev) prev.innerHTML=`<img src="${dataUrl}" style="max-width:100%;border-radius:6px;margin-top:8px;">`;
  if(hint) hint.textContent="Leyendo el albarán…";
  try{
    const r=await api("/recepciones/escanear",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imagen:dataUrl,media_type:"image/jpeg"})});
    if(r.proveedor_id) el("rcp-prov").value=r.proveedor_id;
    if(r.importe_total) el("rcp-imp").value=r.importe_total;
    if(hint) hint.innerHTML=`Leído: <b>${esc(r.proveedor||"proveedor ?")}</b> · total ${(r.importe_total||0).toFixed(2)} €${r.proveedor_id?"":' · <span style="color:var(--ink);font-weight:700">elige el proveedor</span>'}`;
    window._avisosPrecio=r.avisos_precio||[];
    renderLineasAlbaran(r.lineas||[]);
    // Cotejo: comparar con el pedido del proveedor y los precios habituales.
    window._pedidoId=null;
    try{
      const cot=await api("/recepciones/cotejar",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({proveedor_id:r.proveedor_id||el("rcp-prov").value,lineas:(r.lineas||[]).map(l=>({materia_id:l.materia_id,cantidad:l.cantidad,precio_unitario:l.precio_unitario}))})});
      window._pedidoId=cot.pedido_id||null;
      renderAvisos(cot);
    }catch(_){ }
  }catch(e){
    if(/no configurado|503/i.test(e.message)){
      if(hint) hint.innerHTML="Lectura automática no activada. La foto queda adjunta; rellena proveedor e importe a mano y registra.";
    }else{
      if(hint) hint.textContent="No se pudo leer: "+e.message;
    }
  }
}

// ── CÁMARA EN VIVO PARA ESCANEAR ALBARANES ──────────────────────────────
// El marco es solo una guía visual para encuadrar; la captura se hace a la
// MÁXIMA resolución posible y SIN recortar, para que el lector (OCR) tenga todo
// el texto bien nítido. La calidad de lectura depende de la resolución.
let _camStream=null, _camTrack=null, _imageCapture=null;
async function abrirCamara(){
  const root=el("wizard-root"); if(!root) return;
  root.innerHTML=`
    <div class="cam-overlay">
      <video id="cam-video" class="cam-video" playsinline autoplay muted></video>
      <div class="cam-mask">
        <div class="cam-frame">
          <i class="cam-corner tl"></i><i class="cam-corner tr"></i>
          <i class="cam-corner bl"></i><i class="cam-corner br"></i>
        </div>
      </div>
      <div class="cam-hint" id="cam-hint">Llena el marco con el albarán · plano · buena luz · sin sombras</div>
      <div class="cam-bar">
        <button class="cam-cancel" onclick="cerrarCamara()">Cancelar</button>
        <button class="cam-shot" id="cam-shot" onclick="capturarFoto()" aria-label="Capturar"><span></span></button>
        <div class="cam-spacer"></div>
      </div>
    </div>`;
  root.classList.add("show");
  try{
    _camStream=await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:"environment" }, width:{ ideal:3840 }, height:{ ideal:2160 } },
      audio:false
    });
    const v=el("cam-video"); v.srcObject=_camStream; await v.play().catch(()=>{});
    _camTrack=_camStream.getVideoTracks()[0]||null;
    // ImageCapture permite una foto fija a resolución completa del sensor (mejor que el vídeo).
    try{ _imageCapture=(window.ImageCapture&&_camTrack)?new ImageCapture(_camTrack):null; }catch(_){ _imageCapture=null; }
  }catch(e){
    const h=el("cam-hint");
    if(h) h.innerHTML="No se pudo abrir la cámara. Usa “Elegir de la galería”.";
    setTimeout(cerrarCamara,1800);
  }
}
async function capturarFoto(){
  const shot=el("cam-shot"); if(shot) shot.disabled=true;
  try{
    let dataUrl=null;
    // Tamaño moderado (1600px): nítido para leer texto y ligero para que el
    // lector responda sin agotar tiempo/memoria del servidor.
    // 1) Foto fija del sensor (si el navegador lo permite).
    if(_imageCapture&&_imageCapture.takePhoto){
      try{ const blob=await _imageCapture.takePhoto(); dataUrl=await reducirImagen(blob,1600,0.72); }catch(_){ dataUrl=null; }
    }
    // 2) Fallback: fotograma completo del vídeo.
    if(!dataUrl){
      const v=el("cam-video");
      if(v&&v.videoWidth){
        const vw=v.videoWidth, vh=v.videoHeight;
        const escala=Math.min(1,1600/Math.max(vw,vh));
        const c=document.createElement("canvas");
        c.width=Math.round(vw*escala); c.height=Math.round(vh*escala);
        c.getContext("2d").drawImage(v,0,0,c.width,c.height);
        dataUrl=c.toDataURL("image/jpeg",0.72);
      }
    }
    cerrarCamara();
    if(dataUrl){ const doc=await abrirEditorDoc(dataUrl); if(doc) procesarFotoAlbaran(doc); }
    else alert("No se pudo capturar la foto. Prueba con “Elegir de la galería”.");
  }catch(e){ cerrarCamara(); alert("No se pudo capturar: "+e.message); }
}
function cerrarCamara(){
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  _camTrack=null; _imageCapture=null;
  const root=el("wizard-root"); if(root){ root.classList.remove("show"); root.innerHTML=""; }
}

// ── MODO ESCÁNER DE DOCUMENTO ─────────────────────────────────────────────
// Ajustas las 4 esquinas del albarán y la app lo endereza (perspectiva) y
// realza el texto, como un escáner plano. Sin librerías externas.
// Devuelve una Promise con la imagen procesada (dataURL), la original si se
// elige "Sin recorte", o null si se cancela.
function abrirEditorDoc(dataUrl){
  return new Promise((resolve)=>{
    const root=el("wizard-root"); if(!root){ resolve(dataUrl); return; }
    const img=new Image();
    img.onload=()=>{
      const availW=Math.max(120,window.innerWidth-24), availH=Math.max(160,window.innerHeight-140);
      const ratio=img.naturalWidth/img.naturalHeight;
      let dw=availW, dh=dw/ratio; if(dh>availH){ dh=availH; dw=dh*ratio; }
      dw=Math.round(dw); dh=Math.round(dh);
      // Pasamos la foto a blanco y negro AUTOMÁTICAMENTE: el documento se ve y se
      // procesa ya en B/N, sin ningún paso ni interruptor extra.
      const bwCanvas=document.createElement("canvas"); bwCanvas.width=img.naturalWidth; bwCanvas.height=img.naturalHeight;
      const bctx=bwCanvas.getContext("2d"); bctx.drawImage(img,0,0);
      try{
        const id=bctx.getImageData(0,0,bwCanvas.width,bwCanvas.height), p=id.data;
        for(let i=0;i<p.length;i+=4){ let gr=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2]; gr=(gr-128)*1.45+128+22; gr=gr<0?0:gr>255?255:gr; p[i]=p[i+1]=p[i+2]=gr; }
        bctx.putImageData(id,0,0);
      }catch(_){ }
      const bwUrl=bwCanvas.toDataURL("image/jpeg",0.85);
      // Esquinas como fracción (0..1) del documento. Orden TL,TR,BR,BL.
      let pts=[[0.06,0.07],[0.94,0.07],[0.94,0.93],[0.06,0.93]];
      root.innerHTML=`
        <div class="doc-overlay" style="position:fixed;inset:0;z-index:9000;background:#0c0d0b;display:flex;flex-direction:column;align-items:center;">
          <div style="color:#E7E4D7;font-family:var(--sans);font-size:12.5px;padding:10px 16px;text-align:center;">Arrastra las esquinas para encuadrar el albarán</div>
          <div id="doc-box" style="position:relative;width:${dw}px;height:${dh}px;flex:0 0 auto;touch-action:none;">
            <img src="${bwUrl}" style="position:absolute;inset:0;width:100%;height:100%;">
            <svg id="doc-svg" width="${dw}" height="${dh}" style="position:absolute;inset:0;pointer-events:none;"><polygon id="doc-poly" points="" fill="rgba(62,69,52,.18)" stroke="#E7E4D7" stroke-width="2"/></svg>
            ${pts.map((p,i)=>`<div class="doc-h" data-i="${i}" style="position:absolute;width:34px;height:34px;margin:-17px 0 0 -17px;border-radius:50%;border:2px solid #E7E4D7;background:rgba(62,69,52,.5);"></div>`).join("")}
          </div>
          <div style="margin-top:auto;width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 16px max(16px,env(safe-area-inset-bottom));">
            <div style="color:#82857A;font-family:var(--sans);font-size:11px;">La foto ya está en blanco y negro para que se lea mejor.</div>
            <div style="display:flex;gap:10px;width:100%;justify-content:center;">
              <button id="doc-cancel" style="background:none;border:0;color:#E7E4D7;font-family:var(--sans);font-size:14px;padding:10px 14px;">Cancelar</button>
              <button id="doc-skip" style="background:none;border:1px solid rgba(231,228,215,.5);border-radius:6px;color:#E7E4D7;font-family:var(--sans);font-size:14px;padding:10px 14px;">Sin recorte</button>
              <button id="doc-ok" style="background:#E7E4D7;border:0;border-radius:6px;color:#2A332B;font-weight:700;font-family:var(--sans);font-size:14px;padding:10px 20px;">Aplicar</button>
            </div>
          </div>
        </div>`;
      root.classList.add("show");
      const box=el("doc-box"), poly=el("doc-poly"), handles=[...root.querySelectorAll(".doc-h")];
      function pintar(){
        poly.setAttribute("points",pts.map(p=>`${p[0]*dw},${p[1]*dh}`).join(" "));
        handles.forEach((h,i)=>{ h.style.left=(pts[i][0]*dw)+"px"; h.style.top=(pts[i][1]*dh)+"px"; });
      }
      pintar();
      let drag=-1;
      const xy=(ev)=>{ const r=box.getBoundingClientRect(); const t=ev.touches?ev.touches[0]:ev; return [(t.clientX-r.left)/dw, (t.clientY-r.top)/dh]; };
      handles.forEach(h=>{
        h.addEventListener("pointerdown",(e)=>{ drag=Number(h.dataset.i); h.setPointerCapture&&h.setPointerCapture(e.pointerId); e.preventDefault(); });
      });
      box.addEventListener("pointermove",(e)=>{
        if(drag<0)return;
        let [fx,fy]=xy(e); fx=Math.max(0,Math.min(1,fx)); fy=Math.max(0,Math.min(1,fy));
        pts[drag]=[fx,fy]; pintar();
      });
      const endDrag=()=>{ drag=-1; };
      box.addEventListener("pointerup",endDrag); box.addEventListener("pointercancel",endDrag);
      const cerrar=(val)=>{ root.classList.remove("show"); root.innerHTML=""; resolve(val); };
      el("doc-cancel").onclick=()=>cerrar(null);
      el("doc-skip").onclick=()=>cerrar(bwUrl); // "sin recorte" pero ya en B/N
      el("doc-ok").onclick=()=>{
        const ok=el("doc-ok"); ok.textContent="Procesando…"; ok.disabled=true;
        setTimeout(()=>{ // deja repintar el botón antes del bucle pesado
          try{
            const src=pts.map(p=>[p[0]*img.naturalWidth, p[1]*img.naturalHeight]);
            // La fuente ya está en B/N (bwCanvas): enderezamos sin volver a realzar.
            const out=enderezarDoc(bwCanvas, src, false);
            cerrar(out);
          }catch(e){ cerrar(bwUrl); }
        },30);
      };
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// Resuelve la matriz de homografía (dest->src) a partir de 4 correspondencias.
function _gauss(A,b){
  const n=b.length, M=A.map((r,i)=>r.concat([b[i]]));
  for(let col=0;col<n;col++){
    let piv=col; for(let r=col+1;r<n;r++) if(Math.abs(M[r][col])>Math.abs(M[piv][col])) piv=r;
    const tmp=M[col]; M[col]=M[piv]; M[piv]=tmp;
    const d=M[col][col]||1e-9; for(let c=col;c<=n;c++) M[col][c]/=d;
    for(let r=0;r<n;r++){ if(r!==col){ const f=M[r][col]; for(let c=col;c<=n;c++) M[r][c]-=f*M[col][c]; } }
  }
  return M.map(r=>r[n]);
}
// Endereza el cuadrilátero src (4 puntos TL,TR,BR,BL) a un rectángulo y realza.
function enderezarDoc(img, src, realce){
  const dist=(p,q)=>Math.hypot(p[0]-q[0],p[1]-q[1]);
  let outW=Math.round((dist(src[0],src[1])+dist(src[3],src[2]))/2);
  let outH=Math.round((dist(src[0],src[3])+dist(src[1],src[2]))/2);
  const cap=1800, s=Math.min(1,cap/Math.max(outW,outH,1));
  outW=Math.max(8,Math.round(outW*s)); outH=Math.max(8,Math.round(outH*s));
  const dst=[[0,0],[outW,0],[outW,outH],[0,outH]];
  const A=[],bb=[];
  for(let i=0;i<4;i++){ const [x,y]=dst[i], [u,v]=src[i];
    A.push([x,y,1,0,0,0,-x*u,-y*u]); bb.push(u);
    A.push([0,0,0,x,y,1,-x*v,-y*v]); bb.push(v); }
  const H=_gauss(A,bb); const [a,b,c,d,e,f,g,h]=H;
  // La fuente puede ser un <img> (naturalWidth/Height) o un <canvas> (width/height).
  const NW=img.naturalWidth||img.width, NH=img.naturalHeight||img.height;
  const sc=document.createElement("canvas"); sc.width=NW; sc.height=NH;
  sc.getContext("2d").drawImage(img,0,0);
  const sw=sc.width, sh=sc.height, sp=sc.getContext("2d").getImageData(0,0,sw,sh).data;
  const oc=document.createElement("canvas"); oc.width=outW; oc.height=outH;
  const octx=oc.getContext("2d"), od=octx.createImageData(outW,outH), op=od.data;
  for(let y=0;y<outH;y++){
    for(let x=0;x<outW;x++){
      const den=g*x+h*y+1, u=(a*x+b*y+c)/den, v=(d*x+e*y+f)/den;
      let r=255,gg=255,bl=255;
      if(u>=0&&u<sw-1&&v>=0&&v<sh-1){
        const x0=u|0,y0=v|0,fx=u-x0,fy=v-y0, base=(y0*sw+x0)<<2, base2=((y0+1)*sw+x0)<<2;
        for(let ch=0;ch<3;ch++){
          const top=sp[base+ch]*(1-fx)+sp[base+4+ch]*fx;
          const bot=sp[base2+ch]*(1-fx)+sp[base2+4+ch]*fx;
          const val=top*(1-fy)+bot*fy;
          if(ch===0)r=val; else if(ch===1)gg=val; else bl=val;
        }
      }
      const o=(y*outW+x)<<2;
      if(realce){
        let gray=0.299*r+0.587*gg+0.114*bl;
        gray=(gray-128)*1.45+128+22; // contraste + aclarar fondo
        gray=gray<0?0:gray>255?255:gray;
        op[o]=op[o+1]=op[o+2]=gray; op[o+3]=255;
      }else{ op[o]=r; op[o+1]=gg; op[o+2]=bl; op[o+3]=255; }
    }
  }
  octx.putImageData(od,0,0);
  return oc.toDataURL("image/jpeg",0.82);
}

// Filas editables: cada línea del albarán -> materia del almacén + cantidad.
function unidadDe(id){const m=(window._mat||[]).find(x=>x.id===id);return m?m.unidad:"";}
function actualizarUni(sel){const row=sel.closest(".alb-row");if(!row)return;const u=row.querySelector(".alb-uni");if(u)u.textContent=unidadDe(sel.value);}
function renderLineasAlbaran(lineas){
  const cont=el("alb-lineas"); if(!cont) return;
  if(!lineas.length){cont.innerHTML="";return;}
  const opts=(sel)=>`<option value="">— no cargar —</option>`+(window._mat||[]).map(m=>`<option value="${esc(m.id)}" ${m.id===sel?"selected":""}>${esc(m.nombre)}</option>`).join("");
  cont.innerHTML=`<div class="section-label" style="margin-top:10px;">Cargar al almacén (revisa materia, unidad y cantidad)</div>`+
    lineas.map(l=>{
      // Desglose de precio por producto: precio unitario e importe de la línea,
      // tal y como los lee el albarán (cuando vienen). Así no se ve solo el total.
      const pu=(l.precio_unitario!=null&&l.precio_unitario!=="")?Number(l.precio_unitario):null;
      // La cantidad del albarán (kg, L, caja…) sirve para el precio; la cantidad
      // "al almacén" (l.cantidad) ya viene convertida a la unidad de la materia.
      const cantAlb=(l.cantidad_albaran!=null?l.cantidad_albaran:l.cantidad);
      const imp=(l.importe!=null&&l.importe!=="")?Number(l.importe):(pu!=null&&cantAlb!=null?pu*Number(cantAlb):null);
      const uded=l.unidad_detectada||"";
      const uDest=l.unidad_destino||unidadDe(l.materia_id);
      const convWarn=l.conversion_ok===false;
      // Aviso de conversión: qué se leyó y a qué se transformó (o alerta si no supo).
      const conv=(uded&&cantAlb!=null)
        ? `<div class="alb-conv" style="width:100%;font-size:9px;margin-top:1px;color:${convWarn?"var(--alert)":"#9a927e"};">${convWarn?"⚠ ":""}leído: ${esc(String(cantAlb))} ${esc(uded)}${(!convWarn&&uDest)?` → ${l.cantidad} ${esc(uDest)}`:""}${convWarn?" · no supe convertir la unidad, revísala":""}</div>`
        : "";
      const precioTxt=(pu!=null||imp!=null)
        ? `<span class="alb-precio" style="font-size:10px;color:#555040;min-width:96px;text-align:right;flex:0 0 auto;">${pu!=null?`${eur4(pu)} €/${esc(uded||"ud")}`:""}${pu!=null&&imp!=null?" · ":""}${imp!=null?`<b>${imp.toFixed(2)} €</b>`:""}</span>`
        : `<span class="alb-precio" style="font-size:10px;color:#b8b3a3;min-width:96px;text-align:right;flex:0 0 auto;">sin precio</span>`;
      return `<div class="alb-row" data-pu="${pu!=null?pu:""}" data-imp="${imp!=null?imp:""}" data-cantalb="${cantAlb!=null?cantAlb:""}" data-uded="${esc(uded)}" style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;">
      <span class="alb-desc" style="font-size:10px;color:#888070;flex:1;min-width:80px;">${esc(l.descripcion||"")}${l.precio_alerta?` <span style="color:var(--alert);font-weight:700" title="Pactado ${eur4(l.precio_pactado)} €">⚠ ${l.precio_dif_pct>0?"+":""}${l.precio_dif_pct}%</span>`:""}</span>
      <select class="alb-mat" onchange="actualizarUni(this)" style="font-size:11px;max-width:140px;">${opts(l.materia_id)}</select>
      <input class="alb-cant" type="number" inputmode="decimal" step="0.01" value="${l.cantidad!=null?l.cantidad:""}" title="Cantidad que entra al almacén, en ${esc(uDest||"la unidad de la materia")}" style="width:70px;font-size:11px;">
      <span class="alb-uni" style="font-size:10px;color:#888070;min-width:24px;">${unidadDe(l.materia_id)}</span>
      ${precioTxt}
      ${conv}
    </div>`;
    }).join("");
}
function recogerLineasAlbaran(){
  return [...document.querySelectorAll(".alb-row")].map(row=>{
    const mat=row.querySelector(".alb-mat").value;
    // La cantidad editable ya está en la unidad de la materia (la que entra al almacén).
    const cant=Number(row.querySelector(".alb-cant").value);
    const cantOk=Number.isFinite(cant)?cant:0;
    // Conservamos el precio leído por el lector (estaba en data-pu / data-imp);
    // así el albarán digital guarda precio unitario e importe, no solo el total.
    const puRaw=row.dataset.pu;
    const pu=(puRaw!=null&&puRaw!=="")?Number(puRaw):null;
    // El importe se calcula con la cantidad DEL ALBARÁN (no la convertida), que
    // es a la que corresponde el precio unitario del proveedor.
    const cantAlbRaw=row.dataset.cantalb;
    const cantAlb=(cantAlbRaw!=null&&cantAlbRaw!=="")?Number(cantAlbRaw):cantOk;
    const impRaw=row.dataset.imp;
    let imp=(impRaw!=null&&impRaw!=="")?Number(impRaw):null;
    if(pu!=null) imp=Math.round(pu*cantAlb*100)/100;
    return {descripcion:row.querySelector(".alb-desc").textContent.trim(), materia_id:mat||null,
      cantidad:cantOk, cantidad_albaran:cantAlb, unidad_detectada:row.dataset.uded||null,
      precio_unitario:pu, importe:imp};
  });
}

// Convierte la clave VAPID (base64url) en el formato que pide PushManager.
function urlBase64ToUint8Array(base64String){
  const padding="=".repeat((4 - base64String.length % 4) % 4);
  const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(base64); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

    return sub?"activo":"inactivo";
  }catch(_){ return "inactivo"; }
}

async function activarPush(btn){
  const msg=el("av-msg");
  const prev=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Activando…";}
  try{
    if(!("serviceWorker" in navigator)||!("PushManager" in window)){ throw new Error("Este navegador no admite avisos push."); }
    const perm=await Notification.requestPermission();
    if(perm!=="granted") throw new Error("No diste permiso para notificaciones. Actívalo en los ajustes del navegador.");
    const reg=await navigator.serviceWorker.ready;
    if(!window._vapidKey) throw new Error("Falta la clave del servidor. Recarga la página.");
    const sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(window._vapidKey) });
    await api("/avisos/suscribir",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(sub)});
    if(msg){ msg.style.color="var(--olive)"; msg.textContent="✓ Avisos activados en este dispositivo."; }
    irA_avisos();
  }catch(e){ if(msg){ msg.style.color="var(--alert)"; msg.textContent="Error: "+e.message; } }
  finally{ if(btn){btn.disabled=false;btn.textContent=prev;} }
}

async function desactivarPush(btn){
  const prev=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Desactivando…";}
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){ await api("/avisos/desuscribir",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({endpoint:sub.endpoint})}); await sub.unsubscribe(); }
    irA_avisos();
  }catch(e){ alert("Error: "+e.message); if(btn){btn.disabled=false;btn.textContent=prev;} }
}

    msg.textContent=/PUSH_NO_SUBS/.test(e.message)||/dispositivo activado/.test(e.message)?"Primero activa los avisos en este dispositivo (botón de arriba).":"Error: "+e.message; } }

}

async function irA_pagos(){
  openSection("pagos","Pagos pendientes");
  try{
    const [pagos,justs]=await Promise.all([api("/pagos"),api("/pagos/justificantes").catch(()=>[])]);
    const sPagos=section("Por proveedor",pagos,p=>{
      const listId=`alb-${p.proveedor_id}`;
      const filas=(p.recepciones||[]).slice().reverse().map(r=>{
        const f=new Date(r.fecha).toLocaleDateString("es-ES");
        const btn=r.tiene_foto
          ? `<button class="btn-ghost" onclick="verAlbaran('${r.id}')">Ver albarán</button>`
          : `<span style="font-size:10px;color:#aaa490;">sin foto</span>`;
        return `<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-top:1px solid #E2DBCB;">
          <span style="font-size:11px;color:#555040;">${f} · ${(r.importe_total||0).toFixed(2)} € · ${r.estado}${r.n_lineas?` · ${r.n_lineas} líneas`:""}</span>

        <div onclick="toggleAlb('${listId}')" style="cursor:pointer;font-size:11px;color:var(--olive);margin-top:8px;user-select:none;">
          <span id="${listId}-arrow">▸</span> Desplegar ${(p.recepciones||[]).length} albarán(es)</div>
        <div id="${listId}" style="display:none;margin-top:4px;">${filas}</div>`;
      return card(
        p.proveedor_nombre,
        `${p.importe_pendiente.toFixed(2)} € · ${p.albaranes_pendientes} albarán(es)`,
        `<button class="btn-ghost" onclick="marcarPagado('${p.proveedor_id}')">Marcar como pagado</button>`,
        extra
      );
    },"No hay pagos pendientes.");
    const sJust=section("Justificantes emitidos",justs,j=>{
      const tel=(j.proveedor_whatsapp||"").replace(/[^0-9+]/g,"").replace(/^\+/,"");
      const pdfUrl=`${location.origin}/justificante/${j.id}/pdf`;
      const waUrl=tel?`https://wa.me/${tel}?text=${encodeURIComponent('Justificante de pago '+j.codigo+' de M de Materia. PDF: '+pdfUrl)}`:"";
      const wa=tel?`<button class="btn-ghost" onclick="window.open('${waUrl}','_blank')">WhatsApp</button>`:"";
      const pdfB=`<button class="btn-ghost" onclick="window.open('${pdfUrl}','_blank')">PDF</button>`;
      const reenv=j.proveedor_email?`<button class="btn-ghost" onclick="reenviarEmailJust('${j.id}')">Reenviar email</button>`:"";
      const est=j.email_estado==="enviado"?" · ✉ enviado":(j.email_estado==="error"?" · ✉ no enviado":"");
      return card(
        `${j.codigo} — ${j.proveedor_nombre}`,
        `${(j.importe_pagado||0).toFixed(2)} € · ${new Date(j.fecha_pago).toLocaleDateString("es-ES")} · ${(j.albaranes||[]).length} albarán(es)${est}`,
        `<button class="btn-ghost" onclick="verJustificante('${j.id}')">Ver justificante</button>${pdfB}${wa}${reenv}`
      );
    },"Aún no se ha emitido ningún justificante.");
    setInner(sPagos+sJust);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

function redondearPvp(n){ return n>0?Math.ceil(n*20)/20:0; }
async function formReceta(id){
  const mats=await api("/materias");
  window._cartaMats=mats;

  window._recetaEditId=id||null;
  const filas=(p.ingredientes.length?p.ingredientes:[{materia_id:"",cantidad:0}]).map((i)=>filaIngredienteHTML(i)).join("");
  setInner(`
    <div class="section-label">${id?"Editar receta":"Nueva receta"}</div>
    <div class="card">
      <div class="field"><label>Nombre</label><input id="rc-nombre" value="${esc(p.nombre)}" style="width:100%;"></div>
      <div class="field"><label>Categoría</label><input id="rc-cat" value="${esc(p.categoria)}" placeholder="p. ej. sandwich, bebida" style="width:100%;"></div>
      <div class="field"><label>Descripción</label><input id="rc-desc" value="${esc(p.descripcion)}" style="width:100%;"></div>
    </div>
    <div class="card">
      <div class="card-name">Ingredientes (escandallo)</div>
      <div id="rc-ings">${filas}</div>
      <div class="card-actions"><button class="btn-ghost" onclick="addIngrediente()">Añadir ingrediente</button></div>
    </div>
    <div class="card">
      <div class="card-name">Precio y margen</div>
      <div class="field"><label>Margen objetivo (%)</label><input id="rc-margen" type="number" step="1" value="${Math.round((p.margen_objetivo||0.7)*100)}" style="width:120px;" oninput="recalcReceta()"></div>
      <div class="field"><label>Precio de venta (€)</label><input id="rc-precio" type="number" step="0.05" value="${p.precio_venta||0}" style="width:120px;" oninput="recalcReceta()"></div>
      <div id="rc-calc" class="card-meta" style="line-height:1.7;"></div>
      <div class="card-actions"><button class="btn-ghost" onclick="usarPvp()">Usar PVP recomendado</button></div>
    </div>
    <div class="card-actions">
      <button class="btn-primary" onclick="guardarReceta(this)">${id?"Guardar cambios":"Crear receta"}</button>
      <button class="btn-ghost" onclick="irA_carta()">Cancelar</button>
    </div>
    <div id="rc-msg" style="font-size:12px;color:var(--alert);margin-top:8px;"></div>`);
  recalcReceta();
}

function filaIngredienteHTML(i){
  const opts=`<option value="">— materia —</option>`+(window._cartaMats||[]).map(m=>`<option value="${m.id}" data-uni="${m.unidad}" ${m.id===i.materia_id?"selected":""}>${esc(m.nombre)}</option>`).join("");
  return `<div class="rc-row" style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;">
    <select class="rc-mat" onchange="recalcReceta()" style="font-size:11px;max-width:150px;flex:1;">${opts}</select>
    <input class="rc-cant" type="number" step="0.001" value="${i.cantidad||""}" placeholder="cant." style="width:70px;font-size:11px;" oninput="recalcReceta()">
    <span class="rc-uni" style="font-size:10px;color:#888070;min-width:24px;"></span>
    <span class="rc-coste" style="font-size:10px;color:#888070;min-width:54px;text-align:right;"></span>
    <button class="btn-ghost" style="padding:2px 8px;font-size:11px;" onclick="this.closest('.rc-row').remove();recalcReceta()">×</button>
  </div>`;
}
function addIngrediente(){
  const cont=el("rc-ings"); if(!cont) return;
  cont.insertAdjacentHTML("beforeend",filaIngredienteHTML({materia_id:"",cantidad:0}));
}
function matById(id){ return (window._cartaMats||[]).find(m=>m.id===id); }

function recalcReceta(){
  let coste=0;
  document.querySelectorAll(".rc-row").forEach(row=>{
    const id=row.querySelector(".rc-mat").value;
    const cant=Number(row.querySelector(".rc-cant").value)||0;
    const m=matById(id);
    const c=m?(m.coste_medio*cant):0;
    coste+=c;
    row.querySelector(".rc-uni").textContent=m?m.unidad:"";
    row.querySelector(".rc-coste").textContent=m&&cant>0?c.toFixed(3)+" €":"";
  });
  coste=Math.round(coste*100)/100;
  const margenObj=Math.min(0.99,Math.max(0,(Number(el("rc-margen").value)||0)/100));
  const recomendado=coste>0?redondearPvp(coste/(1-margenObj)):0;
  const precio=Number(el("rc-precio").value)||0;
  const margenReal=precio>0?(precio-coste)/precio:0;
  const foodCost=precio>0?coste/precio:0;
  const col=foodCost===0?"var(--muted)":(foodCost>0.35?"var(--alert)":(foodCost>0.28?"#5C6145":"var(--olive)"));
  window._recetaRecom=recomendado;
  const out=el("rc-calc");
  if(out) out.innerHTML=
    `Coste del escandallo: <b>${coste.toFixed(2)} €</b><br>`+
    `PVP recomendado (margen ${Math.round(margenObj*100)}%): <b style="color:var(--olive)">${recomendado.toFixed(2)} €</b><br>`+
    (precio>0?`Con tu precio (${precio.toFixed(2)} €): margen <b style="color:${col}">${Math.round(margenReal*100)}%</b> · food cost ${Math.round(foodCost*100)}%`:`Pon un precio para ver el margen.`);
}
function usarPvp(){ if(window._recetaRecom>0){ el("rc-precio").value=window._recetaRecom; recalcReceta(); } }

function recogerIngredientes(){
  return [...document.querySelectorAll(".rc-row")].map(row=>({
    materia_id:row.querySelector(".rc-mat").value,
    cantidad:Number(row.querySelector(".rc-cant").value)||0,
  })).filter(i=>i.materia_id && i.cantidad>0);
}

async function guardarReceta(btn){
  const msg=el("rc-msg");
  const body={
    nombre:el("rc-nombre").value.trim(),
    categoria:el("rc-cat").value.trim(),
    descripcion:el("rc-desc").value.trim(),
    precio_venta:Number(el("rc-precio").value)||0,
    margen_objetivo:Number(el("rc-margen").value)||70,
    ingredientes:recogerIngredientes(),
  };
  if(!body.nombre){ if(msg) msg.textContent="Revísalo antes de continuar: indica el nombre de la receta."; return; }
  if(btn){btn.disabled=true;}
  try{
    if(window._recetaEditId){
      await api("/carta/"+window._recetaEditId,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    }else{
      await api("/carta",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    }
    irA_carta();
  }catch(e){ if(msg) msg.textContent="Esto no cuadra: "+e.message; if(btn){btn.disabled=false;} }
}

async function borrarReceta(id){
  if(!confirm("¿Quitar esta receta de la carta?")) return;
  try{ await api("/carta/"+id,{method:"DELETE"}); irA_carta(); }
  catch(e){ alert(e.message); }
}

// ── ANÁLISIS ──────────────────────────────────────────
async function irA_analisis(){
  openSection("analisis","Análisis · números");
  try{
    // Los KPIs del día salen del MISMO cerebro que las Tareas (/decisiones),
    // así los números de Análisis nunca se contradicen con la bandeja.
    const [dec,sem,stock]=await Promise.all([api("/decisiones").catch(()=>({})),api("/reportes/semana"),api("/reportes/stock")]);
    const k=dec.kpis||{};
    const kbox=(label,val,sub,warn)=>`<div class="kpi-box ${warn?'warn':''}"><div class="kpi-label">${label}</div><div class="kpi-val" style="${warn?'color:var(--warn)':''}">${val}</div><div class="kpi-sub">${sub||''}</div></div>`;
    const kpisHTML=`<div class="section-label">Números de hoy</div><div class="home-kpis">
      ${kbox("Ventas hoy", k.ventas_hoy!=null?Math.round(k.ventas_hoy)+" €":"—","")}
      ${kbox("Food cost", k.food_cost!=null?k.food_cost+" %":"—","medio carta")}
      ${kbox("Valor stock", k.valor_stock!=null?Math.round(k.valor_stock)+" €":"—","en materias")}
      ${kbox("Mermas hoy", Math.round(k.merma_hoy||0)+" €","",(k.merma_hoy||0)>0)}
      ${kbox("Tareas activas", (k.alertas||0),"por resolver",(k.alertas||0)>0)}
    </div>`;
    const maxCoste=Math.max(1,...sem.dias.map(x=>Math.max(x.coste_produccion,x.coste_mermas)));
    const barrasDias=sem.dias.map(x=>{
      const wp=Math.round(x.coste_produccion/maxCoste*100), wm=Math.round(x.coste_mermas/maxCoste*100);
      return `<div style="margin-bottom:10px;">
        <div style="font-size:10px;color:#888070;display:flex;justify-content:space-between;"><span>${x.fecha.slice(5)}</span><span>${x.coste_produccion.toFixed(2)} €</span></div>
        <div style="height:8px;background:#E2DBCB;border-radius:4px;overflow:hidden;"><div style="height:100%;width:${wp}%;background:var(--ink);"></div></div>
        ${x.coste_mermas>0?`<div style="height:5px;margin-top:2px;background:#E2DBCB;border-radius:4px;overflow:hidden;"><div style="height:100%;width:${wm}%;background:var(--muted);"></div></div>`:""}
      </div>`;
    }).join("");
    const masUsadas=section("Materias más usadas (7 días)", sem.materias_mas_usadas,
      m=>card(m.nombre, `${m.cantidad} ${m.unidad} · ${m.coste.toFixed(2)} €`), "Sin datos de uso esta semana.");
    const maxVal=Math.max(1,...stock.materias.map(m=>m.valor_stock));
    const barrasStock=section("Proyección de stock", stock.materias.slice(0,10), m=>{
      const w=Math.max(2,Math.round(m.valor_stock/maxVal*100));
      const dias=m.dias_restantes!=null?`${m.dias_restantes} días`:"sin ritmo";
      return `<div class="card"><div class="card-name">${m.nombre}${m.bajo_minimo?' <span style="color:var(--ink);font-weight:700;font-size:9px;">bajo mínimo</span>':""}</div>
        <div class="card-meta">${m.valor_stock.toFixed(2)} € · ${m.disponibilidad_actual} ${m.unidad} · ${dias} restantes</div>
        <div style="margin-top:6px;height:6px;background:#E2DBCB;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${w}%;background:var(--ink);"></div></div></div>`;
    }, "Sin materias.");
    setInner(
      kpisHTML+
      `<div class="section-label">Producción vs mermas (7 días)</div><div class="card">${barrasDias}</div>`+
      `<div class="card" style="font-size:11px;color:#888070;">Total semana — producción ${sem.totales.coste_produccion.toFixed(2)} € · mermas ${sem.totales.coste_mermas.toFixed(2)} € · ${sem.totales.preparaciones} preparaciones</div>`+
      masUsadas+barrasStock
    );
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// ── INIT ──────────────────────────────────────────────
const APP_SHELL = document.body.innerHTML;

// Pinta la app ya autenticada. Sin recargar la página (la recarga causaba el
// bucle de splash y la pérdida del contexto JS tras el login).
function entrarApp() {
  document.body.innerHTML = APP_SHELL;
  renderUserChips();
  loadHome();
}

async function arrancar() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div id="splash" style="min-height:100vh;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;text-align:center;">
      <span class="mark" style="color:var(--cream);justify-content:center;gap:5px;"><i style="height:34px;width:3px;"></i><i style="height:34px;width:3px;"></i><i style="height:34px;width:3px;"></i></span>
      <div style="font-family:var(--sans);font-size:34px;font-weight:700;color:var(--cream);line-height:1;margin-top:20px;letter-spacing:.01em;">m de materia</div>
      <div style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#555040;margin-top:8px;margin-bottom:56px;">Control de producción</div>
      <div id="splash-estado" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#555040;">Conectando…</div>
      <div id="splash-count" style="font-size:10px;color:#333020;margin-top:8px;"></div>
      <div style="margin-top:20px;width:48px;height:1px;background:#2A2820;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--olive);animation:slidebar 1.4s ease-in-out infinite;"></div>
      </div>
      <style>@keyframes slidebar{0%{left:-100%}50%{left:0}100%{left:100%}}</style>
    </div>`;

  let intentos = 0;
  const mensajes = {
    3: "El sistema está arrancando…",
    8: "Un momento, casi listo…",
    15: "Tardando más de lo habitual…",
    25: "Sigue esperando…",
  };

  while (intentos < 60) {
    try {
      const r = await fetch("/api/salud", { cache: "no-store" });
      if (r.ok) {
        try { window.__persistencia = (await r.clone().json()).persistencia; } catch(e) {}
        el("splash-estado").textContent = "Listo";
        await new Promise(r => setTimeout(r, 400));
        // Mostrar login o pintar la app — sin recargar (evita bucle de splash)
        if (!getUser()) {
          mostrarLogin();
        } else {
          entrarApp();
        }
        return;
      }
    } catch(e) {}
    intentos++;
    el("splash-count").textContent = intentos * 2 + "s";
    if (mensajes[intentos]) el("splash-estado").textContent = mensajes[intentos];
    await new Promise(r => setTimeout(r, 2000));
  }

  // Tras 2 minutos sin respuesta
  el("splash-estado").textContent = "Sin respuesta del servidor";
  el("splash-count").textContent = "Recarga la página para intentarlo de nuevo";
}

// Registro del Service Worker (necesario para los avisos push en el dispositivo).
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

// Init
arrancar();
</script>
