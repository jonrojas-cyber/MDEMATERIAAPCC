<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Control M · M de Materia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #F0EBE0;
  --paper: #F7F3EA;
  --ink:   #111009;
  --olive: #5C6145;
  --olive-light: #DDE0D0;
  --line:  #D4CDB8;
  --muted: #8A8470;
  --warn:  #9C5A2E;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: 'Courier Prime', 'Courier New', monospace;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; font-size: 13px; }

/* ── TOP BAR ──────────────────────────────────────────── */
.topbar {
  background: var(--ink);
  color: var(--cream);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 52px;
  flex-shrink: 0;
  gap: 16px;
}

.topbar-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.topbar-sep { color: #333020; }

.topbar-section {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #AAA490;
  flex: 1;
}

.topbar-back {
  background: none;
  border: none;
  color: var(--olive-light);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 0;
  display: none;
  align-items: center;
  gap: 6px;
}

.topbar-back.visible { display: flex; }
.topbar-back:hover { color: var(--cream); }

.topbar-user {
  display: flex;
  gap: 6px;
}

.user-chip {
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid #2A2820;
  color: #666050;
  background: none;
}

.user-chip.on {
  background: var(--olive);
  border-color: var(--olive);
  color: var(--cream);
}

/* ── MAIN VIEWPORT ───────────────────────────────────── */
.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 32px 36px;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  background: var(--cream);
}

.screen.active {
  transform: translateX(0);
}

.screen.exit {
  transform: translateX(-30%);
}

/* ── HOME GRID ───────────────────────────────────────── */
.home-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}

.kpi-box {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
}

.kpi-label {
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.kpi-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.kpi-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

.home-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.tile {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 24px 22px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
  position: relative;
}

.tile:hover {
  border-color: var(--olive);
  background: #F2EFE6;
}

.tile:active { opacity: 0.85; }

.tile.urgente {
  border-left: 3px solid var(--warn);
}

.tile.ok {
  border-left: 3px solid var(--olive);
}

.tile-num {
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}

.tile-title {
  font-size: 15px;
  font-weight: 700;
}

.tile-badge {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

.tile-badge.alert { color: var(--warn); }

.tile-arrow {
  position: absolute;
  bottom: 18px;
  right: 18px;
  font-size: 16px;
  color: var(--line);
}

/* ── INNER SCREENS ───────────────────────────────────── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 10px;
  margin-top: 24px;
}

.section-label:first-child { margin-top: 0; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
  margin-bottom: 8px;
}

.card-name { font-size: 14px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.btn-primary {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.02em;
}
.btn-primary:hover { background: var(--olive); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: none;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 10px 16px;
  font-size: 12px;
}
.btn-ghost:hover { border-color: var(--ink); }

.btn-warn {
  background: var(--warn);
  color: #FFF5EE;
  border: none;
  padding: 10px 16px;
  font-size: 12px;
}

.badge-low {
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid var(--warn);
  color: var(--warn);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 8px;
}

.empty { font-size: 12px; color: var(--muted); font-style: italic; padding: 12px 0; }
.loading { font-size: 12px; color: var(--muted); padding: 32px 0; }
.err { font-size: 12px; color: var(--warn); padding: 32px 0; }

/* ── BANNER ──────────────────────────────────────────── */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 3px solid var(--olive);
  padding: 12px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.banner.warn { border-left-color: var(--warn); }
.banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--olive); flex-shrink: 0; }
.banner.warn .dot { background: var(--warn); }

/* ── FORM ────────────────────────────────────────────── */
.field { margin-top: 12px; }
.field label { display: block; font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field select, .field input { background: var(--cream); border: 1px solid var(--line); color: var(--ink); padding: 9px 10px; width: 100%; }
.field input[type="number"] { width: 140px; }

.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.toggle { background: var(--paper); border: 1px solid var(--line); color: var(--ink); font-size: 12px; padding: 7px 12px; }
.toggle.on { background: var(--olive); border-color: var(--olive); color: var(--cream); }
.toggle:hover:not(.on) { border-color: var(--ink); }

/* ── WIZARD ──────────────────────────────────────────── */
.wizard-overlay {
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 999;
  display: flex;
  flex-direction: column;
}

.wiz-bar {
  height: 3px;
  background: var(--line);
  flex-shrink: 0;
}

.wiz-bar-fill {
  height: 100%;
  background: var(--olive);
  transition: width 0.3s ease;
}

.wiz-top {
  padding: 20px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.wiz-close {
  background: none;
  border: none;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.wiz-close:hover { color: var(--ink); }

.wiz-step {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--olive);
}

.wiz-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 40px;
  text-align: center;
}

.wiz-recipe {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

.wiz-action {
  font-size: clamp(24px, 5.5vw, 40px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.1;
  max-width: 640px;
}

.wiz-num {
  font-size: clamp(88px, 20vw, 160px);
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.03em;
  margin-top: 4px;
}

.wiz-unit {
  font-size: clamp(18px, 3vw, 26px);
  color: var(--muted);
  margin-top: 6px;
}

.wiz-done {
  font-size: clamp(30px, 6vw, 52px);
  font-weight: 700;
  margin-bottom: 10px;
}

.wiz-done-meta {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 48px;
}

.wiz-footer {
  padding: 0 40px 48px;
  flex-shrink: 0;
}

.wiz-ok {
  background: var(--ink);
  color: var(--cream);
  border: none;
  width: 100%;
  padding: 26px;
  font-size: 17px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.wiz-ok:hover { background: var(--olive); }

/* ── MANUAL ──────────────────────────────────────────── */
.manual-block { margin-bottom: 24px; }
.manual-block h3 { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--olive); margin-bottom: 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.manual-block ul { padding-left: 18px; font-size: 13px; line-height: 1.9; }

/* ── RESPONSIVE MOBILE ───────────────────────────────── */
@media (max-width: 680px) {
  .topbar { padding: 0 16px; }
  .screen { padding: 20px 18px; }
  .home-kpis { grid-template-columns: repeat(2, 1fr); }
  .home-tiles { grid-template-columns: repeat(2, 1fr); }
  .topbar-user { display: none; }
}

/* ════════════════════════════════════════════════════════
   REDISEÑO · EFICIENCIA Y CLARIDAD (capa de mejora)
   ════════════════════════════════════════════════════════ */
:root { --ok:#5C6145; --alert:#9C5A2E; --gold:#9C7A2E; --shadow:0 1px 2px rgba(17,16,9,.05); }

.screen { padding: 28px 32px; }

.home-kpis { grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 22px; }
.kpi-box { border-radius: 8px; box-shadow: var(--shadow); position: relative; overflow: hidden; padding: 15px 16px 15px 18px; }
.kpi-box::before { content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background: var(--olive); opacity:.45; }
.kpi-box.warn::before { background: var(--alert); opacity:1; }
.kpi-val { font-size: 23px; }

.todo { background: var(--ink); color: var(--cream); border-radius: 10px; padding: 15px 18px; margin-bottom: 22px; }
.todo-h { font-size: 9px; letter-spacing:.18em; text-transform:uppercase; color:#9a9683; margin-bottom: 10px; }
.todo-row { display:flex; flex-wrap:wrap; gap:8px; }
.todo-chip { background:#1d1b12; border:1px solid #2c2a1d; color:var(--cream); border-radius:999px; padding:8px 8px 8px 14px; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:9px; }
.todo-chip:hover { border-color: var(--olive); }
.todo-chip .n { background: var(--alert); color:#fff; border-radius:999px; font-size:11px; padding:1px 8px; font-weight:700; }
.todo-clear { font-size:13px; color:#cfe0b8; }
.agora-line { font-size:10px; color:var(--muted); margin:-8px 0 16px; letter-spacing:.04em; }

.group-label { font-size:9px; letter-spacing:.2em; text-transform:uppercase; color:var(--muted); margin:24px 0 10px; display:flex; align-items:center; gap:10px; }
.group-label::after { content:""; flex:1; height:1px; background:var(--line); }

.home-tiles { gap: 10px; }
.tile { border-radius:10px; box-shadow:var(--shadow); min-height:102px; padding:18px; gap:6px; transition:transform .12s, box-shadow .12s, border-color .12s; }
.tile:hover { transform: translateY(-2px); box-shadow:0 5px 16px rgba(17,16,9,.09); background: var(--paper); }
.tile.urgente { border-left: 1px solid var(--line); }
.tile-status { position:absolute; top:16px; right:16px; width:8px; height:8px; border-radius:50%; background:var(--olive); opacity:.4; }
.tile.urgente .tile-status { background: var(--alert); opacity:1; }
.tile-title { font-size:14px; }
.tile-arrow { bottom:14px; right:16px; }

.card { border-radius:8px; box-shadow:var(--shadow); }
.card.alerta { border-left:3px solid var(--alert); }
.btn-primary, .btn-ghost, .btn-warn { border-radius:6px; }
.banner { border-radius:8px; }
.field select, .field input { border-radius:6px; }

@media (max-width: 680px) {
  .home-kpis { grid-template-columns: repeat(2, 1fr); }
  .screen { padding: 18px 16px; }
}

/* ════════════════════════════════════════════════════════
   IDENTIDAD M DE MATERIA · home por categorías (minimal)
   ════════════════════════════════════════════════════════ */
:root { --serif:'Cormorant Garamond', Georgia, serif; }

/* Imagotipo ||| */
.mark { display:inline-flex; gap:3px; align-items:center; line-height:0; }
.mark i { display:block; width:3px; height:16px; background:currentColor; }

/* Topbar con marca */
.topbar-logo { display:flex; align-items:center; gap:9px; color:var(--cream); }
.brandword { font-family:var(--serif); font-size:19px; font-weight:500; letter-spacing:.03em; }

/* Home: marca y categorías */
.home-brand { text-align:center; padding:30px 0 8px; color:var(--ink); }
.home-brand .mark { color:var(--olive); }
.home-brand .mark i { width:4px; height:30px; }
.home-brand h1 { font-family:var(--serif); font-size:42px; font-weight:500; margin-top:14px; letter-spacing:.02em; line-height:1; }
.home-brand .tag { font-size:9.5px; letter-spacing:.26em; text-transform:uppercase; color:var(--muted); margin-top:9px; }
.home-status { text-align:center; font-size:11px; color:var(--muted); letter-spacing:.04em; margin:6px 0 34px; }
.home-status b { color:var(--alert); font-weight:400; }

.cats { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; max-width:780px; margin:0 auto; }
.cat { background:var(--paper); border:1px solid var(--line); border-radius:12px; padding:30px 28px; cursor:pointer; transition:transform .14s, box-shadow .14s; position:relative; min-height:158px; display:flex; flex-direction:column; justify-content:flex-end; }
.cat:hover { transform:translateY(-3px); box-shadow:0 8px 22px rgba(17,16,9,.08); }
.cat-name { font-family:var(--serif); font-size:30px; font-weight:500; line-height:1; }
.cat-desc { font-size:10.5px; color:var(--muted); margin-top:11px; line-height:1.6; letter-spacing:.02em; }
.cat-alert { position:absolute; top:22px; right:22px; min-width:22px; text-align:center; font-size:10px; background:var(--alert); color:#fff; border-radius:999px; padding:3px 9px; letter-spacing:.04em; }
.cat-arrow { position:absolute; top:24px; left:28px; color:var(--line); font-size:18px; }

/* Lista de módulos dentro de una categoría */
.cat-title { font-family:var(--serif); font-size:30px; font-weight:500; margin-bottom:20px; letter-spacing:.01em; }
.modrow { background:var(--paper); border:1px solid var(--line); border-radius:10px; padding:17px 20px; margin-bottom:10px; cursor:pointer; display:flex; align-items:center; gap:14px; transition:border-color .12s, transform .12s; }
.modrow:hover { border-color:var(--olive); transform:translateX(3px); }
.modrow .mnum { font-size:9px; letter-spacing:.14em; color:var(--muted); width:22px; }
.modrow .mname { font-size:16px; font-weight:700; flex:1; }
.modrow .mbadge { font-size:11px; color:var(--muted); }
.modrow .marrow { color:var(--line); font-size:18px; }

@media (max-width: 680px) {
  .cats { grid-template-columns:1fr; }
  .home-brand h1 { font-size:34px; }
}

/* ════════════════════════════════════════════════════════
   PANTALLAS INTERNAS · misma línea minimalista que la home
   ════════════════════════════════════════════════════════ */
/* Título serif en cada módulo (inyectado por setInner). */
.screen-head {
  font-family: var(--serif);
  font-size: 30px;
  font-weight: 500;
  letter-spacing: .01em;
  line-height: 1;
  margin: 4px 0 26px;
}
.cat-title { /* alias: mismo estilo que .screen-head */
  font-family: var(--serif); font-size: 30px; font-weight: 500;
  letter-spacing: .01em; margin-bottom: 26px;
}
/* La cabecera reemplaza al antiguo título con borde. */
.screen-title { display: none; }
/* Etiquetas de sección más aireadas y discretas. */
.section-label {
  font-size: 9px; letter-spacing: .2em; color: var(--muted);
  margin: 30px 0 12px;
}
.section-label:first-child { margin-top: 4px; }
/* Tarjetas más limpias, con la misma elevación sutil y hover de la home. */
.card {
  border: 1px solid var(--line); border-radius: 12px;
  padding: 18px 20px; margin-bottom: 10px;
  box-shadow: none; transition: border-color .12s, box-shadow .12s, transform .12s;
}
.card:hover { border-color: #c4bda4; box-shadow: 0 6px 18px rgba(17,16,9,.06); }
.card-name { font-size: 15px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
.card-actions { margin-top: 14px; }
/* Botones con un toque más editorial. */
.btn-primary, .btn-ghost, .btn-warn { border-radius: 999px; padding: 10px 20px; letter-spacing: .03em; }
.btn-ghost { border-color: var(--line); }
.btn-ghost:hover { border-color: var(--olive); color: var(--olive); }
.banner { border-radius: 12px; }
.field select, .field input { border-radius: 10px; padding: 10px 12px; }
.field label { letter-spacing: .12em; }
</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo"><span class="mark"><i></i><i></i><i></i></span><span class="brandword">M de Materia</span></div>
  <span class="topbar-sep">·</span>
  <div class="topbar-section" id="topbar-section">Control M</div>
  <button class="topbar-back" id="topbar-back" onclick="goHome()">← Inicio</button>
  <div class="topbar-user" id="topbar-user"></div>
</header>

<!-- VIEWPORT -->
<div class="viewport" id="viewport">
  <!-- HOME -->
  <div class="screen active" id="screen-home">
    <div id="home-content"><div class="loading">Cargando…</div></div>
  </div>
  <!-- INNER SCREEN -->
  <div class="screen" id="screen-inner">
    <div id="inner-content"></div>
  </div>
</div>

<!-- WIZARD -->
<div id="wizard-root"></div>

<script>
const API = "/api";
let currentSection = "home";

// ── SISTEMA DE USUARIOS CON ROLES ─────────────────────
// Solo para pintar los botones de login. La autenticación (PIN) la valida el
// backend vía JWT; los PIN ya no viven en el frontend.
const USUARIOS = {
  "Jon":  { rol: "admin",  nombre: "Jon" },
  "Lara": { rol: "equipo", nombre: "Lara" },
  "Moni": { rol: "admin",  nombre: "Mónica" },
};

const MODULOS_EQUIPO = ["preparaciones","lotes","revisiones","ajustes"];
const MODULOS_ADMIN  = ["preparaciones","lotes","materias","revisiones","ajustes","proveedores","recepcion","pagos","manual"];

function getUser()  { try{ return JSON.parse(localStorage.getItem("cm_session")); }catch{ return null; } }
function getToken() { const u = getUser(); return u && u.token; }
function setSession(u) { localStorage.setItem("cm_session", JSON.stringify(u)); }
function logout()   { localStorage.removeItem("cm_session"); location.reload(); }

function puedeVer(seccion) {
  const u = getUser();
  if (!u) return false;
  if (u.rol === "admin") return true;
  return MODULOS_EQUIPO.includes(seccion);
}

function modulosVisibles() {
  const u = getUser();
  if (!u) return [];
  return u.rol === "admin" ? MODULOS_ADMIN : MODULOS_EQUIPO;
}

// ── LOGIN SCREEN ──────────────────────────────────────
let _loginKey = null;

function mostrarLogin() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div style="min-height:100vh;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;">
      <div style="text-align:center;color:var(--cream);">

function seleccionarUsuario(key) {
  _loginKey = key;
  Object.keys(USUARIOS).forEach(k => {
    const b = document.getElementById("ubtn-"+k);
    if(b) b.style.borderColor = k===key ? "#5C6145" : "#2A2820";
    if(b) b.style.color = k===key ? "#F0EBE0" : "#888070";
  });
  const w = document.getElementById("pin-wrap");
  w.style.display = "block";
  document.getElementById("pin-inp").value = "";
  document.getElementById("pin-err").textContent = "";
  document.getElementById("pin-inp").focus();
}

async function checkPin() {
  const pin = document.getElementById("pin-inp").value;
  if (pin.length !== 4) return;
  document.getElementById("pin-err").textContent = "";
  try {
    const r = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: _loginKey, pin }),
    });
    if (!r.ok) throw new Error();
    const data = await r.json();
    setSession({ key: data.usuario.key, nombre: data.usuario.nombre, rol: data.usuario.rol, token: data.token });
    entrarApp();
  } catch (e) {
    document.getElementById("pin-err").textContent = "PIN incorrecto";
    document.getElementById("pin-inp").value = "";
    document.getElementById("pin-inp").focus();
  }
}

function renderUserChips() {

  el.innerHTML = `

// ── HELPERS ───────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  const t = getToken();
  if (t) headers["Authorization"] = "Bearer " + t;
  const r = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (r.status === 401) { localStorage.removeItem("cm_session"); location.reload(); throw new Error("Sesión expirada"); }
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

function el(id) { return document.getElementById(id); }
// Cada pantalla interna lleva su título serif (misma línea que la home).
function setInner(html) {
  el("inner-content").innerHTML =
    (_sectionTitle ? `<div class="screen-head">${_sectionTitle}</div>` : "") + html;
}

function card(name, meta, actions, extra) {
  return `<div class="card">
    <div class="card-name">${name}</div>
    ${meta ? `<div class="card-meta">${meta}</div>` : ""}
    ${extra || ""}
    ${actions ? `<div class="card-actions">${actions}</div>` : ""}
  </div>`;
}

function section(label, items, fn, empty) {
  return `<div class="section-label">${label}</div>` +
    (items && items.length ? items.map(fn).join("") : `<div class="empty">${empty||"Sin elementos."}</div>`);
}

function fmt(iso) {
  return new Date(iso).toLocaleString("es-ES",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
}

function whatsapp(num, msg) { window.open(`https://wa.me/${num}?text=${msg}`, "_blank"); }

// ── HOME ──────────────────────────────────────────────
// Metadatos vivos de cada módulo (nombre, número, aviso) a partir de /inicio.
function modulosMeta(d) {
  const k = d.kpis || {};
  const enCurso = (d.en_curso||[]).length, pendPrep = (d.preparar||[]).length,
        pendPedir = (d.pedir||[]).length, pendRevisar = (d.revisar||[]).length,
        pendLotes = (d.lotes_a_vigilar||[]).length;
  return {
    preparaciones:{ num:"01", name:"Preparaciones", badge: enCurso?`${enCurso} en curso`:(pendPrep?`${pendPrep} recomendadas`:"Al día"), urgent: !!(enCurso||pendPrep) },
    lotes:        { num:"02", name:"Lotes activos", badge: pendLotes?`${pendLotes} requieren atención`:"Sin alertas", urgent: !!pendLotes },
    materias:     { num:"03", name:"Materias", badge: pendPedir?`${pendPedir} con disponibilidad baja`:"Stock correcto", urgent: !!pendPedir },
    revisiones:   { num:"04", name:"Revisiones", badge: pendRevisar?`${pendRevisar} pendientes`:"Completadas", urgent: !!pendRevisar },
    ajustes:      { num:"05", name:"Ajustes", badge:`${k.ajustes_hoy||0} registrados hoy`, urgent:false },
    proveedores:  { num:"01", name:"Proveedores", badge: pendPedir?`${pendPedir} a contactar`:"Sin pedidos urgentes", urgent:false },
    pedidos:      { num:"02", name:"Pedidos", badge:"Crear y enviar a proveedores", urgent:false },
    recepcion:    { num:"03", name:"Recepción", badge:"Escanear albarán y entrada", urgent:false },
    pagos:        { num:"04", name:"Pagos y justificantes", badge:"Por proveedor", urgent:false },
    carta:        { num:"01", name:"Carta y márgenes", badge: k.margen_medio_carta!=null?`Margen medio ${Math.round(k.margen_medio_carta*100)}%`:"Escandallos", urgent:false },
    analisis:     { num:"02", name:"Análisis", badge:"Reportes y stock", urgent:false },
    ventas:       { num:"03", name:"Importar ventas", badge:"CSV de Ágora", urgent:false },
    manual:       { num:"04", name:"La forma de hacer las cosas", badge:"Manual operativo", urgent:false },
  };
}

const CATS = {
  operacion: { name:"Operación", desc:"Preparaciones · Lotes · Materias · Revisiones · Ajustes", ids:["preparaciones","lotes","materias","revisiones","ajustes"] },
  compras:   { name:"Compras", desc:"Proveedores · Pedidos · Recepción · Pagos", ids:["proveedores","pedidos","recepcion","pagos"], admin:true },
  gestion:   { name:"Gestión", desc:"Carta · Análisis · Ventas · Manual", ids:["carta","analisis","ventas","manual"], admin:true },
};

// Dashboard (KPIs + qué hacer ahora) — vive ahora en "Resumen del día".
function dashboardHTML(d, esAdmin) {
  const k = d.kpis || {};
  const alerta = d.estado_servicio !== "Servicio en orden";
  const enCurso=(d.en_curso||[]).length, pendPrep=(d.preparar||[]).length,
        pendPedir=(d.pedir||[]).length, pendRevisar=(d.revisar||[]).length, pendLotes=(d.lotes_a_vigilar||[]).length;
  const kpisHTML = esAdmin ? `
      <div class="home-kpis">
        <div class="kpi-box"><div class="kpi-label">Producción hoy</div><div class="kpi-val">${k.coste_produccion_hoy!=null?k.coste_produccion_hoy.toFixed(2)+" €":"—"}</div><div class="kpi-sub">${k.preparaciones_hoy||0} preparaciones</div></div>
        <div class="kpi-box ${(k.coste_mermas_hoy||0)>0?"warn":""}"><div class="kpi-label">Mermas hoy</div><div class="kpi-val" style="${(k.coste_mermas_hoy||0)>0?"color:var(--warn)":""}">${k.coste_mermas_hoy!=null?k.coste_mermas_hoy.toFixed(2)+" €":"—"}</div><div class="kpi-sub">${k.ajustes_hoy||0} ajustes</div></div>
        <div class="kpi-box"><div class="kpi-label">Valor stock</div><div class="kpi-val">${k.valor_stock_total!=null?k.valor_stock_total.toFixed(2)+" €":"—"}</div><div class="kpi-sub">en materias</div></div>
        <div class="kpi-box"><div class="kpi-label">Margen carta</div><div class="kpi-val">${k.margen_medio_carta!=null?Math.round(k.margen_medio_carta*100)+" %":"—"}</div><div class="kpi-sub">${k.productos_carta||0} productos</div></div>
        <div class="kpi-box ${alerta?"warn":""}"><div class="kpi-label">Estado</div><div class="kpi-val" style="font-size:14px;padding-top:4px;${alerta?"color:var(--warn)":""}">${alerta?"Requiere atención":"En orden"}</div><div class="kpi-sub">${pendPrep?pendPrep+" pendientes de prep.":"Producción al día"}</div></div>
      </div>` : "";
  const acc = [];
  if (enCurso) acc.push({ txt:"Preparaciones en curso", n:enCurso, go:"preparaciones" });
  else if (pendPrep) acc.push({ txt:"Preparaciones recomendadas", n:pendPrep, go:"preparaciones" });
  if (pendLotes) acc.push({ txt:"Lotes a vigilar", n:pendLotes, go:"lotes" });
  if (pendRevisar) acc.push({ txt:"Revisiones pendientes", n:pendRevisar, go:"revisiones" });
  if (esAdmin && pendPedir) acc.push({ txt:"Materias con stock bajo", n:pendPedir, go:"materias" });
  const todoHTML = `<div class="todo"><div class="todo-h">Qué hacer ahora</div>${acc.length
        ? `<div class="todo-row">${acc.map(a=>`<button class="todo-chip" onclick="irA_${a.go}()">${a.txt}<span class="n">${a.n}</span></button>`).join("")}</div>`
        : `<div class="todo-clear">✓ Todo al día. Sin acciones pendientes.</div>`}</div>`;
  return `
      <div class="banner ${alerta?"warn":""}"><span class="dot"></span><span>${d.estado_servicio}</span></div>
      ${esAdmin && d.agora ? `<div class="agora-line">${d.agora.mensaje}</div>` : ""}
      ${todoHTML}
      ${kpisHTML}`;
}

async function loadHome() {
  try {
    const d = await api("/inicio");
    const u = getUser();
    const esAdmin = u && u.rol === "admin";
    const alerta = d.estado_servicio !== "Servicio en orden";
    const meta = modulosMeta(d);
    const pendCat = ids => ids.reduce((n, id) => n + (meta[id] && meta[id].urgent ? 1 : 0), 0);

    const cats = [
      { name:"Resumen del día", desc:"Estado, KPIs y qué hacer ahora", onclick:"irA_resumen()", pend: alerta?1:0 },
      { name:CATS.operacion.name, desc:CATS.operacion.desc, onclick:"irA_categoria('operacion')", pend: pendCat(CATS.operacion.ids) },
      { name:CATS.compras.name, desc:CATS.compras.desc, onclick:"irA_categoria('compras')", pend: pendCat(CATS.compras.ids), admin:true },
      { name:CATS.gestion.name, desc:CATS.gestion.desc, onclick:"irA_categoria('gestion')", pend:0, admin:true },
    ].filter(c => !c.admin || esAdmin);

    el("home-content").innerHTML = `
      <div class="home-brand">
        <span class="mark"><i></i><i></i><i></i></span>
        <h1>M de Materia</h1>
        <div class="tag">Control de producción</div>
      </div>
      <div class="home-status">${alerta?`<b>${d.estado_servicio}</b>`:d.estado_servicio}</div>
      <div class="cats">
        ${cats.map(c=>`<div class="cat" onclick="${c.onclick}">
          <span class="cat-arrow">›</span>
          <div class="cat-name">${c.name}</div>
          <div class="cat-desc">${c.desc}</div>
          ${c.pend?`<span class="cat-alert">${c.pend}</span>`:""}
        </div>`).join("")}
      </div>`;
  } catch(e) {
    el("home-content").innerHTML = `<div class="err">${e.message}</div>`;
  }
}

// Resumen del día (el antiguo dashboard).
async function irA_resumen() {
  openSection("resumen","Resumen del día");

async function irA_categoria(cat) {

  openSection("cat-"+cat, c.name);

  } catch(e) { setInner(`<div class="err">${e.message}</div>`); }
}

// ── PREPARACIONES ─────────────────────────────────────
async function irA_preparaciones() {
  openSection("preparaciones","Preparaciones");
  try {
    const [recetas, enCurso, recientes] = await Promise.all([
      api("/recetas"),
      api("/preparaciones?estado=En curso"),
      api("/preparaciones?estado=Finalizada"),
    ]);
    let html = "";
    if (enCurso.length) {
      html += `<div class="section-label">En curso</div>`;
      html += enCurso.map(p => card(
        `${p.nombre_receta} — ${p.cantidad_objetivo} g`,
        `${p.responsable} · Paso ${Math.min(p.paso_actual+1,p.pasos.length)} de ${p.pasos.length}`,
        `<button class="btn-primary" onclick="abrirWizard('${p.id}')">Continuar</button>`
      )).join("");
    }
    html += `<div class="section-label">Elegir preparación</div>`;
    html += recetas.map(r => `
      <div class="card">
        <div class="card-name">${r.nombre}</div>
        <div class="card-meta">Disponible: ${r.disponible_ahora} ${r.unidad} · vida útil ${r.vida_util_horas} h</div>
        <div class="card-actions">
          ${r.opciones_tamano.map(o => `
            <button class="btn-ghost" onclick="iniciarYAbrir('${r.id}',${o.cantidad},this)">
              ${o.cantidad} ${r.unidad} · ${o.coste_estimado.toFixed(2)} €
            </button>`).join("")}
        </div>
      </div>`).join("");
    if (recientes.length) {
      html += section("Historial reciente", recientes.slice(-5).reverse(), p =>
        card(`${p.nombre_receta} — ${p.cantidad_objetivo} g`, `${p.responsable} · ${fmt(p.finalizada_en)}`)
      );
    }
    setInner(html);
  } catch(e) { setInner(`<div class="err">${e.message}</div>`); }
}

// ── WIZARD ────────────────────────────────────────────
async function iniciarYAbrir(rid, cantidad, btn) {
  if(btn) btn.disabled=true;
  try {
    const p = await api("/preparaciones",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({receta_id:rid,cantidad_objetivo:cantidad,responsable:getUser()||"Sin asignar"})});
    pintarWizard(p);
  } catch(e){alert(e.message);if(btn)btn.disabled=false;}
}

async function abrirWizard(id) {
  try {
    const todas = await api("/preparaciones?estado=En curso");
    const p = todas.find(x=>x.id===id);
    if(!p){alert("No encontrada.");return;}
    pintarWizard(p);
  } catch(e){alert(e.message);}
}

function cerrarWizard() {
  el("wizard-root").innerHTML="";
  if(currentSection==="preparaciones") irA_preparaciones();
  else loadHome();
}

function pintarWizard(p) {
  const total=p.pasos.length, actual=p.paso_actual;
  const pct=Math.round((actual/total)*100);
  if(actual>=total){
    el("wizard-root").innerHTML=`
      <div class="wizard-overlay">
        <div class="wiz-bar"><div class="wiz-bar-fill" style="width:100%"></div></div>
        <div class="wiz-top"><span class="wiz-step">Completado</span><button class="wiz-close" onclick="cerrarWizard()">Cerrar</button></div>
        <div class="wiz-body">
          <div class="wiz-done">Preparación finalizada</div>
          <div class="wiz-done-meta">${p.nombre_receta} · ${p.cantidad_objetivo} g · ${p.responsable}</div>
          <button class="wiz-ok" onclick="finalizarPrep('${p.id}')">Crear lote</button>
        </div>
      </div>`;
    return;
  }
  const paso=p.pasos[actual];
  const esIng=paso.tipo==="ingrediente";
  el("wizard-root").innerHTML=`
    <div class="wizard-overlay">
      <div class="wiz-bar"><div class="wiz-bar-fill" style="width:${pct}%"></div></div>
      <div class="wiz-top">
        <span class="wiz-step">Paso ${actual+1} de ${total}</span>
        <button class="wiz-close" onclick="cerrarWizard()">Cerrar</button>
      </div>
      <div class="wiz-body">
        <div class="wiz-recipe">${p.nombre_receta}</div>
        <div class="wiz-action">${paso.texto}</div>
        ${esIng?`<div class="wiz-num">${paso.cantidad}</div><div class="wiz-unit">${paso.unidad}</div>`:""}
      </div>
      <div class="wiz-footer">
        <button class="wiz-ok" onclick="confirmarPaso('${p.id}')">OK — Siguiente</button>
      </div>
    </div>`;
}

async function confirmarPaso(id){
  try{const p=await api(`/preparaciones/${id}/confirmar-paso`,{method:"POST"});pintarWizard(p);}
  catch(e){alert(e.message);}
}

async function finalizarPrep(id){
  try{
    const d=await api(`/preparaciones/${id}/finalizar`,{method:"POST"});
    if(d.etiqueta) window.open(`/etiqueta/${d.etiqueta.id}`,"_blank");
    cerrarWizard();
  }catch(e){alert(e.message);}
}

async function irA_revisiones(){

// Reduce la imagen en el navegador antes de enviarla (tamaño y coste OCR).
function reducirImagen(file,maxLado,calidad){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      const escala=Math.min(1,maxLado/Math.max(w,h));
      w=Math.round(w*escala); h=Math.round(h*escala);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",calidad));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

async function escanearAlbaran(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const hint=el("ocr-hint");
  hint.textContent="Procesando imagen…";
  try{
    const dataUrl=await reducirImagen(file,1500,0.7);
    window._albFoto=dataUrl;
    el("alb-preview").innerHTML=`<img src="${dataUrl}" style="max-width:100%;border-radius:6px;margin-top:8px;">`;
    hint.textContent="Leyendo el albarán…";
    const r=await api("/recepciones/escanear",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({imagen:dataUrl,media_type:"image/jpeg"})});
    if(r.proveedor_id) el("rcp-prov").value=r.proveedor_id;
    if(r.importe_total) el("rcp-imp").value=r.importe_total;
    hint.innerHTML=`Leído: <b>${r.proveedor||"proveedor ?"}</b> · total ${(r.importe_total||0).toFixed(2)} €${r.proveedor_id?"":' · <span style="color:#9C5A2E">elige el proveedor</span>'}`;
    renderLineasAlbaran(r.lineas||[]);
    // Cotejo: comparar con el pedido del proveedor y los precios habituales.
    window._pedidoId=null;
    try{
      const cot=await api("/recepciones/cotejar",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({proveedor_id:r.proveedor_id||el("rcp-prov").value,lineas:(r.lineas||[]).map(l=>({materia_id:l.materia_id,cantidad:l.cantidad,precio_unitario:l.precio_unitario}))})});
      window._pedidoId=cot.pedido_id||null;
      renderAvisos(cot);
    }catch(_){ }
  }catch(e){
    if(/no configurado|503/i.test(e.message)){
      hint.innerHTML="Lectura automática no activada. La foto queda adjunta; rellena proveedor e importe a mano y registra.";
    }else{
      hint.textContent="No se pudo leer: "+e.message;
    }
  }
}

// Filas editables: cada línea del albarán -> materia del almacén + cantidad.
function unidadDe(id){const m=(window._mat||[]).find(x=>x.id===id);return m?m.unidad:"";}
function actualizarUni(sel){const row=sel.closest(".alb-row");if(!row)return;const u=row.querySelector(".alb-uni");if(u)u.textContent=unidadDe(sel.value);}
function renderLineasAlbaran(lineas){
  const cont=el("alb-lineas"); if(!cont) return;
  if(!lineas.length){cont.innerHTML="";return;}
  const opts=(sel)=>`<option value="">— no cargar —</option>`+(window._mat||[]).map(m=>`<option value="${m.id}" ${m.id===sel?"selected":""}>${m.nombre}</option>`).join("");
  cont.innerHTML=`<div class="section-label" style="margin-top:10px;">Cargar al almacén (revisa materia y cantidad)</div>`+
    lineas.map(l=>`<div class="alb-row" style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;">
      <span class="alb-desc" style="font-size:10px;color:#888070;flex:1;min-width:80px;">${l.descripcion||""}</span>
      <select class="alb-mat" onchange="actualizarUni(this)" style="font-size:11px;max-width:140px;">${opts(l.materia_id)}</select>
      <input class="alb-cant" type="number" step="0.01" value="${l.cantidad!=null?l.cantidad:""}" style="width:64px;font-size:11px;">
      <span class="alb-uni" style="font-size:10px;color:#888070;min-width:24px;">${unidadDe(l.materia_id)}</span>
    </div>`).join("");
}
function recogerLineasAlbaran(){
  return [...document.querySelectorAll(".alb-row")].map(row=>{
    const mat=row.querySelector(".alb-mat").value;
    const cant=Number(row.querySelector(".alb-cant").value);
    return {descripcion:row.querySelector(".alb-desc").textContent, materia_id:mat||null, cantidad:Number.isFinite(cant)?cant:0};
  });
}

          <span style="font-size:11px;color:#555040;">${f} · ${(r.importe_total||0).toFixed(2)} € · ${r.estado}${r.n_lineas?` · ${r.n_lineas} líneas`:""}</span>
          ${btn}</div>`;
      }).join("");
      const extra=`
        <div onclick="toggleAlb('${listId}')" style="cursor:pointer;font-size:11px;color:var(--olive);margin-top:8px;user-select:none;">
          <span id="${listId}-arrow">▸</span> Desplegar ${(p.recepciones||[]).length} albarán(es)</div>
        <div id="${listId}" style="display:none;margin-top:4px;">${filas}</div>`;
      return card(
        p.proveedor_nombre,
        `${p.importe_pendiente.toFixed(2)} € · ${p.albaranes_pendientes} albarán(es)`,
        `<button class="btn-ghost" onclick="marcarPagado('${p.proveedor_id}')">Marcar como pagado</button>`,
        extra
      );
    },"No hay pagos pendientes.");
    const sJust=section("Justificantes emitidos",justs,j=>{
      const tel=(j.proveedor_whatsapp||"").replace(/[^0-9+]/g,"").replace(/^\+/,"");
      const pdfUrl=`${location.origin}/justificante/${j.id}/pdf`;
      const waUrl=tel?`https://wa.me/${tel}?text=${encodeURIComponent('Justificante de pago '+j.codigo+' de M de Materia. PDF: '+pdfUrl)}`:"";
      const wa=tel?`<button class="btn-ghost" onclick="window.open('${waUrl}','_blank')">WhatsApp</button>`:"";
      const pdfB=`<button class="btn-ghost" onclick="window.open('${pdfUrl}','_blank')">PDF</button>`;
      const reenv=j.proveedor_email?`<button class="btn-ghost" onclick="reenviarEmailJust('${j.id}')">Reenviar email</button>`:"";
      const est=j.email_estado==="enviado"?" · ✉ enviado":(j.email_estado==="error"?" · ✉ no enviado":"");
      return card(
        `${j.codigo} — ${j.proveedor_nombre}`,
        `${(j.importe_pagado||0).toFixed(2)} € · ${new Date(j.fecha_pago).toLocaleDateString("es-ES")} · ${(j.albaranes||[]).length} albarán(es)${est}`,
        `<button class="btn-ghost" onclick="verJustificante('${j.id}')">Ver justificante</button>${pdfB}${wa}${reenv}`
      );
    },"Aún no se ha emitido ningún justificante.");
    setInner(sPagos+sJust);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

function toggleAlb(id){
  const d=el(id); if(!d) return;
  const abierto=d.style.display!=="none";
  d.style.display=abierto?"none":"block";
  const a=el(id+"-arrow"); if(a) a.textContent=abierto?"▸":"▾";
}

async function marcarPagado(id){
  if(!confirm("¿Marcar todos los albaranes de este proveedor como pagados? Se generará un justificante de pago.")) return;
  try{
    const r=await api(`/pagos/${id}/marcar-pagado`,{method:"POST"});
    irA_pagos();
    if(r.justificante&&r.justificante.id) verJustificante(r.justificante.id);
  }catch(e){alert(e.message);}
}

async function reenviarEmailJust(id){
  try{
    await api(`/pagos/justificantes/${id}/email`,{method:"POST"});
    alert("Justificante reenviado por email.");
    irA_pagos();
  }catch(e){
    alert(/no configurado/i.test(e.message)?"El email automático aún no está configurado (falta la clave del servicio de email).":e.message);
  }
}

async function irA_carta(){
  openSection("carta","Carta y márgenes");

    const resumen=`<div class="section-label">Resumen de la carta</div>
      <div class="card"><div class="card-name">Margen medio ${Math.round(d.margen_medio*100)}%</div>

    const items=section("Productos", d.productos, p=>{
      const col=p.rentabilidad==="alta"?"#5C6145":(p.rentabilidad==="media"?"#9C7A2E":"#9C5A2E");
      const w=Math.max(2,Math.round(p.margen_bruto*100));
      const barra=`<div style="margin-top:8px;height:6px;background:#E2DBCB;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${w}%;background:${col};"></div></div>`;
      const ing=p.ingredientes.map(i=>`${i.nombre} ${i.cantidad}${i.unidad}`).join(" · ");
      return card(
        `${p.nombre}${p.coste_estimado?' <span style="font-size:9px;color:#9C7A2E;">(estimado)</span>':""}`,
        `${p.precio_venta.toFixed(2)} € · coste ${p.coste.toFixed(2)} € · margen ${Math.round(p.margen_bruto*100)}% (${p.margen_euros.toFixed(2)} €)`,
        null,

      );

    setInner(resumen+items);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// ── ANÁLISIS ──────────────────────────────────────────
async function irA_analisis(){
  openSection("analisis","Análisis");
  try{
    const [sem,stock]=await Promise.all([api("/reportes/semana"),api("/reportes/stock")]);
    const maxCoste=Math.max(1,...sem.dias.map(x=>Math.max(x.coste_produccion,x.coste_mermas)));
    const barrasDias=sem.dias.map(x=>{
      const wp=Math.round(x.coste_produccion/maxCoste*100), wm=Math.round(x.coste_mermas/maxCoste*100);
      return `<div style="margin-bottom:10px;">
        <div style="font-size:10px;color:#888070;display:flex;justify-content:space-between;"><span>${x.fecha.slice(5)}</span><span>${x.coste_produccion.toFixed(2)} €</span></div>
        <div style="height:8px;background:#E2DBCB;border-radius:4px;overflow:hidden;"><div style="height:100%;width:${wp}%;background:#5C6145;"></div></div>
        ${x.coste_mermas>0?`<div style="height:5px;margin-top:2px;background:#E2DBCB;border-radius:4px;overflow:hidden;"><div style="height:100%;width:${wm}%;background:#9C5A2E;"></div></div>`:""}
      </div>`;
    }).join("");
    const masUsadas=section("Materias más usadas (7 días)", sem.materias_mas_usadas,
      m=>card(m.nombre, `${m.cantidad} ${m.unidad} · ${m.coste.toFixed(2)} €`), "Sin datos de uso esta semana.");
    const maxVal=Math.max(1,...stock.materias.map(m=>m.valor_stock));
    const barrasStock=section("Proyección de stock", stock.materias.slice(0,10), m=>{
      const w=Math.max(2,Math.round(m.valor_stock/maxVal*100));
      const dias=m.dias_restantes!=null?`${m.dias_restantes} días`:"sin ritmo";
      return `<div class="card"><div class="card-name">${m.nombre}${m.bajo_minimo?' <span style="color:#9C5A2E;font-size:9px;">bajo mínimo</span>':""}</div>
        <div class="card-meta">${m.valor_stock.toFixed(2)} € · ${m.disponibilidad_actual} ${m.unidad} · ${dias} restantes</div>
        <div style="margin-top:6px;height:6px;background:#E2DBCB;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${w}%;background:#5C6145;"></div></div></div>`;
    }, "Sin materias.");
    setInner(
      `<div class="section-label">Producción vs mermas (7 días)</div><div class="card">${barrasDias}</div>`+
      `<div class="card" style="font-size:11px;color:#888070;">Total semana — producción ${sem.totales.coste_produccion.toFixed(2)} € · mermas ${sem.totales.coste_mermas.toFixed(2)} € · ${sem.totales.preparaciones} preparaciones</div>`+
      masUsadas+barrasStock
    );
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// ── INIT ──────────────────────────────────────────────
const APP_SHELL = document.body.innerHTML;

// Pinta la app ya autenticada. Sin recargar la página (la recarga causaba el
// bucle de splash y la pérdida del contexto JS tras el login).
function entrarApp() {
  document.body.innerHTML = APP_SHELL;
  renderUserChips();
  loadHome();
}

async function arrancar() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div id="splash" style="min-height:100vh;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;text-align:center;">
      <span class="mark" style="color:var(--olive);justify-content:center;"><i style="height:40px;width:6px;"></i><i style="height:40px;width:6px;"></i><i style="height:40px;width:6px;"></i></span>
      <div style="font-family:var(--serif);font-size:38px;font-weight:500;color:var(--cream);line-height:1;margin-top:20px;">M de Materia</div>
      <div style="font-size:9px;letter-spacing:0.24em;text-transform:uppercase;color:#555040;margin-top:8px;margin-bottom:56px;">Control de producción</div>
      <div id="splash-estado" style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#555040;">Conectando…</div>
      <div id="splash-count" style="font-size:10px;color:#333020;margin-top:8px;"></div>
      <div style="margin-top:20px;width:48px;height:1px;background:#2A2820;position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--olive);animation:slidebar 1.4s ease-in-out infinite;"></div>
      </div>
      <style>@keyframes slidebar{0%{left:-100%}50%{left:0}100%{left:100%}}</style>
    </div>`;

  let intentos = 0;
  const mensajes = {
    3: "El sistema está arrancando…",
    8: "Un momento, casi listo…",
    15: "Tardando más de lo habitual…",
    25: "Sigue esperando…",
  };

  while (intentos < 60) {
    try {
      const r = await fetch("/api/salud", { cache: "no-store" });
      if (r.ok) {
        el("splash-estado").textContent = "Listo";
        await new Promise(r => setTimeout(r, 400));
        // Mostrar login o pintar la app — sin recargar (evita bucle de splash)
        if (!getUser()) {
          mostrarLogin();
        } else {
          entrarApp();
        }
        return;
      }
    } catch(e) {}
    intentos++;
    el("splash-count").textContent = intentos * 2 + "s";
    if (mensajes[intentos]) el("splash-estado").textContent = mensajes[intentos];
    await new Promise(r => setTimeout(r, 2000));
  }

  // Tras 2 minutos sin respuesta
  el("splash-estado").textContent = "Sin respuesta del servidor";
  el("splash-count").textContent = "Recarga la página para intentarlo de nuevo";
}

// Init
arrancar();
</script>
