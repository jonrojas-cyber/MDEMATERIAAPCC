// Lo importante ahora: SOLO riesgo + atención (lo informativo no manda la portada).
function homeImportantHTML(dec, max) {
  const b = decBuckets(dec);
  const cls = { critico: "k-critico", importante: "k-importante" };
  const all = [];
  ["critico", "importante"].forEach((k) => (b[k] || []).forEach((x) => all.push({ x, k })));
  if (!all.length) {
    return `<div class="home-clear"><div class="hc-mark">✓</div>
      <div class="hc-txt">Todo en orden.</div>
      <div class="hc-sub">Nada urgente ahora mismo.</div></div>`;
  }
  const shown = max ? all.slice(0, max) : all;
  const rest = all.length - shown.length;
  let html = `<div class="dstack">`;
  shown.forEach(({ x, k }) => {
    const verb = (x.accion && x.accion.label) ? x.accion.label : (k === "critico" ? "revisar" : "ver");
    const sub = [x.tiempo_min ? `${x.tiempo_min} min` : null, decEstadoTxt(x.estado), x.motivo || x.detalle].filter(Boolean).join(" · ");
    const act = x.accion ? `decAccion('${x.id}')` : `irA_tareas()`;
    html += `<button class="drow ${cls[k]}" onclick="${act}">
      <span class="drail"></span>
      <span class="dbody">
        <span class="dkind"><span class="ddot"></span>${esc(verb)}</span>
        <span class="dwhat">${esc(x.titulo)}</span>
        ${sub ? `<span class="dmeta">${esc(sub)}</span>` : ""}
      </span>
      <span class="dchev">→</span>
    </button>`;
  });
  if (rest > 0) html += `<button class="dmore" onclick="irA_tareas()">+${rest} más en la bandeja →</button>`;
  html += `</div>`;
  return html;
}

}

        <button class="cc-link cc-link-wide" onclick="irA_limonadas()">Módulo Limonadas · producción →</button>
        ${admin?`<button class="cc-link cc-link-wide" onclick="formBebidaMBDS()">+ Nueva bebida</button>`:""}
      </div>
      <div class="section-label">Bebidas</div>
      ${bebidas.length?cards:`<div class="empty">Aún no hay bebidas. ${admin?"Crea la primera.":""}</div>`}`);
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}

function mbdsIngNombre(id){ const l=window._mbdsIng||[]; const i=l.find(x=>x.id===id); return i?i.nombre:id; }

// ════════════════════════════════════════════════════════════════════════════
// MÓDULO LIMONADAS · asistente de producción paso a paso (nativo Control M)
// Eliges el tipo → litros → receta → extracciones → proceso. Cada paso cabe en
// pantalla, sin scroll. Cálculo en vivo (no guarda datos).
// ════════════════════════════════════════════════════════════════════════════
const LIM_L1 = { citric:3.9, malic:2.0, lactic:0.6, salt:0.45, sugar:55, oleo:35 };
const LIM_L2 = { citric:3.7, malic:1.9, lactic:0.6, salt:0.45, sugar:45, ginger:20, mint:50, menthol:0.75, oleo:10 };
const LIM_TIPOS = {
  i:     { rn:"I", nm:"Esencia", ds:"Limón puro. Aroma de citral al final, en frío. Sin gas. Ventana corta." },
  ii:    { rn:"II", nm:"Casa", ds:"Jengibre, hierbabuena y mentol. Carbonatada, seca (6,0 °Bx). Vida larga." },
  ambas: { rn:"I + II", nm:"Ambas líneas", ds:"Produces las dos a la vez. Recetas y compra combinadas." },
};
function limNum(n,d){ if(!isFinite(n)) n=0; return n.toFixed(d==null?1:d).replace(".",","); }
function limG(v){ return v>=1000 ? limNum(v/1000,2)+" kg" : limNum(v,1)+" g"; }
function limMl(v){ return v>=1000 ? limNum(v/1000,2)+" L" : limNum(v,0)+" ml"; }

function irA_limonadas(){
  navInto(()=>irA_mbds());
  window._lim={ tipo:null, l1:0, l2:0, step:1, sel:"i" };
  openSection("limonadas","Limonadas");
  limRender();
}
// Pasos activos según el tipo (la I no se carbonata → sin paso Proceso).
function limPasos(){
  const t=window._lim.tipo;
  const p=["tipo","litros","receta","extracciones"];
  if(t==="ii"||t==="ambas") p.push("proceso");
  return p;
}
function limSetTipo(t){ const s=window._lim; s.tipo=t; s.sel=(t==="ii")?"ii":"i"; if(t==="i"){s.l2=0;} if(t==="ii"){s.l1=0;} s.step=2; limRender(); }
function limGo(dir){
  const pasos=limPasos(); const s=window._lim;
  const idx=pasos.indexOf(limPasoActual());
  const ni=idx+dir;
  if(ni<0){ return goBack(); }
  if(ni>=pasos.length){ return; }
  s.step=ni+1; limRender();
}
function limPasoActual(){ const pasos=limPasos(); return pasos[Math.min(window._lim.step-1,pasos.length-1)]; }
function limLeerLitros(){ const s=window._lim; const a=el("lim-l1"), b=el("lim-l2"); if(a) s.l1=Math.max(0,parseFloat(a.value)||0); if(b) s.l2=Math.max(0,parseFloat(b.value)||0); }
function limPreset(a,b){ const s=window._lim; if(s.tipo!=="ii") s.l1=a; if(s.tipo!=="i") s.l2=b; const A=el("lim-l1"),B=el("lim-l2"); if(A)A.value=s.l1; if(B)B.value=s.l2; }
function limSel(x){ window._lim.sel=x; limRender(); }

function limFilasReceta(line){
  const L=line==="i"?LIM_L1:LIM_L2, lit=line==="i"?window._lim.l1:window._lim.l2, two=line==="ii";
  let r=""; const add=(q,n,s)=> r+=`<tr><td class="q">${q}</td><td class="n">${esc(n)}${s?`<small>${esc(s)}</small>`:""}</td></tr>`;
  add(limG(L.citric*lit),"ácido cítrico");
  add(limG(L.malic*lit),"ácido málico");
  add(limG(L.lactic*lit),"ácido láctico");
  add(limG(L.salt*lit),"sal marina fina");
  add(limG(L.sugar*lit),"azúcar", "ajustar a "+(two?"6,0":"7,0")+" °Bx");
  add(limMl(L.oleo*lit),"oleosaccharum limón · E1", two?"estructura":"aroma · al final, en frío");
  if(two){
    add(limMl(L.ginger*lit),"zumo jengibre · E2","titrar el calor");
    add(limMl(L.mint*lit),"infusión hierbabuena · E3","titrar el aroma");
    add(limMl(L.menthol*lit),"solución mentol · E4","titrar desde casi cero");
  }
  add("enrasar","agua remineralizada","hasta "+limNum(lit,0)+" L final");
  return r;
}
function limFilasExtracciones(){
  const s=window._lim;
  const oleoMl=LIM_L1.oleo*s.l1 + LIM_L2.oleo*s.l2;
  const gingerMl=LIM_L2.ginger*s.l2, mintMl=LIM_L2.mint*s.l2, menthMl=LIM_L2.menthol*s.l2;
  const oleoPeel=oleoMl*100/180, gingerRoot=gingerMl*2, mintLeaf=mintMl*0.04, menthMg=menthMl*10, gel=2.5*(gingerMl+mintMl)/1000;
  let e=""; const row=(n,p,raw)=> e+=`<tr><td class="q">${esc(p)}</td><td class="n">${esc(n)}<small>${esc(raw)}</small></td></tr>`;
  if(oleoMl>0) row("oleosaccharum · E1", limMl(oleoMl), "piel de limón "+limG(oleoPeel)+" · azúcar "+limG(oleoMl));
  if(s.l2>0){
    row("zumo jengibre · E2", limMl(gingerMl), "jengibre fresco "+limG(gingerRoot));
    row("infusión menta · E3", limMl(mintMl), "hierbabuena "+limG(mintLeaf)+" · agua "+limMl(mintMl));
    row("solución mentol · E4", limMl(menthMl), "mentol "+limNum(menthMg,0)+" mg · stock 10 mg/ml");
    row("gelatina · E5", limG(gel), "clarifica E2 + E3");
  }
  return e||`<tr><td class="n" style="color:var(--muted)">Sin extracciones para esta selección.</td></tr>`;
}

function limRender(){
  const s=window._lim, pasos=limPasos(), paso=limPasoActual(), idx=pasos.indexOf(paso);
  const t=s.tipo?LIM_TIPOS[s.tipo]:null;
  const total=(s.tipo==="ii"?0:s.l1)+(s.tipo==="i"?0:s.l2);
  const head=`<div class="lim-head">
      <div><div class="lim-eyebrow">Control M · producción</div><div class="lim-h">Limonadas${t?` · ${esc(t.rn)}`:""}</div></div>
      <div class="lim-meta">Paso ${idx+1}/${pasos.length}${s.tipo?`<b id="lim-meta-total">${limNum(total,0)} L</b>`:""}</div>
    </div>
    <div class="lim-rail">${pasos.map((_,i)=>`<i class="${i<=idx?"on":""}"></i>`).join("")}</div>`;

  let body="", foot="";
  const btnPrev=`<button class="btn-ghost" onclick="limGo(-1)">← ${idx===0?"Salir":"Atrás"}</button>`;
  const btnNext=(txt)=>`<button class="btn-primary" onclick="limGo(1)">${txt||"Siguiente →"}</button>`;

  if(paso==="tipo"){
    body=`<div class="lim-lead">¿Qué línea vas a producir? Cada una tiene su receta, su vida útil y su proceso.</div>
      ${Object.entries(LIM_TIPOS).map(([k,v])=>`<button class="lim-tipo" onclick="limSetTipo('${k}')"><span class="rn">${esc(v.rn)}</span><div class="nm">${esc(v.nm)}</div><div class="ds">${esc(v.ds)}</div></button>`).join("")}
      <button class="cc-link cc-link-wide" style="margin-top:10px" onclick="limOleo()">óleo saccharum · desde piel disponible →</button>`;
    foot=btnPrev; // sin "siguiente": se avanza eligiendo tipo
  } else if(paso==="litros"){
    const campo=(id,rn,val,dis)=> `<div class="lim-lin"><div class="rn">${esc(rn)}</div><input id="${id}" type="number" min="0" step="1" value="${val}" ${dis?"disabled":""} inputmode="numeric" oninput="limLeerLitros();limTotalVivo()"><div class="u">litros</div></div>`;
    body=`<div class="lim-lead">Litros de bebida <b>terminada</b> a producir. El resto se calcula solo.</div>
      <div class="lim-liters">
        ${s.tipo!=="ii"?campo("lim-l1","I · Esencia",s.l1||""):""}
        ${s.tipo!=="i"?campo("lim-l2","II · Casa",s.l2||""):""}
      </div>
      <div class="lim-presets">
        ${s.tipo==="ambas"?`<button onclick="limPreset(10,20)">semana · 10+20</button><button onclick="limPreset(40,80)">mes · 40+80</button>`:""}
        ${s.tipo==="i"?`<button onclick="limPreset(10,0)">10 L</button><button onclick="limPreset(20,0)">20 L</button><button onclick="limPreset(40,0)">40 L</button>`:""}
        ${s.tipo==="ii"?`<button onclick="limPreset(0,20)">20 L</button><button onclick="limPreset(0,40)">40 L</button><button onclick="limPreset(0,80)">80 L</button>`:""}
      </div>
      <div class="lim-lead" id="lim-total-vivo" style="text-align:center;margin:14px 0 0;"></div>`;
    foot=btnPrev+btnNext("Ver receta →");
  } else if(paso==="receta"){
    const seg=s.tipo==="ambas"?`<div class="lim-seg"><button class="${s.sel==="i"?"on":""}" onclick="limSel('i')">I · Esencia</button><button class="${s.sel==="ii"?"on":""}" onclick="limSel('ii')">II · Casa</button></div>`:"";
    const line=s.tipo==="ambas"?s.sel:s.tipo;
    const lit=line==="i"?s.l1:s.l2;
    body=`${seg}<div class="lim-eyebrow" style="margin-bottom:6px;">Receta terminada · ${line==="i"?"I · Esencia":"II · Casa"} · ${limNum(lit,0)} L · ${line==="i"?"7,0":"6,0"} °Bx</div>
      <table class="lim-tab"><tbody>${limFilasReceta(line)}</tbody></table>`;
    foot=btnPrev+btnNext("Extracciones →");
  } else if(paso==="extracciones"){
    body=`<div class="lim-eyebrow" style="margin-bottom:6px;">Extracciones a preparar · lista de compra</div>
      <table class="lim-tab"><tbody>${limFilasExtracciones()}</tbody></table>
      <div class="lim-lead" style="margin:12px 0 0;">Rendimientos aproximados. Enrasar a volumen final con agua tras añadir todo. Dosis de aroma = punto de partida, se cierran en cata.</div>`;
    foot=btnPrev+(limPasos().includes("proceso")?btnNext("Proceso →"):`<button class="btn-primary" onclick="irA_limonadas()">Nuevo lote ↺</button>`);
  } else if(paso==="proceso"){
    body=`<div class="lim-eyebrow" style="margin-bottom:8px;">Carbonatación en frío · línea II</div>
      <dl class="lim-spec"><dt>Temperatura</dt><dd>1–3 °C</dd><dt>Objetivo</dt><dd>2,0–2,5 vol · burbuja fina</dd><dt>Presión</dt><dd>0,8–0,9 bar · 11–13 psi</dd><dt>Método</dt><dd>paciente · 24–48 h</dd></dl>
      <ol class="lim-steps">
        <li>Enfriar el líquido a 1–3 °C — el CO₂ solo entra en frío.</li>
        <li>Aromatizar antes de carbonatar (mentol, jengibre, menta ya dentro).</li>
        <li>Llenar el barril con cámara de aire; purgar el O₂ (presurizar y ventear 2–3 veces).</li>
        <li>Conectar CO₂ a presión de servicio y dejar 24–48 h en frío, sin agitar.</li>
        <li>Servir siempre en frío. El CO₂ baja el pH ~0,1 · ya compensado en los ácidos.</li>
      </ol>`;
    foot=btnPrev+`<button class="btn-primary" onclick="irA_limonadas()">Nuevo lote ↺</button>`;
  }
  el("inner-content").innerHTML=`<div id="lim">${head}<div class="lim-body">${body}</div><div class="lim-foot">${foot}</div></div>`;
  if(paso==="litros") limTotalVivo();
}
function limTotalVivo(){
  const s=window._lim;
  const total=(s.tipo==="ii"?0:s.l1)+(s.tipo==="i"?0:s.l2);
  const out=el("lim-total-vivo"); if(out) out.innerHTML=`Total líquido final <b style="color:var(--ink);font-size:15px;">${limNum(total,0)} L</b>`;
  const hm=el("lim-meta-total"); if(hm) hm.textContent=`${limNum(total,0)} L`;
}

// ── Óleo saccharum · base de la limonada ──────────────────────────────────────
// Calculadora al revés del asistente: partes de la piel de limón que TIENES y te
// dice el azúcar y el óleo que sale. Misma proporción que la extracción E1 de las
// recetas (ancla 100 g piel → 180 g azúcar → 180 ml óleo · relación 1:1,8), así
// que nunca se contradice con lo que calculan las limonadas. No guarda nada.
const OLEO = { piel: 100, azucar: 180, rinde: 180 }; // gramos · gramos · ml
function limOleoDesdePiel(pielG){
  const p = Math.max(0, Number(pielG) || 0);
  return { piel: p, azucar: p * OLEO.azucar / OLEO.piel, oleoMl: p * OLEO.rinde / OLEO.piel };
}
function limOleo(){
  if(!window._lim) window._lim={ tipo:null, l1:0, l2:0, step:1, sel:"i" };
  if(window._lim.peel==null) window._lim.peel=334; // lo que hay ahora en bandeja
  openSection("limonadas","Limonadas");
  limOleoRender();
}
function limLeerPeel(){ const a=el("lim-peel"); if(a) window._lim.peel=Math.max(0,parseFloat(a.value)||0); }
function limPeelPreset(g){ window._lim.peel=g; const a=el("lim-peel"); if(a) a.value=g; limOleoVivo(); }
function limOleoRender(){
  const r=limOleoDesdePiel(window._lim.peel);
  const head=`<div class="lim-head">
      <div><div class="lim-eyebrow">Control M · producción</div><div class="lim-h">Óleo saccharum · base</div></div>
      <div class="lim-meta">1 : 1,8</div>
    </div>`;
  const body=`<div class="lim-lead">¿Cuánta <b>piel de limón</b> tienes? Te digo el azúcar que va y el óleo que sale. Solo la parte amarilla, sin blanco.</div>
    <div class="lim-liters">
      <div class="lim-lin"><div class="rn">piel de limón</div><input id="lim-peel" type="number" min="0" step="1" value="${window._lim.peel||""}" inputmode="numeric" oninput="limLeerPeel();limOleoVivo()"><div class="u">gramos</div></div>
    </div>
    <div class="lim-presets">
      <button onclick="limPeelPreset(250)">250 g</button>
      <button onclick="limPeelPreset(500)">500 g</button>
      <button onclick="limPeelPreset(1000)">1 kg</button>
    </div>
    <table class="lim-tab" style="margin-top:20px" id="lim-oleo-out"><tbody>${limOleoFilas(r)}</tbody></table>
    <dl class="lim-spec" style="margin-top:16px">
      <dt>Macerar</dt><dd>4–24 h · mejor de un día para otro</dd>
      <dt>Extrae</dt><dd>el azúcar tira el aceite de la corteza</dd>
      <dt>Colar</dt><dd>prensar la piel · el líquido ámbar es el óleo</dd>
    </dl>
    <ol class="lim-steps">
      <li>Pelar sólo lo amarillo — el blanco amarga.</li>
      <li>Mezclar piel + azúcar hasta cubrirla toda.</li>
      <li>Tapar y macerar 4–24 h a temperatura ambiente.</li>
      <li>Colar y prensar. Guardar en frío.</li>
    </ol>`;
  const foot=`<button class="btn-ghost" onclick="irA_limonadas()">← Volver</button>
    <button class="btn-primary" onclick="etqDesdeOleo()">generar etiqueta →</button>`;
  el("inner-content").innerHTML=`<div id="lim">${head}<div class="lim-body">${body}</div><div class="lim-foot">${foot}</div></div>`;
}
function etqDesdeOleo(){
  const r=limOleoDesdePiel(window._lim.peel);
  irA_etiquetaProd({ nombre:"óleo saccharum", cantidad: limNum(r.oleoMl,0)+" ml", vidaDias:14 });
}
function limOleoFilas(r){
  const row=(q,n,s)=>`<tr><td class="q">${q}</td><td class="n">${esc(n)}${s?`<small>${esc(s)}</small>`:""}</td></tr>`;
  return row(limG(r.azucar),"azúcar","proporción 1:1,8 sobre la piel")
       + row(limMl(r.oleoMl),"óleo saccharum","rendimiento aproximado tras colar");
}
function limOleoVivo(){
  const out=el("lim-oleo-out");
  if(out) out.innerHTML=`<tbody>${limOleoFilas(limOleoDesdePiel(window._lim.peel))}</tbody>`;
}

// ── Etiquetas de producción ───────────────────────────────────────────────────
// Datea CUALQUIER cosa que preparas (óleo, base de matcha, cordial, lo que sea).
// Tú eliges el producto, la cantidad y la vida útil — nada estándar. Genera la
// etiqueta térmica con QR que, al escanear, dice el tiempo que lleva en vivo.
// No guarda lote: los datos viajan en el propio QR (ruta pública /etiqueta/prep).
const ETQ_PRODUCTOS = [
  { n:"óleo saccharum", v:14 },
  { n:"base de matcha", v:3 },
  { n:"cordial", v:21 },
  { n:"cold brew", v:7 },
  { n:"infusión", v:5 },
  { n:"limonada", v:5 },
];
const ETQ_VIDAS = [
  { h:12,  t:"12 h" }, { h:24, t:"1 día" }, { h:72, t:"3 días" },
  { h:168, t:"1 sem" }, { h:336, t:"2 sem" }, { h:720, t:"1 mes" },
];
function irA_etiquetaProd(pre){
  pre = pre || {};
  const u = getUser();
  window._etq = {
    nombre: pre.nombre || "",
    cantidad: pre.cantidad || "",
    vidaH: pre.vidaDias != null ? pre.vidaDias * 24 : (pre.vidaH != null ? pre.vidaH : 72),
    resp: (u && u.nombre) || "",
  };
  navReset(); openSection("etiquetaprod", "Etiqueta de producción");
  etqRender();
}
function etqLeer(){
  const s=window._etq;
  const n=el("etq-nombre"), c=el("etq-cant"), r=el("etq-resp");
  if(n) s.nombre=n.value.trim();
  if(c) s.cantidad=c.value.trim();
  if(r) s.resp=r.value.trim();
}
function etqPreset(nombre, vidaDias){ etqLeer(); const s=window._etq; s.nombre=nombre; if(vidaDias!=null) s.vidaH=vidaDias*24; etqRender(); }
function etqVida(h){ etqLeer(); window._etq.vidaH=h; etqRender(); }
function etqVidaLibre(dias){ const d=Math.max(0,parseFloat(dias)||0); window._etq.vidaH=d*24; const box=el("etq-vida-libre-val"); if(box) box.textContent=d?`${limNum(d,1)} días de vida útil`:""; document.querySelectorAll("#etq .lim-presets button").forEach(b=>b.classList.remove("on")); }
function etqRender(){
  const s=window._etq;
  const head=`<div class="lim-head">
      <div><div class="lim-eyebrow">Control M · producción</div><div class="lim-h">Etiqueta de producción</div></div>
    </div>`;
  const chips=ETQ_PRODUCTOS.map(p=>`<button class="${s.nombre===p.n?"on":""}" onclick="etqPreset('${p.n.replace(/'/g,"\\'")}',${p.v})">${esc(p.n)}</button>`).join("");
  const vidas=ETQ_VIDAS.map(v=>`<button class="${s.vidaH===v.h?"on":""}" onclick="etqVida(${v.h})">${v.t}</button>`).join("");
  const body=`<div class="lim-lead">Datea cualquier cosa que preparas. Eliges el producto, la cantidad y la vida útil; la etiqueta lleva un QR que te dice el tiempo que lleva en vivo.</div>
    <div class="lim-eyebrow" style="margin-bottom:6px">producto</div>
    <div class="lim-presets" style="margin-top:0;justify-content:flex-start">${chips}</div>
    <input id="etq-nombre" class="etq-in" type="text" placeholder="nombre del producto" value="${esc(s.nombre)}" oninput="etqLeer()" style="margin-top:10px">
    <input id="etq-cant" class="etq-in" type="text" placeholder="cantidad · ej. 601 ml, 2 L, 30 uds" value="${esc(s.cantidad)}" oninput="etqLeer()">
    <div class="lim-eyebrow" style="margin:16px 0 6px">vida útil</div>
    <div class="lim-presets" style="margin-top:0;justify-content:flex-start">${vidas}</div>
    <div class="etq-libre"><input id="etq-vida-libre" type="number" min="0" step="0.5" placeholder="otros" inputmode="decimal" oninput="etqVidaLibre(this.value)"><span>días</span><span id="etq-vida-libre-val" class="etq-libre-val"></span></div>
    <div class="lim-eyebrow" style="margin:16px 0 6px">responsable</div>
    <input id="etq-resp" class="etq-in" type="text" placeholder="quién lo prepara" value="${esc(s.resp)}" oninput="etqLeer()">`;
  const foot=`<button class="btn-ghost" onclick="goBack()">← Salir</button>
    <button class="btn-primary" onclick="etqGenerar()">imprimir etiqueta →</button>`;
  el("inner-content").innerHTML=`<div id="lim"><div id="etq">${head}<div class="lim-body">${body}</div><div class="lim-foot">${foot}</div></div></div>`;
}
function etqGenerar(){
  etqLeer();
  const s=window._etq;
  if(!s.nombre){ alert("Ponle un nombre al producto"); const n=el("etq-nombre"); if(n) n.focus(); return; }
  const qs=new URLSearchParams();
  qs.set("n", s.nombre);
  if(s.cantidad) qs.set("c", s.cantidad);
  if(s.vidaH>0) qs.set("v", s.vidaH);
  if(s.resp) qs.set("r", s.resp);
  qs.set("p", new Date().toISOString()); // sella el momento de la impresión
  qs.set("print", "1");
  window.open("/etiqueta/prep?"+qs.toString(), "_blank");
}

// ── Base de matcha · gel fluido (matcha + agua + gellan) ──────────────────────
// Producción de la base concentrada de matcha para el grifo. El gellan LA
// mantiene el matcha en suspensión y da cuerpo sedoso. Eliges litros y tres
// palancas — cuerpo (gellan %), intensidad (matcha g/L) y calcio — y calcula
// las cantidades. No persiste; genera etiqueta con vida útil de 3 días.
// Cuerpo en rango de BEBIDA (no de salsa). Para suspender el matcha y dar tacto
// sedoso basta muy poco gellan; 0,5 % gelificaría demasiado para beber al grifo.
const MB_CUERPO = [ { v:0.1, t:"ligero" }, { v:0.2, t:"sedoso" }, { v:0.35, t:"con cuerpo" } ]; // % gellan / agua
const MB_INTENS = [ { v:20, t:"suave" }, { v:30, t:"estándar" }, { v:40, t:"intenso" } ];        // g matcha / L
function irA_matchaBase(){
  window._mb = window._mb || { litros:1, cuerpo:0.2, intensidad:30, calcio:false };
  navReset(); openSection("matchabase","Base de matcha");
  mbRender();
}
function mbLeer(){ const a=el("mb-lit"); if(a) window._mb.litros=Math.max(0,parseFloat(a.value)||0); }
function mbLitPreset(l){ window._mb.litros=l; const a=el("mb-lit"); if(a) a.value=l; mbVivo(); }
function mbCuerpo(v){ mbLeer(); window._mb.cuerpo=v; mbRender(); }
function mbIntens(v){ mbLeer(); window._mb.intensidad=v; mbRender(); }
function mbCalcio(b){ mbLeer(); window._mb.calcio=b; mbRender(); }
function mbCalc(){
  const s=window._mb, L=s.litros||0, agua=L*1000;
  // El agua se parte en dos: mitad caliente hidrata el gellan (85-90 °C) y
  // mitad fría lleva el matcha. Al juntarlas la mezcla queda templada (~50 °C)
  // y el matcha no se cuece (no amarga ni pierde color).
  return { agua, aguaCal: agua*0.5, aguaFria: agua*0.5, gellan: agua*s.cuerpo/100, matcha: L*s.intensidad, calcio: s.calcio ? L*0.1 : 0 };
}
function mbFilas(){
  const r=mbCalc(), s=window._mb;
  const row=(q,n,sub)=>`<tr><td class="q">${q}</td><td class="n">${esc(n)}${sub?`<small>${esc(sub)}</small>`:""}</td></tr>`;
  let out = row(limG(r.aguaCal),"agua · caliente","mitad para el gellan · 85–90 °C")
    + row(limG(r.gellan),"gellan LA",`cuerpo ${limNum(s.cuerpo,1)} %`)
    + row(limG(r.aguaFria),"agua · fría","mitad para el matcha · máx 40 °C")
    + row(limG(r.matcha),"matcha",`${limNum(s.intensidad,0)} g/L · tamizado`);
  if(r.calcio>0) out += row(limG(r.calcio),"sal cálcica","una punta · firma el gel");
  return out;
}
function mbRender(){
  const s=window._mb;
  const head=`<div class="lim-head">
      <div><div class="lim-eyebrow">Control M · producción</div><div class="lim-h">Base de matcha</div></div>
      <div class="lim-meta">gel fluido</div>
    </div>`;
  const cuerpo=MB_CUERPO.map(c=>`<button class="${s.cuerpo===c.v?"on":""}" onclick="mbCuerpo(${c.v})">${limNum(c.v,1)}% · ${c.t}</button>`).join("");
  const intens=MB_INTENS.map(i=>`<button class="${s.intensidad===i.v?"on":""}" onclick="mbIntens(${i.v})">${i.v} g · ${i.t}</button>`).join("");
  const body=`<div class="lim-lead">Base concentrada para el grifo. El gellan mantiene el matcha en suspensión y da cuerpo. Metes los litros y ajustas las palancas.</div>
    <div class="lim-liters">
      <div class="lim-lin"><div class="rn">producir</div><input id="mb-lit" type="number" min="0" step="0.5" value="${s.litros||""}" inputmode="decimal" oninput="mbLeer();mbVivo()"><div class="u">litros</div></div>
    </div>
    <div class="lim-presets">
      <button onclick="mbLitPreset(0.5)">0,5 L</button><button onclick="mbLitPreset(1)">1 L</button>
      <button onclick="mbLitPreset(2)">2 L</button><button onclick="mbLitPreset(5)">5 L</button>
    </div>
    <div class="lim-eyebrow" style="margin:18px 0 6px">cuerpo · gellan</div>
    <div class="lim-presets" style="margin-top:0;justify-content:flex-start">${cuerpo}</div>
    <div class="lim-eyebrow" style="margin:16px 0 6px">intensidad · matcha</div>
    <div class="lim-presets" style="margin-top:0;justify-content:flex-start">${intens}</div>
    <div class="lim-eyebrow" style="margin:16px 0 6px">calcio · agua muy blanda</div>
    <div class="lim-seg"><button class="${!s.calcio?"on":""}" onclick="mbCalcio(false)">sin calcio</button><button class="${s.calcio?"on":""}" onclick="mbCalcio(true)">con calcio</button></div>
    <table class="lim-tab" id="mb-out" style="margin-top:8px"><tbody>${mbFilas()}</tbody></table>
    <div class="lim-eyebrow" style="margin:18px 0 6px">proceso · agua partida en dos</div>
    <ol class="lim-steps">
      <li>Separa el agua en <b>dos mitades</b>: una para el gellan, otra para el matcha.</li>
      <li><b>Mitad caliente:</b> lluvia el gellan en su agua fría con la túrmix, luego calienta a <b>85–90 °C</b> 1–2 min para hidratarlo.</li>
      <li><b>Mitad fría:</b> tamiza el matcha y bátelo en la otra mitad, fría o templada (<b>máx 40 °C</b>).</li>
      <li>Vierte el gellan caliente sobre el matcha batiendo. La mezcla queda templada (~50 °C) — <b>el matcha no se cuece</b>.</li>
      <li>Vierte y deja cuajar; remata en nevera hasta gel firme.</li>
      <li>Tritura el gel frío hasta sedoso y vertible; cuela y guarda en frío · <b>3 días</b>.</li>
    </ol>`;
  const foot=`<button class="btn-ghost" onclick="irA_lab()">← Volver</button>
    <button class="btn-primary" onclick="etqDesdeMatcha()">generar etiqueta →</button>`;
  el("inner-content").innerHTML=`<div id="lim">${head}<div class="lim-body">${body}</div><div class="lim-foot">${foot}</div></div>`;
}
function mbVivo(){ const o=el("mb-out"); if(o) o.innerHTML=`<tbody>${mbFilas()}</tbody>`; }
function etqDesdeMatcha(){ mbLeer(); irA_etiquetaProd({ nombre:"base de matcha", cantidad: limNum(window._mb.litros,1)+" L", vidaDias:3 }); }

// Cronómetro simple para el modo trabajador.
let _cronoT=null,_cronoS=0;
function mbdsCronometro(){
  setInner(`<div class="section-label">Cronómetro</div>
    <div class="cc-card" style="text-align:center;"><div id="crono-disp" class="cc-kpi cc-big" style="font-variant-numeric:tabular-nums;">00:00</div>
      <div class="card-actions" style="justify-content:center;margin-top:10px;">
        <button class="btn-primary" onclick="cronoStart()">Iniciar</button>
        <button class="btn-ghost" onclick="cronoStop()">Parar</button>
        <button class="btn-ghost" onclick="cronoReset()">Reiniciar</button>
      </div></div>
    <div class="card-actions" style="margin-top:10px;"><button class="btn-ghost" onclick="goBack()">Volver</button></div>`);
}
function cronoRender(){ const m=String(Math.floor(_cronoS/60)).padStart(2,"0"),s=String(_cronoS%60).padStart(2,"0"); const d=el("crono-disp"); if(d)d.textContent=`${m}:${s}`; }
function cronoStart(){ if(_cronoT)return; _cronoT=setInterval(()=>{_cronoS++;cronoRender();},1000); }
function cronoStop(){ if(_cronoT){clearInterval(_cronoT);_cronoT=null;} }
function cronoReset(){ cronoStop(); _cronoS=0; cronoRender(); }

// ── RUTINAS DEL DÍA · apertura y cierre (mismo motor) ──────────────────────
async function irA_rutina(rutina){
  const r=RUTINAS[rutina]?rutina:"apertura";
  window._rutina=r;
  openSection("rutina-"+r, RUTINAS[r].titulo);
  setInner(`<div class="empty">Cargando…</div>`);
  try{
    const d=await api("/apertura?rutina="+r).catch(()=>({pasos:{}}));
    window._aperPasos=(d&&d.pasos)||{};
    renderRutina();
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}
function irA_apertura(){ return irA_rutina("apertura"); }
function irA_cierre(){ return irA_rutina("cierre"); }
function renderRutina(){
  const u=getUser(), r=window._rutina||"apertura", cfg=RUTINAS[r], PASOS=cfg.pasos, pasos=window._aperPasos||{};
  const hechos=PASOS.filter(p=>pasos[p.k]).length, total=PASOS.length;
  const pct=Math.round(hechos/total*100);
  let html=`${r==="apertura"?saludoHTML(u):""}
    <div class="section-label">Rutina de ${r==="apertura"?"apertura":"cierre"} · ${hechos}/${total}</div>
    <div style="height:6px;background:var(--olive-light);border-radius:3px;overflow:hidden;margin-bottom:14px;"><div style="height:100%;width:${pct}%;background:var(--ink);transition:width .3s;"></div></div>`;
  html+=PASOS.map(p=>{
    const done=!!pasos[p.k];
    const quien=(done&&pasos[p.k].responsable)?` · ${esc(pasos[p.k].responsable)}`:"";
    const go=p.go?`<button class="apstep-go" onclick="event.stopPropagation();aperAbrir('${p.go}')">Abrir →</button>`:"";
    const sub=p.sub?`<span class="apstep-sub">${esc(p.sub)}${quien}</span>`:(quien?`<span class="apstep-sub">hecho${quien}</span>`:"");
    return `<div class="apstep${done?' done':''}" onclick="toggleApertura('${p.k}',${done?false:true})">
      <span class="apstep-check">${done?'✓':''}</span>
      <span class="apstep-ico">${p.ico}</span>
      <span class="apstep-body"><span class="apstep-t">${esc(p.t)}</span>${sub}</span>
      ${go}
    </div>`;
  }).join("");
  if(hechos>=total) html+=`<div class="todo-clear" style="margin-top:16px;font-size:15px;">${cfg.hecho}</div>`;
  setInner(html);
}
// Compat: algunas llamadas antiguas usan renderApertura.
function renderApertura(){ return renderRutina(); }
// Abre una tarea de la rutina recordando que "volver" debe regresar a ELLA.
function aperAbrir(fn){
  const r=window._rutina||"apertura";
  window._backOverride = ()=>irA_rutina(r);
  if (typeof window[fn] === "function") window[fn]();
}
async function toggleApertura(k, hecho){
  const u=getUser(), r=window._rutina||"apertura";
  window._aperPasos=window._aperPasos||{};
  if(hecho){ window._aperPasos[k]={hecho:true,responsable:(u&&u.nombre)||""}; }
  else { delete window._aperPasos[k]; }
  renderRutina();
  try{ await api("/apertura/toggle",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({step:k,hecho:!!hecho,responsable:(u&&u.nombre)||"",rutina:r})}); }
  catch(e){ irA_rutina(r); }
}

async function irA_temperaturas(){
  openSection("temperaturas","Temperaturas de neveras");
  try{
    const [tipos,revs]=await Promise.all([api("/revisiones/tipos"),api("/revisiones").catch(()=>[])]);
    window._tempTipos=tipos.filter(t=>t.clase==="temperatura");
    const hoy=new Date().toDateString();
    const ultimaHoy=(tipo)=> revs.filter(r=>r.tipo===tipo && r.fecha && new Date(r.fecha).toDateString()===hoy).slice(-1)[0];
    let html=`<div class="section-label">Registro de temperaturas (APPCC)</div>
      <div class="card-meta" style="margin-bottom:8px;">Anota la temperatura de cada nevera y congelador. El sistema avisa si está fuera de rango.</div>`;
    html+=window._tempTipos.map((t,i)=>{
      const ult=ultimaHoy(t.tipo);
      const estadoTxt=ult
        ? (ult.estado==='Correcto'
            ? `<b style="color:var(--ink);">${esc(ult.valor)}</b> · correcto`
            : `<b style="color:var(--ink);">${esc(ult.valor)}</b> <span class="tag-ink">fuera de rango</span>`)
        : `<span style="color:var(--muted);">sin registrar hoy</span>`;
      return `<div class="card">
        <div class="card-name">${esc(t.tipo)}</div>

async function guardarTemp(i){
  const t=(window._tempTipos||[])[i]; if(!t) return;
  const val=el("tp-"+i)?el("tp-"+i).value:"";
  if(val===""||val==null){ alert("Pon la temperatura."); return; }

  if(!bloqueaDoble("temp-"+i)) return;
  try{
    const r=await api("/revisiones/registrar",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({tipo:t.tipo,valor:val,responsable:(u&&u.nombre)||"Sin asignar"})});

function recalcInvFila(input){
  const row=input.closest(".inv-row");
  const teo=Number(row.getAttribute("data-teo"))||0;
  const dif=row.querySelector(".inv-dif");
  const v=input.value;
  if(v===""||v==null){ dif.textContent=""; row.classList.remove("inv-desc"); recalcInvTotal(); return; }
  const fis=Number(String(v).replace(",","."))||0;
  const delta=Math.round((fis-teo)*100)/100;
  dif.textContent=delta===0?"✓":(delta>0?`+${delta}`:`${delta}`);
  row.classList.toggle("inv-desc", delta!==0);
  recalcInvTotal();
}
function recalcInvTotal(){
  let cont=0, eurTot=0;
  document.querySelectorAll(".inv-row").forEach(row=>{
    const inp=row.querySelector(".inv-fisico");
    if(inp.value===""||inp.value==null) return;
    const teo=Number(row.getAttribute("data-teo"))||0;
    const coste=Number(row.getAttribute("data-coste"))||0;
    const fis=Number(String(inp.value).replace(",","."))||0;
    const delta=Math.round((fis-teo)*100)/100;
    if(delta!==0){ cont++; eurTot+=delta*coste; }
  });
  eurTot=Math.round(eurTot*100)/100;
  const r=el("inv-resumen");
  if(r) r.textContent=cont?`${cont} materia(s) con descuadre · valor ${eurTot>=0?"+":""}${eurTot.toFixed(2)} €`:"Sin descuadres. Todo cuadra.";
}
async function guardarInventario(btn){
  const conteos=[...document.querySelectorAll(".inv-row")].map(row=>{
    const inp=row.querySelector(".inv-fisico");
    if(inp.value===""||inp.value==null) return null;
    return { materia_id:row.getAttribute("data-mid"), fisico:inp.value };
  }).filter(Boolean);
  const msg=el("inv-msg");
  if(!conteos.length){ if(msg) msg.textContent="Cuenta al menos una materia antes de guardar."; return; }
  if(!confirm(`Vas a ajustar el stock de ${conteos.length} materia(s) al recuento real. ¿Continuar?`)) return;
  const u=getUser();
  if(btn) btn.disabled=true;
  try{
    const r=await api("/inventario/conteo",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({conteos,responsable:(u&&u.nombre)||"Sin asignar"})});
    alert(`Recuento guardado.\n${r.lineas_con_descuadre}/${r.total_lineas} con descuadre.\nDescuadre: ${r.descuadre_eur>=0?"+":""}${r.descuadre_eur.toFixed(2)} €`);
    irA_inventario();
  }catch(e){ if(msg) msg.textContent="No se pudo guardar: "+e.message; if(btn) btn.disabled=false; }
}

function eur0(n){ return Math.round(Number(n)||0).toLocaleString("es-ES"); }
function fmtEur(n,u){ return (Math.round((Number(n)||0)*100)/100).toLocaleString("es-ES")+(u?` ${u}`:""); }
// Barras horizontales monocromas a partir de [{label,value}].
function svgBarsH(data, opts){
  data=(data||[]).filter(d=>d&&isFinite(d.value));
  if(!data.length) return `<div class="empty" style="padding:10px 0;">Sin datos todavía.</div>`;
  const max=Math.max(1,...data.map(d=>Math.abs(d.value)));
  const u=(opts&&opts.unit)||"";
  return `<div class="chart">`+data.map(d=>{
    const w=Math.max(2,Math.round(Math.abs(d.value)/max*100));
    return `<div class="chart-row">
      <div class="chart-row-top"><span class="chart-lbl">${esc(d.label)}</span><span class="chart-val">${fmtEur(d.value,u)}</span></div>
      <div class="chart-track"><div class="chart-bar" style="width:${w}%"></div></div>
    </div>`;
  }).join("")+`</div>`;
}
// Línea (serie temporal) en SVG monocromo.
function svgLine(data){
  data=(data||[]);
  if(!data.length) return `<div class="empty" style="padding:10px 0;">Sin datos.</div>`;
  const W=320,H=88,pad=7, n=data.length, max=Math.max(0.01,...data.map(d=>d.value));
  const x=i=> pad + i*(W-2*pad)/Math.max(1,n-1);
  const y=v=> H-pad - (v/max)*(H-2*pad);
  const pts=data.map((d,i)=>`${x(i).toFixed(1)},${y(d.value).toFixed(1)}`).join(" ");
  const area=`${pad},${(H-pad)} ${pts} ${(W-pad)},${(H-pad)}`;
  const step=Math.max(1,Math.ceil(n/6));
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" style="display:block;overflow:visible;">
    <polygon points="${area}" fill="var(--olive-light)" opacity="0.55"></polygon>
    <polyline points="${pts}" fill="none" stroke="var(--ink)" stroke-width="1.5" stroke-linejoin="round"></polyline>
    ${data.map((d,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(d.value).toFixed(1)}" r="1.7" fill="var(--ink)"></circle>`).join("")}
  </svg>
  <div class="chart-xlabels">${data.map((d,i)=>`<span>${i%step===0?esc(d.label):""}</span>`).join("")}</div>`;
}

    html+=`<div class="section-label">Compras por proveedor (30 días)</div>`+

  try{
    let q="/executive-dashboard?preset="+encodeURIComponent(window._ccPreset);
    if(window._ccPreset==="personalizado" && window._ccCustom) q+=`&desde=${window._ccCustom.desde}&hasta=${window._ccCustom.hasta}`;
    const d=await api(q);
    window._ccData=d;
    setInner(ccRender(d));
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}

function ccFiltroHTML(){
  const chips=CC_PRESETS.map(([k,l])=>`<button class="cc-chip${k===window._ccPreset?' on':''}" onclick="ccElegirPreset('${k}')">${l}</button>`).join("");
  const custom=window._ccPreset==="personalizado"
    ? `<div class="cc-custom"><input type="date" id="cc-desde"><span>→</span><input type="date" id="cc-hasta"><button class="btn-primary" onclick="ccAplicarCustom()">Aplicar</button></div>`:"";
  return `<div class="cc-filtro">${chips}</div>${custom}`;
}
function ccElegirPreset(k){ if(k==="personalizado"){ window._ccPreset="personalizado"; setInner(ccRender(window._ccData||{})); } else irA_centroControl(k); }
function ccAplicarCustom(){
  const desde=el("cc-desde")&&el("cc-desde").value, hasta=el("cc-hasta")&&el("cc-hasta").value;
  if(!desde||!hasta){ alert("Elige las dos fechas."); return; }
  irA_centroControl("personalizado",{desde,hasta});
}

function ccRender(d){
  if(!d||!d.periodo) return ccFiltroHTML()+`<div class="empty">Sin datos.</div>`;
  const s=d.salud||{}, v=d.valor_empresa||{}, b=d.beneficio||{}, ca=d.coste_abrir||{}, be=d.break_even||{}, t=d.tesoreria||{}, de=d.deuda||{}, eq=d.equipo||{}, cp=d.capital_parado||{}, obj=d.objetivos||[], cop=d.copiloto||[];
  const fin=d.financiero||{}, op=d.operaciones||{}, tend=d.tendencia||{};
  // Tendencia a 7 días (desde los snapshots diarios), si hay histórico.
  const tendSem=(campo)=>{ const x=tend.disponible&&tend.semana&&tend.semana[campo]; return (x&&x.pct!=null)?`<span class="cc-delta ${x.abs>=0?'up':'down'}">${x.abs>=0?'▲ +':'▼ −'}${Math.abs(x.pct)}% · 7 días</span>`:""; };
  // Salud
  const razones=(s.razones||[]).slice(0,5).map(r=>`<div class="cc-reason">${ccEstadoDot(r.estado)}${esc(r.texto)}</div>`).join("");
  const deltaS=s.delta!=null&&s.delta!==0?`<span class="cc-delta ${s.delta>=0?'up':'down'}">${s.delta>=0?'▲ +':'▼ −'}${Math.abs(s.delta)} vs anterior</span>`:"";
  const saludCard=`<button class="cc-card cc-hero" onclick="irA_salud()">
    <div class="cc-hero-left"><div class="cc-label">Salud del negocio</div>
      <div class="cc-score">${s.score!=null?s.score:'—'}<span class="cc-score-max">/100</span></div>${deltaS}</div>
    <div class="cc-hero-right">${razones}</div></button>`;
  // Beneficio
  const benCard=`<button class="cc-card" onclick="irA_beneficio()">
    <div class="cc-label">Beneficio real · ${esc(d.periodo.label)}</div>
    <div class="cc-kpi">${ccEur(b.beneficio_operativo)}</div>
    ${ccDelta(b.vs_anterior&&b.vs_anterior.beneficio)}
    <div class="cc-mini">Ventas ${ccEur(b.ventas)} · Materia ${ccEur(b.coste_materia)} · Personal ${ccEur(b.coste_laboral)} · Fijos ${ccEur(b.gastos_fijos)}</div>
    <div class="cc-mini">Burn mensual ${ccEur(fin.monthly_burn)} · EBITDA mes ${ccEur(fin.ebitda_mes)}</div></button>`;
  // Operaciones (estado del día unificado)
  const opCard=`<button class="cc-card" onclick="irA_tareas()">
    <div class="cc-label">Operaciones · hoy</div>
    <div class="cc-kpi">${(op.stock_critico||0)+(op.caducan_48h||0)}<span class="cc-score-max"> a vigilar</span></div>
    <div class="cc-mini">Stock crítico ${op.stock_critico||0} · caducan 48h ${op.caducan_48h||0} · entregas ${op.entregas_esperadas||0}</div>
    <div class="cc-mini">Producción hoy ${op.produccion_hoy||0} · en curso ${op.produccion_en_curso||0} · merma hoy ${ccEur(op.merma_hoy)}</div></button>`;
  // Coste de abrir
  const objMargen=(obj.find(o=>o.tipo==='food_cost'));
  const ventaNec=ca.prorrateo&&ca.prorrateo.diario>0?ca.prorrateo.diario/((objMargen?1-objMargen.objetivo/100:0.65)||0.65):0;
  const costeCard=`<button class="cc-card" onclick="irA_costeAbrir()">
    <div class="cc-label">Coste de abrir la persiana · ${esc(d.periodo.label)}</div>
    <div class="cc-kpi">${ccEur(ca.total)}</div>
    <div class="cc-mini">Al día ${ccEur(ca.prorrateo&&ca.prorrateo.diario)} · semana ${ccEur(ca.prorrateo&&ca.prorrateo.semanal)} · mes ${ccEur(ca.prorrateo&&ca.prorrateo.mensual)}</div>
    <div class="cc-mini cc-accent">${be&&be.ingreso_equilibrio_dia!=null?`Punto de equilibrio: ${ccEur(be.ingreso_equilibrio_dia)}/día${be.hoy&&be.hoy.cafes?` (≈ ${eur0(be.hoy.cafes)} cafés)`:""}`:`Necesitas vender ${ccEur(ventaNec)}/día para cubrirlo con margen`}</div></button>`;
  // Valor empresa
  const valorCard=`<button class="cc-card" onclick="irA_valorEmpresa()">
    <div class="cc-label">Valor de la empresa</div>
    <div class="cc-kpi">${ccEur(v.patrimonio_neto)}</div>
    ${tendSem("patrimonio_neto")}
    <div class="cc-mini">Almacén ${ccEur(v.valor_almacen)} · Producción ${ccEur(v.valor_produccion)} · Activos ${ccEur(v.valor_activos)} − Deuda ${ccEur(v.deuda_pendiente)}</div></button>`;
  // Tesorería
  const runway=t.dias_supervivencia;
  const tesCard=`<button class="cc-card" onclick="irA_tesoreria()">
    <div class="cc-label">Tesorería</div>
    <div class="cc-kpi">${ccEur(t.liquidez_inmediata)}</div>
    <div class="cc-mini">${runway!=null?`<b>${runway} días de supervivencia</b> sin ingresos`:"Añade tus cuentas para ver los días de supervivencia"}</div>
    <div class="cc-mini">Caja ${ccEur(t.caja)} · Banco ${ccEur(t.banco)}</div></button>`;
  // Deuda
  const deudaCard=`<button class="cc-card" onclick="irA_deuda()">
    <div class="cc-label">Deuda</div>
    ${de.deuda_total>0?`<div class="cc-kpi">${ccEur(de.deuda_total)}</div><div class="cc-mini">Cuota mensual ${ccEur(de.cuota_mensual_total)} · ${de.num_deudas} deuda(s)</div>`
      :`<div class="cc-kpi cc-ok">Sin deuda</div><div class="cc-mini">Añade préstamos, leasing o deuda fiscal si los tienes.</div>`}</button>`;
  // Equipo
  const equipoCard=`<button class="cc-card" onclick="irA_equipo()">
    <div class="cc-label">Equipo</div>
    <div class="cc-kpi">${eq.total_empleados}<span class="cc-score-max"> personas</span></div>
    <div class="cc-mini">${eq.faltan_datos?"Añade el coste del equipo para ver el coste laboral":`Coste ${esc(d.periodo.label.toLowerCase())} ${ccEur(eq.coste_periodo)} · día ${ccEur(eq.coste_diario)}`}</div></button>`;
  // Capital parado
  const capCard=`<button class="cc-card" onclick="irA_capitalParado()">
    <div class="cc-label">Capital parado</div>
    <div class="cc-kpi">${ccEur(cp.valor_total)}</div>
    <div class="cc-mini">Sin rotación ${ccEur(cp.sin_rotacion_eur)} · a caducar ${ccEur(cp.en_caducidad_eur)}${cp.dias_medios_stock!=null?` · ${cp.dias_medios_stock} días de stock`:""}</div></button>`;
  // Objetivos (mini barras)
  const objCard=`<button class="cc-card cc-wide" onclick="irA_objetivos()">
    <div class="cc-label">Objetivos</div>
    ${obj.length?obj.slice(0,4).map(o=>ccObjBar(o)).join(""):`<div class="cc-mini">Añade objetivos para medir el avance real del negocio.</div>`}</button>`;
  // Copiloto
  const copCard=`<div class="cc-card cc-wide">
    <div class="cc-label">Copiloto</div>
    ${cop.length?cop.map(c=>`<button class="cc-insight ${c.severidad}" onclick="${c.accion&&c.accion.handler?c.accion.handler+'()':''}">${esc(c.texto)}</button>`).join(""):`<div class="cc-mini">Todo en orden. El copiloto avisará cuando haya algo que decidir.</div>`}</div>`;

  return `${ccFiltroHTML()}
    <div class="cc-grid">
      ${saludCard}${benCard}${costeCard}${valorCard}${tesCard}${deudaCard}${equipoCard}${opCard}${capCard}
    </div>
    ${objCard}
    ${copCard}
    <div class="section-label" style="margin-top:16px;">Más detalle</div>
    <div class="cc-links">
      <button class="cc-link cc-link-wide" onclick="irA_timeline()">Línea temporal · pasado, presente y futuro</button>
      <button class="cc-link" onclick="irA_panel()">Análisis y tendencias</button>
      <button class="cc-link" onclick="irA_costesFijos()">Costes fijos</button>
      <button class="cc-link" onclick="irA_activos()">Activos</button>
      <button class="cc-link" onclick="irA_calendarioEmpresa()">Calendario</button>
      <button class="cc-link cc-link-wide" onclick="irA_maquinaTiempo()">¿Cómo estaba mi empresa?</button>
    </div>`;
}
function ccObjBar(o){
  const pct=o.progreso_pct!=null?o.progreso_pct:0;
  const val=o.unidad==='pct'?`${o.real!=null?o.real:'—'}% / ${o.objetivo}%`:`${o.real!=null?eur0(o.real):'—'} / ${eur0(o.objetivo)}${o.unidad==='eur'?' €':''}`;
  const estado=o.cumple==null?'neutro':(o.cumple?'bien':'mal');
  return `<div class="cc-obj"><div class="cc-obj-top"><span>${esc(o.label)}</span><span class="cc-obj-val">${val}</span></div>
    <div class="cc-obj-track"><div class="cc-obj-fill cc-fill-${estado}" style="width:${Math.min(100,pct)}%"></div></div></div>`;
}

function irA_salud(){
  ccVolver(); openSection("cc-salud","Salud del negocio");
  const d=window._ccData; if(!d){ irA_centroControl(); return; }
  const s=d.salud||{}; const fc=(d.inteligencia&&d.inteligencia.salud_forecast)||{};
  // Categorías con barra (las que tienen score; las neutras se listan aparte).
  const cats=(s.categorias||[]).filter(c=>c.score!=null);
  const neutras=(s.categorias||[]).filter(c=>c.score==null&&c.peso>0);
  const catBar=c=>{ const est=c.estado==='bien'?'bien':(c.estado==='regular'?'neutro':'mal');
    return `<div class="cc-obj"><div class="cc-obj-top"><span>${esc(c.label)}</span><span class="cc-obj-val">${c.score}/100 · peso ${c.peso}</span></div>
      <div class="cc-obj-track"><div class="cc-obj-fill cc-fill-${est}" style="width:${c.score}%"></div></div></div>`; };
  const delta=s.delta!=null&&s.delta!==0?`<div class="cc-mini">${s.delta>=0?'▲ +':'▼ −'}${Math.abs(s.delta)} vs periodo anterior${s.mayor_deterioro?` · peor: ${esc(s.mayor_deterioro.label)}`:''}${s.mayor_mejora?` · mejor: ${esc(s.mayor_mejora.label)}`:''}</div>`:"";
  const fcLine=(fc&&fc.disponible)?`<div class="cc-mini cc-accent">Previsión a 30 días: ${Math.round(fc.valor_horizonte)}/100 (confianza ${fc.confianza!=null?Math.round(fc.confianza*100):'—'}%)</div>`:"";
  const riesgos=(s.riesgos&&s.riesgos.length)?`<div class="section-label">Riesgos priorizados</div>`+
    s.riesgos.map(r=>`<div class="cc-card"><div class="cc-line"><span>${ccEstadoDot(r.nivel==='alto'?'mal':(r.nivel==='medio'?'neutro':'bien'))}${esc(r.explicacion)}</span><b>${r.nivel}</b></div>
      <div class="cc-mini">${esc(r.accion)} · probabilidad ${Math.round(r.probabilidad*100)}% · impacto ${Math.round(r.impacto*100)}%</div></div>`).join(""):"";
  const señales=(s.señales||[]).filter(x=>x.real).map(x=>`<div class="cc-line">${ccEstadoDot(x.estado)}<span>${esc(x.texto)}</span><b>${x.score}</b></div>`).join("");
  const neutrasTxt=neutras.length?`<div class="cc-mini" style="margin-top:6px;">Sin datos aún: ${neutras.map(c=>esc(c.label)).join(", ")}.</div>`:"";
  setInner(`<div class="cc-card cc-hero-single"><div class="cc-label">Salud del negocio</div>
      <div class="cc-kpi cc-big">${s.score!=null?s.score:'—'}<span class="cc-score-max">/100</span></div>${delta}${fcLine}</div>
    <div class="section-label">Salud por categoría</div>
    <div class="cc-card">${cats.length?cats.map(catBar).join(""):'<div class="cc-mini">Aún no hay datos suficientes por categoría.</div>'}${neutrasTxt}
      <div class="cc-mini" style="margin-top:8px;"><button class="btn-ghost" style="padding:2px 8px" onclick="irA_saludPesos()">Ajustar pesos</button></div></div>
    ${riesgos}
    <div class="section-label">Qué mira la nota</div><div class="cc-card">${señales}</div>`);
}
// Ajuste de los pesos de cada categoría (nunca hardcodeados).
async function irA_saludPesos(){
  ccVolver(); window._backOverride=()=>irA_salud(); openSection("cc-salud-pesos","Pesos de la salud");
  try{
    const d=await api("/business-health/config");

// ── LÍNEA TEMPORAL FINANCIERA · pasado, presente y futuro ──────────────────
// Un solo gráfico, muchas métricas. Historia sólida + previsión discontinua +
// anomalías marcadas. Responde "¿cuánto tendré en X días?" y "¿cuándo me quedo
// sin caja?" leyendo de los motores timeline/forecast/anomaly.
const TL_HORIZONTES=[[7,"7 días"],[30,"30 días"],[90,"90 días"],[180,"180 días"],[365,"1 año"]];
async function irA_timeline(metric, horizon){
  ccVolver(); openSection("cc-timeline","Línea temporal");
  window._tlMetric=metric||window._tlMetric||"patrimonio_neto";
  window._tlHorizon=horizon||window._tlHorizon||30;
  setInner(`<div class="empty" style="padding:30px 0;">Cargando la línea temporal…</div>`);
  try{
    const d=await api(`/executive-dashboard/timeline?metric=${encodeURIComponent(window._tlMetric)}&horizon=${window._tlHorizon}`);
    window._tlData=d;
    setInner(tlRender(d));
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}
function tlRender(d){
  const chips=(d.metricas||[]).map(m=>`<button class="cc-chip${m.key===d.metric?' on':''}" onclick="irA_timeline('${m.key}',${window._tlHorizon})">${esc(m.label)}</button>`).join("");
  const hchips=TL_HORIZONTES.map(([h,l])=>`<button class="cc-chip${h===d.horizon?' on':''}" onclick="irA_timeline('${d.metric}',${h})">${l}</button>`).join("");
  const del=d.delta||{}; const fc=d.forecast||{};
  const esEur=!(d.metric==="salud"||d.metric==="runway");
  const fmt=(v)=> v==null?"—":(esEur?ccEur(v):(d.metric==="salud"?Math.round(v)+"/100":Math.round(v)+" días"));
  const deltaTxt=(x)=> x&&x.pct!=null?`<span class="cc-delta ${x.abs>=0?'up':'down'}">${x.abs>=0?'▲ +':'▼ −'}${Math.abs(x.pct)}%</span>`:"";
  if(!(d.serie&&d.serie.length)){
    return `<div class="cc-filtro">${chips}</div>
      <div class="empty" style="padding:24px 0;">Aún no hay histórico suficiente. La línea temporal se construye con un snapshot diario: vuelve en unos días para ver tendencias y previsión.</div>`;
  }
  const chart=svgTimeline(d.serie, fc&&fc.serie, d.anomalies, {eur:esEur});
  const titular=fc&&fc.disponible
    ? `<div class="cc-card"><div class="cc-label">Previsión · ${d.horizon} días</div>
        <div class="cc-kpi">${fmt(fc.valor_horizonte)}</div>
        <div class="cc-mini">Hoy ${fmt(fc.valor_actual)} · velocidad ${fmt(fc.velocidad_dia)}/día · confianza ${fc.confianza!=null?Math.round(fc.confianza*100)+'%':'—'}</div></div>`
    : `<div class="cc-card"><div class="cc-mini">Previsión disponible con al menos 3 días de histórico.</div></div>`;
  const rw=d.runway_caja;
  const rwLine=(rw&&rw.disponible&&rw.en_riesgo)?`<div class="cc-card"><div class="cc-mini cc-accent">Al ritmo actual te quedarás sin caja en ${rw.dias_hasta_cero} días (aprox. ${rw.fecha_estimada}).</div></div>`:"";
  const deltas=del.disponible?`<div class="cc-card">
      <div class="cc-line"><span>Hoy vs ayer</span><b>${fmt(del.dia&&del.dia.actual)} ${deltaTxt(del.dia)}</b></div>
      <div class="cc-line"><span>Semana</span><b>${deltaTxt(del.semana)||'—'}</b></div>
      <div class="cc-line"><span>Mes</span><b>${deltaTxt(del.mes)||'—'}</b></div>
      <div class="cc-line"><span>Tendencia</span><b>${del.tendencia}</b></div></div>`:"";
  const anoms=(d.anomalies&&d.anomalies.length)?`<div class="section-label">Anomalías detectadas</div>`+
    d.anomalies.map(a=>`<div class="cc-card"><div class="cc-line"><span>${ccEstadoDot(a.preocupante?'mal':'bien')}${esc(a.explicacion)}</span><b>${a.severidad}</b></div>
      <div class="cc-mini">${esc(a.accion)} · confianza ${Math.round(a.confianza*100)}%</div></div>`).join(""):"";
  return `<div class="cc-filtro">${chips}</div>
    <div class="cc-card" style="padding:10px 8px;">${chart}</div>
    <div class="cc-filtro" style="margin-top:10px;">${hchips}</div>
    ${titular}${rwLine}${deltas}${anoms}
    <div class="cc-mini" style="margin-top:10px;">Línea sólida = histórico real · línea discontinua = previsión.</div>`;
}
// SVG monocromo: historia sólida + previsión discontinua + puntos de anomalía.
function svgTimeline(hist, fc, anomalies, opts){
  opts=opts||{};
  const W=320,H=140,pad=8;
  const all=hist.concat((fc||[]).map(p=>({fecha:p.fecha,x:p.x,valor:p.valor})));
  if(!all.length) return "";
  const xs=all.map(p=>p.x), ys=all.map(p=>p.valor);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const spanX=(maxX-minX)||1, spanY=(maxY-minY)||1;
  const px=x=>pad+((x-minX)/spanX)*(W-2*pad);
  const py=v=>H-pad-((v-minY)/spanY)*(H-2*pad);
  const path=pts=>pts.map((p,i)=>`${i?'L':'M'}${px(p.x).toFixed(1)},${py(p.valor).toFixed(1)}`).join(" ");
  const histPath=path(hist);
  const bridge=(hist.length&&fc&&fc.length)?[hist[hist.length-1]].concat(fc):[]; // conecta historia con previsión
  const fcPath=bridge.length?path(bridge):"";
  const anomSet=new Set((anomalies||[]).map(a=>a.fecha));
  const dots=hist.filter(p=>anomSet.has(p.fecha)).map(p=>`<circle cx="${px(p.x).toFixed(1)}" cy="${py(p.valor).toFixed(1)}" r="3.2" fill="#D62A1C"/>`).join("");
  const zero=(minY<0&&maxY>0)?`<line x1="${pad}" y1="${py(0).toFixed(1)}" x2="${W-pad}" y2="${py(0).toFixed(1)}" stroke="var(--line)" stroke-dasharray="2,3"/>`:"";
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" preserveAspectRatio="none" style="display:block;">
    ${zero}
    <path d="${histPath}" fill="none" stroke="var(--ink)" stroke-width="2" stroke-linejoin="round"/>
    ${fcPath?`<path d="${fcPath}" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="4,3"/>`:""}
    ${dots}
  </svg>`;
}

const PREV_DIAS=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
async function irA_prevision(wd){
  openSection("prevision","Previsión del día");
  if(wd==null) wd=new Date().getDay();
  window._prevWd=wd;
  setInner(`<div class="empty">Calculando previsión…</div>`);
  try{
    const p=await api("/prevision?weekday="+wd);
    window._prev=p;
    renderPrevision();
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}
function prevDia(wd){ irA_prevision(wd); }
function renderPrevision(){
  const p=window._prev; if(!p) return;
  const hoy=new Date().getDay();
  // Selector de día de la semana (L M X J V S D, empezando en lunes).
  const orden=[1,2,3,4,5,6,0];
  const chips=orden.map(d=>{
    const activo=d===p.weekday, esHoy=d===hoy;
    const lbl=["D","L","M","X","J","V","S"][d];
    return `<button onclick="prevDia(${d})" style="border:1px solid ${activo||esHoy?'var(--ink)':'var(--line)'};border-radius:7px;padding:7px 11px;margin:2px;font-family:var(--sans);font-size:12px;font-weight:${activo?700:600};background:${activo?'var(--ink)':'var(--paper)'};color:${activo?'var(--cream)':'var(--ink)'};cursor:pointer;">${lbl}</button>`;
  }).join("");
  const conf = p.semanas_datos>=3?"buena":(p.semanas_datos>=1?"aprendiendo":"sin datos");
  let html=`<div style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:10px;">${chips}</div>
    <div class="section-label">${esc(p.dia)} · ventas estimadas</div>
    <div class="card-meta" style="margin-bottom:8px;">Basado en <b style="color:var(--ink);">${p.semanas_datos}</b> semana(s) de ventas reales · fiabilidad <b style="color:var(--ink);">${conf}</b>. Cuantas más semanas, más precisa.</div>`;
  // Estimación por producto
  if(p.estimacion.length){
    html+=`<div class="card">${p.estimacion.map(e=>`<div class="card-meta">· <b style="color:var(--ink);">${esc(e.producto)}</b> — ${e.unidades_estimadas} uds ${e.semanas<2?`<span class="tag-ink">pocos datos</span>`:""}</div>`).join("")}</div>`;
  }else{
    html+=`<div class="empty" style="padding:14px;">Aún no hay ventas de este día para estimar. En cuanto Ágora acumule semanas, aparecerá aquí.</div>`;
  }
  // Qué producir
  html+=`<div class="section-label">Qué producir para cubrir el día</div>`;
  html+= p.produccion.length ? p.produccion.map(pr=>`
    <div class="dec-act">
      <div class="dec-act-top"><span class="dec-act-title">${esc(pr.nombre)}</span>
        <button class="dec-act-btn" onclick="iniciarYAbrir('${pr.receta_id}',${Math.ceil(pr.producir)},this)">EMPEZAR</button></div>
      <div class="dec-act-sub">Producir ≈${pr.producir} ${esc(pr.unidad)} para cubrir la venta estimada de ${esc(pr.para_materia)}</div>
    </div>`).join("") : `<div class="todo-clear">✓ Con el stock actual cubres la estimación del día.</div>`;
  // Qué faltaría (materias)
  const faltan=(p.materias||[]).filter(m=>m.falta>0);
  html+=`<div class="section-label">Qué te faltaría para llegar a la estimación</div>`;
  html+= faltan.length ? faltan.map(m=>`
    <div class="card">
      <div class="card-name">${esc(m.nombre)} <span class="tag-ink">faltan ${m.falta} ${esc(m.unidad)}</span></div>
      <div class="card-meta">Necesario ${m.demanda} ${esc(m.unidad)} · tienes ${m.disponible} ${esc(m.unidad)}</div>
    </div>`).join("") : `<div class="todo-clear">✓ Tienes stock para todo lo estimado.</div>`;
  setInner(html);
}

// Pantalla previa estilo Aesop: prepara todo antes de empezar. No se puede

// "Todo preparado": crea la preparación y arranca el paso a paso.
async function comenzarProduccion(rid, cantidad, btn){
  if(btn){ btn.disabled=true; btn.textContent="Comenzando…"; }
  try {
    const p = await api("/preparaciones",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({receta_id:rid,cantidad_objetivo:cantidad,responsable:(getUser()&&getUser().nombre)||"Sin asignar"})});

    pintarWizard(p);

async function abrirWizard(id) {
  try {
    const todas = await api("/preparaciones?estado=En curso");
    const p = todas.find(x=>x.id===id);
    if(!p){alert("No encontrada.");return;}
    pintarWizard(p);

function cerrarWizard() {
  el("wizard-root").innerHTML="";
  document.body.style.overflow="";
  if(currentSection==="preparaciones") irA_preparaciones();
  else loadHome();
}

function pintarWizard(p) {
  const total=p.pasos.length, actual=p.paso_actual;
  const pct=Math.round((actual/total)*100);
  if(actual>=total){
    el("wizard-root").innerHTML=`
      <div class="wizard-overlay">
        <div class="wiz-bar"><div class="wiz-bar-fill" style="width:100%"></div></div>
        <div class="wiz-top"><span class="wiz-step">Completado</span><button class="wiz-close" onclick="cerrarWizard()">Cerrar</button></div>
        <div class="wiz-body">
          <div class="wiz-done">Preparación finalizada</div>
          <div class="wiz-done-meta">${p.nombre_receta} · ${p.cantidad_objetivo} g · ${p.responsable}</div>
          <button class="wiz-ok" onclick="finalizarPrep('${p.id}')">Crear lote</button>
        </div>
      </div>`;
    return;
  }
  const paso=p.pasos[actual];
  const esIng=paso.tipo==="ingrediente";
  el("wizard-root").innerHTML=`
    <div class="wizard-overlay">
      <div class="wiz-bar"><div class="wiz-bar-fill" style="width:${pct}%"></div></div>
      <div class="wiz-top">
        <span class="wiz-step">Paso ${actual+1} de ${total}</span>
        <button class="wiz-close" onclick="cerrarWizard()">Cerrar</button>
      </div>
      <div class="wiz-body">
        <div class="wiz-recipe">${p.nombre_receta}</div>
        <div class="wiz-action">${paso.texto}</div>
        ${esIng?`<div class="wiz-num">${paso.cantidad}</div><div class="wiz-unit">${paso.unidad}</div>`:""}
      </div>
      <div class="wiz-footer">
        <button class="wiz-ok" onclick="confirmarPaso('${p.id}')">OK — Siguiente</button>
      </div>
    </div>`;
}

async function confirmarPaso(id){
  try{const p=await api(`/preparaciones/${id}/confirmar-paso`,{method:"POST"});pintarWizard(p);}
  catch(e){alert(e.message);}
}

async function finalizarPrep(id){
  if(!bloqueaDoble("finalizar-"+id)) return;
  const u=getUser(); const resp=encodeURIComponent(u?u.nombre:"");
  // Abrimos la ventana YA (dentro del clic) para que el móvil no la bloquee;
  // luego la redirigimos a la etiqueta del lote recién creado.
  const w=window.open("","_blank");
  try{
    const d=await api(`/preparaciones/${id}/finalizar`,{method:"POST"});
    const loteId=(d.lote&&d.lote.id)||(d.etiqueta&&d.etiqueta.lote_id);
    if(loteId&&w){ w.location.href=`/etiqueta/lote/${loteId}?print=1&usuario=${resp}&responsable=${resp}`; }
    else if(w){ w.close(); }
    cerrarWizard();
  }catch(e){ if(w)w.close(); alert(e.message); }
  finally{ liberaDoble("finalizar-"+id); }
}

    if(caducados) strip+=`<div style="background:#D62A1C;color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;border-radius: 3px;padding:11px 14px;margin-bottom:10px;">${caducados} ${caducados===1?"lote caducado · no debe usarse":"lotes caducados · no deben usarse"}</div>`;
    if(proximos) strip+=`<div style="background:#f6ecd5;color:#7a5a1e;font-family:var(--sans);font-size:13px;font-weight:600;border-radius: 3px;padding:11px 14px;margin-bottom:10px;">${proximos} ${proximos===1?"lote próximo a caducar":"lotes próximos a caducar"}</div>`;
    const orden={"Requiere atención":0,"Priorizar uso":1,"Correcto":2,"Fuera de servicio":3};
    // Caducados primero, luego por estado, luego por tiempo restante.
    const sorted=lotes.slice().sort((a,b)=>
      (b.caducado?1:0)-(a.caducado?1:0)
      || (orden[a.estado]??9)-(orden[b.estado]??9)
      || ((a.horas_restantes??1e9)-(b.horas_restantes??1e9)));
    setInner(strip+section("Todos los lotes", sorted, l=>`
      <div class="card clickable" role="button" tabindex="0" onclick="verLote('${l.id}')">
        <div class="card-name">${l.codigo} — ${l.nombre||""}${l.caducado?'<span class="badge-low">Caducado</span>':''}</div>
        <div class="card-meta">${l.ubicacion} · ${l.cantidad_restante}/${l.cantidad_inicial} g · ${l.estado} · ${l.caducado?"Fuera de plazo":l.horas_restantes+" h restantes"}</div>
      </div>`,"No hay lotes registrados."));
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// Registrar consumo real de un lote (uso en servicio). Descuenta de lo que queda.
async function registrarConsumoLote(id,restante){
  const v=prompt(`¿Cuánto se ha consumido de este lote?  (quedan ${restante})`);
  if(v==null) return;
  const cant=Number(String(v).replace(",","."));
  if(!Number.isFinite(cant)||cant<=0){ alert("Pon una cantidad válida."); return; }
  if(!bloqueaDoble("consumo-"+id)) return;
  try{
    await api(`/lotes/${id}/consumo`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cantidad:cant,origen:"manual"})});
    cerrarFicha(); irA_lotes();
  }catch(e){ alert(e.message); }
  finally{ liberaDoble("consumo-"+id); }
}

// ── ALMACÉN · jerarquía de 3 niveles (macro → subcategoría → producto) ─────
// La taxonomía es la misma que en el backend (única fuente de verdad).
const ALM_TAXONOMIA={
  "Materia Prima":["Café, Matcha y Té","Lácteos y Bebidas Vegetales","Proteínas","Vegetales y Fruta","Panadería y Bollería","Seco y Despensa","Congelado"],
  "Elaboraciones":["Cremas","Salsas","Producciones Cocina","Producciones Barra"],
  "Bebidas Terminadas":["Refrescos","Zumos","RTD M de Materia","Alcohol"],
  "Consumibles":["Packaging","Vasos y Tapas","Etiquetas","Servilletas","Material Oficina"],
  "Limpieza y APPCC":["Químicos","Desechables","APPCC","Uniformidad"],
};
const ALM_MACROS=Object.keys(ALM_TAXONOMIA);

function almBadge(crit,ped){
  if(crit) return `<span class="alm-badge crit">${crit} crítico${crit>1?"s":""}</span>`;
  if(ped) return `<span class="alm-badge pedir">${ped} por pedir</span>`;
  return "";
}

// NIVEL 1 — macrocategorías (pantalla principal minimalista) + búsqueda global.
async function irA_materias(){
  navReset(); // raíz del almacén: la pila de "atrás" empieza limpia aquí
  openSection("materias","Almacén");
  try{
    const data=await api("/materias/arbol");
    window._almArbol=data;
    const cards=data.macros.map(mc=>`
      <button class="alm-macro" onclick="irA_almMacro('${encodeURIComponent(mc.macro)}')">
        <span class="alm-macro-name">${esc(mc.macro)}</span>
        <span class="alm-macro-meta">${mc.total} ${mc.total===1?"producto":"productos"}</span>
        ${almBadge(mc.criticos,mc.por_pedir)}
        <span class="alm-go">→</span>
      </button>`).join("");
    setInner(`
      <input id="alm-q" class="mat-q" placeholder="Buscar en todo el almacén…" oninput="almBuscarGlobal(this.value)">
      <div id="alm-search"></div>
      <div id="alm-macros">
        <div class="alm-grid">${cards}</div>
        <div class="alm-actions"><button class="btn-ghost" onclick="formProducto()">+ Nuevo producto</button></div>
      </div>`);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// Búsqueda global instantánea (nombre, código, ubicación o proveedor).
let _almSearchT=null;
async function almBuscarGlobal(q){
  const macros=el("alm-macros"), out=el("alm-search");
  if(!out) return;
  if(!q||!q.trim()){ if(macros)macros.style.display=""; out.innerHTML=""; return; }
  if(macros) macros.style.display="none";
  clearTimeout(_almSearchT);
  _almSearchT=setTimeout(async()=>{
    try{
      const items=await api("/materias?q="+encodeURIComponent(q.trim()));
      out.innerHTML=`<div class="section-label">Resultados · ${items.length}</div>`+
        (items.length?items.map(almFila).join(""):'<div class="empty">Nada coincide. Prueba otro nombre o ubicación.</div>');
    }catch(e){ out.innerHTML=`<div class="err">${e.message}</div>`; }
  },160);
}

// NIVEL 2 — subcategorías de una macrocategoría.
async function irA_almMacro(macroEnc, fromBack){
  if(!fromBack) navInto(()=>irA_materias());
  const macro=decodeURIComponent(macroEnc);
  openSection("alm-macro","Almacén · "+macro);
  try{
    if(!window._almArbol) window._almArbol=await api("/materias/arbol");
    const mc=window._almArbol.macros.find(x=>x.macro===macro);
    const subs=(mc?mc.subcategorias:[]).map(s=>`
      <button class="alm-sub${s.total?"":" alm-sub-empty"}" onclick="irA_almSub('${encodeURIComponent(macro)}','${encodeURIComponent(s.subcategoria)}')">
        <span class="alm-sub-name">${esc(s.subcategoria)}</span>
        <span class="alm-sub-right">${almBadge(s.criticos,s.por_pedir)}<span class="alm-sub-meta">${s.total}</span><span class="alm-go">→</span></span>
      </button>`).join("");
    setInner(`<button class="btn-ghost" onclick="irA_materias()">← Almacén</button>
      <div class="section-label">${esc(macro)}</div>
      <div class="alm-sublist">${subs}</div>`);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// NIVEL 3 — productos de una subcategoría: buscador + filtros + semáforo.
async function irA_almSub(macroEnc, subEnc, fromBack){
  if(!fromBack) navInto(()=>irA_almMacro(macroEnc, true));
  const macro=decodeURIComponent(macroEnc), sub=decodeURIComponent(subEnc);
  openSection("alm-sub","Almacén · "+sub);
  try{
    const items=await api(`/materias?macro=${encodeURIComponent(macro)}&sub=${encodeURIComponent(sub)}`);
    window._almSub={macro,sub,items,filtro:"todos",q:""};
    renderAlmSub();
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}
function renderAlmSub(){
  const s=window._almSub; if(!s) return;
  setInner(`<button class="btn-ghost" onclick="irA_almMacro('${encodeURIComponent(s.macro)}')">← ${esc(s.macro)}</button>
    <div class="section-label">${esc(s.sub)}</div>
    <input id="alm-subq" class="mat-q" placeholder="Buscar o por ubicación…" oninput="window._almSub.q=this.value;renderAlmSubList()">
    <div id="alm-subchips"></div>
    <div id="alm-sublist"></div>
    <div class="alm-actions"><button class="btn-ghost" onclick="formProducto(null,'${encodeURIComponent(s.macro)}','${encodeURIComponent(s.sub)}')">+ Nuevo producto aquí</button></div>`);
  const q=el("alm-subq"); if(q) q.value=s.q||"";
  renderAlmSubChips(); renderAlmSubList();
}
function renderAlmSubChips(){
  const s=window._almSub; if(!s) return;
  const crit=s.items.filter(m=>m.estado_stock==="critico").length;
  const ped=s.items.filter(m=>m.estado_stock==="por_pedir").length;
  el("alm-subchips").innerHTML=`<div class="chips">
    <button class="chip ${s.filtro==='todos'?'on':''}" onclick="window._almSub.filtro='todos';renderAlmSubChips();renderAlmSubList()">Todos · ${s.items.length}</button>
    <button class="chip ${s.filtro==='critico'?'on':''}" onclick="window._almSub.filtro='critico';renderAlmSubChips();renderAlmSubList()">Crítico · ${crit}</button>
    <button class="chip ${s.filtro==='por_pedir'?'on':''}" onclick="window._almSub.filtro='por_pedir';renderAlmSubChips();renderAlmSubList()">Por pedir · ${ped}</button>
  </div>`;
}
function renderAlmSubList(){
  const s=window._almSub; if(!s) return;
  let items=s.items.slice();
  if(s.filtro!=="todos") items=items.filter(m=>m.estado_stock===s.filtro);
  if(s.q){ const q=s.q.toLowerCase(); items=items.filter(m=>(m.nombre||"").toLowerCase().includes(q)||(m.ubicacion||"").toLowerCase().includes(q)||(m.codigo_interno||"").toLowerCase().includes(q)); }
  const ord={critico:0,por_pedir:1,correcto:2};
  items.sort((a,b)=>((ord[a.estado_stock]??9)-(ord[b.estado_stock]??9))||(a.nombre||"").localeCompare(b.nombre||""));
  el("alm-sublist").innerHTML=items.map(almFila).join("")||'<div class="empty">Nada por aquí con ese filtro.</div>';
}

async function irA_revisiones(){
  openSection("revisiones","Revisiones");
  try{
    const [tipos,revs]=await Promise.all([api("/revisiones/tipos"),api("/revisiones")]);
    const hoy=new Date().toDateString();
    const deHoy=revs.filter(r=>new Date(r.fecha).toDateString()===hoy);
    let html=`<div class="section-label">Revisiones de hoy</div>`;
    html+=tipos.map(t=>{
      const reg=deHoy.filter(r=>r.tipo===t.tipo).slice(-1)[0];
      if(reg?.estado==="Correcto") return card(t.tipo,`${reg.valor} · registrado`);
      if(reg&&reg.estado!=="Correcto") return card(
        t.tipo,`${reg.valor} · ${reg.estado}${reg.accion_correctiva?" · "+reg.accion_correctiva:""}`,
        `<button class="btn-primary" onclick="resolverRev('${reg.id}',irA_revisiones)">Marcar revisado</button>`);
      if(t.clase==="temperatura") return `
        <div class="card">
          <div class="card-name">${t.tipo}</div>
          <div class="field" style="margin-top:10px;">
            <label>Temperatura en ${t.unidad}</label>
            <input type="number" step="0.1" id="rev_${t.tipo.replace(/\s/g,"_")}" style="width:110px;">
          </div>
          <div class="card-actions">
            <button class="btn-ghost" onclick="regRev('${t.tipo}',document.getElementById('rev_${t.tipo.replace(/\s/g,"_")}').value)">Registrar</button>
          </div>
        </div>`;
      return card(t.tipo,"",`<button class="btn-ghost" onclick="regRev('${t.tipo}','Realizada')">Marcar realizada</button>`);
    }).join("");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function regRev(tipo,valor){
  if(!valor){alert("Introduce un valor.");return;}
  try{
    await api("/revisiones/registrar",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo,valor,responsable:(getUser()&&getUser().nombre)||"Sin asignar"})});
    irA_revisiones();
  }catch(e){alert(e.message);}
}

async function resolverRev(id,cb){
  try{await api(`/revisiones/${id}/resolver`,{method:"POST"});cb();}
  catch(e){alert(e.message);}
}

            ${mat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Cantidad</label><input type="number" inputmode="decimal" id="aj-cant" style="width:130px;"></div>
        <div class="field">
          <label>Motivo</label>
          <div class="toggle-row" id="aj-motivos">
            ${motivos.map(m=>`<button class="toggle" onclick="ajMotivo('${m}',this)">${m}</button>`).join("")}
          </div>
        </div>
        <div class="field"><label>Observación (opcional)</label><input type="text" id="aj-obs" style="width:100%;"></div>
        <div class="card-actions"><button class="btn-primary" onclick="regAjuste()">Registrar ajuste</button></div>
      </div>`;
    const nombreObjetivo=a=>{
      if(a.objetivo_nombre) return a.objetivo_nombre;
      if(a.tipo_objetivo==="materia"){ const m=mat.find(x=>x.id===a.objetivo_id); return m?m.nombre:a.objetivo_id; }
      const l=lotes.find(x=>x.id===a.objetivo_id); return l?l.codigo:a.objetivo_id;
    };
    html+=section("Historial reciente",hist.slice(0,6),a=>card(
      `${nombreObjetivo(a)} — ${a.cantidad}`,
      `${a.motivo} · ${a.coste_estimado.toFixed(2)} € · ${a.responsable} · ${fmt(a.fecha)}`
    ),"Sin ajustes.");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

function ajTipo(t){
  _aj.tipo=t;_aj.objetivoId=null;
  el("aj-m").classList.toggle("on",t==="materia");
  el("aj-l").classList.toggle("on",t==="lote");
  el("aj-ol").textContent=t==="materia"?"Materia":"Lote";
  const ops=t==="materia"
    ?window._ajMat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`)
    :window._ajLotes.map(l=>`<option value="${l.id}">${l.codigo} — ${l.nombre} (${l.cantidad_restante} restantes)</option>`);
  el("aj-obj").innerHTML=`<option value="">Selecciona…</option>${ops.join("")}`;
}

function ajMotivo(m,btn){
  _aj.motivo=m;
  document.querySelectorAll("#aj-motivos .toggle").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
}

async function regAjuste(){
  const obj=el("aj-obj").value,cant=Number(el("aj-cant").value),obs=el("aj-obs").value;
  if(!obj){alert("Selecciona materia o lote.");return;}
  if(!cant||cant<=0){alert("Cantidad inválida.");return;}
  if(!_aj.motivo){alert("Selecciona un motivo.");return;}
  try{
    await api("/ajustes",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo_objetivo:_aj.tipo,objetivo_id:obj,cantidad:cant,motivo:_aj.motivo,observacion:obs,responsable:(getUser()&&getUser().nombre)||"Sin asignar"})});
    irA_ajustes();
  }catch(e){alert(e.message);}
}

// ── PROVEEDORES ───────────────────────────────────────
const PROV_EST_COLOR={ "Activo":"var(--olive)", "Pausado":"var(--muted)", "Sustituido":"var(--alert)" };
async function irA_proveedores(){
  navReset(); // raíz de Proveedores
  openSection("proveedores","Proveedores");
  try{
    const [provs,meta]=await Promise.all([api("/proveedores"),api("/proveedores/meta")]);
    window._provMeta=meta;
    const cab=`<div class="card-actions" style="margin-bottom:14px;"><button class="btn-primary" onclick="formProveedor()">Agregar proveedor</button></div>`;
    if(!provs.length){ setInner(cab+`<div class="empty">Aún no hay proveedores. Pulsa “Agregar proveedor” para crear el primero.</div>`); return; }
    // Orden: activos primero, luego por nombre.
    provs.sort((a,b)=> (a.estado==="Activo"?0:1)-(b.estado==="Activo"?0:1) || a.nombre.localeCompare(b.nombre));
    const html=cab+provs.map(p=>{
      const tel=(p.telefono||p.whatsapp||"").replace(/[^0-9+]/g,"");
      const estado=p.estado||"Activo";
      const meta2=[p.categoria||"Otros", p.contacto||"", (p.productos_nombres||[]).slice(0,3).join(", ")].filter(Boolean).join(" · ");
      const acc=`<button class="btn-primary" onclick="irA_productosProveedor('${p.id}')">Productos</button>`+
        `<button class="btn-ghost" onclick="formProveedor('${p.id}')">Editar</button>`+
        (tel?`<button class="btn-ghost" onclick="whatsapp('${tel}','${encodeURIComponent("Hola "+(p.contacto||"")+", ")}')">WhatsApp</button>`:"");
      return `<div class="card">
        <div class="card-name">${p.nombre} <span style="font-size:10px;font-weight:700;color:${PROV_EST_COLOR[estado]||"var(--muted)"};letter-spacing:.06em;text-transform:lowercase;">· ${estado}</span></div>
        <div class="card-meta">${meta2}</div>
        <div class="card-actions">${acc}</div>
      </div>`;
    }).join("");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function guardarProveedor(btn){
  const msg=el("pv-msg");
  const body={
    nombre:el("pv-nombre").value.trim(),
    categoria:el("pv-cat").value,
    contacto:el("pv-contacto").value.trim(),
    telefono:el("pv-tel").value.trim(),
    email:el("pv-email").value.trim(),
    direccion:el("pv-dir").value.trim(),
    estado:el("pv-estado").value,
    notas:el("pv-notas").value.trim(),
  };
  if(window._provFoto!==undefined && window._provFoto!==null) body.foto_url=window._provFoto; // "" borra, dataURL nueva
  if(!body.nombre){ if(msg) msg.textContent="Revísalo antes de continuar: indica el nombre del proveedor."; return; }
  if(btn){btn.disabled=true;}

const eur4=(n)=>Number(n||0).toFixed(2);

  navInto(()=>irA_proveedores()); // "atrás" vuelve a la lista de proveedores
  openSection("prov-productos","Productos del proveedor");
  try{
    const [prov,prods,meta]=await Promise.all([
      api("/proveedores/"+provId),
      api("/compras-productos?proveedor_id="+provId),
      api("/compras-productos/meta"),
    ]);
    window._cprMeta=meta; window._cprProv=prov;
    const cab=`<div class="section-label">${esc(prov.nombre)}</div>
      <div class="card-actions" style="margin-bottom:14px;">
        <button class="btn-primary" onclick="formProductoCompra('${provId}')">Agregar producto</button>
        <button class="btn-ghost" onclick="irA_proveedores()">← Proveedores</button>
      </div>`;

      ${(p.alergenos&&p.alergenos.length)?`<div class="card-meta" style="color:var(--alert)">Alérgenos: ${p.alergenos.map(esc).join(", ")}</div>`:""}

  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }

function calcPrecioProd(){
  const sin=Number(el("cp-siniva").value)||0;
  const iva=Number(el("cp-iva").value)||0;
  const cant=Number(el("cp-cant").value)||0;
  const con=sin*(1+iva/100);
  const uni=cant>0?con/cant:con;
  const out=el("cp-calc");
  if(out) out.innerHTML=`Precio con IVA: <b>${con.toFixed(2)} €</b> · Precio unitario real: <b>${uni.toFixed(4)} €</b>`;
}

async function irA_precioProducto(prodId,provId){
  openSection("prov-precio","Precio del producto");
  try{
    const [p,hist]=await Promise.all([api("/compras-productos/"+prodId),api("/compras-productos/"+prodId+"/historico")]);
    window._precProd=p; window._precProvId=provId; window._precDoc=null;
    const histHtml=hist.length?hist.map(h=>{
      const f=new Date(h.fecha).toLocaleDateString("es-ES");
      const sube=h.precio_nuevo>h.precio_anterior;
      return `<div class="card">
        <div class="card-meta">${f} · <b style="color:${sube?"var(--alert)":"var(--olive)"}">${eur4(h.precio_anterior)} € → ${eur4(h.precio_nuevo)} €</b> ${sube?"↑":"↓"}</div>

    setInner(`
      <div class="section-label">${esc(p.nombre)}</div>
      <div class="card">
        <div class="card-name">Precio pactado actual</div>
        <div class="card-meta">Sin IVA: <b>${eur4(p.precio_sin_iva)} €</b> · IVA ${p.iva||0}% · Con IVA: <b>${eur4(p.precio_con_iva)} €</b> · Unitario real: <b>${eur4(p.precio_unitario_real)} €/${esc(p.formato||"ud")}</b></div>
      </div>
      <div class="card">
        <div class="card-name">Cambiar precio</div>
        <div class="field"><label>Nuevo precio sin IVA (€)</label><input id="pr-nuevo" type="number" step="0.0001" value="${p.precio_sin_iva||0}" style="width:140px;"></div>
        <div class="field"><label>Motivo</label><input id="pr-motivo" placeholder="p. ej. Subida de proveedor" style="width:100%;"></div>
