// Tarjeta de un pedido realizado (misma info que antes, reutilizable por el buscador).
function pedidoCard(p){
  const provs=window._provPed||[];
  const prov=provs.find(x=>x.id===p.proveedor_id);
  const wa=(prov&&prov.whatsapp&&p.estado!=="recibido")?`<button class="btn-ghost" onclick="enviarPedidoWA('${p.id}')">Enviar por WhatsApp</button>`:"";
  const recibir=(p.estado!=="recibido")?`<button class="btn-primary" onclick="recibirPedido('${p.id}','${p.proveedor_id}','${esc(p.codigo)}')">Recibir</button>`:"";
  return card(
    `${esc(p.codigo)} — ${esc(p.proveedor_nombre)}`,
    `${esc(p.estado)} · ${(p.total_estimado||0).toFixed(2)} € · ${p.lineas.length} producto(s) · ${new Date(p.fecha).toLocaleDateString("es-ES")}`,
    recibir+wa,
    `<div style="font-size:10px;color:#888070;margin-top:6px;">${p.lineas.map(l=>{const pu=Number(l.precio_esperado)||0;return `${esc(l.nombre)}: ${l.cantidad} ${esc(l.unidad||"")} × ${pu.toFixed(4)} €/${esc(l.unidad||"ud")} = ${(l.cantidad*pu).toFixed(2)} €`;}).join("<br>")}</div>`
  );
}
function renderPedidosLista(list){
  const c=el("ped-lista"); if(!c) return;
  c.innerHTML=(list&&list.length)?list.map(pedidoCard).join(""):`<div class="empty">Ningún pedido coincide con la búsqueda.</div>`;
}
// Buscador de pedidos por proveedor o por artículo (nombre de producto de una línea).
function filtrarPedidos(q){
  const s=(q||"").toLowerCase().trim();
  const all=window._pedsAll||[];
  if(!s) return renderPedidosLista(all);
  const f=all.filter(p=>
    (p.proveedor_nombre||"").toLowerCase().includes(s) ||
    (p.codigo||"").toLowerCase().includes(s) ||
    (p.lineas||[]).some(l=>(l.nombre||"").toLowerCase().includes(s))
  );
  renderPedidosLista(f);
}
function renderPedidoLineas(){
  const provId=el("ped-prov").value, cont=el("ped-lineas"); if(!cont) return;
  if(!provId){cont.innerHTML="";return;}
  const prov=(window._provPed||[]).find(p=>p.id===provId);
  const aso=(prov&&prov.productos_asociados)||[];
  // Artículos de ESTE proveedor: por vínculo directo (proveedor_id) o por catálogo
  // (productos_asociados). Así aparecen también los creados al escanear un albarán.
  let mats=(window._matPed||[]).filter(m=> m.proveedor_id===provId || aso.includes(m.id));
  const soloProv=mats.length>0;
  if(!mats.length) mats=window._matPed||[]; // sin catálogo aún: muestra todo
  mats=mats.slice().sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||""));
  const rows=mats.map(m=>`<div class="ped-row" data-mat="${m.id}" data-nombre="${esc((m.nombre||"").toLowerCase())}">
      <span class="ped-name">${esc(m.nombre)}</span>
      <input class="ped-cant" type="number" inputmode="decimal" step="0.01" placeholder="0">
      <span class="ped-u">${esc(m.unidad||"")}</span>
      <input class="ped-precio" type="number" inputmode="decimal" step="0.0001" value="${m.coste_medio}" title="Precio esperado por ${esc(m.unidad||"ud")}">
      <span class="ped-u">€/${esc(m.unidad||"ud")}</span>
    </div>`).join("");
  cont.innerHTML=`<div class="section-label" style="margin-top:8px;">${soloProv?`Artículos de este proveedor · ${mats.length}`:"Productos (pon cantidad a los que pidas)"}</div>
    <input id="ped-artq" class="mat-q" placeholder="Buscar artículo de este proveedor…" oninput="buscarArticuloPedido(this.value)" style="margin:6px 0;">
    <div id="ped-artlist">${rows}</div>`;
}
// Buscador RÁPIDO dentro de los artículos del proveedor (oculta/muestra filas,
// así no se pierde la cantidad ya escrita).
function buscarArticuloPedido(q){
  const s=(q||"").toLowerCase().trim();
  document.querySelectorAll("#ped-artlist .ped-row").forEach(r=>{
    r.style.display=(!s||(r.dataset.nombre||"").includes(s))?"":"none";
  });
}
// Buscador GENERAL de artículos: dado un nombre, dice de qué proveedor es y su precio.
function buscarArticuloGlobal(q){
  const s=(q||"").toLowerCase().trim(); const out=el("ped-cat-res"); if(!out) return;
  if(!s){ out.innerHTML=""; return; }
  const items=(window._matPed||[]).filter(m=>(m.nombre||"").toLowerCase().includes(s)).slice(0,40);
  out.innerHTML=items.length?items.map(m=>`<div class="card">
      <div class="card-name">${esc(m.nombre)}</div>
      <div class="card-meta">Proveedor: <b>${esc(m.proveedor_nombre||"— sin asignar —")}</b> · ${(Number(m.coste_medio)||0).toFixed(4)} €/${esc(m.unidad||"ud")} · stock ${m.disponibilidad_actual} ${esc(m.unidad||"")}</div>
      ${m.proveedor_id?`<div class="card-actions"><button class="btn-ghost" onclick="pedirDeProveedor('${m.proveedor_id}','${m.id}')">Pedir a este proveedor</button></div>`:""}
    </div>`).join(""):`<div class="empty">Ningún artículo coincide.</div>`;
}
// Desde un resultado de la búsqueda general: selecciona el proveedor y enfoca el artículo.
function pedirDeProveedor(provId, matId){
  const sel=el("ped-prov"); if(sel){ sel.value=provId; renderPedidoLineas(); }
  const res=el("ped-cat-res"); if(res) res.innerHTML=""; const q=el("ped-cat-q"); if(q) q.value="";
  setTimeout(()=>{ const row=document.querySelector(`#ped-artlist .ped-row[data-mat="${matId}"]`); if(row){ row.scrollIntoView({block:"center"}); const inp=row.querySelector(".ped-cant"); if(inp) inp.focus(); } },60);
}

async function crearPedido(){
  const provId=el("ped-prov").value;
  if(!provId){alert("Selecciona un proveedor.");return;}
  const lineas=[...document.querySelectorAll(".ped-row")].map(r=>({
    materia_id:r.dataset.mat,
    cantidad:Number(r.querySelector(".ped-cant").value)||0,
    precio_esperado:Number(r.querySelector(".ped-precio").value)||0,
  })).filter(l=>l.cantidad>0);
  if(!lineas.length){alert("Pon cantidad en al menos un producto.");return;}
  if(!bloqueaDoble("pedido")) return;
  try{
    const p=await api("/pedidos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({proveedor_id:provId,lineas})});
    if(confirm("Pedido creado. ¿Enviarlo ahora por WhatsApp al proveedor?")){ enviarPedidoWA(p.id); }
    else { irA_pedidos(); }
  }catch(e){alert(e.message);}
  finally{ liberaDoble("pedido"); }
}

async function enviarPedidoWA(id){
  try{
    const p=await api(`/pedidos/${id}`);
    let prov=(window._provPed||[]).find(x=>x.id===p.proveedor_id);
    if(!prov) prov=await api(`/proveedores/${p.proveedor_id}`);
    const tel=(prov.whatsapp||"").replace(/[^0-9+]/g,"").replace(/^\+/,"");
    if(!tel){alert("Este proveedor no tiene WhatsApp.");return;}
    const lineas=p.lineas.map(l=>{const pu=Number(l.precio_esperado)||0;return `• ${l.nombre}: ${l.cantidad} ${l.unidad} × ${pu.toFixed(2)} €/${l.unidad||"ud"} = ${(l.cantidad*pu).toFixed(2)} €`;}).join("\n");
    const total=(Number(p.total_estimado)||p.lineas.reduce((s,l)=>s+l.cantidad*(Number(l.precio_esperado)||0),0)).toFixed(2);
    const texto=`Hola ${prov.contacto||""}, pedido de M de Materia (${p.codigo}):\n${lineas}\n\nTotal estimado: ${total} €\n\nGracias.`;
    window.open(`https://wa.me/${tel}?text=${encodeURIComponent(texto)}`,"_blank");
    await api(`/pedidos/${id}/enviado`,{method:"POST"}).catch(()=>{});
    irA_pedidos();
  }catch(e){alert(e.message);}
}

// Descarga el PDF del trimestre con la sesión (token), para enviar a la gestoría.
async function descargarTrimestre(year,q,btn){
  const prev=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Generando PDF…";}
  try{
    const r=await fetch(API+`/recepciones/trimestre/${year}/${q}/pdf`,{headers:{Authorization:"Bearer "+getToken()}});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||"No se pudo generar el PDF"); }
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`albaranes-${year}-T${q}.pdf`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),8000);
  }catch(e){ alert(e.message); }

}

// Reduce la imagen en el navegador antes de enviarla (tamaño y coste OCR).
function reducirImagen(file,maxLado,calidad){
  return new Promise((resolve,reject)=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      const escala=Math.min(1,maxLado/Math.max(w,h));
      w=Math.round(w*escala); h=Math.round(h*escala);
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      resolve(c.toDataURL("image/jpeg",calidad));
    };
    img.onerror=reject;
    img.src=URL.createObjectURL(file);
  });
}

// Entrada desde el selector de archivo (galería). Reduce y procesa.
async function escanearAlbaran(input){
  const file=input.files&&input.files[0]; if(!file)return;
  const hint=el("ocr-hint"); if(hint) hint.textContent="Procesando imagen…";
  try{
    // Foto de la cámara nativa (nítida): resolución alta para que el texto se
    // lea bien. El editor recorta/endereza y deja la imagen final ligera.
    const dataUrl=await reducirImagen(file,2400,0.85);
    const doc=await abrirEditorDoc(dataUrl);
    if(doc) agregarHojaAlbaran(doc);
  }catch(e){ if(hint) hint.textContent="No se pudo leer: "+e.message; }
  input.value=""; // permite re-elegir la misma foto
}

// Un albarán puede tener VARIAS HOJAS: se van acumulando fotos y se leen todas
// juntas como un solo albarán. Cada foto ya viene enderezada por el editor.
function agregarHojaAlbaran(dataUrl){
  window._albHojas=window._albHojas||[];

// Aplica el resultado del OCR (proveedor, importe, líneas, cotejo) a la recepción.
async function aplicarResultadoAlbaran(r){
  const hint=el("ocr-hint");
  try{
    // El proveedor puede haberse creado al vuelo: asegúralo como opción y selecciónalo.
    if(r.proveedor_id){
      const sel=el("rcp-prov");
      if(sel){
        if(!Array.from(sel.options).some(o=>o.value===r.proveedor_id)){
          const o=document.createElement("option"); o.value=r.proveedor_id;
          o.textContent=(r.proveedor_nombre||r.proveedor||"Proveedor")+(r.proveedor_creado?" (nuevo)":"");
          sel.appendChild(o);
        }
        sel.value=r.proveedor_id;
      }
    }
    if(r.importe_total) el("rcp-imp").value=r.importe_total;
    if(hint){
      const nProd=(r.materias_creadas||[]).length;
      const partes=[`Leído: <b>${esc(r.proveedor_nombre||r.proveedor||"proveedor ?")}</b>`];
      if(r.proveedor_creado) partes.push('<span style="font-weight:700">proveedor creado ✓</span>');
      if(nProd) partes.push(`<span style="font-weight:700">${nProd} producto${nProd===1?"":"s"} nuevo${nProd===1?"":"s"} en el almacén ✓</span>`);
      partes.push(`total ${(r.importe_total||0).toFixed(2)} €`);
      if(!r.proveedor_id) partes.push('<span style="color:var(--ink);font-weight:700">elige el proveedor</span>');
      hint.innerHTML=partes.join(" · ");
    }
    window._avisosPrecio=r.avisos_precio||[];
    // Materias recién creadas: añádelas al catálogo local para que aparezcan
    // seleccionadas en el desplegable de cada línea (no como "no cargar").
    if(r.materias_creadas&&r.materias_creadas.length){
      window._mat=window._mat||[];
      r.materias_creadas.forEach(m=>{ if(!window._mat.some(x=>x.id===m.id)) window._mat.push({id:m.id,nombre:m.nombre,unidad:m.unidad,macro:m.macro,subcategoria:m.subcategoria}); });
      // Carga la taxonomía (macro→sub) para poder mostrar y CORREGIR la categoría
      // de cada producto nuevo en la propia revisión del albarán.
      if(!window._taxonomia){ try{ const a=await api("/materias/arbol"); window._taxonomia=a.taxonomia; }catch(_){} }
    }
    renderLineasAlbaran(r.lineas||[]);
    // Cotejo: comparar con el pedido del proveedor y los precios habituales.
    window._pedidoId=null;
    try{
      const cot=await api("/recepciones/cotejar",{method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({proveedor_id:r.proveedor_id||el("rcp-prov").value,lineas:(r.lineas||[]).map(l=>({materia_id:l.materia_id,cantidad:l.cantidad,precio_unitario:l.precio_unitario}))})});
      window._pedidoId=cot.pedido_id||null;
      renderAvisos(cot);
    }catch(_){ }
  }catch(e){
    if(/no configurado|503/i.test(e.message)){
      if(hint) hint.innerHTML="Lectura automática no activada. La foto queda adjunta; rellena proveedor e importe a mano y registra.";
    }else{
      if(hint) hint.textContent="No se pudo leer: "+e.message;
    }
  }
}

// ── CÁMARA EN VIVO PARA ESCANEAR ALBARANES ──────────────────────────────
// El marco es solo una guía visual para encuadrar; la captura se hace a la
// MÁXIMA resolución posible y SIN recortar, para que el lector (OCR) tenga todo
// el texto bien nítido. La calidad de lectura depende de la resolución.
let _camStream=null, _camTrack=null, _imageCapture=null;
async function abrirCamara(){
  const root=el("wizard-root"); if(!root) return;
  root.innerHTML=`
    <div class="cam-overlay">
      <video id="cam-video" class="cam-video" playsinline autoplay muted></video>
      <div class="cam-mask">
        <div class="cam-frame">
          <i class="cam-corner tl"></i><i class="cam-corner tr"></i>
          <i class="cam-corner bl"></i><i class="cam-corner br"></i>
        </div>
      </div>
      <div class="cam-hint" id="cam-hint">Llena el marco con el albarán · plano · buena luz · sin sombras</div>
      <div class="cam-bar">
        <button class="cam-cancel" onclick="cerrarCamara()">Cancelar</button>
        <button class="cam-shot" id="cam-shot" onclick="capturarFoto()" aria-label="Capturar"><span></span></button>
        <div class="cam-spacer"></div>
      </div>
    </div>`;
  root.classList.add("show");
  try{
    _camStream=await navigator.mediaDevices.getUserMedia({
      video:{ facingMode:{ ideal:"environment" }, width:{ ideal:3840 }, height:{ ideal:2160 } },
      audio:false
    });
    const v=el("cam-video"); v.srcObject=_camStream; await v.play().catch(()=>{});
    _camTrack=_camStream.getVideoTracks()[0]||null;
    // ImageCapture permite una foto fija a resolución completa del sensor (mejor que el vídeo).
    try{ _imageCapture=(window.ImageCapture&&_camTrack)?new ImageCapture(_camTrack):null; }catch(_){ _imageCapture=null; }
  }catch(e){
    const h=el("cam-hint");
    if(h) h.innerHTML="No se pudo abrir la cámara. Usa “Elegir de la galería”.";
    setTimeout(cerrarCamara,1800);
  }
}
async function capturarFoto(){
  const shot=el("cam-shot"); if(shot) shot.disabled=true;
  try{
    let dataUrl=null;
    // Tamaño moderado (1600px): nítido para leer texto y ligero para que el
    // lector responda sin agotar tiempo/memoria del servidor.
    // 1) Foto fija del sensor (si el navegador lo permite).
    if(_imageCapture&&_imageCapture.takePhoto){
      try{ const blob=await _imageCapture.takePhoto(); dataUrl=await reducirImagen(blob,1600,0.72); }catch(_){ dataUrl=null; }
    }
    // 2) Fallback: fotograma completo del vídeo.
    if(!dataUrl){
      const v=el("cam-video");
      if(v&&v.videoWidth){
        const vw=v.videoWidth, vh=v.videoHeight;
        const escala=Math.min(1,1600/Math.max(vw,vh));
        const c=document.createElement("canvas");
        c.width=Math.round(vw*escala); c.height=Math.round(vh*escala);
        c.getContext("2d").drawImage(v,0,0,c.width,c.height);
        dataUrl=c.toDataURL("image/jpeg",0.72);
      }
    }
    cerrarCamara();
    if(dataUrl){ const doc=await abrirEditorDoc(dataUrl); if(doc) agregarHojaAlbaran(doc); }
    else alert("No se pudo capturar la foto. Prueba con “Elegir de la galería”.");
  }catch(e){ cerrarCamara(); alert("No se pudo capturar: "+e.message); }
}
function cerrarCamara(){
  if(_camStream){ _camStream.getTracks().forEach(t=>t.stop()); _camStream=null; }
  _camTrack=null; _imageCapture=null;
  const root=el("wizard-root"); if(root){ root.classList.remove("show"); root.innerHTML=""; }
}

// ── MODO ESCÁNER DE DOCUMENTO ─────────────────────────────────────────────
// Ajustas las 4 esquinas del albarán y la app lo endereza (perspectiva) y
// realza el texto, como un escáner plano. Sin librerías externas.
// Devuelve una Promise con la imagen procesada (dataURL), la original si se
// elige "Sin recorte", o null si se cancela.
function abrirEditorDoc(dataUrl){
  return new Promise((resolve)=>{
    const root=el("wizard-root"); if(!root){ resolve(dataUrl); return; }
    const img=new Image();
    img.onload=()=>{
      const availW=Math.max(120,window.innerWidth-24), availH=Math.max(160,window.innerHeight-140);
      const ratio=img.naturalWidth/img.naturalHeight;
      let dw=availW, dh=dw/ratio; if(dh>availH){ dh=availH; dw=dh*ratio; }
      dw=Math.round(dw); dh=Math.round(dh);
      // Pasamos la foto a blanco y negro AUTOMÁTICAMENTE: el documento se ve y se
      // procesa ya en B/N, sin ningún paso ni interruptor extra.
      const bwCanvas=document.createElement("canvas"); bwCanvas.width=img.naturalWidth; bwCanvas.height=img.naturalHeight;
      const bctx=bwCanvas.getContext("2d"); bctx.drawImage(img,0,0);
      try{
        const id=bctx.getImageData(0,0,bwCanvas.width,bwCanvas.height), p=id.data;
        for(let i=0;i<p.length;i+=4){ let gr=0.299*p[i]+0.587*p[i+1]+0.114*p[i+2]; gr=(gr-128)*1.45+128+22; gr=gr<0?0:gr>255?255:gr; p[i]=p[i+1]=p[i+2]=gr; }
        bctx.putImageData(id,0,0);
      }catch(_){ }
      const bwUrl=bwCanvas.toDataURL("image/jpeg",0.85);
      // Esquinas como fracción (0..1) del documento. Orden TL,TR,BR,BL.
      let pts=[[0.06,0.07],[0.94,0.07],[0.94,0.93],[0.06,0.93]];
      root.innerHTML=`
        <div class="doc-overlay" style="position:fixed;inset:0;z-index:9000;background:#0c0d0b;display:flex;flex-direction:column;align-items:center;">
          <div style="color:#E7E4D7;font-family:var(--sans);font-size:12.5px;padding:10px 16px;text-align:center;">Arrastra las esquinas para encuadrar el albarán</div>
          <div id="doc-box" style="position:relative;width:${dw}px;height:${dh}px;flex:0 0 auto;touch-action:none;">
            <img src="${bwUrl}" style="position:absolute;inset:0;width:100%;height:100%;">
            <svg id="doc-svg" width="${dw}" height="${dh}" style="position:absolute;inset:0;pointer-events:none;"><polygon id="doc-poly" points="" fill="rgba(62,69,52,.18)" stroke="#E7E4D7" stroke-width="2"/></svg>
            ${pts.map((p,i)=>`<div class="doc-h" data-i="${i}" style="position:absolute;width:34px;height:34px;margin:-17px 0 0 -17px;border-radius:50%;border:2px solid #E7E4D7;background:rgba(62,69,52,.5);"></div>`).join("")}
          </div>
          <div style="margin-top:auto;width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;padding:14px 16px max(16px,env(safe-area-inset-bottom));">
            <div style="color:#82857A;font-family:var(--sans);font-size:11px;">La foto ya está en blanco y negro para que se lea mejor.</div>
            <div style="display:flex;gap:10px;width:100%;justify-content:center;">
              <button id="doc-cancel" style="background:none;border:0;color:#E7E4D7;font-family:var(--sans);font-size:14px;padding:10px 14px;">Cancelar</button>
              <button id="doc-skip" style="background:none;border:1px solid rgba(231,228,215,.5);border-radius:6px;color:#E7E4D7;font-family:var(--sans);font-size:14px;padding:10px 14px;">Sin recorte</button>
              <button id="doc-ok" style="background:#E7E4D7;border:0;border-radius:6px;color:#2A332B;font-weight:700;font-family:var(--sans);font-size:14px;padding:10px 20px;">Aplicar</button>
            </div>
          </div>
        </div>`;
      root.classList.add("show");
      const box=el("doc-box"), poly=el("doc-poly"), handles=[...root.querySelectorAll(".doc-h")];
      function pintar(){
        poly.setAttribute("points",pts.map(p=>`${p[0]*dw},${p[1]*dh}`).join(" "));
        handles.forEach((h,i)=>{ h.style.left=(pts[i][0]*dw)+"px"; h.style.top=(pts[i][1]*dh)+"px"; });
      }
      pintar();
      let drag=-1;
      const xy=(ev)=>{ const r=box.getBoundingClientRect(); const t=ev.touches?ev.touches[0]:ev; return [(t.clientX-r.left)/dw, (t.clientY-r.top)/dh]; };
      handles.forEach(h=>{
        h.addEventListener("pointerdown",(e)=>{ drag=Number(h.dataset.i); h.setPointerCapture&&h.setPointerCapture(e.pointerId); e.preventDefault(); });
      });
      box.addEventListener("pointermove",(e)=>{
        if(drag<0)return;
        let [fx,fy]=xy(e); fx=Math.max(0,Math.min(1,fx)); fy=Math.max(0,Math.min(1,fy));
        pts[drag]=[fx,fy]; pintar();
      });
      const endDrag=()=>{ drag=-1; };
      box.addEventListener("pointerup",endDrag); box.addEventListener("pointercancel",endDrag);
      const cerrar=(val)=>{ root.classList.remove("show"); root.innerHTML=""; resolve(val); };
      el("doc-cancel").onclick=()=>cerrar(null);
      el("doc-skip").onclick=()=>cerrar(bwUrl); // "sin recorte" pero ya en B/N
      el("doc-ok").onclick=()=>{
        const ok=el("doc-ok"); ok.textContent="Procesando…"; ok.disabled=true;
        setTimeout(()=>{ // deja repintar el botón antes del bucle pesado
          try{
            const src=pts.map(p=>[p[0]*img.naturalWidth, p[1]*img.naturalHeight]);
            // La fuente ya está en B/N (bwCanvas): enderezamos sin volver a realzar.
            const out=enderezarDoc(bwCanvas, src, false);
            cerrar(out);
          }catch(e){ cerrar(bwUrl); }
        },30);
      };
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// Resuelve la matriz de homografía (dest->src) a partir de 4 correspondencias.
function _gauss(A,b){
  const n=b.length, M=A.map((r,i)=>r.concat([b[i]]));
  for(let col=0;col<n;col++){
    let piv=col; for(let r=col+1;r<n;r++) if(Math.abs(M[r][col])>Math.abs(M[piv][col])) piv=r;
    const tmp=M[col]; M[col]=M[piv]; M[piv]=tmp;
    const d=M[col][col]||1e-9; for(let c=col;c<=n;c++) M[col][c]/=d;
    for(let r=0;r<n;r++){ if(r!==col){ const f=M[r][col]; for(let c=col;c<=n;c++) M[r][c]-=f*M[col][c]; } }
  }
  return M.map(r=>r[n]);
}
// Endereza el cuadrilátero src (4 puntos TL,TR,BR,BL) a un rectángulo y realza.
function enderezarDoc(img, src, realce){
  const dist=(p,q)=>Math.hypot(p[0]-q[0],p[1]-q[1]);
  let outW=Math.round((dist(src[0],src[1])+dist(src[3],src[2]))/2);
  let outH=Math.round((dist(src[0],src[3])+dist(src[1],src[2]))/2);
  const cap=1800, s=Math.min(1,cap/Math.max(outW,outH,1));
  outW=Math.max(8,Math.round(outW*s)); outH=Math.max(8,Math.round(outH*s));
  const dst=[[0,0],[outW,0],[outW,outH],[0,outH]];
  const A=[],bb=[];
  for(let i=0;i<4;i++){ const [x,y]=dst[i], [u,v]=src[i];
    A.push([x,y,1,0,0,0,-x*u,-y*u]); bb.push(u);
    A.push([0,0,0,x,y,1,-x*v,-y*v]); bb.push(v); }
  const H=_gauss(A,bb); const [a,b,c,d,e,f,g,h]=H;
  // La fuente puede ser un <img> (naturalWidth/Height) o un <canvas> (width/height).
  const NW=img.naturalWidth||img.width, NH=img.naturalHeight||img.height;
  const sc=document.createElement("canvas"); sc.width=NW; sc.height=NH;
  sc.getContext("2d").drawImage(img,0,0);
  const sw=sc.width, sh=sc.height, sp=sc.getContext("2d").getImageData(0,0,sw,sh).data;
  const oc=document.createElement("canvas"); oc.width=outW; oc.height=outH;
  const octx=oc.getContext("2d"), od=octx.createImageData(outW,outH), op=od.data;
  for(let y=0;y<outH;y++){
    for(let x=0;x<outW;x++){
      const den=g*x+h*y+1, u=(a*x+b*y+c)/den, v=(d*x+e*y+f)/den;
      let r=255,gg=255,bl=255;
      if(u>=0&&u<sw-1&&v>=0&&v<sh-1){
        const x0=u|0,y0=v|0,fx=u-x0,fy=v-y0, base=(y0*sw+x0)<<2, base2=((y0+1)*sw+x0)<<2;
        for(let ch=0;ch<3;ch++){
          const top=sp[base+ch]*(1-fx)+sp[base+4+ch]*fx;
          const bot=sp[base2+ch]*(1-fx)+sp[base2+4+ch]*fx;
          const val=top*(1-fy)+bot*fy;
          if(ch===0)r=val; else if(ch===1)gg=val; else bl=val;
        }
      }
      const o=(y*outW+x)<<2;
      if(realce){
        let gray=0.299*r+0.587*gg+0.114*bl;
        gray=(gray-128)*1.45+128+22; // contraste + aclarar fondo
        gray=gray<0?0:gray>255?255:gray;
        op[o]=op[o+1]=op[o+2]=gray; op[o+3]=255;
      }else{ op[o]=r; op[o+1]=gg; op[o+2]=bl; op[o+3]=255; }
    }
  }
  octx.putImageData(od,0,0);
  return oc.toDataURL("image/jpeg",0.82);
}

// Filas editables: cada línea del albarán -> materia del almacén + cantidad.
function unidadDe(id){const m=(window._mat||[]).find(x=>x.id===id);return m?m.unidad:"";}
function actualizarUni(sel){const row=sel.closest(".alb-row");if(!row)return;const u=row.querySelector(".alb-uni");if(u)u.textContent=unidadDe(sel.value);}
function renderLineasAlbaran(lineas){
  const cont=el("alb-lineas"); if(!cont) return;
  if(!lineas.length){cont.innerHTML="";return;}
  const opts=(sel)=>`<option value="">— no cargar —</option>`+(window._mat||[]).map(m=>`<option value="${esc(m.id)}" ${m.id===sel?"selected":""}>${esc(m.nombre)}</option>`).join("");
  cont.innerHTML=`<div class="section-label" style="margin-top:10px;">Cargar al almacén (revisa materia, unidad y cantidad)</div>`+
    lineas.map(l=>{
      // Desglose de precio por producto: precio unitario e importe de la línea,
      // tal y como los lee el albarán (cuando vienen). Así no se ve solo el total.
      const pu=(l.precio_unitario!=null&&l.precio_unitario!=="")?Number(l.precio_unitario):null;
      // La cantidad del albarán (kg, L, caja…) sirve para el precio; la cantidad
      // "al almacén" (l.cantidad) ya viene convertida a la unidad de la materia.
      const cantAlb=(l.cantidad_albaran!=null?l.cantidad_albaran:l.cantidad);
      const imp=(l.importe!=null&&l.importe!=="")?Number(l.importe):(pu!=null&&cantAlb!=null?pu*Number(cantAlb):null);
      const uded=l.unidad_detectada||"";
      const uDest=l.unidad_destino||unidadDe(l.materia_id);
      const convWarn=l.conversion_ok===false;
      // Aviso de conversión: qué se leyó y a qué se transformó (o alerta si no supo).
      const conv=(uded&&cantAlb!=null)
        ? `<div class="alb-conv" style="width:100%;font-size:9px;margin-top:1px;color:${convWarn?"var(--alert)":"#9a927e"};">${convWarn?"⚠ ":""}leído: ${esc(String(cantAlb))} ${esc(uded)}${(!convWarn&&uDest)?` → ${l.cantidad} ${esc(uDest)}`:""}${convWarn?" · no supe convertir la unidad, revísala":""}</div>`
        : "";
      const precioTxt=(pu!=null||imp!=null)
        ? `<span class="alb-precio" style="font-size:10px;color:#555040;min-width:96px;text-align:right;flex:0 0 auto;">${pu!=null?`${eur4(pu)} €/${esc(uded||"ud")}`:""}${pu!=null&&imp!=null?" · ":""}${imp!=null?`<b>${imp.toFixed(2)} €</b>`:""}</span>`
        : `<span class="alb-precio" style="font-size:10px;color:#b8b3a3;min-width:96px;text-align:right;flex:0 0 auto;">sin precio</span>`;
      // Producto NUEVO: muestra en qué categoría se ha dado de alta y deja corregirla.
      const mm=(window._mat||[]).find(x=>x.id===l.materia_id);
      const catSel=(l.materia_creada&&mm)?`<div style="width:100%;font-size:9px;margin-top:2px;color:#6a6555;display:flex;align-items:center;gap:5px;">Categoría: ${catSelectAlbaran(l.materia_id,mm.macro,mm.subcategoria)}</div>`:"";
      return `<div class="alb-row" data-pu="${pu!=null?pu:""}" data-imp="${imp!=null?imp:""}" data-cantalb="${cantAlb!=null?cantAlb:""}" data-uded="${esc(uded)}" style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;">
      <span class="alb-desc" style="font-size:10px;color:#888070;flex:1;min-width:80px;">${esc(l.descripcion||"")}${l.materia_creada?' <span class="tag-ink" style="font-size:8px;">nuevo</span>':""}${l.precio_alerta?` <span style="color:var(--alert);font-weight:700" title="Pactado ${eur4(l.precio_pactado)} €">⚠ ${l.precio_dif_pct>0?"+":""}${l.precio_dif_pct}%</span>`:""}</span>
      <select class="alb-mat" onchange="actualizarUni(this)" style="font-size:11px;max-width:140px;">${opts(l.materia_id)}</select>
      <input class="alb-cant" type="number" inputmode="decimal" step="0.01" value="${l.cantidad!=null?l.cantidad:""}" title="Cantidad que entra al almacén, en ${esc(uDest||"la unidad de la materia")}" style="width:70px;font-size:11px;">
      <span class="alb-uni" style="font-size:10px;color:#888070;min-width:24px;">${unidadDe(l.materia_id)}</span>
      ${precioTxt}
      ${conv}
      ${catSel}
    </div>`;
    }).join("");
}
// Desplegable "Macro › Sub" para corregir la categoría de un producto recién creado.
function catSelectAlbaran(materiaId, curMacro, curSub){
  const tax=window._taxonomia; if(!tax) return `<b>${esc(curMacro||"")} › ${esc(curSub||"")}</b>`;
  let opts="";
  Object.keys(tax).forEach(macro=>{ (tax[macro]||[]).forEach(sub=>{
    const val=macro+"|||"+sub;
    const seld=(macro===curMacro&&sub===curSub)?"selected":"";
    opts+=`<option value="${esc(val)}" ${seld}>${esc(macro)} › ${esc(sub)}</option>`;
  }); });
  return `<select onchange="cambiarCategoriaMateria('${materiaId}',this.value)" style="font-size:9px;max-width:180px;">${opts}</select>`;
}
async function cambiarCategoriaMateria(id,val){
  const i=String(val).indexOf("|||"); if(i<0) return;
  const macro=val.slice(0,i), sub=val.slice(i+3);
  try{
    await api("/materias/"+id,{method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({macro,subcategoria:sub})});
    const m=(window._mat||[]).find(x=>x.id===id); if(m){ m.macro=macro; m.subcategoria=sub; }
  }catch(e){ alert("No se pudo cambiar la categoría: "+e.message); }
}
function recogerLineasAlbaran(){
  return [...document.querySelectorAll(".alb-row")].map(row=>{
    const mat=row.querySelector(".alb-mat").value;
    // La cantidad editable ya está en la unidad de la materia (la que entra al almacén).
    const cant=Number(row.querySelector(".alb-cant").value);
    const cantOk=Number.isFinite(cant)?cant:0;
    // Conservamos el precio leído por el lector (estaba en data-pu / data-imp);
    // así el albarán digital guarda precio unitario e importe, no solo el total.
    const puRaw=row.dataset.pu;
    const pu=(puRaw!=null&&puRaw!=="")?Number(puRaw):null;
    // El importe se calcula con la cantidad DEL ALBARÁN (no la convertida), que
    // es a la que corresponde el precio unitario del proveedor.
    const cantAlbRaw=row.dataset.cantalb;
    const cantAlb=(cantAlbRaw!=null&&cantAlbRaw!=="")?Number(cantAlbRaw):cantOk;
    const impRaw=row.dataset.imp;
    let imp=(impRaw!=null&&impRaw!=="")?Number(impRaw):null;
    if(pu!=null) imp=Math.round(pu*cantAlb*100)/100;
    return {descripcion:row.querySelector(".alb-desc").textContent.trim(), materia_id:mat||null,
      cantidad:cantOk, cantidad_albaran:cantAlb, unidad_detectada:row.dataset.uded||null,
      precio_unitario:pu, importe:imp};
  });
}

// Convierte la clave VAPID (base64url) en el formato que pide PushManager.
function urlBase64ToUint8Array(base64String){
  const padding="=".repeat((4 - base64String.length % 4) % 4);
  const base64=(base64String+padding).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(base64); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i);
  return arr;
}

async function estadoPushDispositivo(){
  if(!("serviceWorker" in navigator)||!("PushManager" in window)||!("Notification" in window)) return "no-soportado";
  try{

    const sub=await reg.pushManager.getSubscription();
    return sub?"activo":"inactivo";
  }catch(_){ return "inactivo"; }
}

async function activarPush(btn){
  const msg=el("av-msg");
  const prev=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Activando…";}
  try{
    if(!("serviceWorker" in navigator)||!("PushManager" in window)){ throw new Error("Este navegador no admite avisos push."); }
    const perm=await Notification.requestPermission();
    if(perm!=="granted") throw new Error("No diste permiso para notificaciones. Actívalo en los ajustes del navegador.");
    const reg=await navigator.serviceWorker.ready;
    if(!window._vapidKey) throw new Error("Falta la clave del servidor. Recarga la página.");
    const sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey:urlBase64ToUint8Array(window._vapidKey) });
    await api("/avisos/suscribir",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(sub)});
    if(msg){ msg.style.color="var(--olive)"; msg.textContent="✓ Avisos activados en este dispositivo."; }
    irA_avisos();
  }catch(e){ if(msg){ msg.style.color="var(--alert)"; msg.textContent="Error: "+e.message; } }
  finally{ if(btn){btn.disabled=false;btn.textContent=prev;} }
}

async function desactivarPush(btn){
  const prev=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Desactivando…";}
  try{
    const reg=await navigator.serviceWorker.ready;
    const sub=await reg.pushManager.getSubscription();
    if(sub){ await api("/avisos/desuscribir",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({endpoint:sub.endpoint})}); await sub.unsubscribe(); }
    irA_avisos();
  }catch(e){ alert("Error: "+e.message); if(btn){btn.disabled=false;btn.textContent=prev;} }
}

      const tel=(j.proveedor_whatsapp||"").replace(/[^0-9+]/g,"").replace(/^\+/,"");
      const pdfUrl=`${location.origin}/justificante/${j.id}/pdf`;
      const waUrl=tel?`https://wa.me/${tel}?text=${encodeURIComponent('Justificante de pago '+j.codigo+' de M de Materia. PDF: '+pdfUrl)}`:"";
      const wa=tel?`<button class="btn-ghost" onclick="window.open('${waUrl}','_blank')">WhatsApp</button>`:"";
      const pdfB=`<button class="btn-ghost" onclick="window.open('${pdfUrl}','_blank')">PDF</button>`;
      const reenv=j.proveedor_email?`<button class="btn-ghost" onclick="reenviarEmailJust('${j.id}')">Reenviar email</button>`:"";
      const est=j.email_estado==="enviado"?" · ✉ enviado":(j.email_estado==="error"?" · ✉ no enviado":"");
      return card(
        `${j.codigo} — ${j.proveedor_nombre}`,
        `${(j.importe_pagado||0).toFixed(2)} € · ${new Date(j.fecha_pago).toLocaleDateString("es-ES")} · ${(j.albaranes||[]).length} albarán(es)${est}`,
        `<button class="btn-ghost" onclick="verJustificante('${j.id}')">Ver justificante</button>${pdfB}${wa}${reenv}`
      );
    },"Aún no se ha emitido ningún justificante.");
    setInner(sPagos+sJust);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// ── CARTA Y MÁRGENES ──────────────────────────────────
async function irA_carta(){
  openSection("carta","Carta y márgenes");
  try{
    const d=await api("/carta");
    const cab=`<div class="card-actions" style="margin-bottom:14px;"><button class="btn-primary" onclick="irA_escandalloCafe()">Escandallo de café</button><button class="btn-ghost" onclick="formReceta()">Crear receta</button></div>`;

      <div class="card"><div class="card-name">Margen medio ${Math.round(d.margen_medio*100)}%</div>
        <div class="card-meta">Food cost medio ${Math.round(d.food_cost_medio*100)}% · ${d.total_productos} productos${d.hay_estimaciones?" · incluye costes estimados":""}</div></div>`;
    const items=section("Productos", d.productos, p=>{
      const col=p.rentabilidad==="alta"?"var(--ink)":(p.rentabilidad==="media"?"#5C6145":"var(--muted)");
      const w=Math.max(2,Math.round(p.margen_bruto*100));
      const barra=`<div style="margin-top:8px;height:6px;background:#E2DBCB;border-radius:3px;overflow:hidden;"><div style="height:100%;width:${w}%;background:${col};"></div></div>`;
      const ing=p.ingredientes.map(i=>`${i.nombre} ${i.cantidad}${i.unidad}`).join(" · ");
      // Escenarios de food-cost (20/25/30%) + objetivo editable por producto.
      const e3 = p.escenarios ? `
        <div style="font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:10px 0 4px;">PVP por food-cost objetivo</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;">
          ${['20','25','30'].map(fc=>{
            const v=p.escenarios['fc'+fc]||0;
            const on=Math.round(p.food_cost_objetivo)==+fc;
            return `<div style="border:1px solid ${on?'var(--ink)':'var(--line)'};padding:6px 8px;text-align:center;${on?'background:var(--olive-light);':''}">
              <div style="font-size:9px;color:var(--muted);">${fc}% food cost</div>
              <div style="font-size:15px;font-weight:700;color:var(--ink);">${v.toFixed(2)} €</div></div>`;
          }).join("")}
        </div>` : "";
      const sugiere = p.escenarios ? `
        <div style="font-size:11px;margin-top:8px;color:var(--muted);">objetivo
          <input type="number" min="5" max="90" step="1" value="${Math.round(p.food_cost_objetivo)}" onchange="setFcObjetivo('${p.id}',this.value)" style="width:60px;padding:4px 6px;margin:0 2px;"> % food cost →
          <b style="color:var(--olive);">${p.precio_recomendado.toFixed(2)} €</b></div>` : "";
      const alerg=(p.alergenos&&p.alergenos.length)
        ? `<div style="font-size:10px;color:var(--muted);margin-top:6px;">Alérgenos: ${p.alergenos.map(a=>esc(a)).join(" · ")}</div>`:"";
      const meta2=[p.version?`Versión ${esc(p.version)}`:"",p.vida_util_horas?`Vida útil ${p.vida_util_horas} h`:""].filter(Boolean).join(" · ");
      const metaLine=meta2?`<div style="font-size:10px;color:var(--muted);margin-top:4px;">${meta2}</div>`:"";
      const foto=p.foto_url?`<img src="${p.foto_url}" style="width:100%;max-width:180px;border-radius:8px;border:1px solid var(--line);margin-top:8px;">`:"";
      return card(
        `${p.nombre}${p.coste_estimado?' <span style="font-size:9px;color:var(--muted);">(estimado)</span>':""}`,
        `${p.precio_venta.toFixed(2)} € · coste ${p.coste.toFixed(2)} € · margen ${Math.round(p.margen_bruto*100)}% (${p.margen_euros.toFixed(2)} €)`,
        `<button class="btn-ghost" onclick="formReceta('${p.id}')">Editar</button><button class="btn-ghost" onclick="borrarReceta('${p.id}')">Quitar</button>`,
        barra+`<div style="font-size:10px;color:#888070;margin-top:8px;">${ing}</div>`+e3+sugiere+alerg+metaLine+foto
      );
    }, "No hay productos en la carta.");

  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// Cambia el food-cost objetivo de un producto (lo guarda como margen y recalcula
// el PVP recomendado). "no todo es igual": cada producto puede ir a su objetivo.
async function setFcObjetivo(id, fcPct){
  let fc=Number(String(fcPct).replace(",","."));
  if(!(fc>0)) return;
  if(fc>1) fc=fc/100;                 // admite 25 o 0.25
  if(fc>=1) return;
  const margen=1-fc;
  try{
    await api("/carta/"+id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify({margen_objetivo:margen})});
    irA_carta();
  }catch(e){ alert(e.message); }
}

  { k:"flatwhite", n:"Flat White", desc:"2 shot + leche · 200 ml",             g:17,  leche:200 },
  { k:"capuccino", n:"Capuccino",  desc:"1 shot + leche · 200 ml",             g:8.5, leche:200 },
  { k:"latte",     n:"Latte",      desc:"2 shot + leche · taza grande 220 ml", g:17,  leche:220 },
  { k:"icedlatte", n:"Iced latte", desc:"1 shot + 2 hielos + leche",           g:8.5, leche:180 },

  openSection("escandalloCafe","Escandallo de café");
  try{
    const mats=await api("/materias");
    window._ecMats=mats;

    window._ecCafes=mats.filter(m=>m.categoria==="Café" && m.unidad==="g" && !/coldbrew/i.test(m.id));
    // Leches (categoría Leche) menos la combinada legacy.

      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;">

      </div>
      <div class="field" style="max-width:200px;"><label>o food cost a mano (%)</label>

function ecMat(id){ return (window._ecMats||[]).find(m=>m.id===id); }

function ecCargarBebida(){
  const b=CAFE_BEBIDAS[Number(el("ec-bebida").value)||0];
  el("ec-g").value=b.g;
  const wrap=el("ec-leche-wrap");
  if(b.leche>0){ wrap.style.display=""; el("ec-ml").value=b.leche; }
  else { wrap.style.display="none"; el("ec-ml").value=0; }
  const cafe=ecMat(el("ec-cafe").value);
  const grano=cafe?cafe.nombre.replace(/^Café\s+/i,"").replace(/\s*\(espresso\)/i,""):"";
  el("ec-nombre").value=b.n+(grano?" · "+grano:"");
  ecCalc();
}

function ecCalc(){
  const g=Number(el("ec-g").value)||0;
  const cafe=ecMat(el("ec-cafe").value);
  const llevaLeche=el("ec-leche-wrap").style.display!=="none";
  const ml=llevaLeche?(Number(el("ec-ml").value)||0):0;
  const leche=llevaLeche?ecMat(el("ec-leche").value):null;
  const costeCafe=cafe?cafe.coste_medio*g:0;
  const costeLeche=leche?leche.coste_medio*ml:0;
  const coste=Math.round((costeCafe+costeLeche)*10000)/10000;
  const fc=Math.min(0.9,Math.max(0.05,(Number(el("ec-fc").value)||25)/100));
  const recom=coste>0?redondearPvp(coste/fc):0;
  window._ecCoste=coste; window._ecRecom=recom;
  el("ec-out").innerHTML=
    `Café: <b>${cafe?esc(cafe.nombre):"—"}</b> · ${g} g → ${costeCafe.toFixed(3)} €<br>`+
    (llevaLeche?`Leche: <b>${leche?esc(leche.nombre):"—"}</b> · ${ml} ml → ${costeLeche.toFixed(3)} €<br>`:"")+
    `Coste total: <b>${coste.toFixed(3)} €</b><br>`+
    `A ${Math.round(fc*100)}% food cost → PVP recomendado <b style="color:var(--olive);font-size:16px;">${recom.toFixed(2)} €</b>`;
  const pvp=Number(el("ec-pvp").value)||0;
  const out=el("ec-final");
  if(pvp>0 && coste>0){
    const margen=(pvp-coste)/pvp, food=coste/pvp;
    const col=food>0.35?"var(--alert)":(food>0.28?"#C9CBBE":"var(--olive)");
    out.innerHTML=`Con tu precio (${pvp.toFixed(2)} €): margen <b style="color:${col}">${Math.round(margen*100)}%</b> · food cost <b style="color:${col}">${Math.round(food*100)}%</b> · ganas ${(pvp-coste).toFixed(2)} €/taza`;
  } else out.innerHTML=`Pon un precio o pulsa «Usar PVP recomendado».`;
}

function matById(id){ return (window._cartaMats||[]).find(m=>m.id===id); }

function recalcReceta(){
  let coste=0;
  document.querySelectorAll(".rc-row").forEach(row=>{
    const id=row.querySelector(".rc-mat").value;
    const cant=Number(row.querySelector(".rc-cant").value)||0;
    const m=matById(id);
    const c=m?(m.coste_medio*cant):0;
    coste+=c;
    row.querySelector(".rc-uni").textContent=m?m.unidad:"";
    row.querySelector(".rc-coste").textContent=m&&cant>0?c.toFixed(3)+" €":"";
  });
  coste=Math.round(coste*100)/100;
  const margenObj=Math.min(0.99,Math.max(0,(Number(el("rc-margen").value)||0)/100));
  const recomendado=coste>0?redondearPvp(coste/(1-margenObj)):0;
  const precio=Number(el("rc-precio").value)||0;
  const margenReal=precio>0?(precio-coste)/precio:0;
  const foodCost=precio>0?coste/precio:0;
  const col=foodCost===0?"var(--muted)":(foodCost>0.35?"var(--alert)":(foodCost>0.28?"#5C6145":"var(--olive)"));
  window._recetaRecom=recomendado;
  const out=el("rc-calc");
  if(out) out.innerHTML=
    `Coste del escandallo: <b>${coste.toFixed(2)} €</b><br>`+
    `PVP recomendado (margen ${Math.round(margenObj*100)}%): <b style="color:var(--olive)">${recomendado.toFixed(2)} €</b><br>`+
    (precio>0?`Con tu precio (${precio.toFixed(2)} €): margen <b style="color:${col}">${Math.round(margenReal*100)}%</b> · food cost ${Math.round(foodCost*100)}%`:`Pon un precio para ver el margen.`);
}

// ── MODO TPV (mostrador táctil) · detección + teclado numérico en pantalla ──
// En el TPV no siempre hay teclado físico: al tocar un campo numérico aparece un
// teclado en pantalla. Se puede forzar con ?tpv=1 (o desactivar con ?tpv=0).
function detectarTPV(){
  try{
    const params=new URLSearchParams(location.search);
    if(params.get("tpv")==="1") localStorage.setItem("cm_tpv","1");
    if(params.get("tpv")==="0") localStorage.setItem("cm_tpv","0");
    const g=localStorage.getItem("cm_tpv");
    if(g==="1") return true;
    if(g==="0") return false;
    // Auto: pantalla táctil grande (mostrador/tablet), no un móvil.
    const tactil=(navigator.maxTouchPoints||0)>0 || ("ontouchstart" in window);
    const menor=Math.min(screen.width||9999, screen.height||9999);
    return tactil && menor>=768;
  }catch(_){ return false; }
}
let _tpv=false, _kpWired=false, _kpTarget=null;
function initTPV(){
  _tpv=detectarTPV();
  document.body.classList.toggle("tpv", _tpv);
  if(_tpv) montarKeypad();
}
function esCampoNumerico(x){ return x && x.tagName==="INPUT" && x.type==="number"; }
function montarKeypad(){
  let kp=document.getElementById("tpv-keypad");
  if(!kp){
    kp=document.createElement("div"); kp.id="tpv-keypad";
    const keys=["1","2","3","4","5","6","7","8","9",".","0","←"];
    kp.innerHTML=keys.map(k=>`<button type="button" data-k="${k}">${k}</button>`).join("")+`<button type="button" class="kp-ok" data-k="ok">Hecho</button>`;
    kp.addEventListener("mousedown",(e)=>e.preventDefault()); // no robar el foco del campo
    kp.addEventListener("click",(e)=>{ const b=e.target.closest("button"); if(b) kpPulsar(b.dataset.k); });
    document.body.appendChild(kp);
  }
  if(!_kpWired){
    document.addEventListener("focusin",(e)=>{
      if(!_tpv) return;
      if(esCampoNumerico(e.target)){ _kpTarget=e.target; try{e.target.setAttribute("inputmode","none");}catch(_){}
        const k=document.getElementById("tpv-keypad"); if(k) k.classList.add("on"); }
    });
    document.addEventListener("focusout",()=>{
      setTimeout(()=>{ if(!esCampoNumerico(document.activeElement)){ const k=document.getElementById("tpv-keypad"); if(k) k.classList.remove("on"); _kpTarget=null; } },60);
    });
    _kpWired=true;
  }
}
function kpPulsar(k){
  const inp=_kpTarget; if(!inp) return;
  if(k==="ok"){ const kp=document.getElementById("tpv-keypad"); if(kp) kp.classList.remove("on"); inp.blur(); _kpTarget=null; return; }
  let v=String(inp.value||"");
  if(k==="←") v=v.slice(0,-1);
  else if(k===".") { if(!v.includes(".")) v=v+"."; }
  else v=v+k;
  inp.value=v;
  inp.dispatchEvent(new Event("input",{bubbles:true}));
  inp.dispatchEvent(new Event("change",{bubbles:true}));
}

  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div id="splash" style="min-height:100vh;background:var(--cream);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier Prime',monospace;padding:24px;text-align:center;">
      <span class="mark" style="color:var(--ink);justify-content:center;gap:5px;"><i style="height:34px;width:3px;"></i><i style="height:34px;width:3px;"></i><i style="height:34px;width:3px;"></i></span>
      <div style="font-family:var(--sans);font-size:34px;font-weight:700;color:var(--ink);line-height:1;margin-top:20px;letter-spacing:.01em;">m de materia</div>
      <div style="font-size:9px;letter-spacing:0.24em;text-transform:lowercase;color:var(--muted);margin-top:8px;margin-bottom:56px;">Control de producción</div>
      <div id="splash-estado" style="font-size:11px;letter-spacing:0.12em;text-transform:lowercase;color:var(--muted);">Conectando…</div>
      <div id="splash-count" style="font-size:10px;color:var(--muted);margin-top:8px;"></div>
      <div style="margin-top:20px;width:48px;height:1px;background:var(--line);position:relative;overflow:hidden;">
        <div style="position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--olive);animation:slidebar 1.4s ease-in-out infinite;"></div>
      </div>
      <style>@keyframes slidebar{0%{left:-100%}50%{left:0}100%{left:100%}}</style>
    </div>`;

  let intentos = 0;
  const mensajes = {
    3: "El sistema está arrancando…",
    8: "Un momento, casi listo…",
    15: "Tardando más de lo habitual…",
    25: "Sigue esperando…",
  };

  while (intentos < 60) {
    try {
      const r = await fetch("/api/salud", { cache: "no-store" });
      if (r.ok) {
        try { window.__persistencia = (await r.clone().json()).persistencia; } catch(e) {}
        el("splash-estado").textContent = "Listo";
        await new Promise(r => setTimeout(r, 400));
        // Mostrar login o pintar la app — sin recargar (evita bucle de splash)
        if (!getUser()) {
          mostrarLogin();
        } else {
          entrarApp();
        }
        return;
      }
    } catch(e) {}
    intentos++;
    el("splash-count").textContent = intentos * 2 + "s";
    if (mensajes[intentos]) el("splash-estado").textContent = mensajes[intentos];
    await new Promise(r => setTimeout(r, 2000));
  }

  // Tras 2 minutos sin respuesta
  el("splash-estado").textContent = "Sin respuesta del servidor";
  el("splash-count").textContent = "Recarga la página para intentarlo de nuevo";
}

// Registro del Service Worker (necesario para los avisos push en el dispositivo).
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js").catch(() => {});
}

// Init
arrancar();
</script>

<!-- ===== MÓDULO BURBUJAS · script (init diferido · sin scope global) =====
     El módulo se integra "tal cual": su lógica interna no se toca. Solo se
     difiere la ejecución, porque esta app reconstruye el shell del <body>
     (APP_SHELL) tras el splash/login; si corriese al cargar, el markup del

<script>
// Recetas de producción de Burbujas (sodas de té). Datos verificados POR LITRO;
// el cliente multiplica por los litros del lote. Sin dependencias ni fetch.
function _mdmBurbujasMain(){

  var $ = function(id){ return document.getElementById(id); };

  var DATA = {

    bases: {

    corazones: {

      C2: { nombre: "Piña clarificada", tiempo: "45 min", rend: "85 %",

    },
    // --- RECETAS · todas las cantidades POR LITRO ---
    recetas: {

        bx: "6,5", acidez: "0,55 %", co2: "3,0 vol", bar: "1,04 bar", linea: "2,08 m",
        compra: "≈ 5,2 kg manzana Granny Smith / 16 L",
        lineas: [
          { c: "C1", n: "Manzana clarificada",  v: 180,  u: "g",  cod: "C1" },
          { c: "B1", n: "Infusión earl grey",   v: 300,  u: "ml", cod: "B1" },
          { n: "Azúcar",            v: 45.2, u: "g" },
          { n: "Ácido cítrico",     v: 2.76, u: "g" },
          { n: "Ácido málico",      v: 1.84, u: "g" },
          { n: "Sal sin yodar",     v: 0.50, u: "g" },
          { n: "Citrato trisódico", v: 0.42, u: "g" },
          { n: "Ácido ascórbico",   v: 0.35, u: "g" }
        ],
        aviso: "Corre contra el reloj: se oxida en montaje. Lote del tirón, zumo recién clarificado."
      },
      R2: {
        nombre: "Melocotón · lapsang · picante", pilar: "II · EQUILIBRIO",
        bx: "8,5", acidez: "0,59 %", co2: "3,0 vol", bar: "1,04 bar", linea: "2,08 m",
        compra: "≈ 9,7 kg melocotón / 16 L · sin menta",
        lineas: [
          { c: "C3", n: "Melocotón clarificado", v: 260, u: "g", cod: "C3" },
          { c: "B3", n: "Infusión lapsang",      v: 250, u: "ml", cod: "B3" },
          { n: "Azúcar",            v: 56.0, u: "g" },
          { n: "Ácido cítrico",     v: 2.15, u: "g" },
          { n: "Ácido málico",      v: 2.15, u: "g" },
          { n: "Sal sin yodar (declarada)", v: 1.00, u: "g" },
          { n: "Citrato trisódico", v: 0.42, u: "g" },
          { n: "Ácido ascórbico",   v: 0.35, u: "g" },
          { c: "C3", n: "Melocotón crudo", v: 40,  u: "g",  cod: "C3", tardio: true },
          { c: "B4", n: "Infusión de pimienta", v: 22.5, u: "ml", cod: "B4", tardio: true }
        ],

      },

        bx: "10,0", acidez: "0,65 %", co2: "2,8 vol", bar: "0,90 bar", linea: "1,53 m",
        compra: "≈ 8,3 kg piña / 16 L · chai = infusión de especias",
        lineas: [
          { c: "C2", n: "Piña clarificada", v: 200, u: "g", cod: "C2" },
          { c: "B2", n: "Infusión chai",    v: 280, u: "ml", cod: "B2" },
          { n: "Azúcar",            v: 70.0, u: "g" },
          { n: "Ácido cítrico",     v: 3.16, u: "g" },
          { n: "Ácido málico",      v: 1.36, u: "g" },
          { n: "Sal sin yodar",     v: 0.50, u: "g" },
          { n: "Citrato trisódico", v: 0.42, u: "g" },
          { n: "Ácido ascórbico",   v: 0.35, u: "g" },
          { c: "C2", n: "Piña cruda", v: 50, u: "g", cod: "C2", tardio: true }
        ],
        aviso: "PENDIENTE: Bx 10 / ratio 15, dulce. Catar carbonatada; si empalaga, bajar azúcar a ~45 g/L (Bx 8, ratio 12)."
      }
    }
  };

  function fmt(x){
    if(x>=100) return Math.round(x).toLocaleString('es-ES');
    if(x>=10)  return (Math.round(x*10)/10).toLocaleString('es-ES');
    return (Math.round(x*100)/100).toLocaleString('es-ES');
  }

  function initSel(){
    var s = $('burSel');
    Object.keys(DATA.recetas).forEach(function(k){
      var r = DATA.recetas[k];
      var o = document.createElement('option');
      o.value = k; o.textContent = r.pilar + '  ·  ' + r.nombre;
      s.appendChild(o);
    });
  }

  function setL(n){ $('burLitros').value = n; sync(); render(); }

  function sync(){
    var L = parseFloat($('burLitros').value) || 0;
    var chips = raiz.querySelectorAll('.bur-chip');
    for(var i=0;i<chips.length;i++){
      chips[i].classList.toggle('on', parseFloat(chips[i].getAttribute('data-l')) === L);
    }
  }

  function render(){
    var rk = $('burSel').value;
    var L = parseFloat($('burLitros').value) || 0;
    var r = DATA.recetas[rk];
    if(!r) return;
    var rows = r.lineas.map(function(li){
      var total = li.v * L;
      var cod = li.cod ? '<span class="cod">' + li.cod + '</span>' : '';
      var cls = li.tardio ? ' class="tardia"' : '';
      var tag = li.tardio ? ' <span style="font-size:8.5px;letter-spacing:.1em;text-transform:uppercase">tardío</span>' : '';
      return '<tr' + cls + '><td>' + cod + li.n + tag + '</td><td>' + fmt(li.v) + ' ' + li.u + '/L</td><td class="big">' + fmt(total) + ' ' + li.u + '</td></tr>';
    }).join('');
    $('burOut').innerHTML =
      '<div class="bur-head"><h2>' + r.nombre + '</h2><span class="bur-pilar">' + r.pilar + '</span></div>' +
      '<div class="bur-param">' +
        '<div><b>' + r.bx + '</b><span>°Bx</span></div>' +
        '<div><b>' + r.acidez + '</b><span>acidez</span></div>' +
        '<div><b>' + r.co2 + '</b><span>CO₂</span></div>' +
        '<div><b>' + r.bar + '</b><span>2 °C</span></div>' +
        '<div><b>' + r.linea + '</b><span>línea 3/16"</span></div>' +
      '</div>' +
      '<table><thead><tr><th>componente</th><th>por litro</th><th>lote ' + fmt(L) + ' L</th></tr></thead>' +
      '<tbody>' + rows +
      '<tr><td style="font-weight:700;color:var(--olive);border-top:1px solid var(--ink);padding-top:9px">Agua c.s.p.</td>' +
      '<td style="border-top:1px solid var(--ink);padding-top:9px">—</td>' +
      '<td class="big" style="border-top:1px solid var(--ink);padding-top:9px">hasta ' + fmt(L) + ' L</td></tr>' +
      '</tbody></table>' +
      '<div class="bur-aviso"><b>atención</b>' + r.aviso + '</div>' +
      '<div class="bur-compra"><b>Compra:</b> ' + r.compra + ' · ' + Math.floor(L*1000/250*0.96) + ' latas vendibles</div>';

  function renderBases(){
    var h = '';
    Object.keys(DATA.corazones).forEach(function(k){
      var c = DATA.corazones[k];
      h += '<div class="bcard"><div class="bt"><h3><span class="cod">' + k + '</span>' + c.nombre + '</h3>' +
           '<span class="bp">' + c.tiempo + ' · rend. ' + c.rend + '</span></div><div class="bn">' + c.nota + '</div></div>';
    });
    Object.keys(DATA.bases).forEach(function(k){
      var b = DATA.bases[k];
      h += '<div class="bcard"><div class="bt"><h3><span class="cod">' + k + '</span>' + b.nombre + '</h3>' +
           '<span class="bp">' + b.temp + (b.tiempo !== '—' ? ' · ' + b.tiempo : '') + ' · ' + b.dosis + '</span></div><div class="bn">' + b.nota + '</div></div>';
    });
    $('burBout').innerHTML = h;
  }

  $('burSel').addEventListener('change', render);
  $('burLitros').addEventListener('input', function(){ sync(); render(); });
  var chips = raiz.querySelectorAll('.bur-chip');
  for(var i=0;i<chips.length;i++){
    chips[i].addEventListener('click', function(){ setL(parseFloat(this.getAttribute('data-l'))); });
  }

  initSel(); renderBases(); sync(); render();
}
// Init bajo demanda: se ejecuta cuando el shell ya tiene el markup del módulo
// (al abrir Burbujas). Reinicializa si el shell se reconstruyó (select vacío).
window.__mdmBurbujasInit = function(){
  var sel = document.getElementById('burSel');
  if(!sel) return;                              // shell aún no presente
  if(sel.options && sel.options.length) return; // ya inicializado
  _mdmBurbujasMain();
};
</script>

<!-- ===== MÓDULO MACERACIÓN · script (IIFE · scopeado a #mdm-mac · init diferido) =====
     Adaptado del módulo original: envuelto para no filtrar globals (render/calcular
     colisionaban con la app), el listener y $ scopeados al contenedor, el QR reusa
     el generador de Control M (/qr) en vez de una librería CDN, y las horas se
     calculan en LOCAL del navegador (el inicio se pone a la hora real al abrir). -->
<script>
function _mdmMacMain(){
  'use strict';
  const root = document.getElementById('mdm-mac');
  const $ = id => document.getElementById(id);

  const CAFES = [
    {id:'QCO', n:'Quebraditas Coconut', o:'colombia · huila · co-fermentado'},
    {id:'RUM', n:'Romario Umaña',       o:'costa rica · tarrazú · natural'},
    {id:'TMB', n:'Tembo Tembo',         o:'tanzania · karatu · lavado'},
    {id:'TBR', n:'Tibebu Roba',         o:'etiopía · yirgacheffe · natural'}
  ];
  const VIDA_BARRIL_DIAS = 10;

  const n2 = v => v.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:2});
  const fecha = d => String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0');
  const hora  = d => String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
  const sello = d => fecha(d)+' · '+hora(d);
  const nowLocal = () => new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);

  function loteId(cafe,d){
    const y = String(d.getFullYear()).slice(2);
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return 'CB-'+y+m+day+'-'+cafe;
  }

  function calcular(){
    const cafe = CAFES.find(c=>c.id===$('cafe').value) || CAFES[0];
    const R    = +$('ratio').value;
    const ret  = +$('ret').value;
    const ey   = +$('ey').value/100;
    const modo = $('modo').value;
    let dosis, recuperado;
    if(modo==='vol'){ recuperado = +$('vol').value*1000; dosis = recuperado/(R-ret); }
    else { dosis = +$('dosis').value; recuperado = dosis*(R-ret); }
    const agua = dosis*R, retenido = dosis*ret, solidos = dosis*ey, tds = solidos/recuperado*100;
    const bloom = $('bloom').value==='1';
    const aguaCal = bloom ? dosis*2 : 0;
    const aguaFria = agua - aguaCal;
    const ini = $('inicio').value ? new Date($('inicio').value) : new Date();
    const fin = new Date(ini.getTime() + (+$('horas').value)*3600e3);
    const cad = new Date(fin.getTime() + VIDA_BARRIL_DIAS*864e5);
    return {cafe,R,dosis,agua,aguaCal,aguaFria,retenido,recuperado,solidos,tds,bloom,ini,fin,cad,
            mol:+$('mol').value, temp:+$('temp').value, horas:+$('horas').value,
            op:$('op').value, destino:$('destino').value, catanum:$('catanum').value,
            lote:loteId(cafe.id,ini)};
  }

  function pintarOut(c){
    const alerta = (c.tds<1.4||c.tds>2.0) ? ' warn' : '';
    $('out').innerHTML =
      '<div class="cell"><div class="k">dosis</div><div class="v">'+n2(c.dosis)+'<span class="u"> g</span></div></div>'+
      '<div class="cell"><div class="k">agua total</div><div class="v">'+n2(c.agua)+'<span class="u"> g</span></div></div>'+
      (c.bloom?'<div class="cell"><div class="k">bloom 93 °C</div><div class="v">'+n2(c.aguaCal)+'<span class="u"> g</span></div></div>'+
               '<div class="cell"><div class="k">agua fría</div><div class="v">'+n2(c.aguaFria)+'<span class="u"> g</span></div></div>':'')+
      '<div class="cell"><div class="k">retención</div><div class="v">'+n2(c.retenido)+'<span class="u"> g</span></div></div>'+
      '<div class="cell"><div class="k">recuperado</div><div class="v">'+n2(c.recuperado/1000)+'<span class="u"> L</span></div></div>'+
      '<div class="cell"><div class="k">tds previsto</div><div class="v'+alerta+'">'+c.tds.toFixed(2)+'<span class="u"> %</span></div></div>'+
      '<div class="cell"><div class="k">fin previsto</div><div class="v" style="font-size:15px">'+sello(c.fin)+'</div></div>';
  }

  // URL de la ficha en vivo (misma /p que el resto de etiquetas). El QR la lleva.
  function fichaUrl(nombre, prodISO, vidaH, resp, code, et){
    const u = new URLSearchParams();
    u.set('n', nombre); u.set('p', prodISO);
    if(vidaH) u.set('v', vidaH);
    if(resp) u.set('r', resp);
    if(code) u.set('code', code);
    if(et) u.set('et', et);
    return location.origin + '/p?' + u.toString();
  }
  // Etiqueta ESTÁNDAR de Control M (idéntica a las de APPCC). QR → ficha en vivo.
  function stdLabel(o){
    const el = document.createElement('div');
    el.className = 'mlbl';
    el.innerHTML =
      '<div class="mlbl-datos">'+
        '<div class="mlbl-brand"><span class="mlbl-word">m · de · materia</span>'+
          '<span class="mlbl-mark"><i></i><i></i><i></i></span></div>'+
        '<div class="mlbl-rule"></div>'+
        '<div class="mlbl-nombre">'+o.nombre.toLowerCase()+'</div>'+
        '<dl class="mlbl-meta">'+
          '<dt>elaborado</dt><dd>'+sello(o.elaboradoD)+'</dd>'+
          '<dt>'+o.venceLabel+'</dt><dd class="big">'+sello(o.venceD)+'</dd>'+
          '<dt>responsable</dt><dd>'+String(o.resp||'—').toLowerCase()+'</dd>'+
        '</dl>'+
        '<div class="mlbl-rule foot"></div>'+
        '<div class="mlbl-codigo">'+o.code+'</div>'+
      '</div>'+
      '<div class="mlbl-qr"><div class="mlbl-frame"><img src="/qr?d='+encodeURIComponent(o.fichaUrl)+'&w=132" alt="QR"></div>'+
        '<span>escanea · tiempo</span></div>';
    return el;
  }

  function pintarEtiquetas(c){
    const sh = $('sheet'); sh.innerHTML='';
    // 1 · MACERADOR: el QR cuenta el tiempo que RESTA de maceración (hasta fin).
    const nombreMac = 'Cold Brew · ' + c.cafe.n;
    sh.appendChild(stdLabel({
      nombre: nombreMac, elaboradoD: c.ini,
      venceLabel: 'maceración lista', venceD: c.fin, resp: c.op, code: c.lote,
      fichaUrl: fichaUrl(nombreMac, c.ini.toISOString(), c.horas, c.op, c.lote, 'Maceración lista')
    }));
    // 2 · BARRIL (producto acabado): el QR cuenta la vida útil (consumir antes).
    if(c.destino==='barril'){
      const nombreBar = 'Cold Brew Nitro · ' + c.cafe.n;
      sh.appendChild(stdLabel({
        nombre: nombreBar, elaboradoD: c.fin,
        venceLabel: 'consumir', venceD: c.cad, resp: c.op, code: c.lote,
        fichaUrl: fichaUrl(nombreBar, c.fin.toISOString(), VIDA_BARRIL_DIAS*24, c.op, c.lote, '')
      }));
    }
  }

  function render(){
    $('wVol').style.display   = $('modo').value==='vol'  ? 'block':'none';
    $('wDosis').style.display = $('modo').value==='dosis'? 'block':'none';
    const c = calcular();
    pintarOut(c);
    pintarEtiquetas(c);
  }
  window.__mdmMacRender = render;

  function nuevoLote(){
    $('inicio').value = nowLocal();
    $('catanum').value = (+$('catanum').value)+1;
    render();
  }
  // Imprime abriendo la MISMA página de etiqueta del backend que el resto del
  // sistema (/etiqueta/prep): tiene @page 62×30mm + autoimpresión, así sale en
  // la Phomemo. window.print() sobre la app NO sirve (la página es A4).
  function macPrint(){
    const c = calcular();
    const vol = n2(c.recuperado/1000)+' L';
    const abrir = (o) => window.open(location.origin+'/etiqueta/prep?'+new URLSearchParams(o).toString(), '_blank');
    abrir({ n:'Cold Brew · '+c.cafe.n, c:vol, v:c.horas, r:c.op, p:c.ini.toISOString(), code:c.lote, et:'Maceración lista', print:'1' });
    if(c.destino==='barril'){
      abrir({ n:'Cold Brew Nitro · '+c.cafe.n, c:vol, v:VIDA_BARRIL_DIAS*24, r:c.op, p:c.fin.toISOString(), code:c.lote, et:'Consumir', print:'1' });
    }
  }

  // Poblar café (una vez por montaje del shell)
  const sel = $('cafe');
  if (sel && !sel.options.length) {
    CAFES.forEach(c=>{ const o=document.createElement('option'); o.value=c.id; o.textContent=c.n; sel.appendChild(o); });
  }
  $('inicio').value = nowLocal();
  // Listener SCOPEADO al módulo (no engancha el resto de la app)
  root.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',render));
  $('mac-nuevo').addEventListener('click', nuevoLote);
  $('mac-print').addEventListener('click', macPrint);
  render();
}
// Init diferido: el shell se reconstruye tras el splash/login (APP_SHELL); se
// monta la 1ª vez que se abre Maceración (y si el shell se rehízo, select vacío).
window.__mdmMacInit = function(){
  const sel = document.getElementById('cafe');
  if(!sel) return;
  if(sel.options && sel.options.length) return;
  _mdmMacMain();
};
// Refresco al abrir: pone el inicio a la hora real y recalcula.
window.__mdmMacRefresh = function(){
  const i = document.getElementById('inicio');
  if(!i) return;
  i.value = new Date(Date.now()-new Date().getTimezoneOffset()*60000).toISOString().slice(0,16);
  if(typeof window.__mdmMacRender==='function') window.__mdmMacRender();
};
</script>
