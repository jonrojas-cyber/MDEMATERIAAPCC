<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#3E4534"/>
<title>Control M · m de materia</title>
<!-- Tipografía autoalojada (Courier Prime WOFF2). Sin dependencias externas. -->
<style>
/* Courier Prime autoalojada (clon de Courier New con NEGRITA REAL) en WOFF2.
   Evita el engordado sintético que duplica trazos en móviles sin Courier New. */
@font-face { font-family:'Courier Prime'; font-style:normal; font-weight:400;
  font-display:swap; src:url('/fonts/CourierPrime-Regular.woff2') format('woff2'); }
@font-face { font-family:'Courier Prime'; font-style:normal; font-weight:700;
  font-display:swap; src:url('/fonts/CourierPrime-Bold.woff2') format('woff2'); }

/* ════════════════════════════════════════════════════════════════════
   DESIGN TOKENS · única fuente de verdad para color y tipografía.
   ════════════════════════════════════════════════════════════════════ */
:root {
  /* Superficie y papel */
  --cream: #ECEAE3;   /* fondo papel */
  --paper: #F1EFE9;   /* celdas / tarjetas */
  /* Tinta (verde botella oscuro · no negro, corporativo) */
  --ink:   #2A332B;   /* texto y superficies oscuras */
  --olive: #2A332B;   /* acentos = tinta */
  --olive-light: #CFCABB;
  --muted: #82857A;   /* gris ceniza secundario */
  --warn:  #2A332B;   /* alertas: por peso, sin rojo */
  --ok:    #2A332B;
  --alert: #2A332B;
  --gold:  #2A332B;
  /* Líneas y sombra */
  --line:  #B4AE9B;   /* keyline */
  --shadow: none;
  /* Marco oliva (barra superior e inferior) */
  --olivebar: #3E4534;
  --oliveink: #E7E4D7;
  /* Tipografía */
  --sans:  'Courier New', 'Courier Prime', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
/* App anclada a la pantalla visible: position:fixed (arriba) + altura 100dvh.
   Fijo arriba ⇒ el documento no puede arrastrarse; altura = pantalla visible
   real ⇒ el pie queda dentro. Así NINGÚN navegador móvil (Samsung/Chrome)
   hace scroll de página. Sin "bottom" para que no anule la altura dvh. */
html { height: 100%; overflow: hidden; }

body {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 100vh;
  height: 100dvh;
  width: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--cream);
  color: var(--ink);
  font-family: 'Courier New', 'Courier Prime', monospace;
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  display: flex;
  flex-direction: column;
}

button { font-family: inherit; cursor: pointer; }
input, select { font-family: inherit; font-size: 13px; }

/* ── TOP BAR ──────────────────────────────────────────── */
.topbar {
  background: var(--ink);
  color: var(--cream);
  display: flex;
  align-items: center;
  padding: 0 24px;
  height: 52px;
  flex-shrink: 0;
  gap: 16px;
}

.topbar-logo {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.04em;
}

.topbar-sep { color: #333020; }

.topbar-section {
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: #AAA490;
  flex: 1;
}

.topbar-back {
  background: none;
  border: none;
  color: var(--olive-light);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 0;
  display: none;
  align-items: center;
  gap: 6px;
}

.topbar-back.visible { display: flex; }
.topbar-back:hover { color: var(--cream); }

.topbar-user {
  display: flex;
  gap: 6px;
}

.user-chip {
  font-size: 10px;
  padding: 3px 8px;
  border: 1px solid #2A2820;
  color: #666050;
  background: none;
}

.user-chip.on {
  background: var(--olive);
  border-color: var(--olive);
  color: var(--cream);
}

/* ── MAIN VIEWPORT ───────────────────────────────────── */
.viewport {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.screen {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  padding: 32px 36px;
  transform: translateX(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
  background: var(--cream);
}

.screen.active {
  transform: translateX(0);
}

.screen.exit {
  transform: translateX(-30%);
}

/* ── HOME GRID ───────────────────────────────────────── */
.home-kpis {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  margin-bottom: 28px;
}

.kpi-box {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
}

.kpi-label {
  font-size: 8.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}

.kpi-val {
  font-size: 22px;
  font-weight: 700;
  line-height: 1;
}

.kpi-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 4px;
}

.home-tiles {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.tile {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 24px 22px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 120px;
  position: relative;
}

.tile:hover {
  border-color: var(--olive);
  background: #F2EFE6;
}

.tile:active { opacity: 0.85; }

.tile.urgente {
  border-left: 3px solid var(--warn);
}

.tile.ok {
  border-left: 3px solid var(--olive);
}

.tile-num {
  font-size: 9px;
  letter-spacing: 0.16em;
  color: var(--muted);
  text-transform: uppercase;
}

.tile-title {
  font-size: 15px;
  font-weight: 700;
}

.tile-badge {
  font-size: 10px;
  color: var(--muted);
  line-height: 1.4;
}

.tile-badge.alert { color: var(--warn); }

.tile-arrow {
  position: absolute;
  bottom: 18px;
  right: 18px;
  font-size: 16px;
  color: var(--line);
}

/* ── INNER SCREENS ───────────────────────────────────── */
.screen-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--line);
}

.section-label {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--olive);
  margin-bottom: 10px;
  margin-top: 24px;
}

.section-label:first-child { margin-top: 0; }

.card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 16px 18px;
  margin-bottom: 8px;
}

.card-name { font-size: 14px; font-weight: 700; }
.card-meta { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.card-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }

.btn-primary {
  background: var(--ink);
  color: var(--cream);
  border: none;
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.02em;
}
.btn-primary:hover { background: var(--olive); }
.btn-primary:disabled { opacity: 0.4; cursor: default; }

.btn-ghost {
  background: none;
  color: var(--ink);
  border: 1px solid var(--line);
  padding: 10px 16px;
  font-size: 12px;
}
.btn-ghost:hover { border-color: var(--ink); }

.btn-warn {
  background: var(--warn);
  color: #FFF5EE;
  border: none;
  padding: 10px 16px;
  font-size: 12px;
}

.badge-low {
  font-size: 9px;
  padding: 2px 6px;
  border: 1px solid var(--warn);
  color: var(--warn);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-left: 8px;
}

.empty { font-size: 11px; color: var(--muted); letter-spacing: .04em; padding: 14px 0; }
.loading { font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; padding: 32px 0; }
.err { font-size: 12px; color: var(--ink); font-weight: 700; padding: 32px 0; }

/* ── BANNER ──────────────────────────────────────────── */
.banner {
  display: flex;
  align-items: center;
  gap: 10px;
  border-left: 3px solid var(--olive);
  padding: 12px 16px;
  margin-bottom: 24px;
  font-size: 13px;
  background: var(--paper);
  border-top: 1px solid var(--line);
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.banner.warn { border-left-color: var(--warn); }
.banner .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--olive); flex-shrink: 0; }
.banner.warn .dot { background: var(--warn); }

/* ── FORM ────────────────────────────────────────────── */
.field { margin-top: 12px; }
.field label { display: block; font-size: 9.5px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
.field select, .field input { background: var(--cream); border: 1px solid var(--line); color: var(--ink); padding: 9px 10px; width: 100%; }
.field input[type="number"] { width: 140px; }

.toggle-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.toggle { background: var(--paper); border: 1px solid var(--line); color: var(--ink); font-size: 12px; padding: 7px 12px; }
.toggle.on { background: var(--olive); border-color: var(--olive); color: var(--cream); }
.toggle:hover:not(.on) { border-color: var(--ink); }

/* ── WIZARD ──────────────────────────────────────────── */
.wizard-overlay {
  position: fixed;
  inset: 0;
  background: var(--cream);
  z-index: 999;
  display: flex;
  flex-direction: column;
}

/* Pantalla de preparación (previa al paso a paso) — estilo Aesop, mucho aire. */
.prep-overlay { position: fixed; inset: 0; background: var(--cream); z-index: 999; display: flex; flex-direction: column; }
.prep-top { padding: 18px 22px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.prep-eyebrow { font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); }
.prep-wrap { flex: 1; overflow-y: auto; padding: 4px 22px 24px; max-width: 560px; width: 100%; margin: 0 auto; -webkit-overflow-scrolling: touch; }
.prep-title { font-size: 26px; font-weight: 700; line-height: 1.1; }
.prep-sub { font-size: 12px; color: var(--muted); margin-top: 6px; }
.prep-lead { font-size: 13.5px; line-height: 1.5; margin: 18px 0 4px; color: var(--ink); }
.prep-h { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin: 26px 0 10px; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.prep-list { display: flex; flex-direction: column; }
.prep-row { display: flex; justify-content: space-between; align-items: baseline; gap: 14px; padding: 11px 0; border-bottom: 1px solid var(--line); }
.prep-name { font-size: 15px; }
.prep-cat { font-size: 10px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-left: 8px; }
.prep-obs { display: block; font-size: 11.5px; color: var(--muted); margin-top: 2px; }
.prep-qty { font-size: 15px; font-weight: 700; white-space: nowrap; font-variant-numeric: tabular-nums; }
.prep-qty.falta { text-decoration: line-through dotted; }
.prep-warn { font-size: 11.5px; color: #9C5A2E; padding: 4px 0 8px; }
.prep-mat { font-size: 14.5px; padding: 10px 0; border-bottom: 1px solid var(--line); }
.prep-tick { color: var(--muted); margin-right: 8px; }
.prep-empty { font-size: 13px; color: var(--muted); padding: 10px 0; }
.prep-footer { flex-shrink: 0; padding: 14px 22px max(16px, env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
.prep-footer .wiz-ok { width: 100%; }

/* Materia · almacén por categorías */
.catgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.catcard { display: flex; flex-direction: column; align-items: flex-start; gap: 5px; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 16px 14px; cursor: pointer; position: relative; min-height: 78px; }
.catcard:hover { border-color: var(--ink); }
.catcard-name { font-size: 15px; font-weight: 700; line-height: 1.1; }
.catcard-meta { font-size: 11px; color: var(--muted); }
.catcard-meta .cc-low { color: #9C5A2E; }
.catcard-go { position: absolute; top: 13px; right: 14px; color: var(--muted); font-size: 13px; }
.mat-q { width: 100%; padding: 11px 13px; font-family: var(--sans); font-size: 14px; border: 1px solid var(--line);
  border-radius: 9px; background: var(--paper); color: var(--ink); margin: 8px 0; }
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.chip { font-family: var(--sans); font-size: 12px; padding: 7px 13px; border-radius: 20px; border: 1px solid var(--line);
  background: transparent; color: var(--ink); cursor: pointer; }
.chip.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.ficha-recat { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
.ficha-recat label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.ficha-recat select { font-family: var(--sans); font-size: 13.5px; padding: 9px 11px; border: 1px solid var(--line);
  border-radius: 8px; background: var(--cream); color: var(--ink); }

/* ── ALMACÉN · 3 niveles (Aesop: aire, orden, premium) ── */
.alm-grid { display: flex; flex-direction: column; gap: 10px; }
/* Nivel 1: macrocategorías, tarjetas amplias y limpias. */
.alm-macro { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: 13px; padding: 20px 18px; cursor: pointer; }
.alm-macro:hover { border-color: var(--ink); }
.alm-macro-name { font-size: 17px; font-weight: 700; letter-spacing: .01em; }
.alm-macro-meta { font-size: 11px; color: var(--muted); margin-left: 4px; }
.alm-go { margin-left: auto; color: var(--muted); font-size: 16px; }
.alm-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; letter-spacing: .02em; }
.alm-badge.crit { background: #f3ddd2; color: #b5462a; }
.alm-badge.pedir { background: #f6ecd5; color: #8a6a1e; }
/* Nivel 2: subcategorías */
.alm-sublist { display: flex; flex-direction: column; gap: 8px; }
.alm-sub { display: flex; align-items: center; justify-content: space-between; gap: 10px; width: 100%; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: 11px; padding: 15px 16px; cursor: pointer; }
.alm-sub:hover { border-color: var(--ink); }
.alm-sub-empty { opacity: .5; }
.alm-sub-name { font-size: 14.5px; font-weight: 600; }
.alm-sub-right { display: flex; align-items: center; gap: 10px; }
.alm-sub-meta { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; min-width: 18px; text-align: right; }
/* Nivel 3: filas de producto con punto de semáforo */
.alm-row { display: flex; align-items: center; gap: 12px; }
.alm-dot { flex: 0 0 auto; width: 11px; height: 11px; border-radius: 50%; }
.alm-row-main { display: flex; flex-direction: column; min-width: 0; }
.alm-actions { margin-top: 16px; }
/* Formulario de producto */
.pf { display: flex; flex-direction: column; gap: 2px; }
.pf-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
.pf-row > label { font-size: 10px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.pf-row input, .pf-row select, .pf-row textarea { font-family: var(--sans); font-size: 14px; padding: 10px 12px;
  border: 1px solid var(--line); border-radius: 8px; background: var(--paper); color: var(--ink); width: 100%; }
.pf-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.pf-2 .pf-row { margin-bottom: 12px; }

/* ── TAREAS · bandeja de mando (compacto) ── */
/* Identidad m de materia: Courier Prime en todo (sin serif ajeno). */
.home-question { font-family: var(--sans); font-size: 19px; font-weight: 700; line-height: 1.15; margin-top: 2px; }
.kpi-line { display: flex; flex-wrap: wrap; gap: 4px 16px; margin: 4px 0 16px; padding: 10px 12px; background: var(--paper); border: 1px solid var(--line); border-radius: 9px; }
.kpi-i { font-size: 11.5px; color: var(--muted); }
.kpi-i b { color: var(--ink); font-variant-numeric: tabular-nums; }
.tareas-cuenta { font-size: 12px; font-weight: 700; margin-bottom: 12px; }
.qha { margin: 0 0 16px; }
.qha-allbtn { width: 100%; background: none; border: 1px solid var(--line); border-radius: 9px; font-family: var(--sans);
  font-size: 12.5px; color: var(--ink); padding: 11px; cursor: pointer; margin-top: 4px; }
.dec-group { margin-bottom: 14px; }
.dec-gh { font-size: 11px; font-weight: 700; letter-spacing: .04em; margin: 0 0 6px; }
/* Tarjeta de acción compacta: 2 líneas, mínima altura. */
.dec-act { background: var(--paper); border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; margin-bottom: 7px; }
.dec-act-top { display: flex; align-items: center; gap: 10px; }
.dec-act-title { flex: 1; min-width: 0; font-size: 14px; font-weight: 700; line-height: 1.15; }
.dec-act-sub { font-size: 11.5px; color: var(--muted); margin-top: 3px; }
.dec-act-btn { flex: 0 0 auto; font-family: var(--sans); font-size: 12.5px; font-weight: 700; padding: 8px 13px;
  border-radius: 7px; border: 0; background: var(--ink); color: var(--cream); cursor: pointer; white-space: nowrap; }
.dec-act-btn:active { transform: translateY(1px); }
.dec-more { background: none; border: 0; font-family: var(--sans); font-size: 11.5px; color: var(--muted); cursor: pointer; padding: 4px 0; text-decoration: underline; }
/* Bloque HOY operativo */
.hoy { display: flex; align-items: center; flex-wrap: wrap; gap: 12px; background: var(--paper); border: 1px solid var(--line);
  border-radius: 10px; padding: 11px 14px; margin: 0 0 14px; }
.hoy-h { font-size: 10px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted); font-weight: 700; }
.hoy-item { font-size: 12.5px; color: var(--ink); }
.hoy-item b { font-variant-numeric: tabular-nums; }
/* Navegación compacta a las 5 áreas */
.home-nav { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.navchip { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; background: var(--paper);
  border: 1px solid var(--line); border-radius: 11px; padding: 15px 16px; cursor: pointer; }
.navchip:hover { border-color: var(--ink); }
.navchip-num { font-family: 'Courier Prime', monospace; font-size: 16px; font-weight: 700; color: var(--muted); }
.navchip-name { font-size: 15px; font-weight: 700; letter-spacing: .02em; }
.navchip-pend { font-size: 11px; font-weight: 700; color: #b5462a; background: #f3ddd2; border-radius: 20px; padding: 2px 9px; margin-left: auto; }
.navchip-go { color: var(--muted); font-size: 15px; margin-left: auto; }
.navchip-pend + .navchip-go { margin-left: 8px; }
.home-nav-label { font-size: 10px; letter-spacing: .16em; text-transform: uppercase; color: var(--muted); margin: 6px 0 8px; }
/* APPCC hub */
.appcc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.appcc-tile { display: flex; flex-direction: column; align-items: flex-start; gap: 4px; text-align: left; position: relative;
  background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 16px 14px; cursor: pointer; min-height: 80px; }
.appcc-tile:hover { border-color: var(--ink); }
.appcc-tile-name { font-size: 14.5px; font-weight: 700; line-height: 1.15; }
.appcc-tile-sub { font-size: 11px; color: var(--muted); }
.appcc-badge { position: absolute; top: 12px; right: 12px; font-size: 10px; font-weight: 700; color: #b5462a; background: #f3ddd2; border-radius: 20px; padding: 2px 8px; }
.appcc-nota { font-size: 11.5px; color: var(--muted); margin-top: 14px; line-height: 1.5; }

.wiz-bar {
  height: 3px;
  background: var(--line);
  flex-shrink: 0;
}

.wiz-bar-fill {
  height: 100%;
  background: var(--olive);
  transition: width 0.3s ease;
}

.wiz-top {
  padding: 20px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}

.wiz-close {
  background: none;
  border: none;
  font-size: 10px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}

.wiz-close:hover { color: var(--ink); }

.wiz-step {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--olive);
}

.wiz-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0 40px;
  text-align: center;
}

.wiz-recipe {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  margin-bottom: 12px;
}

.wiz-action {
  font-size: clamp(24px, 5.5vw, 40px);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.02em;
  line-height: 1.1;
  max-width: 640px;
}

/* ════════════════════════════════════════════════════════

/* Número con tamaño fijo y contenido (sin unidades cqh, que algunos móviles
   no soportan y hacían que se saliera del botón). Quitamos los puntos
   decorativos para que el contenido quepa centrado aunque la tarjeta sea baja. */
.cat { flex: 1 1 0; min-height: 0; margin-bottom: 0; overflow: hidden; }
.cat-big { font-size: 30px; line-height: 1; }
.cat-name { font-size: clamp(16px, 2.4dvh, 22px); }
/* Contenido pegado arriba: el número y el título empiezan en el borde superior,
   así nada se sale por abajo aunque la tarjeta sea baja. */
.cat-numcol { justify-content: flex-start; padding-top: 16px; padding-bottom: 8px; }

<script>
const API = "/api";
let currentSection = "home";

// Accesibilidad: Enter/Espacio activan los elementos role="button" (tarjetas,
// filas) igual que un clic, para navegación por teclado.
document.addEventListener("keydown", (e) => {
  if ((e.key === "Enter" || e.key === " ") && e.target && e.target.matches && e.target.matches('[role="button"]')) {
    e.preventDefault();
    e.target.click();
  }
});

// ── SISTEMA DE USUARIOS CON ROLES ─────────────────────
// Solo para pintar los botones de login. La autenticación (PIN) la valida el
// backend vía JWT; los PIN ya no viven en el frontend.
const USUARIOS = {
  "Jon":  { rol: "admin",  nombre: "Jon" },
  "Lara": { rol: "equipo", nombre: "Lara" },
  "Moni": { rol: "admin",  nombre: "Mónica" },
};

const MODULOS_EQUIPO = ["preparaciones","lotes","revisiones","ajustes"];
const MODULOS_ADMIN  = ["preparaciones","lotes","materias","revisiones","ajustes","proveedores","recepcion","pagos","manual"];

function getUser()  { try{ return JSON.parse(localStorage.getItem("cm_session")); }catch{ return null; } }
function getToken() { const u = getUser(); return u && u.token; }

let _pinVal = "";

function seleccionarUsuario(key) {
  _loginKey = key;
  Object.keys(USUARIOS).forEach(k => {
    const b = document.getElementById("ubtn-"+k);
    if(b) b.style.borderColor = k===key ? "#5C6145" : "#2A2820";
    if(b) b.style.color = k===key ? "#F0EBE0" : "#888070";
  });
  const w = document.getElementById("pin-wrap");
  w.style.display = "block";
  const quien = document.getElementById("pin-quien");
  if (quien) quien.textContent = (USUARIOS[key] && USUARIOS[key].nombre) || "";
  _pinVal = "";
  pintarPinDots();
  document.getElementById("pin-err").textContent = "";
}

function pintarPinDots() {
  document.querySelectorAll("#pin-dots .pin-dot").forEach((d, i) => {
    d.classList.toggle("on", i < _pinVal.length);
  });
}

// Teclado numérico en pantalla: añade un dígito y valida al llegar a 4.
function pinPush(d) {
  if (!_loginKey) return;
  if (_pinVal.length >= 4) return;
  _pinVal += d;
  document.getElementById("pin-err").textContent = "";
  pintarPinDots();
  if (_pinVal.length === 4) checkPin();
}

function pinDel() {
  _pinVal = _pinVal.slice(0, -1);
  document.getElementById("pin-err").textContent = "";
  pintarPinDots();
}

// Soporte de teclado físico (opcional): dígitos, borrar y entrar.
function _pinKeydown(e) {
  if (!document.getElementById("pin-wrap") || document.getElementById("pin-wrap").style.display === "none") return;
  if (e.key >= "0" && e.key <= "9") { pinPush(e.key); e.preventDefault(); }
  else if (e.key === "Backspace") { pinDel(); e.preventDefault(); }
}

async function checkPin() {
  if (_pinVal.length !== 4) return;
  const pin = _pinVal;
  document.getElementById("pin-err").textContent = "";
  try {
    const r = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: _loginKey, pin }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      // Mensaje real del servidor: bloqueo por intentos o intentos restantes.
      let msg = data.error || "PIN incorrecto · vuelve a intentarlo";
      if (data.bloqueado && data.segundos) msg = `Cuenta bloqueada · espera ${Math.ceil(data.segundos / 60)} min`;
      else if (data.intentos_restantes != null) msg = `PIN incorrecto · ${data.intentos_restantes} intento(s) restante(s)`;
      document.getElementById("pin-err").textContent = msg;
      _pinVal = "";
      pintarPinDots();
      return;
    }
    setSession({ key: data.usuario.key, nombre: data.usuario.nombre, rol: data.usuario.rol, token: data.token });
    entrarApp();
  } catch (e) {
    document.getElementById("pin-err").textContent = "No se pudo conectar. Inténtalo de nuevo.";
    _pinVal = "";
    pintarPinDots();
  }
}

// Cambio de PIN del usuario en sesión (4 dígitos).
async function cambiarMiPin() {
  const actual = prompt("PIN actual (4 dígitos):");
  if (actual == null) return;
  const nuevo = prompt("PIN nuevo (4 dígitos):");
  if (nuevo == null) return;
  if (!/^\d{4}$/.test(nuevo)) { alert("El PIN nuevo debe tener 4 dígitos."); return; }
  try {
    await api("/auth/cambiar-pin", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pin_actual: actual, pin_nuevo: nuevo }) });
    alert("PIN actualizado. Úsalo la próxima vez que entres.");
  } catch (e) { alert(e.message); }
}

// "Volver": si estamos en una sección que pertenece a una categoría, regresa
// a su submenú (no al inicio). Desde un submenú o el resumen, va al inicio.
function goBack() {
  const s = currentSection;
  if (s === "home" || s === "resumen" || (typeof s === "string" && s.indexOf("cat-") === 0)) {
    goHome();
    return;
  }
  let parent = null;
  for (const k in CATS) {
    if (CATS[k].ids && CATS[k].ids.indexOf(s) !== -1) { parent = k; break; }
  }
  if (parent) irA_categoria(parent);
  else goHome();
}

// ── HELPERS ───────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  const t = getToken();
  if (t) headers["Authorization"] = "Bearer " + t;
  const r = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (r.status === 401) { localStorage.removeItem("cm_session"); location.reload(); throw new Error("Sesión expirada"); }
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    // Nunca dejar el mensaje vacío: si el servidor no da detalle (502/timeout,
    // HTTP/2 sin statusText…), mostramos al menos el código para diagnosticar.
    const detalle = e.error || r.statusText || (r.status === 502 || r.status === 504 ? "el servidor tardó demasiado en responder" : "");
    throw new Error(detalle || ("error " + r.status));
  }
  return r.json();
}

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
// Anti doble-envío: evita que un doble toque (habitual en móvil con mala red)
// cree dos pedidos/recepciones/lotes. bloqueaDoble devuelve false si ya hay uno
// en curso con esa clave; libera en el finally.
const _enviando=new Set();
function bloqueaDoble(clave){ if(_enviando.has(clave)) return false; _enviando.add(clave); return true; }
function liberaDoble(clave){ _enviando.delete(clave); }

// ── TAREAS · bandeja única operativa ──────────────────────────────────────
// Toda alerta del sistema es una TAREA. Tres niveles, una sola pregunta:
// ¿qué tengo que hacer ahora? 🔴 Crítico · 🟡 Importante · 🔵 Informativo.
const DEC_GRUPOS=[
  { key:"critico",     label:"Crítico",     ico:"🔴", color:"#b5462a" },
  { key:"importante",  label:"Importante",  ico:"🟡", color:"#c79a3a" },
  { key:"informativo", label:"Informativo", ico:"🔵", color:"#3f6079" },
];

// Indexa cada tarea por id para que el botón ejecute su acción directa.
function decIndexar(dec){
  window._decData=dec; window._decIndex={};
  [...(dec.acciones||[]),...(dec.oportunidades||[]),...(dec.riesgos||[])].forEach(x=>{ if(x.id) window._decIndex[x.id]=x; });
}
// Reparte todo en 3 niveles: oportunidades y avisos menores → informativo.
function decBuckets(dec){
  const b={critico:[],importante:[],informativo:[]};
  (dec.acciones||[]).forEach(a=>{ (b[a.severidad]||b.informativo).push(a); });
  (dec.oportunidades||[]).forEach(o=> b.informativo.push(o));
  (dec.riesgos||[]).filter(r=>r.severidad==="info").forEach(r=> b.informativo.push(r));
  return b;
}
function decCuenta(dec){ const b=decBuckets(dec); return { critico:b.critico.length, importante:b.importante.length, informativo:b.informativo.length }; }

// Tarjeta de tarea COMPACTA: título + botón arriba, una línea de detalle.
function accionRow(a, color){
  const sub=[a.tiempo_min?`${a.tiempo_min} min`:null, decEstadoTxt(a.estado), a.motivo].filter(Boolean).join(" · ");
  const btn=a.accion?`<button class="dec-act-btn" onclick="decAccion('${a.id}')">${esc((a.accion.label||"Hacer").toUpperCase())}</button>`:"";
  return `<div class="dec-act" style="border-left:3px solid ${color};">
    <div class="dec-act-top"><span class="dec-act-title">${esc(a.titulo)}</span>${btn}</div>
    <div class="dec-act-sub">${esc(sub)}</div>
  </div>`;
}
function decEstadoTxt(e){ return e==="en_curso"?"en curso":e==="bloqueado"?"bloqueado":e==="hecho"?"hecho":""; }

// Render de los grupos. opts.max limita tareas por grupo (home).
function decGruposHTML(dec, opts){
  const b=decBuckets(dec); let html="";
  DEC_GRUPOS.forEach(g=>{
    const all=b[g.key]; if(!all.length) return;
    const items=(opts&&opts.max)?all.slice(0,opts.max):all;
    html+=`<div class="dec-group"><div class="dec-gh" style="color:${g.color}">${g.ico} ${g.label} · ${all.length}</div>`;
    html+=items.map(x=>accionRow(x,g.color)).join("");
    if(opts&&opts.max&&all.length>opts.max) html+=`<button class="dec-more" onclick="irA_tareas()">+${all.length-opts.max} más →</button>`;
    html+=`</div>`;
  });
  return html || `<div class="todo-clear">✓ Todo hecho. No hay tareas pendientes.</div>`;
}
// Ejecuta el handler de una tarea → acción directa (≤ 1 clic).
function decAccion(id){
  const a=(window._decIndex||{})[id]; if(!a||!a.accion)return;
  const h=a.accion.handler, args=a.accion.args||{};
  if(h==="decisionProducir") return iniciarYAbrir(args.receta_id, args.cantidad);
  // Pasa los args al manejador (irA_pedidos usa proveedor + cantidades sugeridas;
  // el resto de irA_* ignoran el argumento sin problema).
  if(typeof window[h]==="function") return window[h](a.accion.args);
}

function qhaHomeHTML(dec){
  if(!dec) return "";
  decIndexar(dec);
  const c=decCuenta(dec);
  const total=c.critico+c.importante+c.informativo;
  const cuenta = total
    ? `<div class="tareas-cuenta"><span style="color:#b5462a">${c.critico} críticas</span> · <span style="color:#c79a3a">${c.importante} importantes</span> · <span style="color:#3f6079">${c.informativo} info</span></div>`

// ── CALENDARIO ANUAL · histórico de producción y APPCC ────────────────────
const CAL_MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CAL_MESES_L=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const CAL_TIPO={ produccion:"Producción", caducidad:"Caducidad", revision:"Revisión", merma:"Merma", recepcion:"Recepción" };

async function irA_calendario(){
  openSection("calendario","Calendario anual");
  const hoy=new Date();
  if(window._calYear==null) window._calYear=hoy.getFullYear();
  if(window._calMes==null) window._calMes=hoy.getMonth();
  window._calDia=null;
  await cargarCalendario();
}
async function cargarCalendario(){
  setInner(`<div class="empty">Cargando calendario…</div>`);
  try{ window._cal=await api("/calendario?year="+window._calYear); renderCalendario(); }
  catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}
function calYear(delta){ window._calYear+=delta; window._calDia=null; cargarCalendario(); }
function calMes(m){ window._calMes=m; window._calDia=null; renderCalendario(); }
function calDia(f){ window._calDia=(window._calDia===f?null:f); renderCalendario(); }

function renderCalendario(){
  const d=window._cal; if(!d) return;
  const year=window._calYear, mes=window._calMes, dias=d.dias||{}, meses=d.meses||[];
  const tot=meses.reduce((s,m)=>({p:s.p+m.produccion,a:s.a+m.appcc}),{p:0,a:0});
  const chips=CAL_MESES.map((nm,m)=>{
    const activo=m===mes, hay=(meses[m]&&meses[m].total)||0;
    return `<button onclick="calMes(${m})" style="border:0;border-radius:8px;padding:6px 9px;margin:2px;font-family:var(--sans);font-size:11px;font-weight:${activo?800:600};background:${activo?'var(--ink)':'#e7e1d2'};color:${activo?'#f0ebe0':'var(--ink)'};cursor:pointer;position:relative;">${nm}${hay?`<span style="position:absolute;top:3px;right:4px;width:5px;height:5px;border-radius:50%;background:${activo?'#f0ebe0':'var(--ink)'};"></span>`:""}</button>`;
  }).join("");
  const primero=(new Date(year,mes,1).getDay()+6)%7;
  const nDias=new Date(year,mes+1,0).getDate();
  const cab=["L","M","X","J","V","S","D"].map(x=>`<div style="text-align:center;font-size:9px;color:var(--muted);font-weight:700;">${x}</div>`).join("");
  let celdas="";
  for(let i=0;i<primero;i++) celdas+=`<div></div>`;
  for(let dia=1;dia<=nDias;dia++){
    const f=`${year}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
    const n=(dias[f]||[]).length, esHoy=(f===d.hoy), sel=(f===window._calDia);
    const bg=sel?'var(--ink)':(n?'#dcd4c2':'transparent'), col=sel?'#f0ebe0':'var(--ink)';
    celdas+=`<button onclick="calDia('${f}')" style="aspect-ratio:1;border:${esHoy?'1.5px solid var(--ink)':'0'};border-radius:8px;background:${bg};color:${col};font-family:var(--sans);font-size:12px;font-weight:${n?700:500};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;">${dia}${n?`<span style="font-size:8px;opacity:.8;">${n}</span>`:""}</button>`;
  }
  let detalle="";
  if(window._calDia){
    const evs=dias[window._calDia]||[];
    const fdmt=new Date(window._calDia+"T00:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
    detalle=`<div class="section-label" style="margin-top:14px;">${esc(fdmt)}</div>`;
    detalle+= evs.length? evs.map(e=>`<div class="card"><div class="card-name">${e.hora?`<span style="color:var(--muted);font-weight:600;">${esc(e.hora)}</span> `:""}${esc(e.titulo||CAL_TIPO[e.tipo]||e.tipo)}</div>${e.detalle?`<div class="card-meta">${esc(e.detalle)}${e.responsable?` · ${esc(e.responsable)}`:""}</div>`:""}</div>`).join("")
      : `<div class="empty" style="padding:14px;">Sin registros ese día.</div>`;
  }else{
    detalle=`<div class="card-meta" style="margin-top:12px;color:var(--muted);text-align:center;font-size:11px;">Toca un día con actividad para ver todo lo que pasó.</div>`;
  }
  setInner(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
      <button onclick="calYear(-1)" style="border:0;background:#e7e1d2;border-radius:8px;padding:6px 13px;font-size:16px;cursor:pointer;">‹</button>
      <div style="text-align:center;"><div style="font-family:var(--sans);font-size:20px;font-weight:800;">${year}</div>
        <div style="font-size:10px;color:var(--muted);">${tot.p} producciones · ${tot.a} registros APPCC</div></div>
      <button onclick="calYear(1)" style="border:0;background:#e7e1d2;border-radius:8px;padding:6px 13px;font-size:16px;cursor:pointer;">›</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:10px;">${chips}</div>
    <div class="section-label">${CAL_MESES_L[mes]}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:4px;">${cab}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">${celdas}</div>
    ${detalle}`);
}

        <div class="kpi-box"><div class="kpi-label">Margen carta</div><div class="kpi-val">${k.margen_medio_carta!=null?Math.round(k.margen_medio_carta*100)+" %":"—"}</div><div class="kpi-sub">${k.productos_carta||0} productos</div></div>
        <div class="kpi-box ${alerta?"warn":""}"><div class="kpi-label">Estado</div><div class="kpi-val" style="font-size:14px;padding-top:4px;${alerta?"color:var(--warn)":""}">${alerta?"Requiere atención":"En orden"}</div><div class="kpi-sub">${pendPrep?pendPrep+" pendientes de prep.":"Producción al día"}</div></div>
      </div>` : "";
  const acc = [];

// Pantalla previa estilo Aesop: prepara todo antes de empezar. No se puede
// arrancar el paso a paso sin pasar por aquí y pulsar "Todo preparado".
function pantallaPreparacion(rid, cantidad, c){
  const ing=(c.ingredientes||[]).map(i=>{
    const falta = i.suficiente===false;
    return `<div class="prep-row">
      <span class="prep-name">${esc(i.nombre)}${i.categoria?`<span class="prep-cat">${esc(i.categoria)}</span>`:""}${i.observaciones?`<span class="prep-obs">${esc(i.observaciones)}</span>`:""}</span>
      <span class="prep-qty${falta?" falta":""}">${i.cantidad_necesaria} ${esc(i.unidad||"")}</span>
    </div>${falta?`<div class="prep-warn">Stock corto · disponible ${i.disponibilidad_actual} ${esc(i.unidad||"")}. Revísalo antes de continuar.</div>`:""}`;
  }).join("");
  const mat=(c.materiales||[]).map(m=>`<div class="prep-mat"><span class="prep-tick">○</span> ${esc(m)}</div>`).join("");
  el("wizard-root").innerHTML=`
    <div class="prep-overlay">
      <div class="prep-top">
        <span class="prep-eyebrow">Preparación · paso previo</span>
        <button class="wiz-close" onclick="cerrarWizard()">Cerrar ✕</button>
      </div>
      <div class="prep-wrap">
        <div class="prep-title">${esc(c.nombre_receta)}</div>
        <div class="prep-sub">${cantidad} ${esc(c.unidad||"")} · vida útil ${c.vida_util_horas} h · ${(c.coste_estimado||0).toFixed(2)} €</div>
        <div class="prep-lead">Prepara todo antes de empezar. Revisa los ingredientes y el material; cuando lo tengas a mano, comienza.</div>

        <div class="prep-h">Ingredientes necesarios</div>
        <div class="prep-list">${ing||'<div class="prep-empty">Sin ingredientes definidos.</div>'}</div>

        <div class="prep-h">Material necesario</div>
        <div class="prep-list">${mat}</div>
      </div>
      <div class="prep-footer">
        <button class="wiz-ok" onclick="comenzarProduccion('${rid}',${cantidad},this)">Todo preparado · comenzar</button>
      </div>
    </div>`;
  document.body.style.overflow="hidden";
}

// "Todo preparado": crea la preparación y arranca el paso a paso.
async function comenzarProduccion(rid, cantidad, btn){
  if(btn){ btn.disabled=true; btn.textContent="Comenzando…"; }
  try {
    const p = await api("/preparaciones",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({receta_id:rid,cantidad_objetivo:cantidad,responsable:(getUser()&&getUser().nombre)||"Sin asignar"})});
    document.body.style.overflow="";
    pintarWizard(p);
  } catch(e){ alert(e.message); if(btn){ btn.disabled=false; btn.textContent="Todo preparado · comenzar"; } }
}

async function abrirWizard(id) {
  try {
    const todas = await api("/preparaciones?estado=En curso");
    const p = todas.find(x=>x.id===id);
    if(!p){alert("No encontrada.");return;}
    pintarWizard(p);
  } catch(e){alert(e.message);}
}

function cerrarWizard() {
  el("wizard-root").innerHTML="";
  document.body.style.overflow="";
  if(currentSection==="preparaciones") irA_preparaciones();
  else loadHome();
}

function pintarWizard(p) {
  const total=p.pasos.length, actual=p.paso_actual;
  const pct=Math.round((actual/total)*100);
  if(actual>=total){
    el("wizard-root").innerHTML=`
      <div class="wizard-overlay">
        <div class="wiz-bar"><div class="wiz-bar-fill" style="width:100%"></div></div>
        <div class="wiz-top"><span class="wiz-step">Completado</span><button class="wiz-close" onclick="cerrarWizard()">Cerrar</button></div>
        <div class="wiz-body">
          <div class="wiz-done">Preparación finalizada</div>
          <div class="wiz-done-meta">${p.nombre_receta} · ${p.cantidad_objetivo} g · ${p.responsable}</div>
          <button class="wiz-ok" onclick="finalizarPrep('${p.id}')">Crear lote</button>
        </div>
      </div>`;
    return;
  }
  const paso=p.pasos[actual];
  const esIng=paso.tipo==="ingrediente";
  el("wizard-root").innerHTML=`
    <div class="wizard-overlay">
      <div class="wiz-bar"><div class="wiz-bar-fill" style="width:${pct}%"></div></div>
      <div class="wiz-top">
        <span class="wiz-step">Paso ${actual+1} de ${total}</span>
        <button class="wiz-close" onclick="cerrarWizard()">Cerrar</button>
      </div>
      <div class="wiz-body">
        <div class="wiz-recipe">${p.nombre_receta}</div>
        <div class="wiz-action">${paso.texto}</div>
        ${esIng?`<div class="wiz-num">${paso.cantidad}</div><div class="wiz-unit">${paso.unidad}</div>`:""}
      </div>
      <div class="wiz-footer">
        <button class="wiz-ok" onclick="confirmarPaso('${p.id}')">OK — Siguiente</button>
      </div>
    </div>`;
}

async function confirmarPaso(id){
  try{const p=await api(`/preparaciones/${id}/confirmar-paso`,{method:"POST"});pintarWizard(p);}
  catch(e){alert(e.message);}
}

async function finalizarPrep(id){
  if(!bloqueaDoble("finalizar-"+id)) return;
  const u=getUser(); const resp=encodeURIComponent(u?u.nombre:"");
  // Abrimos la ventana YA (dentro del clic) para que el móvil no la bloquee;
  // luego la redirigimos a la etiqueta del lote recién creado.
  const w=window.open("","_blank");
  try{
    const d=await api(`/preparaciones/${id}/finalizar`,{method:"POST"});
    const loteId=(d.lote&&d.lote.id)||(d.etiqueta&&d.etiqueta.lote_id);
    if(loteId&&w){ w.location.href=`/etiqueta/lote/${loteId}?print=1&usuario=${resp}&responsable=${resp}`; }
    else if(w){ w.close(); }
    cerrarWizard();
  }catch(e){ if(w)w.close(); alert(e.message); }
  finally{ liberaDoble("finalizar-"+id); }
}

// ── FICHA TÉCNICA · detalle de producto a pantalla completa (layout etiqueta) ──
function fmtFecha(iso){ try{return new Date(iso).toLocaleDateString("es-ES",{day:"2-digit",month:"2-digit",year:"numeric"});}catch(e){return "—";} }

function fichaTecnica({ eyebrow, nombre, sub, code, filas, nota, acciones }){
  const rows = (filas||[]).map(f=>`<div class="frow"><span class="k">${f.k}</span><span class="v${f.alerta?" alert":""}">${f.v}</span></div>`).join("");
  el("wizard-root").innerHTML = `
    <div class="ficha-overlay">
      <div class="ficha-top">
        <span class="ficha-eyebrow">${eyebrow||"Ficha técnica"}</span>
        <button class="wiz-close" onclick="cerrarFicha()">Cerrar ✕</button>
      </div>
      <div class="ficha-wrap">
        <div class="ficha-card">
          <div class="ficha-spine">
            <span class="mark"><i></i><i></i><i></i></span>
            <div class="ficha-brand">m de<br>materia</div>
          </div>
          <div class="ficha-body">
            <div class="ficha-head">
              <div class="ficha-name">${nombre}</div>
              ${sub?`<div class="ficha-sub">${sub}</div>`:""}
              ${code?`<div class="ficha-code">${code}</div>`:""}
            </div>
            <div class="ficha-rows">${rows}</div>
            ${nota?`<div class="ficha-note">${nota}</div>`:""}
          </div>
        </div>
        ${acciones?`<div class="ficha-actions">${acciones}</div>`:""}
      </div>
    </div>`;
  document.body.style.overflow="hidden";
}
function cerrarFicha(){ el("wizard-root").innerHTML=""; document.body.style.overflow=""; }

async function verMateria(id){
  try{
    const m=await api("/materias/"+id);
    const baja=m.estado_stock!=="correcto";
    const num=(x)=>x!=null&&x!==""?x:null;
    const filas=[
      { k:"Estado", v:m.estado_stock_etiqueta||"—", alerta:baja },
      { k:"Código", v:m.codigo_interno||(m.id||"").toUpperCase() },
      { k:"Categoría", v:`${esc(m.macro)} › ${esc(m.subcategoria)}` },
      { k:"Disponible", v:`${m.disponibilidad_actual} ${esc(m.unidad||"")}`, alerta:baja },
      m.autonomia_dias!=null?{ k:"Autonomía", v:`${m.autonomia_dias} día${m.autonomia_dias===1?"":"s"} · ${m.consumo_diario} ${esc(m.unidad||"")}/día${m.autonomia_fuente==="estimado"?" (est.)":""}`, alerta:m.autonomia_dias<=2 }:null,
      { k:"Mín · pedido · óptimo", v:`${m.stock_minimo} · ${m.punto_pedido}${m.stock_optimo!=null?` · ${m.stock_optimo}`:""} ${esc(m.unidad||"")}` },
      num(m.precio_compra)!=null?{ k:"Precio compra", v:`${Number(m.precio_compra).toFixed(4)} €` }:null,
      num(m.precio_pactado)!=null?{ k:"Precio pactado", v:`${Number(m.precio_pactado).toFixed(4)} €` }:null,
      num(m.iva)!=null?{ k:"IVA", v:`${m.iva} %` }:null,
      { k:"Coste medio", v:`${(Number(m.coste_medio)||0).toFixed(4)} €/${esc(m.unidad||"")}` },
      { k:"Valor stock", v:`${(m.valor_stock_actual||0).toFixed(2)} €` },
      (m.unidad_compra||m.conversion)?{ k:"Compra · consumo", v:`${esc(m.unidad_compra||"—")}${m.conversion?` (×${m.conversion})`:""} → ${esc(m.unidad_consumo||m.unidad||"—")}` }:null,
      m.vida_util_horas?{ k:"Vida útil", v:`${m.vida_util_horas} h` }:null,
      { k:"Ubicación", v:m.ubicacion||"— sin ubicar —" },
      { k:"Proveedor", v:m.proveedor_nombre },
      m.proveedores_alt?{ k:"Alternativos", v:esc(m.proveedores_alt) }:null,
      m.lote?{ k:"Lote", v:esc(m.lote) }:null,
      m.fecha_ultima_compra?{ k:"Última compra", v:fmtFecha(m.fecha_ultima_compra) }:null,
    ].filter(Boolean);
    const fotos=(m.foto_url||m.foto_etiqueta_url)
      ? `<div style="display:flex;gap:8px;margin-top:12px;">${m.foto_url?`<img src="${m.foto_url}" style="max-width:48%;border-radius:6px;">`:""}${m.foto_etiqueta_url?`<img src="${m.foto_etiqueta_url}" style="max-width:48%;border-radius:6px;">`:""}</div>`:"";
    const acc=
      `<button class="btn-primary" onclick="formProducto('${m.id}')">Editar producto</button>`
      +(baja&&m.proveedor_whatsapp?`<button class="btn-ghost" onclick="whatsapp('${m.proveedor_whatsapp.replace(/[^0-9+]/g,"")}','${encodeURIComponent("Hola, necesitamos reponer "+m.nombre+" para m de materia.")}')">Pedir por WhatsApp</button>`:"");
    fichaTecnica({ eyebrow:"Producto · Almacén", nombre:m.nombre, sub:`${esc(m.subcategoria)} · ${esc(m.unidad||"")}`,
      code:`${esc(m.codigo_interno||(m.id||"").toUpperCase())}`, filas,
      nota:(m.observaciones?esc(m.observaciones)+"<br>":"")+fotos, acciones:acc });
  }catch(e){alert(e.message);}
}

async function verLote(id){
  try{
    const lotes=await api("/lotes");
    const l=lotes.find(x=>x.id===id); if(!l){alert("Lote no encontrado");return;}
    const alerta=(l.estado==="Requiere atención"||l.caducado);
    const filas=[
      { k:"Código", v:l.codigo },
      { k:"Producto", v:l.nombre||"—" },
      { k:"Cantidad", v:`${l.cantidad_restante} / ${l.cantidad_inicial} g` },
      { k:"Estado", v:l.estado, alerta },
      { k:"Ubicación", v:l.ubicacion },
      { k:"Producido", v:fmtFecha(l.producido_en) },
      { k:"Caduca", v:l.caducado?"Fuera de plazo":fmtFecha(l.caduca_en), alerta:l.caducado },
      { k:"Restante", v:l.caducado?"—":`${l.horas_restantes} h` },
    ];
    const enServicio=(l.cantidad_restante>0 && l.estado!=="Fuera de servicio" && !l.caducado);
    const acc=
      (enServicio?`<button class="btn-primary" onclick="registrarConsumoLote('${l.id}',${l.cantidad_restante})">Registrar consumo</button>`:"")
      +`<button class="btn-ghost" onclick="imprimirEtiqueta('${l.id}')">Imprimir etiqueta</button>`
      +`<button class="btn-ghost" onclick="verQRLote('${l.id}')">Ver QR · vida útil</button>`
      +`<button class="btn-ghost" onclick="copiarEnlaceLote('${l.id}')">Copiar enlace</button>`
      +(l.caducado&&l.estado!=="Fuera de servicio"?`<button class="btn-warn" onclick="darDeBaja('${l.id}',()=>{cerrarFicha();irA_lotes();})">Dar de baja</button>`:"");
    fichaTecnica({ eyebrow:"Ficha técnica · Lote", nombre:l.codigo, sub:l.nombre||"lote de producción",
      code:"LOTE<br>SERIE 01", filas,
      nota:"Lote de producción · conservar siempre en frío. Elaborado en pequeñas cantidades.", acciones:acc });
  }catch(e){alert(e.message);}
}

// ── LOTES ─────────────────────────────────────────────
async function irA_lotes(){
  openSection("lotes","Lotes activos");
  try{
    const lotes=await api("/lotes");
    const activos=lotes.filter(l=>l.estado!=="Fuera de servicio");
    const caducados=activos.filter(l=>l.caducado).length;
    const proximos=activos.filter(l=>!l.caducado&&l.horas_restantes!=null&&l.horas_restantes<=12).length;
    // Aviso de caducidad dentro del propio módulo (no solo en la home).
    let strip="";
    if(caducados) strip+=`<div style="background:#b5462a;color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;border-radius:10px;padding:11px 14px;margin-bottom:10px;">${caducados} ${caducados===1?"lote caducado · no debe usarse":"lotes caducados · no deben usarse"}</div>`;
    if(proximos) strip+=`<div style="background:#f6ecd5;color:#7a5a1e;font-family:var(--sans);font-size:13px;font-weight:600;border-radius:10px;padding:11px 14px;margin-bottom:10px;">${proximos} ${proximos===1?"lote próximo a caducar":"lotes próximos a caducar"}</div>`;
    const orden={"Requiere atención":0,"Priorizar uso":1,"Correcto":2,"Fuera de servicio":3};
    // Caducados primero, luego por estado, luego por tiempo restante.
    const sorted=lotes.slice().sort((a,b)=>
      (b.caducado?1:0)-(a.caducado?1:0)
      || (orden[a.estado]??9)-(orden[b.estado]??9)
      || ((a.horas_restantes??1e9)-(b.horas_restantes??1e9)));
    setInner(strip+section("Todos los lotes", sorted, l=>`
      <div class="card clickable" role="button" tabindex="0" onclick="verLote('${l.id}')">
        <div class="card-name">${l.codigo} — ${l.nombre||""}${l.caducado?'<span class="badge-low">Caducado</span>':''}</div>
        <div class="card-meta">${l.ubicacion} · ${l.cantidad_restante}/${l.cantidad_inicial} g · ${l.estado} · ${l.caducado?"Fuera de plazo":l.horas_restantes+" h restantes"}</div>
      </div>`,"No hay lotes registrados."));
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function darDeBaja(id,cb){
  if(!confirm("¿Dar de baja este lote? Quedará fuera de servicio y no se podrá usar. Esta acción no se puede deshacer.")) return;
  try{await api(`/lotes/${id}/dar-de-baja`,{method:"POST"});cb();}
  catch(e){alert(e.message);}
}

// Registrar consumo real de un lote (uso en servicio). Descuenta de lo que queda.
async function registrarConsumoLote(id,restante){
  const v=prompt(`¿Cuánto se ha consumido de este lote?  (quedan ${restante})`);
  if(v==null) return;
  const cant=Number(String(v).replace(",","."));
  if(!Number.isFinite(cant)||cant<=0){ alert("Pon una cantidad válida."); return; }
  if(!bloqueaDoble("consumo-"+id)) return;
  try{
    await api(`/lotes/${id}/consumo`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({cantidad:cant,origen:"manual"})});
    cerrarFicha(); irA_lotes();
  }catch(e){ alert(e.message); }
  finally{ liberaDoble("consumo-"+id); }
}

// Abre la vista pública de vida útil en vivo (la misma que abre el QR).
function verQRLote(loteId){ window.open(`/lote/${loteId}`,"_blank"); }

// Copia al portapapeles el enlace que lleva el QR (ficha de vida útil del lote).
async function copiarEnlaceLote(loteId){
  const url=`${location.origin}/lote/${loteId}`;
  try{ await navigator.clipboard.writeText(url); alert("Enlace copiado:\n"+url); }
  catch(_){ prompt("Copia el enlace del lote:", url); }
}

const ALM_TAXONOMIA={
  "Materia Prima":["Café, Matcha y Té","Lácteos y Bebidas Vegetales","Proteínas","Vegetales y Fruta","Panadería y Bollería","Seco y Despensa","Congelado"],
  "Elaboraciones":["Cremas","Salsas","Producciones Cocina","Producciones Barra"],
  "Bebidas Terminadas":["Refrescos","Zumos","RTD M de Materia","Alcohol"],
  "Consumibles":["Packaging","Vasos y Tapas","Etiquetas","Servilletas","Material Oficina"],
  "Limpieza y APPCC":["Químicos","Desechables","APPCC","Uniformidad"],
};
const ALM_MACROS=Object.keys(ALM_TAXONOMIA);

function almBadge(crit,ped){
  if(crit) return `<span class="alm-badge crit">${crit} crítico${crit>1?"s":""}</span>`;
  if(ped) return `<span class="alm-badge pedir">${ped} por pedir</span>`;
  return "";
}

// NIVEL 1 — macrocategorías (pantalla principal minimalista) + búsqueda global.
async function irA_materias(){
  openSection("materias","Almacén");
  try{
    const data=await api("/materias/arbol");
    window._almArbol=data;
    const cards=data.macros.map(mc=>`
      <button class="alm-macro" onclick="irA_almMacro('${encodeURIComponent(mc.macro)}')">
        <span class="alm-macro-name">${esc(mc.macro)}</span>
        <span class="alm-macro-meta">${mc.total} ${mc.total===1?"producto":"productos"}</span>
        ${almBadge(mc.criticos,mc.por_pedir)}
        <span class="alm-go">→</span>
      </button>`).join("");
    setInner(`
      <input id="alm-q" class="mat-q" placeholder="Buscar en todo el almacén…" oninput="almBuscarGlobal(this.value)">
      <div id="alm-search"></div>
      <div id="alm-macros">
        <div class="alm-grid">${cards}</div>
        <div class="alm-actions"><button class="btn-ghost" onclick="formProducto()">+ Nuevo producto</button></div>
      </div>`);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// Búsqueda global instantánea (nombre, código, ubicación o proveedor).
let _almSearchT=null;
async function almBuscarGlobal(q){
  const macros=el("alm-macros"), out=el("alm-search");
  if(!out) return;
  if(!q||!q.trim()){ if(macros)macros.style.display=""; out.innerHTML=""; return; }
  if(macros) macros.style.display="none";
  clearTimeout(_almSearchT);
  _almSearchT=setTimeout(async()=>{
    try{
      const items=await api("/materias?q="+encodeURIComponent(q.trim()));
      out.innerHTML=`<div class="section-label">Resultados · ${items.length}</div>`+
        (items.length?items.map(almFila).join(""):'<div class="empty">Nada coincide. Prueba otro nombre o ubicación.</div>');
    }catch(e){ out.innerHTML=`<div class="err">${e.message}</div>`; }
  },160);
}

// NIVEL 2 — subcategorías de una macrocategoría.
async function irA_almMacro(macroEnc){
  const macro=decodeURIComponent(macroEnc);
  openSection("alm-macro","Almacén · "+macro);
  try{
    if(!window._almArbol) window._almArbol=await api("/materias/arbol");
    const mc=window._almArbol.macros.find(x=>x.macro===macro);
    const subs=(mc?mc.subcategorias:[]).map(s=>`
      <button class="alm-sub${s.total?"":" alm-sub-empty"}" onclick="irA_almSub('${encodeURIComponent(macro)}','${encodeURIComponent(s.subcategoria)}')">
        <span class="alm-sub-name">${esc(s.subcategoria)}</span>
        <span class="alm-sub-right">${almBadge(s.criticos,s.por_pedir)}<span class="alm-sub-meta">${s.total}</span><span class="alm-go">→</span></span>
      </button>`).join("");
    setInner(`<button class="btn-ghost" onclick="irA_materias()">← Almacén</button>
      <div class="section-label">${esc(macro)}</div>
      <div class="alm-sublist">${subs}</div>`);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

// NIVEL 3 — productos de una subcategoría: buscador + filtros + semáforo.
async function irA_almSub(macroEnc, subEnc){
  const macro=decodeURIComponent(macroEnc), sub=decodeURIComponent(subEnc);
  openSection("alm-sub","Almacén · "+sub);
  try{
    const items=await api(`/materias?macro=${encodeURIComponent(macro)}&sub=${encodeURIComponent(sub)}`);
    window._almSub={macro,sub,items,filtro:"todos",q:""};
    renderAlmSub();
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}
function renderAlmSub(){
  const s=window._almSub; if(!s) return;
  setInner(`<button class="btn-ghost" onclick="irA_almMacro('${encodeURIComponent(s.macro)}')">← ${esc(s.macro)}</button>
    <div class="section-label">${esc(s.sub)}</div>
    <input id="alm-subq" class="mat-q" placeholder="Buscar o por ubicación…" oninput="window._almSub.q=this.value;renderAlmSubList()">
    <div id="alm-subchips"></div>
    <div id="alm-sublist"></div>
    <div class="alm-actions"><button class="btn-ghost" onclick="formProducto(null,'${encodeURIComponent(s.macro)}','${encodeURIComponent(s.sub)}')">+ Nuevo producto aquí</button></div>`);
  const q=el("alm-subq"); if(q) q.value=s.q||"";
  renderAlmSubChips(); renderAlmSubList();
}
function renderAlmSubChips(){
  const s=window._almSub; if(!s) return;
  const crit=s.items.filter(m=>m.estado_stock==="critico").length;
  const ped=s.items.filter(m=>m.estado_stock==="por_pedir").length;
  el("alm-subchips").innerHTML=`<div class="chips">
    <button class="chip ${s.filtro==='todos'?'on':''}" onclick="window._almSub.filtro='todos';renderAlmSubChips();renderAlmSubList()">Todos · ${s.items.length}</button>
    <button class="chip ${s.filtro==='critico'?'on':''}" onclick="window._almSub.filtro='critico';renderAlmSubChips();renderAlmSubList()">Crítico · ${crit}</button>
    <button class="chip ${s.filtro==='por_pedir'?'on':''}" onclick="window._almSub.filtro='por_pedir';renderAlmSubChips();renderAlmSubList()">Por pedir · ${ped}</button>
  </div>`;
}
function renderAlmSubList(){
  const s=window._almSub; if(!s) return;
  let items=s.items.slice();
  if(s.filtro!=="todos") items=items.filter(m=>m.estado_stock===s.filtro);
  if(s.q){ const q=s.q.toLowerCase(); items=items.filter(m=>(m.nombre||"").toLowerCase().includes(q)||(m.ubicacion||"").toLowerCase().includes(q)||(m.codigo_interno||"").toLowerCase().includes(q)); }
  const ord={critico:0,por_pedir:1,correcto:2};
  items.sort((a,b)=>((ord[a.estado_stock]??9)-(ord[b.estado_stock]??9))||(a.nombre||"").localeCompare(b.nombre||""));
  el("alm-sublist").innerHTML=items.map(almFila).join("")||'<div class="empty">Nada por aquí con ese filtro.</div>';
}

async function guardarProducto(id){

    macro:v("prod-macro"), subcategoria:v("prod-sub"),
    proveedor_id:v("prod-prov")||null, proveedores_alt:v("prod-provalt").trim(),

async function irA_revisiones(){
  openSection("revisiones","Revisiones");
  try{
    const [tipos,revs]=await Promise.all([api("/revisiones/tipos"),api("/revisiones")]);
    const hoy=new Date().toDateString();
    const deHoy=revs.filter(r=>new Date(r.fecha).toDateString()===hoy);
    let html=`<div class="section-label">Revisiones de hoy</div>`;
    html+=tipos.map(t=>{
      const reg=deHoy.filter(r=>r.tipo===t.tipo).slice(-1)[0];
      if(reg?.estado==="Correcto") return card(t.tipo,`${reg.valor} · registrado`);
      if(reg&&reg.estado!=="Correcto") return card(
        t.tipo,`${reg.valor} · ${reg.estado}${reg.accion_correctiva?" · "+reg.accion_correctiva:""}`,
        `<button class="btn-primary" onclick="resolverRev('${reg.id}',irA_revisiones)">Marcar revisado</button>`);
      if(t.clase==="temperatura") return `
        <div class="card">
          <div class="card-name">${t.tipo}</div>
          <div class="field" style="margin-top:10px;">
            <label>Temperatura en ${t.unidad}</label>
            <input type="number" step="0.1" id="rev_${t.tipo.replace(/\s/g,"_")}" style="width:110px;">
          </div>
          <div class="card-actions">
            <button class="btn-ghost" onclick="regRev('${t.tipo}',document.getElementById('rev_${t.tipo.replace(/\s/g,"_")}').value)">Registrar</button>
          </div>
        </div>`;
      return card(t.tipo,"",`<button class="btn-ghost" onclick="regRev('${t.tipo}','Realizada')">Marcar realizada</button>`);
    }).join("");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

async function regRev(tipo,valor){
  if(!valor){alert("Introduce un valor.");return;}
  try{
    await api("/revisiones/registrar",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo,valor,responsable:(getUser()&&getUser().nombre)||"Sin asignar"})});
    irA_revisiones();
  }catch(e){alert(e.message);}
}

async function resolverRev(id,cb){
  try{await api(`/revisiones/${id}/resolver`,{method:"POST"});cb();}
  catch(e){alert(e.message);}
}

async function irA_ajustes(){

      <div class="section-label">Registrar ajuste</div>
      <div class="card">
        <div class="field">
          <label>¿Qué se ajusta?</label>
          <div class="toggle-row">
            <button class="toggle on" id="aj-m" onclick="ajTipo('materia')">Materia</button>
            <button class="toggle" id="aj-l" onclick="ajTipo('lote')">Lote</button>
          </div>
        </div>
        <div class="field">
          <label id="aj-ol">Materia</label>
          <select id="aj-obj" onchange="_aj.objetivoId=this.value">
            <option value="">Selecciona…</option>
            ${mat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`).join("")}
          </select>
        </div>
        <div class="field"><label>Cantidad</label><input type="number" inputmode="decimal" id="aj-cant" style="width:130px;"></div>
        <div class="field">
          <label>Motivo</label>
          <div class="toggle-row" id="aj-motivos">
            ${motivos.map(m=>`<button class="toggle" onclick="ajMotivo('${m}',this)">${m}</button>`).join("")}
          </div>
        </div>
        <div class="field"><label>Observación (opcional)</label><input type="text" id="aj-obs" style="width:100%;"></div>
        <div class="card-actions"><button class="btn-primary" onclick="regAjuste()">Registrar ajuste</button></div>
      </div>`;
    const nombreObjetivo=a=>{
      if(a.objetivo_nombre) return a.objetivo_nombre;
      if(a.tipo_objetivo==="materia"){ const m=mat.find(x=>x.id===a.objetivo_id); return m?m.nombre:a.objetivo_id; }
      const l=lotes.find(x=>x.id===a.objetivo_id); return l?l.codigo:a.objetivo_id;
    };
    html+=section("Historial reciente",hist.slice(0,6),a=>card(
      `${nombreObjetivo(a)} — ${a.cantidad}`,
      `${a.motivo} · ${a.coste_estimado.toFixed(2)} € · ${a.responsable} · ${fmt(a.fecha)}`
    ),"Sin ajustes.");
    setInner(html);
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}

function ajTipo(t){
  _aj.tipo=t;_aj.objetivoId=null;
  el("aj-m").classList.toggle("on",t==="materia");
  el("aj-l").classList.toggle("on",t==="lote");
  el("aj-ol").textContent=t==="materia"?"Materia":"Lote";
  const ops=t==="materia"
    ?window._ajMat.map(m=>`<option value="${m.id}">${m.nombre} (${m.disponibilidad_actual} ${m.unidad})</option>`)
    :window._ajLotes.map(l=>`<option value="${l.id}">${l.codigo} — ${l.nombre} (${l.cantidad_restante} restantes)</option>`);
  el("aj-obj").innerHTML=`<option value="">Selecciona…</option>${ops.join("")}`;
}

function ajMotivo(m,btn){
  _aj.motivo=m;
  document.querySelectorAll("#aj-motivos .toggle").forEach(b=>b.classList.remove("on"));
  btn.classList.add("on");
}

async function regAjuste(){
  const obj=el("aj-obj").value,cant=Number(el("aj-cant").value),obs=el("aj-obs").value;
  if(!obj){alert("Selecciona materia o lote.");return;}
  if(!cant||cant<=0){alert("Cantidad inválida.");return;}
  if(!_aj.motivo){alert("Selecciona un motivo.");return;}
  try{
    await api("/ajustes",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({tipo_objetivo:_aj.tipo,objetivo_id:obj,cantidad:cant,motivo:_aj.motivo,observacion:obs,responsable:(getUser()&&getUser().nombre)||"Sin asignar"})});
    irA_ajustes();
  }catch(e){alert(e.message);}
}

async function guardarProveedor(btn){
  const msg=el("pv-msg");
  const body={
    nombre:el("pv-nombre").value.trim(),
    categoria:el("pv-cat").value,
    contacto:el("pv-contacto").value.trim(),
    telefono:el("pv-tel").value.trim(),
    email:el("pv-email").value.trim(),
    direccion:el("pv-dir").value.trim(),
    estado:el("pv-estado").value,
    notas:el("pv-notas").value.trim(),
  };
  if(window._provFoto!==undefined && window._provFoto!==null) body.foto_url=window._provFoto; // "" borra, dataURL nueva
  if(!body.nombre){ if(msg) msg.textContent="Revísalo antes de continuar: indica el nombre del proveedor."; return; }
  if(btn){btn.disabled=true;}
  try{
    if(window._provEditId){
      await api("/proveedores/"+window._provEditId,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    }else{
      await api("/proveedores",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});

    irA_proveedores();

}

// ── PRODUCTOS POR PROVEEDOR ───────────────────────────
const eur4=(n)=>Number(n||0).toFixed(2);
async function irA_productosProveedor(provId){
  openSection("prov-productos","Productos del proveedor");
  try{
    const [prov,prods,meta]=await Promise.all([
      api("/proveedores/"+provId),
      api("/compras-productos?proveedor_id="+provId),
      api("/compras-productos/meta"),
    ]);
    window._cprMeta=meta; window._cprProv=prov;
    const cab=`<div class="section-label">${esc(prov.nombre)}</div>
      <div class="card-actions" style="margin-bottom:14px;">
        <button class="btn-primary" onclick="formProductoCompra('${provId}')">Agregar producto</button>
        <button class="btn-ghost" onclick="irA_proveedores()">← Proveedores</button>
      </div>`;
    if(!prods.length){ setInner(cab+`<div class="empty">Aún no hay productos de este proveedor. Pulsa “Agregar producto”.</div>`); return; }
    prods.sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||""));
    const html=cab+prods.map(p=>`<div class="card">
      <div class="card-name">${esc(p.nombre)}</div>
      <div class="card-meta">${esc(p.categoria||"")} · ${p.cantidad_formato||1} ${esc(p.formato||"")} · pactado ${eur4(p.precio_con_iva)} € (IVA ${p.iva||0}%) · unitario ${eur4(p.precio_unitario_real)} €/${esc(p.formato||"ud")}</div>
      ${(p.alergenos&&p.alergenos.length)?`<div class="card-meta" style="color:var(--alert)">Alérgenos: ${p.alergenos.map(esc).join(", ")}</div>`:""}
      <div class="card-actions">
        <button class="btn-ghost" onclick="irA_precioProducto('${p.id}','${provId}')">Precio / histórico</button>
        <button class="btn-ghost" onclick="formProductoCompra('${provId}','${p.id}')">Editar</button>
        <button class="btn-ghost" onclick="borrarProductoCompra('${p.id}','${provId}')">Eliminar</button>
      </div>
    </div>`).join("");
    setInner(html);
  }catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}

function calcPrecioProd(){
  const sin=Number(el("cp-siniva").value)||0;
  const iva=Number(el("cp-iva").value)||0;
  const cant=Number(el("cp-cant").value)||0;
  const con=sin*(1+iva/100);
  const uni=cant>0?con/cant:con;
  const out=el("cp-calc");
  if(out) out.innerHTML=`Precio con IVA: <b>${con.toFixed(2)} €</b> · Precio unitario real: <b>${uni.toFixed(4)} €</b>`;
}

      <div class="field"><label>Precio pactado sin IVA (€)</label><input id="cp-siniva" type="number" step="0.0001" value="${p.precio_sin_iva||0}" style="width:140px;" oninput="calcPrecioProd()"></div>
      <div class="field"><label>IVA (%)</label><input id="cp-iva" type="number" step="1" value="${p.iva!=null?p.iva:10}" style="width:100px;" oninput="calcPrecioProd()"></div>

      <div class="field"><label>Código interno</label><input id="cp-cod" value="${esc(p.codigo_interno)}" style="width:100%;"></div>
      <div class="field"><label>Referencia del proveedor</label><input id="cp-ref" value="${esc(p.referencia_proveedor)}" style="width:100%;"></div>
      <div class="field"><label>Stock mínimo</label><input id="cp-smin" type="number" step="0.001" value="${p.stock_minimo||0}" style="width:120px;"></div>
      <div class="field"><label>Stock ideal</label><input id="cp-sideal" type="number" step="0.001" value="${p.stock_ideal||0}" style="width:120px;"></div>
      <div class="field"><label>Caducidad habitual</label><input id="cp-cad" value="${esc(p.caducidad_habitual)}" placeholder="p. ej. 5 días" style="width:100%;"></div>

      <div class="card-name">Alérgenos</div>
      <div style="display:flex;flex-wrap:wrap;">${alg}</div>
    </div>

async function elegirFotoProd(input){

    el("cp-foto-prev").innerHTML=`<img src="${window._cprFoto}" style="max-width:100%;max-height:200px;border-radius:6px;margin-top:8px;">`;
  }catch(e){ const m=el("cp-msg"); if(m) m.textContent="No se pudo cargar la foto: "+e.message; }

// ── PRECIO PACTADO + HISTÓRICO ────────────────────────
async function irA_precioProducto(prodId,provId){
  openSection("prov-precio","Precio del producto");
  try{
    const [p,hist]=await Promise.all([api("/compras-productos/"+prodId),api("/compras-productos/"+prodId+"/historico")]);
    window._precProd=p; window._precProvId=provId; window._precDoc=null;
    const histHtml=hist.length?hist.map(h=>{
      const f=new Date(h.fecha).toLocaleDateString("es-ES");
      const sube=h.precio_nuevo>h.precio_anterior;
      return `<div class="card">
        <div class="card-meta">${f} · <b style="color:${sube?"var(--alert)":"var(--olive)"}">${eur4(h.precio_anterior)} € → ${eur4(h.precio_nuevo)} €</b> ${sube?"↑":"↓"}</div>
        <div class="card-meta">${esc(h.motivo)} · ${esc(h.responsable)}${h.tiene_documento?" · 📎 con documento":""}</div>
      </div>`;

      <div class="section-label">${esc(p.nombre)}</div>
      <div class="card">
        <div class="card-name">Precio pactado actual</div>
        <div class="card-meta">Sin IVA: <b>${eur4(p.precio_sin_iva)} €</b> · IVA ${p.iva||0}% · Con IVA: <b>${eur4(p.precio_con_iva)} €</b> · Unitario real: <b>${eur4(p.precio_unitario_real)} €/${esc(p.formato||"ud")}</b></div>
      </div>
      <div class="card">
        <div class="card-name">Cambiar precio</div>
        <div class="field"><label>Nuevo precio sin IVA (€)</label><input id="pr-nuevo" type="number" step="0.0001" value="${p.precio_sin_iva||0}" style="width:140px;"></div>
        <div class="field"><label>Motivo</label><input id="pr-motivo" placeholder="p. ej. Subida de proveedor" style="width:100%;"></div>
        <input type="file" accept="image/*" capture="environment" id="pr-file" style="display:none" onchange="elegirDocPrecio(this)">
        <div class="card-actions">
          <button class="btn-ghost" onclick="document.getElementById('pr-file').click()">Adjuntar documento/foto</button>
        </div>

        <div class="card-actions">

      </div>

async function guardarCambioPrecio(btn){

    await api("/compras-productos/"+window._precProd.id,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});
    irA_precioProducto(window._precProd.id,window._precProvId);
  }catch(e){ if(msg) msg.textContent="Esto no cuadra: "+e.message; if(btn){btn.disabled=false;} }

// ── PEDIDOS ───────────────────────────────────────────
async function irA_pedidos(pre){
  openSection("pedidos","Pedidos");
  try{
    const [provs,mats,peds,sug]=await Promise.all([api("/proveedores"),api("/materias"),api("/pedidos"),api("/pedidos/sugerencias").catch(()=>[])]);
    window._provPed=provs; window._matPed=mats; window._pedSug=sug;
    // Sugerencias de compra POR PROVEEDOR (lo mismo que el aviso de las 16:00).
    let sugHtml="";
    if(sug.length){
      sugHtml=`<div class="section-label">Sugerencias de compra · por proveedor</div>`+
        sug.map((g,idx)=>{
          const items=g.items.map(it=>`${esc(it.nombre)} <span style="color:${it.estado==='critico'?'var(--alert)':'#c79a3a'};font-weight:700;">(${it.estado==='critico'?'bajo mínimo':'va justo'})</span> · sugerido ${it.cantidad_sugerida} ${esc(it.unidad)}`).join("<br>");
          return `<div class="card" style="${g.criticos?'border-color:var(--alert);':''}">
            <div class="card-name">${esc(g.proveedor)} · ${g.total_items} producto(s)${g.criticos?` · ${g.criticos} bajo mínimo`:""}</div>
            <div class="card-meta" style="margin-top:4px;line-height:1.6;">${items}</div>
            <div class="card-actions"><button class="btn-primary" onclick="prepararPedidoDesdeSug(${idx})">Preparar pedido</button></div>
          </div>`;
        }).join("");
    }
    let html=sugHtml+`
      <div class="section-label">Nuevo pedido</div>
      <div class="card">
        <div class="field"><label>Proveedor</label>
          <select id="ped-prov" onchange="renderPedidoLineas()">
            <option value="">Selecciona…</option>
            ${provs.map(p=>`<option value="${p.id}">${p.nombre}</option>`).join("")}
          </select>
        </div>
        <div id="ped-lineas"></div>
        <div class="card-actions"><button class="btn-primary" onclick="crearPedido()">Crear pedido</button></div>
      </div>`;
    html+=section("Pedidos realizados",peds,p=>{
      const prov=provs.find(x=>x.id===p.proveedor_id);
      const wa=(prov&&prov.whatsapp&&p.estado!=="recibido")?`<button class="btn-ghost" onclick="enviarPedidoWA('${p.id}')">Enviar por WhatsApp</button>`:"";
      const recibir=(p.estado!=="recibido")?`<button class="btn-primary" onclick="recibirPedido('${p.id}','${p.proveedor_id}','${esc(p.codigo)}')">Recibir</button>`:"";
      return card(
        `${esc(p.codigo)} — ${esc(p.proveedor_nombre)}`,
        `${esc(p.estado)} · ${(p.total_estimado||0).toFixed(2)} € · ${p.lineas.length} producto(s) · ${new Date(p.fecha).toLocaleDateString("es-ES")}`,
        recibir+wa,
        `<div style="font-size:10px;color:#888070;margin-top:6px;">${p.lineas.map(l=>{const pu=Number(l.precio_esperado)||0;return `${esc(l.nombre)}: ${l.cantidad} ${esc(l.unidad||"")} × ${pu.toFixed(4)} €/${esc(l.unidad||"ud")} = ${(l.cantidad*pu).toFixed(2)} €`;}).join("<br>")}</div>`
      );
    },"Aún no hay pedidos.");
    setInner(html);
    // Si venimos del aviso "Pedir a X": proveedor preseleccionado y cantidades
    // sugeridas ya puestas. El usuario solo revisa y confirma.
    if(pre&&pre.proveedor_id){
      const sel=el("ped-prov");
      if(sel){ sel.value=pre.proveedor_id; renderPedidoLineas(); }
      (pre.sugeridos||[]).forEach(s=>{
        const row=document.querySelector(`.ped-row[data-mat="${s.materia_id}"]`);
        if(row){ const inp=row.querySelector(".ped-cant"); if(inp && s.cantidad>0) inp.value=s.cantidad; }
      });
    }
  }catch(e){setInner(`<div class="err">${e.message}</div>`);}
}

function renderPedidoLineas(){
  const provId=el("ped-prov").value, cont=el("ped-lineas"); if(!cont) return;
  if(!provId){cont.innerHTML="";return;}
  const prov=(window._provPed||[]).find(p=>p.id===provId);
  const aso=(prov&&prov.productos_asociados)||[];
  let mats=(window._matPed||[]).filter(m=>aso.includes(m.id));
  if(!mats.length) mats=window._matPed||[];
  cont.innerHTML=`<div class="section-label" style="margin-top:8px;">Productos (pon cantidad a los que pidas)</div>`+
    mats.map(m=>`<div class="ped-row" data-mat="${m.id}" style="display:flex;gap:6px;align-items:center;margin-top:6px;flex-wrap:wrap;">
      <span style="font-size:11px;flex:1;min-width:90px;">${m.nombre}</span>
      <input class="ped-cant" type="number" inputmode="decimal" step="0.01" placeholder="0" style="width:62px;font-size:11px;">
      <span style="font-size:10px;color:#888070;">${m.unidad}</span>
      <input class="ped-precio" type="number" inputmode="decimal" step="0.0001" value="${m.coste_medio}" style="width:74px;font-size:11px;" title="Precio esperado por ${m.unidad}">
      <span style="font-size:10px;color:#888070;">€/${m.unidad}</span>
    </div>`).join("");
}

async function crearPedido(){
  const provId=el("ped-prov").value;
  if(!provId){alert("Selecciona un proveedor.");return;}
  const lineas=[...document.querySelectorAll(".ped-row")].map(r=>({
    materia_id:r.dataset.mat,
    cantidad:Number(r.querySelector(".ped-cant").value)||0,
    precio_esperado:Number(r.querySelector(".ped-precio").value)||0,
  })).filter(l=>l.cantidad>0);
  if(!lineas.length){alert("Pon cantidad en al menos un producto.");return;}
  if(!bloqueaDoble("pedido")) return;
  try{
    const p=await api("/pedidos",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({proveedor_id:provId,lineas})});
    if(confirm("Pedido creado. ¿Enviarlo ahora por WhatsApp al proveedor?")){ enviarPedidoWA(p.id); }
    else { irA_pedidos(); }
  }catch(e){alert(e.message);}
  finally{ liberaDoble("pedido"); }
}

async function enviarPedidoWA(id){
  try{
    const p=await api(`/pedidos/${id}`);
    let prov=(window._provPed||[]).find(x=>x.id===p.proveedor_id);
    if(!prov) prov=await api(`/proveedores/${p.proveedor_id}`);
    const tel=(prov.whatsapp||"").replace(/[^0-9+]/g,"").replace(/^\+/,"");
    if(!tel){alert("Este proveedor no tiene WhatsApp.");return;}
    const lineas=p.lineas.map(l=>{const pu=Number(l.precio_esperado)||0;return `• ${l.nombre}: ${l.cantidad} ${l.unidad} × ${pu.toFixed(2)} €/${l.unidad||"ud"} = ${(l.cantidad*pu).toFixed(2)} €`;}).join("\n");
    const total=(Number(p.total_estimado)||p.lineas.reduce((s,l)=>s+l.cantidad*(Number(l.precio_esperado)||0),0)).toFixed(2);
    const texto=`Hola ${prov.contacto||""}, pedido de M de Materia (${p.codigo}):\n${lineas}\n\nTotal estimado: ${total} €\n\nGracias.`;
    window.open(`https://wa.me/${tel}?text=${encodeURIComponent(texto)}`,"_blank");
    await api(`/pedidos/${id}/enviado`,{method:"POST"}).catch(()=>{});
    irA_pedidos();

// Descarga el PDF del trimestre con la sesión (token), para enviar a la gestoría.
async function descargarTrimestre(year,q,btn){
  const prev=btn?btn.textContent:""; if(btn){btn.disabled=true;btn.textContent="Generando PDF…";}
  try{
    const r=await fetch(API+`/recepciones/trimestre/${year}/${q}/pdf`,{headers:{Authorization:"Bearer "+getToken()}});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||"No se pudo generar el PDF"); }
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=`albaranes-${year}-T${q}.pdf`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),8000);
  }catch(e){ alert(e.message); }
  finally{ if(btn){btn.disabled=false;btn.textContent=prev;} }
}
