.todo-chip:hover { border-color: rgba(236,234,227,.9); background: rgba(236,234,227,.06); }
.todo-chip .n { background: var(--cream); color: var(--ink); border-radius: 0; }
.todo-clear { color: rgba(236,234,227,.82); }

/* KPIs como celdas de ficha técnica (key/val). */
.home-kpis { border: 1px solid var(--line); gap: 0; }
.kpi-box { border: none; border-right: 1px solid var(--line); padding: 16px 16px; }
.kpi-box:last-child { border-right: none; }
.kpi-box::before { display: none; }
.kpi-label { font-size: 8.5px; letter-spacing: .14em; }
.kpi-val { font-family: 'Courier Prime', monospace; }

/* Imagotipo ||| más fino y en tinta. */
.mark i { background: currentColor; }

/* Tarjetas de producto clicables (abren la ficha a pantalla completa). */
.card.clickable { cursor: pointer; }
.card.clickable:hover { background: var(--paper); }
.card-acts { margin-top: 14px; }

/* ── FICHA TÉCNICA a pantalla completa (layout de etiqueta) ── */
.ficha-overlay { position: fixed; inset: 0; background: var(--cream); z-index: 1000;
  display: flex; flex-direction: column; overflow-y: auto; }
.ficha-top { display: flex; justify-content: space-between; align-items: center;
  padding: 18px 24px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
.ficha-eyebrow { font-size: 9px; letter-spacing: .22em; text-transform: lowercase; color: var(--muted); }
.ficha-wrap { flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 40px 24px; }
.ficha-card { width: 100%; max-width: 680px; border: 1px solid var(--ink); display: flex; background: var(--cream); }
.ficha-spine { width: 92px; flex-shrink: 0; border-right: 1px solid var(--ink);
  display: flex; flex-direction: column; justify-content: space-between; padding: 18px 0 18px 16px; }
.ficha-spine .mark i { height: 18px; width: 2.5px; }
.ficha-brand { font-family: var(--sans); font-size: 11px; font-weight: 700; line-height: 1.3;
  text-transform: lowercase; letter-spacing: .02em; }
.ficha-body { flex: 1; }
.ficha-head { padding: 18px 20px; border-bottom: 1px solid var(--ink); position: relative; }
.ficha-name { font-family: var(--sans); font-size: 24px; font-weight: 700;
  text-transform: lowercase; letter-spacing: .04em; line-height: 1; }
.ficha-sub { font-size: 11px; color: var(--muted); margin-top: 7px; letter-spacing: .04em; }
.ficha-code { position: absolute; top: 18px; right: 20px; text-align: right;
  font-family: 'Courier Prime', monospace; font-size: 10px; letter-spacing: .08em; color: var(--muted); line-height: 1.5; }
.ficha-rows { padding: 6px 20px 14px; }
.frow { display: flex; justify-content: space-between; align-items: baseline; gap: 16px;
  padding: 10px 0; border-bottom: 1px solid var(--line); font-family: 'Courier Prime', monospace; font-size: 12px; }
.frow:last-child { border-bottom: none; }
.frow .k { color: var(--muted); letter-spacing: .12em; text-transform: lowercase; font-size: 10px; }
.frow .v { color: var(--ink); text-align: right; }
.frow .v.alert { font-weight: 700; }
.ficha-note { padding: 14px 20px; border-top: 1px solid var(--ink);
  font-family: 'Courier Prime', monospace; font-size: 9.5px; letter-spacing: .04em;
  text-transform: lowercase; color: var(--muted); line-height: 1.7; }
.ficha-actions { width: 100%; max-width: 680px; display: flex; gap: 10px; margin-top: 18px; flex-wrap: wrap; }
@media (max-width: 680px) {
  .ficha-spine { width: 64px; padding: 14px 0 14px 12px; }
  .ficha-name { font-size: 20px; }
  .ficha-code { position: static; text-align: left; margin-top: 8px; }
}

/* ════════════════════════════════════════════════════════
   LAYOUT PRO · marco oliva + inicio en filas (referencia TPV)
   ════════════════════════════════════════════════════════ */

/* Barra superior oliva con 3 zonas: marca · ||| · control total */
.topbar { background: var(--olivebar); color: var(--oliveink); height: 94px;
  padding: 0 42px; gap: 0; justify-content: space-between;
  box-shadow: 0 2px 10px rgba(23,21,15,.16); z-index: 5; position: relative; }
.topbar-left { display: flex; align-items: center; gap: 14px; flex: 1; }
.topbar-center { flex: 0 0 auto; }
.topbar-right { flex: 1; display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
.topbar .brandword { font-family: 'Courier Prime', monospace; font-size: 15px;
  font-weight:700; letter-spacing: .2em; text-transform: lowercase; color: var(--oliveink);
  cursor: pointer; transition: opacity .15s ease; }
.topbar .brandword:hover { opacity: .7; }
.topbar .brandword:focus-visible { outline: 1px solid var(--oliveink); outline-offset: 3px; border-radius: 2px; }
/* Botón de inicio en el centro de la barra (antes iba el imagotipo). */
.topbar-inicio { font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: .12em;
  text-transform: lowercase; color: var(--oliveink); background: none; border: 1px solid var(--line);
  border-radius: 100px; padding: 7px 18px; cursor: pointer; transition: border-color .15s, color .15s; }
.topbar-inicio:hover { color: var(--ink); border-color: var(--oliveink); }
.topbar-inicio:focus-visible { outline: 2px solid var(--sev-info); outline-offset: 2px; }
/* Ajustes · arriba a la derecha, siempre visible (también en móvil). */
.topbar-aj { font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: .06em;
  text-transform: lowercase; color: var(--oliveink); background: none; border: 1px solid var(--line);
  border-radius: 100px; padding: 7px 15px; cursor: pointer; transition: border-color .15s, color .15s; }
.topbar-aj:hover { color: var(--ink); border-color: var(--oliveink); }
.topbar-aj:focus-visible { outline: 2px solid var(--sev-info); outline-offset: 2px; }

/* Imagotipo ||| incrustado (en relieve) en verde sobre la barra oliva. */
.topbar-center .mark { gap: 11px; cursor: pointer; }
.topbar-center .mark i {
  width: 6px; height: 48px; border-radius: 5px;
  background: #262B1E; /* surco más oscuro que la barra: mayor profundidad */
  box-shadow:
    inset 2.2px 2.2px 3.5px rgba(0,0,0,.72),
    inset 4px 4px 7px rgba(0,0,0,.40),
    inset -1.6px -1.6px 2.4px rgba(231,228,215,.16),
    0 1.5px 0 rgba(231,228,215,.18); /* labio de luz al pie (efecto tallado hondo) */
}
.topbar-section { font-family: 'Courier Prime', monospace; font-size: 12px;
  letter-spacing: .18em; text-transform: lowercase; color: var(--oliveink); flex: 0; }
.topbar-back { background: none; border: none; color: var(--oliveink); font-size: 17px;
  width: auto; padding: 0 4px 0 0; display: none; }
.topbar-back.visible { display: block; }
.topbar-back:hover { opacity: .65; }
.topbar .user-chip { border-color: #5b6149; color: var(--oliveink); }
.topbar .user-chip:hover { background: #5b6149; }

/* Footer oliva (cierra el marco) */
.botbar { flex-shrink: 0; background: var(--olivebar); color: var(--oliveink);
  height: 62px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 42px; font-family: 'Courier Prime', monospace; font-size: 10px;
  letter-spacing: .16em; text-transform: lowercase; opacity: .95;
  box-shadow: 0 -2px 10px rgba(23,21,15,.14); z-index: 5; position: relative; }

/* ── ACCIONES SUPERIORES · inicio · buscar · ajustes (3 fijas) ── */
.tb-act { font-family: var(--sans); font-size: 12px; font-weight: 700; letter-spacing: .04em;
  text-transform: lowercase; color: var(--oliveink); background: none; border: 0; padding: 8px 7px;
  cursor: pointer; opacity: .82; transition: opacity .15s, color .15s; }
.tb-act:hover, .tb-act.on { color: var(--ink); opacity: 1; }
.tb-act:focus-visible { outline: 2px solid var(--sev-info); outline-offset: 2px; border-radius: 4px; }
/* Ajustes = ruleta (engranaje) que gira al pasar/pulsar, como una rueda de ajustes. */
.tb-icon { display: inline-flex; align-items: center; justify-content: center; background: none; border: 0;
  cursor: pointer; color: var(--oliveink); padding: 6px; opacity: .85; transition: opacity .15s, color .15s; }
.tb-icon:hover, .tb-icon:focus-visible { color: var(--ink); opacity: 1; }
.tb-icon svg { transition: transform .6s cubic-bezier(.34,1.4,.4,1); }
.tb-icon:hover svg, .tb-icon:active svg { transform: rotate(90deg); }
.tb-icon:focus-visible { outline: 2px solid var(--sev-info); outline-offset: 2px; border-radius: 50%; }
/* El nombre de sección lo da la cabecera de cada pantalla; en la barra sobra.
   Se mantiene en el DOM (accesible/tests) pero oculto a la vista. */
#topbar-section { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; }

/* ── BARRA INFERIOR · 4 dominios fijos (Spotify-like) ── */
.tabbar { flex-shrink: 0; display: grid; grid-template-columns: repeat(4, 1fr);
  background: var(--olivebar); border-top: 1px solid var(--line); z-index: 6; position: relative;
  box-shadow: 0 -2px 12px rgba(0,0,0,.22); }
.tabbar-3 { grid-template-columns: repeat(3, 1fr); }
.tab { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  padding: 11px 4px calc(11px + env(safe-area-inset-bottom, 0px)); background: none; border: 0; cursor: pointer;
  font-family: var(--sans); font-size: 11.5px; font-weight: 700; letter-spacing: .03em; color: var(--muted);
  transition: color .15s; }
.tab .tab-ic { font-size: 23px; line-height: 1; }
.tab.on { color: var(--ink); }
.tab:active { transform: scale(.96); }

/* Cabecera del inicio (sin wordmark grande: ya está en la barra). */
.home-brand { display: none; }
.home-head { padding: 6px 2px 22px; }
.home-sys { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .14em;
  text-transform: lowercase; color: var(--muted); }
.home-efimera { font-family: 'Courier Prime', monospace; font-size: 10px; letter-spacing: .04em;
  color: #fff; background: var(--olivebar); display: inline-block; padding: 4px 10px; margin-top: 10px; }
.home-alert { font-family: 'Courier Prime', monospace; font-size: 12px; font-weight: 700;
  letter-spacing: .1em; text-transform: lowercase; color: var(--ink); margin-top: 8px; }
.home-status { display: none; }

/* Inicio en filas horizontales a todo el ancho. */
.cats { display: block; max-width: 1080px; margin: 0 auto; border: none; }
.cat { display: flex; flex-direction: row; align-items: stretch; gap: 0; background: var(--paper);
  border: 1px solid var(--line); padding: 0; margin-bottom: 12px; min-height: 0;
  transition: border-color .12s, background .12s; }
.cat:hover { background: #efece4; border-color: #b3ad9c; transform: none; }
.cats .cat:nth-child(2n) { border-right: 1px solid var(--line); }
.cat-numcol { flex: 0 0 168px; padding: 26px 24px; border-right: 1px solid var(--line);
  display: flex; flex-direction: column; justify-content: center; }
.cat-big { font-family: 'Courier Prime', monospace; font-weight: 700; font-size: 50px;
  line-height: 1; color: var(--ink); letter-spacing: .02em; }
.cat-state { font-family: 'Courier Prime', monospace; font-size: 9.5px; letter-spacing: .12em;
  text-transform: lowercase; color: var(--muted); margin-top: 12px; }
.cat-dots { font-family: 'Courier Prime', monospace; font-size: 14px; color: var(--ink);
  margin-top: 8px; letter-spacing: .18em; min-height: 14px; }
.cat-main { flex: 1; padding: 26px 28px; display: flex; flex-direction: column; justify-content: center; }
.cat-name { font-family: var(--sans); font-weight: 700; font-size: 22px; text-transform: lowercase;
  letter-spacing: .1em; line-height: 1; }
.cat-l1 { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .08em;
  text-transform: lowercase; color: var(--ink); margin-top: 16px; padding-bottom: 12px;
  border-bottom: 1px solid var(--line); }
.cat-l2 { font-family: 'Courier Prime', monospace; font-size: 11px; letter-spacing: .08em;
  text-transform: lowercase; color: var(--muted); margin-top: 12px; }
.cat-go { flex: 0 0 76px; display: flex; align-items: center; justify-content: center;
  font-size: 22px; color: var(--ink); }
.cat-desc, .cat-top, .cat-idx, .cat-code, .cat-arrow, .cat-alert { display: none; }

/* ── INICIO · dashboard de tarjetas · TODO visible SIN scroll ──────────────
   Las tarjetas llenan el alto disponible y su texto se ajusta al tamaño REAL
   de la tarjeta (container queries): si la rejilla se comprime (p. ej. con
   Apertura y Cierre a la vez), el título encoge para caber. Nunca se recorta
   y nunca hace falta scroll. */
#screen-home { overflow-y: auto; display: flex; flex-direction: column; }
#screen-home > #home-content { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.home-head { flex: 0 0 auto; padding: 2px 2px 10px; }
.dash { flex: 1 1 auto; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 10px; min-height: 0; }
.dashcard { position: relative; container-type: size; display: flex; flex-direction: column; justify-content: center; gap: 4px; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 12px 14px; cursor: pointer; overflow: hidden; min-height: 0; }
.dashcard:hover { border-color: var(--ink); }
/* Tamaño del título en función del ALTO real de la tarjeta (24% de su altura),
   acotado entre 14 y 19px. En tarjetas altas llega a 19px; si la rejilla se
   comprime, encoge hasta 14px para que SIEMPRE quepa sin recorte ni scroll. */
.dashcard-name { font-family: var(--sans); font-weight: 700; letter-spacing: .03em; line-height: 1.08;
  font-size: clamp(14px, 24cqb, 19px); overflow-wrap: anywhere; text-transform: lowercase; }
.dashcard-sub { font-family: var(--sans); color: var(--muted); line-height: 1.3;
  font-size: clamp(9px, 13cqb, 10.5px); }
.dashcard-badge { position: absolute; top: 12px; right: 12px; min-width: 22px; text-align: center; font-size: 12px; font-weight: 700;
  color: var(--ink); background: var(--cream); border: 1px solid var(--line); border-radius: 20px; padding: 2px 8px; font-variant-numeric: tabular-nums; }
.dashcard-badge.rojo { color: #fff; background: #D62A1C; border-color: #D62A1C; }
/* ═══════════════════════════════════════════════════════════════
   INICIO · CEREBRO DE DECISIONES · una pantalla, una pregunta.
   El sistema calcula qué hacer (motor /decisiones) y lo presenta
   ordenado por urgencia. El color solo dice estado. Mucho silencio.
   ═══════════════════════════════════════════════════════════════ */
.home-q { flex: 0 0 auto; padding: 2px 2px 4px; }
.home-eyebrow { font-family: var(--sans); font-size: 11px; letter-spacing: .08em; text-transform: lowercase; color: var(--muted); }
.home-hi { flex: 0 0 auto; padding: 2px 2px; font-size: 12px; }
/* Portada: imagotipo de tres columnas estampado en hueco, en grande, llenando
   el espacio libre. Verde más oscuro que el fondo + sombra interior (profundidad). */
.home-hero { flex: 1 1 auto; min-height: 160px; display: flex; align-items: center; justify-content: center;
  gap: clamp(16px, 4vw, 36px); padding: 20px 0; }
.home-hero i { display: block; width: clamp(30px, 9vw, 62px); height: clamp(140px, 34vh, 300px);
  border-radius: clamp(14px, 2.6vw, 30px); background: #202821;
  box-shadow: inset 0 4px 9px rgba(0,0,0,.60), inset 0 13px 24px rgba(0,0,0,.30),
    inset 0 -3px 5px rgba(236,234,227,.05), 0 30px 60px -34px rgba(0,0,0,.6); }
.home-ask { font-family: var(--sans); font-size: 23px; font-weight: 700; letter-spacing: -.01em; color: var(--ink); line-height: 1.12; margin-top: 5px; }

.dstack { flex: 0 0 auto; display: flex; flex-direction: column; margin-top: 14px; }
.drow { --c: var(--muted); display: grid; grid-template-columns: 3px 1fr auto; gap: 14px; align-items: center;
  width: 100%; text-align: left; background: none; border: 0; border-bottom: 1px solid var(--div);
  padding: 16px 2px; cursor: pointer; font: inherit; color: inherit; }
.dstack .drow:last-child { border-bottom: 0; }
.drow .drail { align-self: stretch; border-radius: 3px; background: var(--c); }
.drow .dbody { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
.drow .dkind { font-family: var(--sans); font-size: 11px; letter-spacing: .1em; text-transform: uppercase; font-weight: 700;
  color: var(--c); display: flex; align-items: center; gap: 7px; }
.drow .dkind .ddot { width: 6px; height: 6px; border-radius: 50%; background: var(--c); flex: 0 0 auto; }
.drow .dwhat { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--ink); line-height: 1.25; }
.drow .dmeta { font-family: var(--sans); font-size: 12px; color: var(--muted); line-height: 1.35;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.drow .dchev { font-family: var(--sans); font-size: 15px; color: var(--muted); }
.drow:hover .dwhat { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--div); }
.drow:active { transform: scale(.995); }
.drow.k-critico    { --c: var(--sev-risk); }
.drow.k-importante { --c: var(--sev-warn); }
.drow.k-informativo{ --c: var(--sev-info); }
.dmore { font-family: var(--sans); font-size: 12px; font-weight: 700; color: var(--muted); background: none; border: 0;
  padding: 14px 2px 2px; cursor: pointer; text-align: left; }
.dmore:hover { color: var(--ink); }

/* Estado ideal: silencio. */
.home-clear { flex: 1 1 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 40px 8px; text-align: center; }
.home-clear .hc-mark { font-size: 26px; color: var(--sev-ok); line-height: 1; }
.home-clear .hc-txt { font-family: var(--sans); font-size: 16px; font-weight: 700; color: var(--ink); }
.home-clear .hc-sub { font-family: var(--sans); font-size: 12px; color: var(--muted); }

/* Rutina · una barra fina, no un banner. */
.home-routine { flex: 0 0 auto; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 12px; }
.rrow { display: flex; align-items: center; gap: 12px; width: 100%; background: none; border: 0; padding: 0; cursor: pointer; font: inherit; color: inherit; }
.rrow .rlbl { font-family: var(--sans); font-size: 13px; font-weight: 700; color: var(--ink); flex: 1; text-align: left; }
.rrow .rlbl span { color: var(--muted); font-weight: 400; }
.rmeter { width: 78px; height: 4px; border-radius: 100px; background: var(--track); overflow: hidden; flex: 0 0 auto; }
.rmeter i { display: block; height: 100%; background: var(--sev-ok); border-radius: 100px; }
.rrow .rfrac { font-family: var(--font); font-variant-numeric: tabular-nums; font-size: 13px; color: var(--muted); }

/* Dominios · navegación silenciosa, no contenido. */
.home-nav { flex: 0 0 auto; margin-top: 18px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.home-nav button { font-family: var(--sans); font-size: 12.5px; font-weight: 700; color: var(--ink); background: none;
  border: 1px solid var(--line); border-radius: 3px; padding: 13px 6px; cursor: pointer; text-align: center; line-height: 1.2; }
.home-nav button:hover { border-color: var(--ink); }
.home-nav button .nsub { display: block; font-weight: 400; font-size: 10px; color: var(--muted); margin-top: 3px; letter-spacing: .02em; }

/* Pulso del negocio (dueño) · la cifra importante de un vistazo.
   FIJO: se queda pegado arriba al hacer scroll en la portada. */
.pulse { display: flex; align-items: center; gap: 8px; width: 100%; text-align: left; cursor: pointer;
  background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 14px 16px; margin: 4px 0 10px;
  position: sticky; top: 0; z-index: 6; box-shadow: 0 6px 16px -8px rgba(0,0,0,.5); }
.pulse .pulse-c { display: flex; flex-direction: column; gap: 2px; flex: 1; }
.pulse .pulse-v { font-size: 19px; color: var(--ink); letter-spacing: -.01em; }
.pulse .pulse-l { font-size: 10px; letter-spacing: .06em; text-transform: lowercase; color: var(--muted); }
.pulse .pulse-go { font-family: var(--sans); font-size: 11px; color: var(--muted); flex: 0 0 auto; }
.pulse:hover { border-color: var(--ink); }

/* Etiqueta de sección en la portada. */
.home-sec { flex: 0 0 auto; font-family: var(--sans); font-size: 11px; letter-spacing: .1em; text-transform: lowercase;
  color: var(--muted); margin: 12px 2px 2px; }

/* ── BÚSQUEDA GENERAL ── */
.buscar-input { width: 100%; font-family: var(--sans); font-size: 16px; color: var(--ink);
  background: var(--paper); border: 1px solid var(--line); border-radius: 3px; padding: 13px 16px; margin-bottom: 14px; }
.buscar-input::placeholder { color: var(--muted); }
.buscar-input:focus { outline: none; border-color: var(--ink); }
.buscar-hint { font-family: var(--sans); font-size: 13px; color: var(--muted); padding: 24px 4px; line-height: 1.5; }
.buscar-grupo { margin-bottom: 20px; }
.buscar-gh { font-family: var(--sans); font-size: 11px; letter-spacing: .1em; text-transform: lowercase; color: var(--muted);
  padding: 6px 2px; border-bottom: 1px solid var(--div); margin-bottom: 4px; }
.buscar-row { display: grid; grid-template-columns: 1fr auto; gap: 4px 12px; width: 100%; text-align: left; cursor: pointer;
  background: none; border: 0; border-bottom: 1px solid var(--div); padding: 13px 2px; align-items: baseline; }
.buscar-row:hover .buscar-nm { text-decoration: underline; text-underline-offset: 3px; text-decoration-color: var(--div); }
.buscar-nm { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--ink); }
.buscar-dt { grid-column: 1; font-family: var(--sans); font-size: 12px; color: var(--muted); }
.buscar-pr { grid-column: 2; grid-row: 1 / span 2; font-size: 14px; color: var(--ink); white-space: nowrap; align-self: center; }

/* Herramientas de gestión: UNA fila compacta y secundaria, separada de las
   tarjetas de trabajo. Antes eran 3 barras grandes apiladas (amontonado). */
.dash-tools { flex: 0 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 16px; }
.dash-tools.solo { grid-template-columns: 1fr; }
.dash-tool { background: none; border: 1px solid var(--line); border-radius: 3px;
  font-family: var(--sans); font-size: 11px; letter-spacing: .02em; color: var(--ink);
  padding: 10px 8px; cursor: pointer; text-align: center; line-height: 1.25;
  display: flex; align-items: center; justify-content: center; min-height: 46px; }
.dash-tool:hover { color: var(--ink); border-color: var(--ink); }
.dash-tool.key { color: var(--ink); }   /* Centro de control: algo más de peso, sigue fácil de encontrar */
/* compat: por si queda algún .dash-informes suelto */
.dash-informes { flex: 0 0 auto; margin-top: 10px; width: 100%; background: none; border: 1px solid var(--line);
  border-radius: 3px; font-family: var(--sans); font-size: 12px; color: var(--muted); padding: 11px; cursor: pointer; }
.dash-informes:hover { color: var(--ink); border-color: var(--ink); }
.dash-informes.dash-owner { color: var(--ink); border-color: var(--ink); font-weight: 700; margin-top: 12px; }
/* Pantallas bajas: compacta lo de arriba (saludo, frase, rutinas) para dejar
   alto a las tarjetas. El título de la tarjeta ya se auto-ajusta con cqb, así que
   NO fijamos su tamaño aquí (dejamos que encoja/crezca según el hueco real). */
@media (max-height: 820px) {
  .saludo-frase { display: none; }
  .saludo { margin-bottom: 10px; padding-bottom: 10px; }
  .apertura-card { padding: 10px 13px; margin-bottom: 9px; }
}
@media (max-height: 620px) {
  .saludo-bien { display: none; }
  .home-efimera { display: none; }
}
/* Saludo + frase del día (Courier, como todo el sistema) */
.saludo { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
.saludo-hola { font-family: var(--sans); font-size: 19px; font-weight: 700; letter-spacing: -.01em; color: var(--ink); line-height: 1.15; }
.saludo-bien { font-family: var(--sans); font-size: 11px; letter-spacing: .12em; text-transform: lowercase; color: var(--muted); margin-top: 3px; }
.saludo-frase { font-family: var(--sans); font-size: 12px; color: var(--ink); margin-top: 9px; line-height: 1.55; }
/* Tarjeta de apertura */
.apertura-card { display: flex; align-items: center; gap: 13px; width: 100%; text-align: left; border: 1px solid var(--line);
  border-radius: var(--r-card); padding: 13px 15px; margin-bottom: 14px; background: var(--paper); color: var(--ink); cursor: pointer; }
.apertura-card.ok { background: transparent; color: var(--muted); border-color: var(--line); }
.apertura-ico { display: none; }
.apertura-txt { display: flex; flex-direction: column; gap: 3px; flex: 1; font-family: var(--sans); }
.apertura-txt b { font-size: 13px; font-weight: 700; letter-spacing: .01em; }
.apertura-txt span { font-size: 10.5px; letter-spacing: .04em; opacity: 1; color: var(--ink); }
.apertura-arrow { font-size: 18px; opacity: .6; }
/* Pasos de apertura */
.apstep { display: flex; align-items: flex-start; gap: 12px; width: 100%; text-align: left; border: 0; border-bottom: 1px solid var(--line);
  padding: 14px 2px; background: none; cursor: pointer; font-family: var(--sans); color: var(--ink); }
.apstep-check { flex: 0 0 auto; width: 21px; height: 21px; border: 1.5px solid var(--line); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; margin-top: 1px; color: transparent; }
.apstep.done .apstep-check { background: var(--ink); border-color: var(--ink); color: var(--ink); }
.apstep.done .apstep-t { text-decoration: line-through; color: var(--muted); }
.apstep-ico { font-size: 17px; flex: 0 0 auto; filter: grayscale(1); opacity: .9; }
.apstep-body { flex: 1; min-width: 0; }
.apstep-t { display: block; font-size: 13px; font-weight: 700; line-height: 1.3; }
.apstep-sub { display: block; font-size: 10.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.apstep-go { flex: 0 0 auto; font-size: 10px; letter-spacing: .08em; text-transform: lowercase; color: var(--ink); font-weight: 700; padding: 5px 9px; border: 1px solid var(--line); border-radius: 7px; background: var(--paper); cursor: pointer; align-self: center; }
.apstep-go:hover { border-color: var(--ink); }
/* Pastilla de "atención" monocroma (sin rojo/ámbar): tinta sobre papel */
.tag-ink { display: inline-block; background: var(--ink); color: var(--cream); font-size: 9.5px; font-weight: 700;
  letter-spacing: .04em; padding: 1px 7px; border-radius: 20px; vertical-align: middle; }
/* Selector de alérgenos: chips monocromos que se rellenan al activarse */
.alerg-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.alerg-chip { display: inline-block; font-size: 10.5px; padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--line); color: var(--muted); background: transparent; cursor: pointer;
  user-select: none; transition: background .12s, color .12s, border-color .12s; }
.alerg-chip.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }
/* Ancho de contenido de pantallas internas = misma disciplina que la home
   (capado y centrado a 1080px). Evita tarjetas estiradas en tablet/escritorio;
   en móvil ocupa todo el ancho igual que antes. */
#inner-content { max-width: 1080px; margin: 0 auto; width: 100%; }
/* Submenús como rejilla cuadrada que LLENA la pantalla (sin scroll), como la portada */
#screen-inner.submenu { overflow: hidden; display: flex; flex-direction: column; }
#screen-inner.submenu > #inner-content { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.submenu-grid { flex: 1 1 auto; display: grid; grid-template-columns: 1fr 1fr; grid-auto-rows: 1fr; gap: 11px; min-height: 0; }
.subtile { position: relative; display: flex; flex-direction: column; justify-content: center; gap: 6px; text-align: left;
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-card); padding: 16px; cursor: pointer; min-height: 0;
  transition: border-color .12s; }
.subtile:hover { border-color: var(--ink); }
.subtile-name { font-family: var(--sans); font-size: 17px; font-weight: 700; letter-spacing: .03em; line-height: 1.05; text-transform: lowercase; }
.subtile-sub { font-family: var(--sans); font-size: 10px; letter-spacing: .02em; color: var(--muted); line-height: 1.3; }
.subtile-badge { position: absolute; top: 11px; right: 12px; min-width: 20px; text-align: center; font-size: 11px; font-weight: 700;
  color: var(--muted); }
.subtile-badge.on { color: #fff; background: #D62A1C; border-radius: 20px; padding: 1px 6px; }
@media (max-height: 620px) { .subtile-name { font-size: 15px; } .subtile-sub { font-size: 9px; } .subtile { padding: 12px; } }
/* Gráficos del panel del propietario (monocromo tinta/papel) */
.panel-kpis { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 6px; }
/* Insights del panel: frases accionables ("lo que deberías saber") */
.insight-card { display: block; width: 100%; text-align: left; background: var(--paper);
  border: 1px solid var(--line); border-left: 3px solid var(--muted); border-radius: 3px;
  padding: 11px 13px; margin-bottom: 7px; cursor: pointer; }
.insight-card.alta { border-left-color: var(--ink); }
.insight-card:hover { border-color: var(--ink); }
.insight-titulo { font-size: 13px; font-weight: 700; line-height: 1.25; }
.insight-detalle { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.45; }
.insight-accion { font-size: 10.5px; font-weight: 700; color: var(--ink); margin-top: 6px; }

/* ═══ CENTRO DE CONTROL · sala de mando del propietario (monocromo premium) ═══ */
/* ── CENTRO DE CONTROL · mismo ritmo de tarjeta-celda cuadrada que la home ──
   Keyline, esquinas cuadradas, tipografía de marca. Nada de estética SaaS. */
.cc-filtro { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
.cc-chip { font-size: 10px; letter-spacing: .1em; text-transform: lowercase; padding: 6px 12px;
  border-radius: var(--r-pill); border: 1px solid var(--line);
  background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; }
.cc-chip.on { background: var(--ink); color: var(--cream); border-color: var(--ink); font-weight: 700; }
.cc-custom { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
.cc-custom input { font-size: 12px; }
.cc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap-grid); }
.cc-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-card); padding: 16px 18px;
  text-align: left; width: 100%; display: block; cursor: default; }
button.cc-card { cursor: pointer; transition: border-color .12s, background .12s; }
button.cc-card:hover { border-color: var(--ink); }
.cc-wide { grid-column: 1 / -1; margin-top: var(--gap-grid); }
.cc-label { font-size: 9px; letter-spacing: .16em; text-transform: lowercase; color: var(--muted); font-weight: 700; }
.cc-kpi { font-size: var(--kpi-md); font-weight: 700; line-height: 1.05; margin-top: 6px; letter-spacing: 0;
  font-variant-numeric: tabular-nums; }
.cc-kpi.cc-big { font-size: var(--kpi-lg); }
.cc-kpi.cc-ok { font-size: var(--kpi-sm); }
.cc-score { font-size: 40px; font-weight: 700; line-height: 1; margin-top: 4px; font-variant-numeric: tabular-nums; }
.cc-score-max { font-size: 13px; font-weight: 700; color: var(--muted); }
.cc-mini { font-size: 10.5px; color: var(--muted); margin-top: 6px; line-height: 1.55; }
.cc-mini.cc-accent { color: var(--ink); font-weight: 700; }
.cc-delta { display: inline-block; font-size: 10px; font-weight: 700; margin-top: 5px; }
.cc-delta.up { color: var(--ink); }
.cc-delta.down { color: var(--muted); }
.cc-hero { grid-column: 1 / -1; display: flex; gap: 16px; align-items: stretch; }
.cc-hero-left { flex: 0 0 42%; }
.cc-hero-right { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 4px; border-left: 1px solid var(--line); padding-left: 14px; }
.cc-hero-single { grid-column: 1 / -1; }
.cc-reason { font-size: 11px; color: var(--ink); display: flex; align-items: center; gap: 6px; }
.cc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; display: inline-block; background: var(--muted); }
.cc-dot-bien { background: var(--ink); }
.cc-dot-regular { background: var(--line); }
.cc-dot-mal { background: #D62A1C; }
.cc-dot-neutro { background: var(--olive-light); }
.cc-line { display: flex; justify-content: space-between; align-items: center; gap: 8px; font-size: 12px; padding: 5px 0; border-bottom: 1px solid rgba(180,174,155,.35); }
.cc-line:last-child { border-bottom: none; }
.cc-line.cc-total { font-weight: 800; border-top: 2px solid var(--ink); border-bottom: none; margin-top: 4px; padding-top: 8px; }
.cc-obj { margin-top: 10px; }
.cc-obj-top { display: flex; justify-content: space-between; font-size: 11.5px; font-weight: 600; }
.cc-obj-val { color: var(--muted); }
.cc-obj-track { height: 7px; background: var(--track); border-radius: var(--r-pill); overflow: hidden; margin-top: 5px; }
.cc-obj-fill { height: 100%; background: var(--ink); border-radius: var(--r-pill); }
.cc-obj-fill.cc-fill-mal { background: #D62A1C; }
.cc-obj-fill.cc-fill-neutro { background: var(--muted); }
.cc-insight { display: block; width: 100%; text-align: left; background: var(--cream); border: 1px solid var(--line);
  border-left: 3px solid var(--muted); border-radius: var(--r-card); padding: 11px 13px; margin-top: 7px; font-size: 12px; cursor: pointer; }
.cc-insight.importante { border-left-color: var(--ink); font-weight: 700; }
.cc-links { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.cc-link { background: none; border: 1px solid var(--line); border-radius: var(--r-card); font-family: var(--font);
  font-size: 11px; letter-spacing: .04em; color: var(--muted); padding: 12px; cursor: pointer; text-align: left; }
.cc-link:hover { color: var(--ink); border-color: var(--ink); }
.cc-link-wide { grid-column: 1 / -1; }
.cc-cal-nav { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 10px; gap: 8px; }
.cc-cal { display: flex; flex-direction: column; gap: 8px; }
.cc-cal-dia { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-card); padding: 11px 13px; }
.cc-cal-cab { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.cc-cal-ev { display: flex; justify-content: space-between; gap: 8px; font-size: 11px; padding: 3px 0; }
.cc-cal-vacio { font-size: 11px; color: var(--olive-light); }
.chart { margin: 2px 0 6px; }
.chart-row { margin-bottom: 9px; }
.chart-row-top { display: flex; justify-content: space-between; align-items: baseline; font-family: var(--font); }
.chart-lbl { font-size: 11px; color: var(--ink); font-weight: 700; }
.chart-val { font-size: 11px; color: var(--muted); font-weight: 700; }
.chart-track { height: 8px; background: var(--track); border-radius: var(--r-pill); overflow: hidden; margin-top: 3px; }
.chart-bar { height: 100%; background: var(--ink); border-radius: var(--r-pill); }
.chart-xlabels { display: flex; justify-content: space-between; font-family: var(--sans); font-size: 8px; color: var(--muted); margin-top: 2px; }
.chart-xlabels span { flex: 1; text-align: center; }
.cats { flex: 1 1 auto; display: flex; flex-direction: column; min-height: 0; gap: 10px; max-width: 1080px; width: 100%; }
/* Número con tamaño fijo y contenido (sin unidades cqh, que algunos móviles
   no soportan y hacían que se saliera del botón). Quitamos los puntos
   decorativos para que el contenido quepa centrado aunque la tarjeta sea baja. */
.cat { flex: 1 1 0; min-height: 0; margin-bottom: 0; overflow: hidden; }
.cat-big { font-size: 30px; line-height: 1; }
.cat-name { font-size: clamp(16px, 2.4dvh, 22px); }
/* Contenido pegado arriba: el número y el título empiezan en el borde superior,
   así nada se sale por abajo aunque la tarjeta sea baja. */
.cat-numcol { justify-content: flex-start; padding-top: 16px; padding-bottom: 8px; }
.cat-main { justify-content: flex-start; padding-top: 18px; padding-bottom: 8px; }
.cat-state { margin-top: 6px; white-space: nowrap; }
.cat-dots { display: none; }
.cat-l1 { margin-top: clamp(6px, 1.7dvh, 16px); padding-bottom: clamp(6px, 1.3dvh, 12px); }
.cat-l2 { margin-top: clamp(6px, 1.3dvh, 12px); }
/* Pantallas muy bajas (móvil apaisado): simplifica para que quepa sin recortes. */
@media (max-height: 600px) {
  .cat-l2, .cat-dots { display: none; }
  .cat-l1 { border-bottom: none; padding-bottom: 0; margin-top: clamp(4px, 1dvh, 10px); }
  .cat-big { font-size: 26px; }
  .cat-state { margin-top: 5px; }
  .home-head { padding-bottom: 8px; }
  .home-efimera { display: none; }
}

@media (max-width: 680px) {
  .topbar { padding: 0 20px; height: 72px; }
  .botbar { padding: 0 20px; height: 48px; font-size: 8.5px; }
  .topbar .brandword { font-size: 12px; letter-spacing: .12em; }
  .topbar-center .mark i { height: 28px; width: 4px; }
  /* Cabecera compacta para dejar alto a los menús. */
  .home-head { padding: 0 2px 10px; }
  .home-sys { font-size: 9px; letter-spacing: .1em; }
  .home-alert { font-size: 10.5px; }
  .home-efimera { font-size: 8.5px; padding: 3px 8px; margin-top: 8px; }
  /* Menús: solo número + nombre + una línea de módulos. Nada se corta. */
  .cat-numcol { flex-basis: 72px; padding: 12px; }
  .cat-big { font-size: 28px; }
  .cat-state { font-size: 7.5px; letter-spacing: .08em; margin-top: 6px; }
  .cat-dots { font-size: 12px; margin-top: 5px; }
  .cat-main { padding: 10px 12px; min-width: 0; }
  .cat-name { font-size: 15px; letter-spacing: .02em; line-height: 1.1; }
  .cat-l1 { font-size: 9px; margin-top: 7px; padding-bottom: 0; border-bottom: none; line-height: 1.5; }
  .cat-l2 { display: none; }
  .cat-go { flex-basis: 34px; font-size: 17px; }
}

/* ── Accesibilidad: foco visible por teclado (no afecta al ratón) ── */
:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
.topbar :focus-visible, .botbar :focus-visible { outline-color: var(--oliveink); }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
}

/* ════════════════════════════════════════════════════════════════════
   PROFUNDIDAD · botones y tarjetas con relieve (serio, elegante, tactil)
   ════════════════════════════════════════════════════════════════════ */
.btn-primary, .btn-ghost, .btn-warn {
  border-radius: 3px !important;
  transition: transform .08s ease, box-shadow .14s ease, background .14s ease;
}
/* Botones sólidos (verde): convexos, iluminados desde arriba. */
.btn-primary, .btn-warn {
  background: var(--olive) !important;
  border: 1px solid var(--olive) !important;
  color: #23281E !important;
  text-shadow: none !important;
  box-shadow: none !important;
}
.btn-primary:hover, .btn-warn:hover {
  background: #B7C77E !important; border-color: #B7C77E !important;
  box-shadow: none !important;
}
.btn-primary:active, .btn-warn:active {
  transform: translateY(1px);
  box-shadow: none !important;
}
.btn-primary:disabled { opacity: .4; box-shadow: none !important; }
/* Botones contorno (oscuro): tecla en relieve sobre el olivo. */
.btn-ghost {
  background: transparent !important;
  border: 1px solid var(--line) !important;
  color: var(--ink) !important;
  box-shadow: none !important;
}
.btn-ghost:hover {
  border-color: var(--ink) !important;
  background: rgba(236,234,227,.04) !important;
  color: var(--ink) !important;
  box-shadow: none !important;
}
.btn-ghost:active { transform: translateY(1px); box-shadow: none !important; }
/* Toggles: planos, keyline. */
.toggle { box-shadow: none !important; border-radius: 3px !important; }
.toggle.on { box-shadow: none !important; }

/* Teclas del menú: relieve marcado (luz arriba, sombra abajo, borde inferior
   oscuro) para que se vean como teclas físicas serias. */
/* Teclas de categoría, filas de submenú y tarjetas clicables: planas, keyline
   cuadrada a hilo, sin sombra. El hover solo marca el borde (estilo Aesop). */
.cat, .modrow {
  border: 1px solid var(--line) !important;
  border-radius: 3px !important;
  background: var(--paper) !important;
  box-shadow: none !important;
  transition: border-color .14s ease, background .14s ease;
}
.cat:hover, .modrow:hover { border-color: var(--ink) !important; background: var(--olive-light) !important; transform: none !important; box-shadow: none !important; }
.cat:active, .modrow:active { transform: translateY(1px); box-shadow: none !important; }
.modrow { padding: 16px 18px !important; margin-bottom: 8px !important; }
.card.clickable { border-radius: 3px !important; box-shadow: none !important;
  transition: border-color .14s ease, background .14s ease; }
.card.clickable:hover { border-color: var(--ink) !important; box-shadow: none !important; }
.card.clickable:active { transform: translateY(1px); box-shadow: none !important; }

/* Teclas de login (Jon/Lara/Mónica): teclas oscuras en relieve. */
.ubtn {
  border-radius: 5px !important;
  background: linear-gradient(180deg, #24221A 0%, #1A1812 100%) !important;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.07),
    inset 0 -1px 0 rgba(0,0,0,.4),
    0 3px 7px rgba(0,0,0,.45),
    0 1px 2px rgba(0,0,0,.3) !important;
  transition: transform .1s ease, box-shadow .14s ease, border-color .12s ease;
}
.ubtn:hover {
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    0 5px 12px rgba(0,0,0,.5),
    0 1px 2px rgba(0,0,0,.3) !important;
}
.ubtn:active {
  transform: translateY(1px);
  box-shadow: inset 0 2px 5px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.04) !important;
}

/* Teclado numérico del PIN (login): teclas oscuras en relieve, tipo TPV. */
.pin-pad { display: grid; grid-template-columns: repeat(3, 70px); gap: 12px; justify-content: center; }
.pin-key {
  font-family: 'Courier Prime', monospace; font-size: 24px; color: #E7E4D7;
  width: 70px; height: 62px; border-radius: 7px; border: 1px solid #2A2820; cursor: pointer;
  background: linear-gradient(180deg, #24221A 0%, #1A1812 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.07), inset 0 -1px 0 rgba(0,0,0,.4), 0 3px 7px rgba(0,0,0,.45);
  transition: transform .08s ease, box-shadow .12s ease;
}
.pin-key:active { transform: translateY(1px); box-shadow: inset 0 2px 5px rgba(0,0,0,.55); }
.pin-key-ghost { background: none; box-shadow: none; border-color: #2A2820; font-size: 20px; color: #888070; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #555040; transition: background .12s, border-color .12s; }
.pin-dot.on { background: #E7E4D7; border-color: #E7E4D7; }

/* "Salir" en la barra: chip en relieve sobre el oliva. */
.topbar .user-chip {
  border-radius: 4px !important;
  background: linear-gradient(180deg, #4A5040 0%, #3A4031 100%) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 2px 4px rgba(0,0,0,.28) !important;
  transition: transform .1s ease, box-shadow .12s ease;
}
.topbar .user-chip:hover { box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 4px 8px rgba(0,0,0,.34) !important; }
.topbar .user-chip:active { transform: translateY(1px); box-shadow: inset 0 1px 3px rgba(0,0,0,.4) !important; }

/* Chips de "qué hacer ahora" (sobre la caja verde): relieve sutil. */
.todo-chip {
  border-radius: 4px !important;
  background: linear-gradient(180deg, rgba(255,255,255,.10) 0%, rgba(255,255,255,.03) 100%) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.18), 0 2px 5px rgba(0,0,0,.30) !important;
  transition: transform .1s ease, box-shadow .12s ease;
}
.todo-chip:hover { box-shadow: inset 0 1px 0 rgba(255,255,255,.25), 0 4px 9px rgba(0,0,0,.36) !important; }
.todo-chip:active { transform: translateY(1px); box-shadow: inset 0 1px 4px rgba(0,0,0,.4) !important; }

/* Botón grande del asistente (Crear lote / OK siguiente): tecla maestra. */
.wiz-ok {
  border-radius: 6px;
  background: linear-gradient(180deg, #38422F 0%, #2A332B 58%, #232B22 100%) !important;
  border: 1px solid #1B2117;
  text-shadow: 0 1px 0 rgba(0,0,0,.3);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.10),
    inset 0 -1px 0 rgba(0,0,0,.3),
    0 4px 10px rgba(23,21,15,.28),
    0 1px 2px rgba(23,21,15,.16) !important;
  transition: transform .1s ease, box-shadow .14s ease, background .14s ease;
}
.wiz-ok:hover {
  background: linear-gradient(180deg, #3F4936 0%, #2F382E 58%, #283026 100%) !important;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.12), 0 6px 16px rgba(23,21,15,.32), 0 1px 2px rgba(23,21,15,.18) !important;
}
.wiz-ok:active { transform: translateY(1px); box-shadow: inset 0 2px 6px rgba(0,0,0,.34) !important; }
.wiz-close {
  border-radius: 4px; padding: 6px 12px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.5), 0 1px 2px rgba(23,21,15,.10);
}

/* ── CÁMARA DE ESCANEO DE ALBARANES ─────────────────────────────────── */
.cam-overlay {
  position: fixed; inset: 0; z-index: 9000;
  background: #0c0d0b; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
.cam-video {
  position: absolute; inset: 0;
  width: 100%; height: 100%; object-fit: cover;
}
.cam-mask {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.cam-frame {
  position: relative;
  width: 86%; max-width: 460px;
  aspect-ratio: 1 / 1.32;
  border-radius: 8px;
  /* foco: oscurece todo menos el interior del marco */
  box-shadow: 0 0 0 100vmax rgba(8,9,7,.62);
  outline: 1.5px solid rgba(231,228,215,.55);
}
.cam-corner {
  position: absolute; width: 26px; height: 26px;
  border: 2.5px solid #E7E4D7;
}
.cam-corner.tl { top: -2px; left: -2px; border-right: 0; border-bottom: 0; border-top-left-radius: 8px; }
.cam-corner.tr { top: -2px; right: -2px; border-left: 0; border-bottom: 0; border-top-right-radius: 8px; }
.cam-corner.bl { bottom: -2px; left: -2px; border-right: 0; border-top: 0; border-bottom-left-radius: 8px; }
.cam-corner.br { bottom: -2px; right: -2px; border-left: 0; border-top: 0; border-bottom-right-radius: 8px; }
.cam-hint {
  position: absolute; left: 0; right: 0; top: max(22px, env(safe-area-inset-top));
  text-align: center; color: #E7E4D7;
  font-family: var(--sans); font-size: 12.5px; letter-spacing: .02em;
  padding: 0 28px; text-shadow: 0 1px 3px rgba(0,0,0,.6);
}
.cam-bar {
  position: absolute; left: 0; right: 0;
  bottom: max(26px, env(safe-area-inset-bottom));
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; gap: 14px;
}
.cam-spacer { width: 86px; }
.cam-cancel {
  width: 86px; text-align: left;
  background: none; border: 0; color: #E7E4D7;
  font-family: var(--sans); font-size: 14px; letter-spacing: .03em;
  padding: 10px 0; cursor: pointer;
}
.cam-shot {
  width: 72px; height: 72px; border-radius: 50%;
  border: 3px solid rgba(231,228,215,.9);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  padding: 0; transition: transform .1s ease;
}
.cam-shot > span {
  width: 56px; height: 56px; border-radius: 50%;
  background: #E7E4D7;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.6), 0 2px 6px rgba(0,0,0,.4);
}
.cam-shot:active { transform: scale(.94); }
.cam-shot:disabled { opacity: .5; }

/* ── MBDS · laboratorio de bebidas ── */
.mbds-apta { font-size: 9px; letter-spacing: .1em; text-transform: lowercase; font-weight: 700; padding: 4px 9px; border: 1px solid var(--line); white-space: nowrap; align-self: center; }
.mbds-apta.ok { background: var(--ink); color: var(--cream); border-color: var(--ink); }
.mbds-apta.no { color: #D62A1C; border-color: #D62A1C; }
.mbds-apta.pend { color: var(--muted); }
.mbds-ing-row { display: flex; gap: 8px; align-items: center; margin-top: 6px; }
.mbds-ing-row select { flex: 1; min-width: 120px; font-size: 12px; }
.mbds-ing-row input { width: 84px; font-size: 12px; }

/* ── LIMONADAS · asistente paso a paso, sin scroll, quirúrgico ── */
#lim { display: flex; flex-direction: column; height: calc(100dvh - 108px); min-height: 380px; }
.lim-head { flex: 0 0 auto; display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; border-bottom: 1px solid var(--ink); padding-bottom: 10px; }
.lim-eyebrow { font-size: 9px; letter-spacing: .2em; text-transform: lowercase; color: var(--muted); }
.lim-h { font-size: 19px; font-weight: 700; letter-spacing: .03em; text-transform: lowercase; margin-top: 3px; }
.lim-meta { font-size: 9px; letter-spacing: .14em; text-transform: lowercase; color: var(--muted); text-align: right; white-space: nowrap; }
.lim-meta b { display: block; font-size: 15px; color: var(--ink); font-variant-numeric: tabular-nums; margin-top: 2px; letter-spacing: .02em; }
.lim-rail { flex: 0 0 auto; display: flex; gap: 4px; margin: 10px 0 0; }
.lim-rail i { flex: 1; height: 3px; background: var(--line); }
.lim-rail i.on { background: var(--ink); }
.lim-body { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; justify-content: center; padding: 14px 0; overflow: hidden; }
.lim-foot { flex: 0 0 auto; display: flex; gap: 8px; border-top: 1px solid var(--line); padding-top: 12px; }
.lim-foot button { flex: 1; }
.lim-lead { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 12px; letter-spacing: .01em; }
.lim-tipo { display: block; width: 100%; text-align: left; border: 1px solid var(--line); background: var(--paper); padding: 16px 18px; margin-bottom: 10px; cursor: pointer; transition: border-color .12s, background .12s; }
.lim-tipo:hover, .lim-tipo:focus-visible { border-color: var(--ink); background: var(--cream); }
.lim-tipo .rn { font-size: 11px; letter-spacing: .16em; color: var(--muted); }
.lim-tipo .nm { font-size: 20px; font-weight: 700; letter-spacing: .02em; margin-top: 2px; }
.lim-tipo .ds { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.45; }
.lim-liters { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.lim-lin { border: 1px solid var(--line); background: var(--paper); padding: 16px 18px; text-align: center; min-width: 150px; }
.lim-lin .rn { font-size: 10px; letter-spacing: .16em; text-transform: lowercase; color: var(--muted); }
.lim-lin input { display: block; width: 130px; margin: 6px auto 2px; text-align: center; font-family: var(--font); font-weight: 700; font-size: 40px; color: var(--ink); background: transparent; border: 0; border-bottom: 2px solid var(--line); font-variant-numeric: tabular-nums; }
.lim-lin input:focus { outline: none; border-bottom-color: var(--ink); }
.lim-lin .u { font-size: 10px; letter-spacing: .16em; text-transform: lowercase; color: var(--muted); }
.lim-presets { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-top: 16px; }
.lim-presets button { font-size: 10px; letter-spacing: .06em; color: var(--muted); background: transparent; border: 1px solid var(--line); padding: 6px 11px; cursor: pointer; }
.lim-presets button:hover { border-color: var(--ink); color: var(--ink); }
.lim-presets button.on { border-color: var(--ink); color: var(--ink); background: var(--olive-light); }
/* Generador de etiquetas de producción */
.etq-in { display: block; width: 100%; margin-top: 8px; padding: 12px 12px; font-family: var(--font); font-size: 14px; color: var(--ink); background: var(--paper); border: 1px solid var(--line); }
.etq-in::placeholder { color: var(--muted); }
.etq-in:focus { outline: none; border-color: var(--ink); }
.etq-libre { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
.etq-libre input { width: 90px; padding: 8px 10px; font-family: var(--font); font-size: 13px; color: var(--ink); background: var(--paper); border: 1px solid var(--line); }
.etq-libre input:focus { outline: none; border-color: var(--ink); }
.etq-libre > span { font-size: 11px; letter-spacing: .06em; color: var(--muted); }
.etq-libre .etq-libre-val { margin-left: 4px; }
.lim-seg { display: flex; border: 1px solid var(--line); margin-bottom: 12px; }
.lim-seg button { flex: 1; font-size: 10px; letter-spacing: .12em; text-transform: lowercase; padding: 9px; background: transparent; border: 0; border-right: 1px solid var(--line); color: var(--muted); cursor: pointer; }
.lim-seg button:last-child { border-right: 0; }
.lim-seg button.on { background: var(--ink); color: var(--cream); font-weight: 700; }
.lim-tab { width: 100%; border-collapse: collapse; }
.lim-tab td { padding: 5px 4px; border-bottom: 1px solid rgba(180,174,155,.4); font-size: 12px; vertical-align: baseline; }
.lim-tab tr:last-child td { border-bottom: 0; }
.lim-tab td.q { font-weight: 700; text-align: right; white-space: nowrap; width: 1%; font-variant-numeric: tabular-nums; padding-right: 12px; }
.lim-tab td.n small { display: block; color: var(--muted); font-size: 10px; margin-top: 1px; letter-spacing: .01em; }
.lim-spec { display: grid; grid-template-columns: auto 1fr; gap: 6px 16px; border: 1px solid var(--line); background: var(--paper); padding: 12px 14px; margin-bottom: 12px; }
.lim-spec dt { font-size: 9.5px; letter-spacing: .1em; text-transform: lowercase; color: var(--muted); align-self: center; }
.lim-spec dd { font-size: 12px; font-weight: 700; color: var(--ink); font-variant-numeric: tabular-nums; }
.lim-steps { list-style: none; counter-reset: ls; }
.lim-steps li { counter-increment: ls; position: relative; padding: 0 0 8px 24px; font-size: 12px; line-height: 1.45; }
.lim-steps li::before { content: counter(ls, decimal-leading-zero); position: absolute; left: 0; top: 0; font-size: 10px; font-weight: 700; color: var(--muted); }
.lim-steps li:last-child { padding-bottom: 0; }

/* ── PEDIDO · filas de artículo legibles y con aire (buenas para TPV táctil) ── */
.ped-row { display: flex; gap: 10px; align-items: center; padding: 11px 8px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
.ped-row:last-child { border-bottom: none; }
.ped-row .ped-name { font-size: 14px; font-weight: 700; flex: 1; min-width: 130px; letter-spacing: .01em; }
.ped-row input { font-size: 15px; padding: 9px 10px; border: 1px solid var(--line); border-radius: var(--r-pill); background: var(--cream); color: var(--ink); }
.ped-row .ped-cant { width: 84px; text-align: center; }
.ped-row .ped-precio { width: 96px; text-align: right; }
.ped-row .ped-u { font-size: 11px; color: var(--muted); min-width: 26px; }

/* ── MODO TPV · elementos más grandes para pantalla táctil de mostrador ── */
body.tpv .ped-row { padding: 14px 8px; }
body.tpv .ped-row .ped-name { font-size: 16px; }
body.tpv .ped-row input { font-size: 17px; padding: 12px 12px; }
body.tpv .mat-q { font-size: 16px; padding: 13px 14px; }
body.tpv .btn-primary, body.tpv .btn-ghost { padding: 13px 20px; font-size: 12px; }

/* Teclado numérico en pantalla (solo modo TPV). */
#tpv-keypad { position: fixed; left: 50%; transform: translateX(-50%); bottom: 14px; z-index: 1200;
  display: none; grid-template-columns: repeat(3, 1fr); gap: 8px; width: min(320px, 92vw);
  background: var(--paper); border: 1px solid var(--ink); border-radius: 3px; padding: 12px;
  box-shadow: 0 10px 30px rgba(17,16,9,.28); }
#tpv-keypad.on { display: grid; }
#tpv-keypad button { font-family: var(--font); font-size: 22px; font-weight: 700; padding: 14px 0;
  border: 1px solid var(--line); border-radius: 8px; background: var(--cream); color: var(--ink); cursor: pointer; }
#tpv-keypad button:active { background: var(--ink); color: var(--cream); }
#tpv-keypad button.kp-ok { grid-column: 1 / -1; background: var(--ink); color: var(--cream); border-color: var(--ink); letter-spacing: .1em; text-transform: lowercase; font-size: 14px; }
#tpv-keypad .kp-wide { grid-column: span 1; }
</style>

     Sin fuentes externas (regla: cero dependencias nuevas). El módulo cae a su
     propio stack: Courier Prime→monospace del sistema, Fraunces→Georgia. -->

/* Etiqueta ESTÁNDAR de Control M (misma que APPCC): réplica scopeada del

<script>
const API = "/api";
let currentSection = "home";
// Pila de navegación: cada vez que se entra en un detalle se apila cómo VOLVER a
// la pantalla anterior. Así "atrás" regresa al sitio real (no al menú principal).
let _backStack = [];
function navInto(restore){ if (typeof restore === "function") _backStack.push(restore); }
function navReset(){ _backStack = []; }

// Accesibilidad: Enter/Espacio activan los elementos role="button" (tarjetas,
// filas) igual que un clic, para navegación por teclado.
document.addEventListener("keydown", (e) => {
  if ((e.key === "Enter" || e.key === " ") && e.target && e.target.matches && e.target.matches('[role="button"]')) {
    e.preventDefault();
    e.target.click();
  }
});

// ── SISTEMA DE USUARIOS CON ROLES ─────────────────────
// Solo para pintar los botones de login. La autenticación (PIN) la valida el
// backend vía JWT; los PIN ya no viven en el frontend.
const USUARIOS = {
  "Jon":  { rol: "admin",  nombre: "Jon" },
  "Lara": { rol: "equipo", nombre: "Lara" },
  "Moni": { rol: "admin",  nombre: "Mónica" },
};


function getUser()  { try{ return JSON.parse(localStorage.getItem("cm_session")); }catch{ return null; } }
function getToken() { const u = getUser(); return u && u.token; }
function setSession(u) { localStorage.setItem("cm_session", JSON.stringify(u)); }
function logout()   { localStorage.removeItem("cm_session"); location.reload(); }

// ── LOGIN SCREEN ──────────────────────────────────────
let _loginKey = null;

function mostrarLogin() {
  document.body.style.overflow = "auto";
  document.body.innerHTML = `
    <div style="min-height:100vh;background:var(--cream);display:flex;align-items:center;justify-content:center;font-family:var(--font);padding:24px;">
      <div style="text-align:center;color:var(--ink);">
        <span class="mark" style="color:var(--ink);justify-content:center;gap:5px;"><i style="height:30px;width:3px;"></i><i style="height:30px;width:3px;"></i><i style="height:30px;width:3px;"></i></span>
        <div style="font-family:var(--font);font-size:30px;font-weight:700;line-height:1;margin-top:18px;letter-spacing:.01em;">m de materia</div>
        <div style="font-size:9px;letter-spacing:0.24em;text-transform:lowercase;color:var(--muted);margin-top:8px;margin-bottom:52px;">Control de producción</div>
        <div style="font-size:9px;letter-spacing:0.18em;text-transform:lowercase;color:var(--muted);margin-bottom:18px;">¿Quién prepara hoy?</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:40px;">
          ${Object.entries(USUARIOS).map(([k,u]) => `
            <button id="ubtn-${k}" class="ubtn" onclick="seleccionarUsuario('${k}')"
              style="font-family:inherit;font-size:13px;padding:15px 30px;border:1px solid var(--line);color:var(--ink);cursor:pointer;background:none;">
              ${u.nombre}
            </button>`).join("")}
        </div>
        <div id="pin-wrap" style="display:none;">
          <div style="font-size:9px;letter-spacing:0.18em;text-transform:lowercase;color:var(--muted);margin-bottom:16px;">PIN de <span id="pin-quien"></span></div>
          <div id="pin-dots" style="display:flex;gap:16px;justify-content:center;margin-bottom:24px;">
            <span class="pin-dot" data-i="0"></span><span class="pin-dot" data-i="1"></span><span class="pin-dot" data-i="2"></span><span class="pin-dot" data-i="3"></span>
          </div>
          <div class="pin-pad">
            <button type="button" class="pin-key" onclick="pinPush('1')">1</button>
            <button type="button" class="pin-key" onclick="pinPush('2')">2</button>
            <button type="button" class="pin-key" onclick="pinPush('3')">3</button>
            <button type="button" class="pin-key" onclick="pinPush('4')">4</button>
            <button type="button" class="pin-key" onclick="pinPush('5')">5</button>
            <button type="button" class="pin-key" onclick="pinPush('6')">6</button>
            <button type="button" class="pin-key" onclick="pinPush('7')">7</button>
            <button type="button" class="pin-key" onclick="pinPush('8')">8</button>
            <button type="button" class="pin-key" onclick="pinPush('9')">9</button>
            <span></span>
            <button type="button" class="pin-key" onclick="pinPush('0')">0</button>
            <button type="button" class="pin-key pin-key-ghost" onclick="pinDel()" aria-label="Borrar">⌫</button>
          </div>
          <div id="pin-err" style="font-size:11px;color:#E7E4D7;margin-top:18px;min-height:16px;"></div>
        </div>
      </div>
    </div>`;
  document.addEventListener("keydown", _pinKeydown);
}

let _pinVal = "";

function seleccionarUsuario(key) {
  _loginKey = key;
  Object.keys(USUARIOS).forEach(k => {
    const b = document.getElementById("ubtn-"+k);
    if(b) b.style.borderColor = k===key ? "#5C6145" : "#2A2820";
    if(b) b.style.color = k===key ? "#F0EBE0" : "#888070";
  });
  const w = document.getElementById("pin-wrap");
  w.style.display = "block";
  const quien = document.getElementById("pin-quien");
  if (quien) quien.textContent = (USUARIOS[key] && USUARIOS[key].nombre) || "";
  _pinVal = "";
  pintarPinDots();
  document.getElementById("pin-err").textContent = "";
}

function pintarPinDots() {
  document.querySelectorAll("#pin-dots .pin-dot").forEach((d, i) => {
    d.classList.toggle("on", i < _pinVal.length);
  });
}

// Teclado numérico en pantalla: añade un dígito y valida al llegar a 4.
function pinPush(d) {
  if (!_loginKey) return;
  if (_pinVal.length >= 4) return;
  _pinVal += d;
  document.getElementById("pin-err").textContent = "";
  pintarPinDots();
  if (_pinVal.length === 4) checkPin();
}

function pinDel() {
  _pinVal = _pinVal.slice(0, -1);
  document.getElementById("pin-err").textContent = "";
  pintarPinDots();
}

// Soporte de teclado físico (opcional): dígitos, borrar y entrar.
function _pinKeydown(e) {
  if (!document.getElementById("pin-wrap") || document.getElementById("pin-wrap").style.display === "none") return;
  if (e.key >= "0" && e.key <= "9") { pinPush(e.key); e.preventDefault(); }
  else if (e.key === "Backspace") { pinDel(); e.preventDefault(); }
}

async function checkPin() {
  if (_pinVal.length !== 4) return;
  const pin = _pinVal;
  document.getElementById("pin-err").textContent = "";
  try {
    const r = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ usuario: _loginKey, pin }),
    });
    const data = await r.json().catch(() => ({}));
    if (!r.ok) {
      // Mensaje real del servidor: bloqueo por intentos o intentos restantes.
      let msg = data.error || "PIN incorrecto · vuelve a intentarlo";
      if (data.bloqueado && data.segundos) msg = `Cuenta bloqueada · espera ${Math.ceil(data.segundos / 60)} min`;
      else if (data.intentos_restantes != null) msg = `PIN incorrecto · ${data.intentos_restantes} intento(s) restante(s)`;
      document.getElementById("pin-err").textContent = msg;
      _pinVal = "";
      pintarPinDots();
      return;
    }
    setSession({ key: data.usuario.key, nombre: data.usuario.nombre, rol: data.usuario.rol, token: data.token });
    entrarApp();
  } catch (e) {
    document.getElementById("pin-err").textContent = "No se pudo conectar. Inténtalo de nuevo.";
    _pinVal = "";
    pintarPinDots();
  }
}

function renderUserChips() {
  const u = getUser();
  const el = document.getElementById("topbar-user");
  if (!el || !u) return;
  el.innerHTML = `
    <button class="user-chip" onclick="cambiarMiPin()" title="Cambiar PIN" style="margin-right:8px;">${u.nombre}</button>
    <button class="user-chip" onclick="logout()">Salir</button>`;
  // Ajustes arriba a la derecha, solo dueño (visible también en móvil).
  const aj = document.getElementById("tb-ajustes");
  if (aj) aj.style.display = u.rol === "admin" ? "" : "none";
}

// Barra inferior de dominios: marca el activo y navega.
function setTab(name) {
  document.querySelectorAll("#tabbar .tab").forEach((t) => t.classList.toggle("on", t.dataset.tab === name));
  document.getElementById("tb-inicio") && document.getElementById("tb-inicio").classList.toggle("on", !name);
}
function irDominio(name, fn) { setTab(name); try { fn(); } catch (e) {} }

// Cambio de PIN del usuario en sesión (4 dígitos).
async function cambiarMiPin() {
  const actual = prompt("PIN actual (4 dígitos):");
  if (actual == null) return;
  const nuevo = prompt("PIN nuevo (4 dígitos):");
  if (nuevo == null) return;
  if (!/^\d{4}$/.test(nuevo)) { alert("El PIN nuevo debe tener 4 dígitos."); return; }
  try {
    await api("/auth/cambiar-pin", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ pin_actual: actual, pin_nuevo: nuevo }) });
    alert("PIN actualizado. Úsalo la próxima vez que entres.");
  } catch (e) { alert(e.message); }
}

// ── NAVEGACIÓN ────────────────────────────────────────
function goHome() {
  window._backOverride = null; // al ir a inicio se olvida cualquier "volver a…"
  navReset();
  currentSection = "home";
  document.getElementById("topbar-section").textContent = "";
  if (typeof setTab === "function") setTab(null);
  document.getElementById("topbar-back").classList.remove("visible");
  document.getElementById("screen-inner").classList.remove("active");
  document.getElementById("screen-inner").classList.add("exit");
  _ocultaBurbujas();
  document.getElementById("screen-home").classList.add("active");
  document.getElementById("screen-home").classList.remove("exit");
  setTimeout(() => {
    document.getElementById("screen-inner").classList.remove("exit");
  }, 300);
  loadHome();
}

// "Volver": si estamos en una sección que pertenece a una categoría, regresa
// a su submenú (no al inicio). Desde un submenú o el resumen, va al inicio.
function goBack() {
  // Si venimos de la rutina de apertura (profundizamos en una tarea), volver a
  // ESA lista, no a donde vive la tarea.
  if (window._backOverride) {
    const f = window._backOverride; window._backOverride = null;
    return f();
  }
  // Pila de navegación: vuelve a la pantalla anterior real (detalle → lista →
  // subcategoría → …) en vez de saltar al menú.
  if (_backStack.length) {
    const f = _backStack.pop();
    return f();
  }
  const s = currentSection;
  if (s === "home" || s === "resumen" || (typeof s === "string" && s.indexOf("cat-") === 0)) {
    goHome();
    return;
  }
  let parent = null;
  for (const k in CATS) {
    if (CATS[k].ids && CATS[k].ids.indexOf(s) !== -1) { parent = k; break; }
  }
  if (parent) irA_categoria(parent);
  else goHome();
}

let _sectionTitle = "";
function openSection(id, title) {
  currentSection = id;
  _sectionTitle = title;
  document.getElementById("screen-inner").classList.remove("submenu"); // reset rejilla submenú
  document.getElementById("topbar-section").textContent = title;
  document.getElementById("topbar-back").classList.add("visible");
  document.getElementById("screen-home").classList.add("exit");
  document.getElementById("screen-home").classList.remove("active");
  _ocultaBurbujas();
  document.getElementById("screen-inner").classList.add("active");
  document.getElementById("screen-inner").classList.remove("exit");
  document.getElementById("inner-content").innerHTML = `<div class="loading">Cargando…</div>`;
  setTimeout(() => {
    document.getElementById("screen-home").classList.remove("exit");
  }, 300);
}

// ── MÓDULO BURBUJAS ───────────────────────────────────
// El módulo es un bloque persistente con su propia IIFE (se autoinicializa al
// cargar la página). Aquí solo lo mostramos/ocultamos como una pantalla más y
// le fijamos el data-rol de la sesión: "direccion" (Jon/Mónica) o "lara".
function _ocultaBurbujas() {
  ["screen-burbujas", "screen-maceracion"].forEach(function (id) {
    const sb = document.getElementById(id);
    if (sb) { sb.classList.remove("active"); sb.classList.add("exit"); }
  });
}
function irA_maceracion() {
  navInto(() => irA_lab());
  currentSection = "maceracion";
  _sectionTitle = "Maceración";
  document.getElementById("topbar-section").textContent = "Maceración";
  document.getElementById("topbar-back").classList.add("visible");
  document.getElementById("screen-home").classList.remove("active");
  document.getElementById("screen-home").classList.add("exit");
  document.getElementById("screen-inner").classList.remove("active");
  document.getElementById("screen-inner").classList.add("exit");
  document.getElementById("screen-burbujas").classList.remove("active");
  document.getElementById("screen-burbujas").classList.add("exit");

// ── HELPERS ───────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = Object.assign({}, opts.headers || {});
  const t = getToken();
  if (t) headers["Authorization"] = "Bearer " + t;
  const r = await fetch(API + path, Object.assign({}, opts, { headers }));
  if (r.status === 401) { localStorage.removeItem("cm_session"); location.reload(); throw new Error("Sesión expirada"); }
  if (!r.ok) {
    const e = await r.json().catch(() => ({}));
    // Nunca dejar el mensaje vacío: si el servidor no da detalle (502/timeout,
    // HTTP/2 sin statusText…), mostramos al menos el código para diagnosticar.
    const detalle = e.error || r.statusText || (r.status === 502 || r.status === 504 ? "el servidor tardó demasiado en responder" : "");
    throw new Error(detalle || ("error " + r.status));
  }
  return r.json();
}

// Toda alerta del sistema es una TAREA. Tres niveles, una sola pregunta:
// ¿qué tengo que hacer ahora? 🔴 Crítico · 🟡 Importante · 🔵 Informativo.
const DEC_GRUPOS=[
  { key:"critico",     label:"Crítico",     ico:"🔴", color:"#D62A1C" },
  { key:"importante",  label:"Importante",  ico:"🟡", color:"#c79a3a" },
  { key:"informativo", label:"Informativo", ico:"🔵", color:"#3f6079" },
];

// Indexa cada tarea por id para que el botón ejecute su acción directa.
function decIndexar(dec){
  window._decData=dec; window._decIndex={};
  [...(dec.acciones||[]),...(dec.oportunidades||[]),...(dec.riesgos||[])].forEach(x=>{ if(x.id) window._decIndex[x.id]=x; });
}
// Reparte todo en 3 niveles: oportunidades y avisos menores → informativo.
function decBuckets(dec){
  const b={critico:[],importante:[],informativo:[]};
  (dec.acciones||[]).forEach(a=>{ (b[a.severidad]||b.informativo).push(a); });
  (dec.oportunidades||[]).forEach(o=> b.informativo.push(o));
  (dec.riesgos||[]).filter(r=>r.severidad==="info").forEach(r=> b.informativo.push(r));
  return b;
}
function decCuenta(dec){ const b=decBuckets(dec); return { critico:b.critico.length, importante:b.importante.length, informativo:b.informativo.length }; }

// Tarjeta de tarea COMPACTA: título + botón arriba, una línea de detalle.
function accionRow(a, color){
  const sub=[a.tiempo_min?`${a.tiempo_min} min`:null, decEstadoTxt(a.estado), a.motivo].filter(Boolean).join(" · ");
  const btn=a.accion?`<button class="dec-act-btn" onclick="decAccion('${a.id}')">${esc((a.accion.label||"Hacer").toUpperCase())}</button>`:"";
  return `<div class="dec-act" style="border-left:3px solid ${color};">
    <div class="dec-act-top"><span class="dec-act-title">${esc(a.titulo)}</span>${btn}</div>
    <div class="dec-act-sub">${esc(sub)}</div>
  </div>`;
}
function decEstadoTxt(e){ return e==="en_curso"?"en curso":e==="bloqueado"?"bloqueado":e==="hecho"?"hecho":""; }

// Render de los grupos. opts.max limita tareas por grupo (home).
function decGruposHTML(dec, opts){
  const b=decBuckets(dec); let html="";
  DEC_GRUPOS.forEach(g=>{
    const all=b[g.key]; if(!all.length) return;
    const items=(opts&&opts.max)?all.slice(0,opts.max):all;
    html+=`<div class="dec-group"><div class="dec-gh" style="color:${g.color}">${g.ico} ${g.label} · ${all.length}</div>`;
    html+=items.map(x=>accionRow(x,g.color)).join("");
    if(opts&&opts.max&&all.length>opts.max) html+=`<button class="dec-more" onclick="irA_tareas()">+${all.length-opts.max} más →</button>`;
    html+=`</div>`;
  });
  return html || `<div class="todo-clear">✓ Todo hecho. No hay tareas pendientes.</div>`;
}
// Ejecuta el handler de una tarea → acción directa (≤ 1 clic).
function decAccion(id){
  const a=(window._decIndex||{})[id]; if(!a||!a.accion)return;
  const h=a.accion.handler, args=a.accion.args||{};
  if(h==="decisionProducir") return iniciarYAbrir(args.receta_id, args.cantidad);
  // Pasa los args al manejador (irA_pedidos usa proveedor + cantidades sugeridas;
  // el resto de irA_* ignoran el argumento sin problema).
  if(typeof window[h]==="function") return window[h](a.accion.args);
}

// INICIO · pila de decisiones. Reusa el MISMO cerebro (/decisiones): ordena
// crítico → importante → informativo y presenta cada decisión con su acción
// directa (1 clic). Estado ideal = lista vacía → silencio "Todo en orden".
function homeStackHTML(dec, max){
  const b = decBuckets(dec);
  const cls = { critico:"k-critico", importante:"k-importante", informativo:"k-informativo" };
  const all = [];
  ["critico","importante","informativo"].forEach(k => (b[k]||[]).forEach(x => all.push({ x, k })));
  if(!all.length){
    return `<div class="home-clear"><div class="hc-mark">✓</div>
      <div class="hc-txt">Todo en orden.</div>
      <div class="hc-sub">Nada urgente ahora mismo.</div></div>`;
  }
  const shown = max ? all.slice(0, max) : all;
  const rest = all.length - shown.length;
  let html = `<div class="dstack">`;
  shown.forEach(({ x, k }) => {
    const verb = (x.accion && x.accion.label) ? x.accion.label : (k === "critico" ? "revisar" : "ver");
    const sub = [x.tiempo_min ? `${x.tiempo_min} min` : null, decEstadoTxt(x.estado), x.motivo || x.detalle].filter(Boolean).join(" · ");
    const act = x.accion ? `decAccion('${x.id}')` : `irA_tareas()`;
    html += `<button class="drow ${cls[k]}" onclick="${act}">
      <span class="drail"></span>
      <span class="dbody">
        <span class="dkind"><span class="ddot"></span>${esc(verb)}</span>
        <span class="dwhat">${esc(x.titulo)}</span>
        ${sub ? `<span class="dmeta">${esc(sub)}</span>` : ""}
      </span>
      <span class="dchev">→</span>
    </button>`;
  });
  if(rest > 0) html += `<button class="dmore" onclick="irA_tareas()">+${rest} más en la bandeja →</button>`;
  html += `</div>`;
  return html;
}

const CAL_MESES=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const CAL_MESES_L=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const CAL_TIPO={ produccion:"Producción", caducidad:"Caducidad", revision:"Revisión", merma:"Merma", recepcion:"Recepción" };

async function irA_calendario(){
  openSection("calendario","Calendario anual");
  const hoy=new Date();
  if(window._calYear==null) window._calYear=hoy.getFullYear();
  if(window._calMes==null) window._calMes=hoy.getMonth();
  window._calDia=null;
  await cargarCalendario();
}
async function cargarCalendario(){
  setInner(`<div class="empty">Cargando calendario…</div>`);
  try{ window._cal=await api("/calendario?year="+window._calYear); renderCalendario(); }
  catch(e){ setInner(`<div class="err">${e.message}</div>`); }
}
function calYear(delta){ window._calYear+=delta; window._calDia=null; cargarCalendario(); }
function calMes(m){ window._calMes=m; window._calDia=null; renderCalendario(); }
function calDia(f){ window._calDia=(window._calDia===f?null:f); renderCalendario(); }

function renderCalendario(){
  const d=window._cal; if(!d) return;
  const year=window._calYear, mes=window._calMes, dias=d.dias||{}, meses=d.meses||[];
  const tot=meses.reduce((s,m)=>({p:s.p+m.produccion,a:s.a+m.appcc}),{p:0,a:0});
  const chips=CAL_MESES.map((nm,m)=>{
    const activo=m===mes, hay=(meses[m]&&meses[m].total)||0;
    return `<button onclick="calMes(${m})" style="border:1px solid ${activo?'var(--ink)':'var(--line)'};border-radius:7px;padding:6px 9px;margin:2px;font-family:var(--sans);font-size:11px;font-weight:${activo?700:600};letter-spacing:.02em;background:${activo?'var(--ink)':'var(--paper)'};color:${activo?'var(--cream)':'var(--ink)'};cursor:pointer;position:relative;">${nm}${hay?`<span style="position:absolute;top:3px;right:4px;width:4px;height:4px;border-radius:50%;background:${activo?'var(--cream)':'var(--ink)'};"></span>`:""}</button>`;
  }).join("");
  const primero=(new Date(year,mes,1).getDay()+6)%7;
  const nDias=new Date(year,mes+1,0).getDate();
  const cab=["L","M","X","J","V","S","D"].map(x=>`<div style="text-align:center;font-size:9px;letter-spacing:.1em;color:var(--muted);font-weight:700;">${x}</div>`).join("");
  let celdas="";
  for(let i=0;i<primero;i++) celdas+=`<div></div>`;
  for(let dia=1;dia<=nDias;dia++){
    const f=`${year}-${String(mes+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
    const n=(dias[f]||[]).length, esHoy=(f===d.hoy), sel=(f===window._calDia);
    const bg=sel?'var(--ink)':(n?'var(--olive-light)':'var(--paper)');
    const col=sel?'var(--cream)':'var(--ink)';
    const bord=sel?'var(--ink)':(esHoy?'var(--ink)':'var(--line)');
    celdas+=`<button onclick="calDia('${f}')" style="aspect-ratio:1;border:${esHoy&&!sel?'1.5px':'1px'} solid ${bord};border-radius:8px;background:${bg};color:${col};font-family:var(--sans);font-size:12px;font-weight:${n?700:400};cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;line-height:1;">${dia}${n?`<span style="font-size:7.5px;font-weight:700;margin-top:1px;opacity:${sel?1:.7};">·${n}·</span>`:""}</button>`;
  }
  let detalle="";
  if(window._calDia){
    const evs=dias[window._calDia]||[];
    const fdmt=new Date(window._calDia+"T00:00:00").toLocaleDateString("es-ES",{weekday:"long",day:"numeric",month:"long"});
    detalle=`<div class="section-label" style="margin-top:14px;">${esc(fdmt)}</div>`;
    detalle+= evs.length? evs.map(e=>`<div class="card"><div class="card-name">${e.hora?`<span style="color:var(--muted);font-weight:600;">${esc(e.hora)}</span> `:""}${esc(e.titulo||CAL_TIPO[e.tipo]||e.tipo)}</div>${e.detalle?`<div class="card-meta">${esc(e.detalle)}${e.responsable?` · ${esc(e.responsable)}`:""}</div>`:""}</div>`).join("")
      : `<div class="empty" style="padding:14px;">Sin registros ese día.</div>`;
  }else{
    detalle=`<div class="card-meta" style="margin-top:12px;color:var(--muted);text-align:center;font-size:11px;">Toca un día con actividad para ver todo lo que pasó.</div>`;
  }
  setInner(`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <button onclick="calYear(-1)" style="border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:8px;padding:6px 14px;font-size:15px;cursor:pointer;">‹</button>
      <div style="text-align:center;"><div style="font-family:var(--sans);font-size:19px;font-weight:700;letter-spacing:.02em;">${year}</div>
        <div style="font-size:9.5px;letter-spacing:.06em;color:var(--muted);margin-top:1px;">${tot.p} producciones · ${tot.a} registros APPCC</div></div>
      <button onclick="calYear(1)" style="border:1px solid var(--line);background:var(--paper);color:var(--ink);border-radius:8px;padding:6px 14px;font-size:15px;cursor:pointer;">›</button>
    </div>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;margin-bottom:12px;">${chips}</div>
    <div class="section-label">${CAL_MESES_L[mes]}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:5px;">${cab}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">${celdas}</div>
    ${detalle}`);
}
